<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=no">
    <title>Rucoy Online - ПОЛНАЯ ВЕРСИЯ</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { background: #0a0c12; overflow: hidden; position: fixed; width: 100%; height: 100%; font-family: 'Courier New', monospace; touch-action: none; }
        canvas { display: block; position: fixed; top: 0; left: 0; width: 100%; height: 100%; cursor: pointer; background: #1a2a1a; }
        .vertical-buttons { position: fixed; bottom: 20px; left: 15px; display: flex; flex-direction: column; gap: 12px; z-index: 100; pointer-events: auto; }
        .v-btn { width: 60px; height: 60px; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); border: 2px solid #ffaa55; border-radius: 50%; color: #ffcc88; font-size: 28px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 0 #1a1c2a; cursor: pointer; transition: 0.03s linear; }
        .v-btn:active { transform: translateY(2px); }
        .super-btn { background: rgba(200,100,50,0.9); border-color: #ffaa66; }
        .hp-btn { background: rgba(180,60,60,0.9); border-color: #ff8866; }
        .mp-btn { background: rgba(60,80,180,0.9); border-color: #88aaff; }
        .corner-btn { position: fixed; top: 15px; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); border: 1px solid #ffaa55; color: #ffcc88; font-size: 14px; font-weight: bold; padding: 8px 14px; border-radius: 30px; cursor: pointer; font-family: monospace; z-index: 100; }
        .stats-btn { right: 15px; }
        .inventory-btn { left: 15px; }
        .corner-btn:active { transform: translateY(2px); }
        @media (max-width: 700px) { .v-btn { width: 50px; height: 50px; font-size: 24px; } .corner-btn { font-size: 11px; padding: 5px 10px; } }
    </style>
</head>

<script>
(function(){
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // ========== МИРЫ ==========

    // ========== ВСЯ БРОНЯ ==========

    const WEAPONS = {

        sword: { name: "Меч", dmgMin: 12, dmgMax: 22, level: 3, price: 250, icon: "⚔️", type: "melee", range: 60 },
        claymore: { name: "Двуручный меч", dmgMin: 20, dmgMax: 35, level: 6, price: 700, icon: "🗡️✨", type: "melee", range: 65 },
        bow: { name: "Лук", dmgMin: 14, dmgMax: 26, level: 3, price: 300, icon: "🏹", type: "ranged", range: 150 },
        crossbow: { name: "Арбалет", dmgMin: 22, dmgMax: 40, level: 8, price: 900, icon: "🏹✨", type: "ranged", range: 160 },

        wand: { name: "Жезл", dmgMin: 26, dmgMax: 48, level: 10, price: 1200, icon: "🔮✨", type: "mage", range: 150 },
        dragonfang: { name: "Драконий клык", dmgMin: 38, dmgMax: 62, level: 20, price: 4000, icon: "🐉⚔️", type: "melee", range: 68 },
        legendary: { name: "Легендарный меч", dmgMin: 52, dmgMax: 88, level: 30, price: 10000, icon: "⭐⚔️", type: "melee", range: 70 }
    };
    
    // ========== КЛАССЫ ==========
    const CLASSES = {

        archer: { name: "Лучник", icon: "🏹", color: "#7cae6c", armorColor: "#6a8a5a", hpBase: 360, mpBase: 170, crit: 18, dodge: 12, skill: "Тройной выстрел", skillDesc: "3 стрелы x3.2 урона" },
        mage: { name: "Маг", icon: "🔮", color: "#b57ad6", armorColor: "#9a6aba", hpBase: 300, mpBase: 300, crit: 15, dodge: 9, skill: "Огненный взрыв", skillDesc: "Взрыв по клику x2.8" }
    };
    
    // ========== МОБЫ (ВСЕ ВИДЫ) ==========
    const MOB_TYPES = [
        { name: "Гоблин", hp: 85, dmg: 22, exp: 48, color: "#6f8c5a", skin: "#8cae6a", icon: "👺", speed: 1.05, range: 60, levelMin: 1, goldMin: 25, goldMax: 55 },
        { name: "Тролль", hp: 165, dmg: 33, exp: 82, color: "#7a6a4a", skin: "#9a8a62", icon: "👹", speed: 0.78, range: 64, levelMin: 2, goldMin: 42, goldMax: 82 },
        { name: "Скелет", hp: 220, dmg: 42, exp: 118, color: "#b8b8cc", skin: "#d0d0e0", icon: "💀", speed: 1.12, range: 60, levelMin: 3, goldMin: 60, goldMax: 110 },
        { name: "Орк", hp: 305, dmg: 56, exp: 168, color: "#8a6a4a", skin: "#aa8262", icon: "👺", speed: 0.88, range: 64, levelMin: 4, goldMin: 82, goldMax: 155 },
        { name: "Волк", hp: 130, dmg: 31, exp: 72, color: "#8a9ac6", skin: "#c0d0f0", icon: "🐺", speed: 1.35, range: 56, levelMin: 2, goldMin: 35, goldMax: 72 },
        { name: "Элементаль", hp: 190, dmg: 46, exp: 108, color: "#d97a3a", skin: "#f0a060", icon: "🔥", speed: 0.95, range: 62, levelMin: 3, goldMin: 52, goldMax: 98 },
        { name: "Голем", hp: 390, dmg: 62, exp: 210, color: "#8a8a7a", skin: "#aaa890", icon: "🗿", speed: 0.55, range: 70, levelMin: 5, goldMin: 105, goldMax: 185 },
        { name: "Дракон", hp: 420, dmg: 74, exp: 265, color: "#c97a3a", skin: "#e09a5a", icon: "🐉", speed: 0.62, range: 70, levelMin: 6, goldMin: 125, goldMax: 225 },
        { name: "Призрак", hp: 230, dmg: 52, exp: 142, color: "#6a5a8a", skin: "#8a7ab0", icon: "👻", speed: 1.2, range: 58, levelMin: 4, goldMin: 72, goldMax: 125 },
        { name: "Энт", hp: 480, dmg: 66, exp: 310, color: "#5a8a4a", skin: "#7aaa62", icon: "🌳", speed: 0.5, range: 72, levelMin: 7, goldMin: 165, goldMax: 285 },
        { name: "Вампир", hp: 280, dmg: 58, exp: 185, color: "#8a5a6a", skin: "#b07a8a", icon: "🧛", speed: 1.1, range: 62, levelMin: 5, goldMin: 95, goldMax: 165 },
        { name: "Демон", hp: 550, dmg: 88, exp: 420, color: "#aa5a5a", skin: "#cc7a7a", icon: "😈", speed: 0.7, range: 68, levelMin: 9, goldMin: 220, goldMax: 380 }
    ];
    
    // ========== РАЗМЕР МИРА ==========
    const WORLD_WIDTH = 7800;
    const WORLD_HEIGHT = 6200;
    
    let cameraX = 0, cameraY = 0;
    let canvasWidth, canvasHeight;
    
    function resizeCanvas() { canvasWidth = window.innerWidth; canvasHeight = window.innerHeight; canvas.width = canvasWidth; canvas.height = canvasHeight; }
    window.addEventListener('resize', () => { resizeCanvas(); updateCamera(); });
    resizeCanvas();
    
    // ========== СТАТИСТИКА ==========
    let stats = {
        mobsKilled: 0, totalGold: 0, totalDamage: 0, totalDamageTaken: 0,
        criticalHits: 0, dodges: 0, skillsUsed: 0, potionsUsed: 0,
        startTime: Date.now()
    };
    function getPlayTime() { let s = Math.floor((Date.now() - stats.startTime) / 1000); return { h: Math.floor(s/3600), m: Math.floor((s%3600)/60), s: s%60 }; }
    
    // ========== ИНВЕНТАРЬ ==========
    let inventory = {
        potionHp: 5, potionMp: 5, potionBigHp: 1, potionBigMp: 1,
        armorId: "cloth", weaponId: "dagger",
        armor: "Тканевая броня", armorDef: 4,
        weapon: "Кинжал", weaponDmgMin: 6, weaponDmgMax: 12, weaponRange: 55, weaponType: "melee"
    };
    
    // ========== БЕЗОПАСНАЯ ЗОНА ==========
    let safeZone = { x: 700, y: 600, width: 700, height: 540 };
    let npcs = {
        shop: { x: safeZone.x + safeZone.width - 120, y: safeZone.y + safeZone.height - 90, radius: 35, name: "Торговец", icon: "🏪" },
        healer: { x: safeZone.x + 100, y: safeZone.y + safeZone.height - 90, radius: 35, name: "Лекарь", icon: "💚" },
        banker: { x: safeZone.x + safeZone.width/2, y: safeZone.y + 80, radius: 35, name: "Банкир", icon: "🏦" },
        worldPortal: { x: safeZone.x + safeZone.width - 250, y: safeZone.y + 50, radius: 35, name: "Портал миров", icon: "🌍" }
    };
    
    let gates = [
        { x: safeZone.x + safeZone.width/2 - 80, y: safeZone.y - 45, width: 160, height: 55 },
        { x: safeZone.x + safeZone.width/2 - 80, y: safeZone.y + safeZone.height - 10, width: 160, height: 55 },
        { x: safeZone.x - 45, y: safeZone.y + safeZone.height/2 - 80, width: 55, height: 160 },
        { x: safeZone.x + safeZone.width - 10, y: safeZone.y + safeZone.height/2 - 80, width: 55, height: 160 }
    ];
    
    function isInSafeZone(x,y) { return x>safeZone.x && x<safeZone.x+safeZone.width && y>safeZone.y && y<safeZone.y+safeZone.height; }
    function isAtGate(x,y) { for(let g of gates) if(x>g.x && x<g.x+g.width && y>g.y && y<g.y+g.height) return true; return false; }
    function canCrossBoundary(fx,fy,tx,ty) { let was=isInSafeZone(fx,fy), will=isInSafeZone(tx,ty); if(was===will) return true; let mx=(fx+tx)/2, my=(fy+ty)/2; return isAtGate(mx,my) || isAtGate(tx,ty) || isAtGate(fx,fy); }
    
    // ========== ПРЕПЯТСТВИЯ ==========
    let obstacles = [];
    function generateWorld() {
        obstacles = [];
        for(let i=0;i<52;i++) { let fx=safeZone.x+i*30; if(!(fx>gates[0].x-35 && fx<gates[0].x+gates[0].width+35)) obstacles.push({x:fx,y:safeZone.y-28,radius:15,type:'fence'}); if(!(fx>gates[1].x-35 && fx<gates[1].x+gates[1].width+35)) obstacles.push({x:fx,y:safeZone.y+safeZone.height+18,radius:15,type:'fence'}); }
        for(let i=0;i<44;i++) { let fy=safeZone.y+i*30; if(!(fy>gates[2].y-35 && fy<gates[2].y+gates[2].height+35)) obstacles.push({x:safeZone.x-28,y:fy,radius:15,type:'fence'}); if(!(fy>gates[3].y-35 && fy<gates[3].y+gates[3].height+35)) obstacles.push({x:safeZone.x+safeZone.width+18,y:fy,radius:15,type:'fence'}); }
        for(let i=0;i<700;i++) { let x=120+Math.random()*(WORLD_WIDTH-240), y=120+Math.random()*(WORLD_HEIGHT-240); if(x>safeZone.x-120 && x<safeZone.x+safeZone.width+120 && y>safeZone.y-120 && y<safeZone.y+safeZone.height+120) continue; obstacles.push({x,y,radius:30,type:'tree'}); }
        for(let i=0;i<150;i++) { let x=150+Math.random()*(WORLD_WIDTH-300), y=150+Math.random()*(WORLD_HEIGHT-300); if(x>safeZone.x-140 && x<safeZone.x+safeZone.width+140 && y>safeZone.y-140 && y<safeZone.y+safeZone.height+140) continue; obstacles.push({x,y,radius:48,type:'mountain'}); }
        for(let i=0;i<400;i++) { let x=70+Math.random()*(WORLD_WIDTH-140), y=70+Math.random()*(WORLD_HEIGHT-140); if(x>safeZone.x-90 && x<safeZone.x+safeZone.width+90 && y>safeZone.y-90 && y<safeZone.y+safeZone.height+90) continue; obstacles.push({x,y,radius:20,type:'rock'}); }
        for(let i=0;i<350;i++) { let x=50+Math.random()*(WORLD_WIDTH-100), y=50+Math.random()*(WORLD_HEIGHT-100); if(x>safeZone.x-70 && x<safeZone.x+safeZone.width+70 && y>safeZone.y-70 && y<safeZone.y+safeZone.height+70) continue; obstacles.push({x,y,radius:14,type:'bush'}); }
        for(let r=0;r<25;r++) { let sx=250+Math.random()*(WORLD_WIDTH-500), sy=200+Math.random()*(WORLD_HEIGHT-400), ang=Math.random()*Math.PI*2, len=500+Math.random()*600; for(let s=0;s<30;s++) { let t=s/29, x=sx+Math.cos(ang)*len*t+(Math.random()-0.5)*60, y=sy+Math.sin(ang)*len*t+(Math.random()-0.5)*60; if(x>safeZone.x-180 && x<safeZone.x+safeZone.width+180 && y>safeZone.y-180 && y<safeZone.y+safeZone.height+180) continue; obstacles.push({x,y,radius:24,type:'river'}); } }
    }
    function isWalkable(x,y,r=28) { if(x-r<40 || x+r>WORLD_WIDTH-40 || y-r<40 || y+r>WORLD_HEIGHT-40) return false; for(let o of obstacles) if(Math.hypot(x-o.x,y-o.y)<r+o.radius) return false; return true; }
    function canMoveTo(x,y,r=28) { return isWalkable(x,y,r) && canCrossBoundary(player.x,player.y,x,y); }
    
    // ========== МОБЫ ==========
    let mobs = [], spawnTimer = 0, MAX_MOBS = 48;
    function createMob() { let avail=MOB_TYPES.filter(m=>player.level>=m.levelMin); if(avail.length===0) avail=MOB_TYPES; let t=avail[Math.floor(Math.random()*avail.length)]; let lvl=Math.max(1,player.level+Math.floor(Math.random()*6)-3); let mult=WORLDS[currentWorld].mobMultiplier; let hpMult=1+(lvl-1)*0.16; let dmgMult=1+(lvl-1)*0.14; return { name:`${t.name} Lv.${lvl}`, level:lvl, hp:Math.floor(t.hp*hpMult*mult), maxHp:Math.floor(t.hp*hpMult*mult), dmg:Math.floor(t.dmg*dmgMult), exp:Math.floor(t.exp*(0.85+lvl*0.12)*mult), goldMin:Math.floor(t.goldMin*(0.8+lvl*0.05)), goldMax:Math.floor(t.goldMax*(0.9+lvl*0.07)), color:t.color, skin:t.skin, icon:t.icon, speed:t.speed, attackRange:t.range, x:0,y:0, attackTimer:0 }; }
    function spawnMob() { if(mobs.length>=MAX_MOBS) return; for(let a=0;a<80;a++) { let x=200+Math.random()*(WORLD_WIDTH-400), y=180+Math.random()*(WORLD_HEIGHT-360); if(isWalkable(x,y,30) && !isInSafeZone(x,y) && Math.hypot(x-player.x,y-player.y)>260) { let m=createMob(); m.x=x; m.y=y; mobs.push(m); return; } } }
    
    // ========== ИГРОК ==========
    let player = {
        x: safeZone.x + safeZone.width/2, y: safeZone.y + safeZone.height/2,
        targetX: null, targetY: null, path: [],
        hp: 450, maxHp: 450, mp: 100, maxMp: 100,
        level: 1, exp: 0, expToNext: 120,
        classType: "warrior",
        gold: 800, bankGold: 0,
        speed: 5.2, defense: 8,
        attackTimer: 0, superCooldown: 0,
        critChance: 12, dodgeChance: 6
    };
    
    function updateGear() {
        let armor = ARMORS[inventory.armorId];
        let weapon = WEAPONS[inventory.weaponId];
        inventory.armor = armor.name;
        inventory.armorDef = armor.def;
        inventory.weapon = weapon.name;
        inventory.weaponDmgMin = weapon.dmgMin;
        inventory.weaponDmgMax = weapon.dmgMax;
        inventory.weaponRange = weapon.range;
        inventory.weaponType = weapon.type;
        player.defense = armor.def + Math.floor(player.level * 1.3);
        let cls = CLASSES[player.classType];
        player.critChance = cls.crit + Math.floor(player.level * 0.5);
        player.dodgeChance = cls.dodge + Math.floor(player.level * 0.4);
        player.maxHp = cls.hpBase + player.level * 18;
        player.maxMp = cls.mpBase + player.level * 14;
        if(player.hp > player.maxHp) player.hp = player.maxHp;
        if(player.mp > player.maxMp) player.mp = player.maxMp;
    }
    
    function getDamageRange() { return { min: inventory.weaponDmgMin + Math.floor(player.level * 2.5), max: inventory.weaponDmgMax + Math.floor(player.level * 3.2) }; }
    function getAttackRange() { return inventory.weaponRange; }
    
    // ========== ПУТЬ ==========
    function findPath(sx,sy,tx,ty) { let path=[], dx=tx-sx, dy=ty-sy, dist=Math.hypot(dx,dy); if(dist<22) return path; let steps=Math.min(100,Math.floor(dist/15)); for(let i=1;i<=steps;i++) { let t=i/steps, nx=sx+dx*t, ny=sy+dy*t; if(canMoveTo(nx,ny,28)) path.push({x:nx,y:ny}); else { let ang=Math.atan2(dy,dx); for(let off of [-1.5,1.5,-2.3,2.3,-3.2,3.2]) { let nx2=sx+dx*t+Math.cos(ang+off)*58, ny2=sy+dy*t+Math.sin(ang+off)*58; if(canMoveTo(nx2,ny2,28)) { path.push({x:nx2,y:ny2}); break; } } } } path.push({x:tx,y:ty}); return path; }
    function moveTo(x,y) { player.targetX=x; player.targetY=y; player.path=findPath(player.x,player.y,x,y); }
    function updateMove() { if(!player.path||player.path.length===0) return; let next=player.path[0], dx=next.x-player.x, dy=next.y-player.y, dist=Math.hypot(dx,dy); if(dist<14) player.path.shift(); else { let step=Math.min(player.speed,dist), ang=Math.atan2(dy,dx), nx=player.x+Math.cos(ang)*step, ny=player.y+Math.sin(ang)*step; if(canMoveTo(nx,ny,28)) { player.x=nx; player.y=ny; } else { player.path=[]; player.targetX=null; } } }
    
    // ========== БОЙ ==========
    let selectedMob = null, messages = [], damageFloats = [], showStats = false, showInventory = false, shopOpen = false, bankOpen = false, shopCategory = "potions", explosionTarget = null, whirlwindActive = false, whirlwindTimer = 0;
    function addMsg(t,e=false) { messages.unshift({text:t,isErr:e,life:220}); if(messages.length>7) messages.pop(); }
    function showDamage(x,y,dmg,isPlayer=false,isCrit=false) { damageFloats.push({x,y,dmg,life:26,isPlayer,isCrit}); }
    function calculateDamage() { let {min,max}=getDamageRange(); let dmg=Math.floor(Math.random()*(max-min+1)+min); let isCrit=Math.random()*100<player.critChance; if(isCrit) { dmg=Math.floor(dmg*1.9); stats.criticalHits++; } return {dmg,isCrit}; }
    function killMob(mob) { let expGain=mob.exp, goldGain=Math.floor(mob.goldMin+Math.random()*(mob.goldMax-mob.goldMin)); player.exp+=expGain; player.gold+=goldGain; stats.mobsKilled++; stats.totalGold+=goldGain; addMsg(`✨ +${expGain} опыта, +${goldGain}💰`); if(Math.random()<0.45) { if(Math.random()<0.6) inventory.potionHp++; else inventory.potionMp++; addMsg(`🧪 Выпало зелье!`); } if(Math.random()<0.18) { if(Math.random()<0.6) inventory.potionBigHp++; else inventory.potionBigMp++; addMsg(`✨ Выпало большое зелье!`); } let idx=mobs.indexOf(mob); if(idx!==-1) mobs.splice(idx,1); if(selectedMob===mob) selectedMob=null; while(player.exp>=player.expToNext) { player.exp-=player.expToNext; player.level++; updateGear(); player.hp=player.maxHp; player.mp=player.maxMp; player.expToNext=120+player.level*48; addMsg(`⭐⭐⭐⭐⭐ УРОВЕНЬ ${player.level}! ⭐⭐⭐⭐⭐`); } }
    function playerAttack() { if(!selectedMob||selectedMob.hp<=0) { selectedMob=null; return false; } if(player.attackTimer>0) return false; let dist=Math.hypot(player.x-selectedMob.x,player.y-selectedMob.y); let range=getAttackRange(); if(dist>range) { addMsg(`🏃 Слишком далеко! (${Math.floor(dist)}/${range}px)`,true); return false; } let {dmg,isCrit}=calculateDamage(); selectedMob.hp-=dmg; stats.totalDamage+=dmg; player.attackTimer=28; let cls=CLASSES[player.classType]; addMsg(`⚔️ ${cls.name} → ${dmg} урона${isCrit?" (КРИТ!)":""} ${selectedMob.name}!`); showDamage(selectedMob.x,selectedMob.y,dmg,false,isCrit); if(selectedMob.hp<=0) killMob(selectedMob); return true; }

    function drawMob(m) { let x=m.x-cameraX, y=m.y-cameraY; if(x<-150||x>canvasWidth+150) return; ctx.fillStyle=m.skin; ctx.fillRect(x-22,y-34,44,62); ctx.fillStyle=m.color; ctx.fillRect(x-20,y-26,40,48); ctx.fillStyle="#000"; ctx.fillRect(x-14,y-28,8,8); ctx.fillRect(x+6,y-28,8,8); ctx.font=`${Math.min(34,canvasWidth/24)}px monospace`; ctx.fillStyle="#fff"; ctx.fillText(m.icon,x-16,y+2); let percent=m.hp/m.maxHp; ctx.fillStyle="#a33"; ctx.fillRect(x-36,y-54,88,9); ctx.fillStyle="#4f6"; ctx.fillRect(x-36,y-54,88*percent,9); ctx.font="11px monospace"; ctx.fillStyle="#ffffaa"; ctx.fillText(`Lv.${m.level}`,x-18,y-60); }
    function drawUI() { let cls=CLASSES[player.classType], fs=Math.max(14,Math.min(18,canvasWidth/48)); ctx.fillStyle="#000000aa"; ctx.fillRect(12,12,300,128); ctx.fillStyle="#c55"; ctx.fillRect(18,20,280,28); ctx.fillStyle="#f75"; ctx.fillRect(18,20,280*(player.hp/player.maxHp),28); ctx.fillStyle="#58f"; ctx.fillRect(18,56,280*(player.mp/player.maxMp),24); ctx.fillStyle="#fff"; ctx.font=`bold ${fs}px monospace`; ctx.fillText(`❤️ ${Math.floor(player.hp)}/${player.maxHp}`,22,44); ctx.fillText(`💙 ${Math.floor(player.mp)}/${player.maxMp}`,22,78); ctx.fillStyle="#fd9"; ctx.font=`bold ${fs+2}px monospace`; ctx.fillText(`${cls.name} ${cls.icon} Lv.${player.level}`,22,110); ctx.fillStyle="#000000aa"; ctx.fillRect(12,148,300,22); ctx.fillStyle="#8af"; ctx.fillRect(12,148,300*(player.exp/player.expToNext),22); ctx.fillStyle="#fff"; ctx.font=`${fs-2}px monospace`; ctx.fillText(`EXP: ${player.exp}/${player.expToNext}`,18,168); ctx.fillStyle="#000000aa"; ctx.fillRect(canvasWidth-190,12,178,88); ctx.fillStyle="#fc8"; ctx.font=`bold ${fs}px monospace`; ctx.fillText(`💰 ${player.gold}`,canvasWidth-180,38); ctx.fillText(`🏦 ${player.bankGold}`,canvasWidth-180,68); ctx.fillText(`🌍 ${WORLDS[currentWorld].name}`,canvasWidth-180,98); for(let i=0;i<Math.min(6,messages.length);i++) { let m=messages[i]; ctx.fillStyle=m.isErr?"#f86c":"#edbc"; ctx.font=`${fs-2}px monospace`; ctx.fillText(m.text.substring(0,44),15,canvasHeight-75-i*22); } if(selectedMob&&selectedMob.hp>0) { let x=selectedMob.x-cameraX, y=selectedMob.y-cameraY; ctx.strokeStyle="#fa4"; ctx.lineWidth=4; ctx.strokeRect(x-26,y-42,76,76); } if(player.targetX&&player.path&&player.path.length>0) { let tx=player.targetX-cameraX, ty=player.targetY-cameraY; ctx.fillStyle="#fc4a"; ctx.beginPath(); ctx.arc(tx,ty,22,0,Math.PI*2); ctx.fill(); ctx.fillStyle="#fa0"; ctx.beginPath(); ctx.arc(tx,ty,14,0,Math.PI*2); ctx.fill(); } for(let i=0;i<damageFloats.length;i++) { let d=damageFloats[i], x=d.x-cameraX, y=d.y-cameraY; if(d.isExplosion) { ctx.font="bold 44px monospace"; ctx.fillStyle="#ff8844"; ctx.fillText("💥",x-22,y-34); } else { ctx.font=`bold ${d.isPlayer?24:28}px monospace`; ctx.fillStyle=d.isCrit?"#ffaa44":(d.isPlayer?"#fa6":"#f84"); ctx.fillText(d.isCrit?`⚡${d.dmg}⚡`:`-${d.dmg}`,x-18,y-40); } d.life--; if(d.life<=0) damageFloats.splice(i,1),i--; } if(shopOpen&&isInSafeZone(player.x,player.y)) { ctx.fillStyle="#000000dd"; ctx.fillRect(canvasWidth/2-280,canvasHeight/2-240,560,480); ctx.fillStyle="#fd9"; ctx.font=`bold ${Math.min(28,canvasWidth/24)}px monospace`; ctx.fillText("🏪 МАГАЗИН",canvasWidth/2-100,canvasHeight/2-190); ctx.font="12px monospace"; ctx.fillStyle="#cca"; ctx.fillText("ЗЕЛЬЯ",canvasWidth/2-260,canvasHeight/2-140); for(let i=0;i<SHOP_POTIONS.length;i++) { let it=SHOP_POTIONS[i], y=canvasHeight/2-120+i*65; ctx.fillStyle="#a86"; ctx.fillRect(canvasWidth/2-260,y-10,240,48); ctx.fillStyle="#fc8"; ctx.font="14px monospace"; ctx.fillText(`${it.icon} ${it.name} - ${it.price}💰`,canvasWidth/2-240,y+12); } ctx.fillStyle="#cca"; ctx.fillText("БРОНЯ",canvasWidth/2+40,canvasHeight/2-140); for(let i=0;i<SHOP_ARMORS.length;i++) { let it=SHOP_ARMORS[i], y=canvasHeight/2-120+i*55; ctx.fillStyle="#a86"; ctx.fillRect(canvasWidth/2+20,y-10,240,44); ctx.fillStyle="#fc8"; ctx.font="12px monospace"; ctx.fillText(`${it.icon} ${it.name} (Ур.${it.level}) +${it.def} - ${it.price}💰`,canvasWidth/2+40,y+10); } ctx.fillStyle="#cca"; ctx.fillText("ОРУЖИЕ",canvasWidth/2+40,canvasHeight/2+180); for(let i=0;i<SHOP_WEAPONS.length;i++) { let it=SHOP_WEAPONS[i], y=canvasHeight/2+200+i*55; ctx.fillStyle="#a86"; ctx.fillRect(canvasWidth/2+20,y-10,240,44); ctx.fillStyle="#fc8"; ctx.font="12px monospace"; ctx.fillText(`${it.icon} ${it.name} (Ур.${it.level}) ${it.dmgMin}-${it.dmgMax} - ${it.price}💰`,canvasWidth/2+40,y+10); } } if(bankOpen&&isInSafeZone(player.x,player.y)) { ctx.fillStyle="#000000dd"; ctx.fillRect(canvasWidth/2-240,canvasHeight/2-170,480,340); ctx.fillStyle="#fd9"; ctx.font=`bold ${Math.min(28,canvasWidth/24)}px monospace`; ctx.fillText("🏦 БАНК",canvasWidth/2-65,canvasHeight/2-100); ctx.fillStyle="#a86"; ctx.fillRect(canvasWidth/2-180,canvasHeight/2-30,360,60); ctx.fillStyle="#fc8"; ctx.font="18px monospace"; ctx.fillText(`💰 Внести 200💰`,canvasWidth/2-130,canvasHeight/2+2); ctx.fillStyle="#a86"; ctx.fillRect(canvasWidth/2-180,canvasHeight/2+55,360,60); ctx.fillStyle="#fc8"; ctx.fillText(`🏦 Снять 200💰`,canvasWidth/2-130,canvasHeight/2+87); ctx.fillStyle="#ffdd99"; ctx.font="16px monospace"; ctx.fillText(`Ваш счет: ${player.bankGold}💰`,canvasWidth/2-85,canvasHeight/2+150); } if(showStats) { let t=getPlayTime(); ctx.fillStyle="#000000dd"; ctx.fillRect(canvasWidth/2-280,canvasHeight/2-250,560,500); ctx.fillStyle="#fd9"; ctx.font=`bold ${Math.min(30,canvasWidth/22)}px monospace`; ctx.fillText("📊 СТАТИСТИКА",canvasWidth/2-120,canvasHeight/2-180); ctx.font=`${Math.min(18,canvasWidth/34)}px monospace`; ctx.fillStyle="#edb"; let y=canvasHeight/2-100; ctx.fillText(`👾 Убито мобов: ${stats.mobsKilled}`,canvasWidth/2-240,y); ctx.fillText(`💰 Всего золота: ${stats.totalGold}`,canvasWidth/2-240,y+38); ctx.fillText(`⚔️ Нанесено урона: ${stats.totalDamage}`,canvasWidth/2-240,y+76); ctx.fillText(`🛡️ Получено урона: ${stats.totalDamageTaken}`,canvasWidth/2-240,y+114); ctx.fillText(`⚡ Криты: ${stats.criticalHits}`,canvasWidth/2-240,y+152); ctx.fillText(`✨ Увороты: ${stats.dodges}`,canvasWidth/2-240,y+190); ctx.fillText(`🌟 Суперсилы: ${stats.skillsUsed}`,canvasWidth/2-240,y+228); ctx.fillText(`🧪 Зелий: ${stats.potionsUsed}`,canvasWidth/2-240,y+266); ctx.fillText(`⏱️ Время: ${t.h}ч ${t.m}м ${t.s}с`,canvasWidth/2-240,y+304); } if(showInventory) { ctx.fillStyle="#000000dd"; ctx.fillRect(canvasWidth/2-260,canvasHeight/2-250,520,500); ctx.fillStyle="#fd9"; ctx.font=`bold ${Math.min(30,canvasWidth/24)}px monospace`; ctx.fillText("🎒 ИНВЕНТАРЬ",canvasWidth/2-100,canvasHeight/2-180); ctx.font=`${Math.min(16,canvasWidth/36)}px monospace`; ctx.fillStyle="#edb"; let y=canvasHeight/2-110; ctx.fillText(`🧪 Малые HP: ${inventory.potionHp}`,canvasWidth/2-220,y); ctx.fillText(`💙 Малые MP: ${inventory.potionMp}`,canvasWidth/2-220,y+32); ctx.fillText(`✨ Большие HP: ${inventory.potionBigHp}`,canvasWidth/2-220,y+64); ctx.fillText(`✨ Большие MP: ${inventory.potionBigMp}`,canvasWidth/2-220,y+96); ctx.fillText(`🛡️ ${inventory.armor} +${inventory.armorDef}`,canvasWidth/2-220,y+138); ctx.fillText(`⚔️ ${inventory.weapon} ${inventory.weaponDmgMin}-${inventory.weaponDmgMax}`,canvasWidth/2-220,y+170); ctx.fillStyle="#fda"; ctx.fillText(`💰 Золото: ${player.gold}`,canvasWidth/2-220,y+212); ctx.fillStyle="#8af"; ctx.fillText(`⭐ Уровень: ${player.level}`,canvasWidth/2-220,y+244); ctx.fillStyle="#4f6"; ctx.fillText(`🛡️ Защита: ${Math.floor(player.defense)}`,canvasWidth/2-220,y+276); ctx.fillStyle="#fa4"; ctx.fillText(`🎯 Крит: ${player.critChance}% | Уворот: ${player.dodgeChance}%`,canvasWidth/2-220,y+308); } if(player.superCooldown>0) { let p=player.superCooldown/180; ctx.fillStyle="#000000aa"; ctx.fillRect(15,canvasHeight-85,90,16); ctx.fillStyle="#ffaa44"; ctx.fillRect(15,canvasHeight-85,90*(1-p),16); ctx.fillStyle="#ffaa88"; ctx.font="12px monospace"; ctx.fillText(`🌟 ${Math.ceil(player.superCooldown/10)}с`,22,canvasHeight-66); } ctx.fillStyle="#ffffffaa"; ctx.font="11px monospace"; ctx.fillText(`⚔️ Урон: ${getDamageRange().min}-${getDamageRange().max}`,canvasWidth-170,canvasHeight-30); ctx.fillText(`🎯 Дальность: ${getAttackRange()}px`,canvasWidth-170,canvasHeight-15); }
    
    // ========== ОБНОВЛЕНИЕ ==========
    function update() { updateMove(); updateMobs(); updateCamera(); if(player.attackTimer>0) player.attackTimer--; if(player.superCooldown>0) player.superCooldown--; if(spawnTimer<=0) { if(mobs.length<MAX_MOBS) for(let i=0;i<2;i++) spawnMob(); spawnTimer=14; } else spawnTimer--; for(let i=0;i<messages.length;i++) if(messages[i].life) messages[i].life--; messages=messages.filter(m=>!m.life||m.life>0); }
    
    // ========== УПРАВЛЕНИЕ ==========
    function getWorldClick(cx,cy) { let rect=canvas.getBoundingClientRect(), sx=canvasWidth/rect.width, sy=canvasHeight/rect.height; return { x:(cx-rect.left)*sx+cameraX, y:(cy-rect.top)*sy+cameraY }; }
    canvas.addEventListener('click',(e)=>{ let w=getWorldClick(e.clientX,e.clientY); handleClick(w.x,w.y); });
    canvas.addEventListener('touchstart',(e)=>{ e.preventDefault(); let t=e.touches[0]; let w=getWorldClick(t.clientX,t.clientY); handleClick(w.x,w.y); });
    setInterval(()=>{ if(selectedMob&&selectedMob.hp>0&&Math.hypot(player.x-selectedMob.x,player.y-selectedMob.y)<=getAttackRange()+22) playerAttack(); },2000);
    document.getElementById('superBtn').addEventListener('click',()=>useSuper());
    document.getElementById('hpBtn').addEventListener('click',()=>useHp());
    document.getElementById('mpBtn').addEventListener('click',()=>useMp());
    document.getElementById('statsBtn').addEventListener('click',()=>{ showStats=!showStats; showInventory=false; });
    document.getElementById('inventoryBtn').addEventListener('click',()=>{ showInventory=!showInventory; showStats=false; });
    window.addEventListener('keydown',(e)=>{ if(e.key==='e') useSuper(); if(e.key==='q') useHp(); if(e.key==='w') useMp(); if(e.key==='c') switchClass(); });
    
    // ========== СТАРТ ==========
    function init() { generateWorld(); player.x=safeZone.x+safeZone.width/2; player.y=safeZone.y+safeZone.height/2; updateGear(); player.hp=player.maxHp; player.mp=player.maxMp; for(let i=0;i<18;i++) spawnMob(); addMsg("✨ ДОБРО ПОЖАЛОВАТЬ! ПОЛНАЯ ВЕРСИЯ ROTO ✨"); addMsg("🗡️ Нажмите на моба → автоатака раз в 2 сек"); addMsg("🌟 Суперспособность: 🌟 слева (КД 18 сек)"); addMsg("🏪 NPC: Торговец 🏪 | Лекарь 💚 | Банкир 🏦 | Портал миров 🌍"); addMsg("🛡️ Вся броня и оружие доступны в магазине!"); }
    init();
    
    function render() { drawWorld(); for(let m of mobs) drawMob(m); drawPlayer(); drawUI(); }
    function loop() { update(); render(); requestAnimationFrame(loop); }
    loop();
})();
</script>
</body>
</html>
