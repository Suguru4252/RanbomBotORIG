<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Rucoy Online - Grid RPG | NetErrror</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #0a0c12;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', 'Press Start 2P', monospace;
            touch-action: manipulation;
            overflow: hidden;
        }
        .game-wrapper {
            background: #1e212a;
            padding: 10px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }
        canvas {
            display: block;
            margin: 0 auto;
            box-shadow: 0 0 0 3px #ffd966, 0 0 0 6px #2a2e3f;
            border-radius: 12px;
            cursor: pointer;
        }
        @media (max-width: 900px) {
            .game-wrapper { padding: 5px; }
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <canvas id="gameCanvas" width="900" height="600"></canvas>
</div>

<script>
    (function(){
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // ========== НАСТРОЙКИ КАРТЫ (КЛЕТКИ) ==========
        const TILE_SIZE = 48;
        const MAP_WIDTH = 19;   // 19x13 клеток
        const MAP_HEIGHT = 13;
        
        // Карта (0=трава, 1=камень, 2=вода, 3=грязь)
        const tileMap = Array(MAP_HEIGHT).fill().map(() => Array(MAP_WIDTH).fill(0));
        // Заполнение карты разнообразием
        for(let y=0; y<MAP_HEIGHT; y++){
            for(let x=0; x<MAP_WIDTH; x++){
                if((x>3 && x<7 && y>2 && y<5) || (x>12 && x<15 && y>7 && y<10)) tileMap[y][x] = 2; // вода
                else if((x>8 && x<12 && y>9 && y<12)) tileMap[y][x] = 1; // камни
                else if((x>2 && x<5 && y>8 && y<11)) tileMap[y][x] = 3; // грязь
                else tileMap[y][x] = 0;
            }
        }
        
        // ========== ПРЕПЯТСТВИЯ (непроходимые клетки) ==========
        const blockedTiles = [
            // вода и камни непроходимы
            {type: 2, walkable: false},
            {type: 1, walkable: false}
        ];
        function isWalkable(tileX, tileY){
            if(tileX < 0 || tileX >= MAP_WIDTH || tileY < 0 || tileY >= MAP_HEIGHT) return false;
            let tileType = tileMap[tileY][tileX];
            if(tileType === 2 || tileType === 1) return false;
            // проверка на мобов (нельзя встать на клетку с мобом)
            for(let mob of mobs){
                if(mob.tileX === tileX && mob.tileY === tileY && mob.hp > 0) return false;
            }
            return true;
        }
        
        // ========== КЛАССЫ ПЕРСОНАЖЕЙ ==========
        const CLASSES = {
            warrior: {
                name: "Воин",
                icon: "⚔️",
                color: "#6c8cae",
                armorColor: "#5a6e8a",
                baseHp: 180,
                baseMp: 40,
                baseDmgMin: 22,
                baseDmgMax: 38,
                skill: "Яростный удар"
            },
            archer: {
                name: "Лучник",
                icon: "🏹",
                color: "#7c9a6e",
                armorColor: "#6a825a",
                baseHp: 140,
                baseMp: 65,
                baseDmgMin: 20,
                baseDmgMax: 36,
                skill: "Точный выстрел"
            },
            mage: {
                name: "Маг",
                icon: "🔮",
                color: "#b58ad6",
                armorColor: "#8a5ab5",
                baseHp: 110,
                baseMp: 110,
                baseDmgMin: 26,
                baseDmgMax: 48,
                skill: "Огненный шар"
            }
        };
        
        // ========== ИГРОК ==========
        let player = {
            tileX: 9,
            tileY: 6,
            hp: 180,
            maxHp: 180,
            mp: 40,
            maxMp: 40,
            level: 1,
            exp: 0,
            expToNext: 60,
            classType: "warrior",
            potionHp: 5,
            potionMp: 5,
            gold: 0
        };
        
        // ========== МОБЫ (МНОЖЕСТВО) ==========
        let mobs = [];
        let spawnCooldown = 0;
        const MAX_MOBS = 12;
        
        const MOB_TYPES = [
            { name: "Гоблин", baseHp: 45, baseDmg: 8, exp: 22, color: "#6b8c5a", icon: "👺", levelRange: [1,5] },
            { name: "Скелет", baseHp: 70, baseDmg: 14, exp: 38, color: "#b8b8c8", icon: "💀", levelRange: [3,8] },
            { name: "Орк", baseHp: 110, baseDmg: 20, exp: 58, color: "#7a6a4a", icon: "👹", levelRange: [6,12] },
            { name: "Дракончик", baseHp: 160, baseDmg: 28, exp: 90, color: "#c97a3a", icon: "🐉", levelRange: [10,20] }
        ];
        
        function getMobByLevel(playerLvl){
            let available = MOB_TYPES.filter(m => playerLvl >= m.levelRange[0]);
            if(available.length === 0) available = MOB_TYPES;
            let selected = available[Math.floor(Math.random() * available.length)];
            let mobLevel = Math.max(1, playerLvl + Math.floor(Math.random() * 3) - 1);
            let hpMult = 1 + (mobLevel-1) * 0.12;
            let dmgMult = 1 + (mobLevel-1) * 0.1;
            return {
                name: `${selected.name} Lv.${mobLevel}`,
                level: mobLevel,
                hp: Math.floor(selected.baseHp * hpMult),
                maxHp: Math.floor(selected.baseHp * hpMult),
                dmg: Math.floor(selected.baseDmg * dmgMult),
                exp: Math.floor(selected.exp * (0.8 + mobLevel*0.12)),
                color: selected.color,
                icon: selected.icon,
                tileX: 0,
                tileY: 0
            };
        }
        
        function spawnMob(){
            if(mobs.length >= MAX_MOBS) return;
            let attempts = 0;
            while(attempts < 30){
                let tx = Math.floor(Math.random() * MAP_WIDTH);
                let ty = Math.floor(Math.random() * MAP_HEIGHT);
                if(isWalkable(tx, ty) && !(tx === player.tileX && ty === player.tileY)){
                    let newMob = getMobByLevel(player.level);
                    newMob.tileX = tx;
                    newMob.tileY = ty;
                    mobs.push(newMob);
                    return;
                }
                attempts++;
            }
        }
        
        function respawnMobs(){
            spawnCooldown--;
            if(spawnCooldown <= 0 && mobs.length < MAX_MOBS){
                spawnMob();
                spawnCooldown = 15 + Math.floor(Math.random() * 20);
            }
        }
        
        // ========== БОЕВАЯ СИСТЕМА ==========
        let currentTargetMob = null;
        let attackCooldown = 0;
        let skillCooldown = 0;
        let messageLog = [];
        
        function addMessage(text, isError=false){
            messageLog.unshift({text, isError, life: 180});
            if(messageLog.length > 8) messageLog.pop();
        }
        
        function getDamageRange(){
            const cls = CLASSES[player.classType];
            let dmgMin = cls.baseDmgMin + Math.floor(player.level * 1.4);
            let dmgMax = cls.baseDmgMax + Math.floor(player.level * 1.9);
            return { dmgMin, dmgMax };
        }
        
        function attackMob(mob){
            if(attackCooldown > 0){
                addMessage(`⏳ Атака перезаряжается! (${attackCooldown})`, true);
                return false;
            }
            if(!mob || mob.hp <= 0){
                addMessage(`👻 Нет цели для атаки!`, true);
                return false;
            }
            const { dmgMin, dmgMax } = getDamageRange();
            let damage = Math.floor(Math.random() * (dmgMax - dmgMin + 1) + dmgMin);
            mob.hp -= damage;
            attackCooldown = 14;
            addMessage(`⚔️ Вы нанесли ${damage} урона ${mob.name}!`);
            
            if(mob.hp <= 0){
                let gainedExp = mob.exp;
                player.exp += gainedExp;
                let goldDrop = Math.floor(10 + Math.random() * (player.level * 5));
                player.gold += goldDrop;
                addMessage(`✨ +${gainedExp} опыта, +${goldDrop} золота с ${mob.name}`);
                
                // Шанс выпадения зелий
                if(Math.random() < 0.35){
                    if(Math.random() < 0.6){
                        player.potionHp++;
                        addMessage(`🧪 Выпало зелье HP! +1`);
                    } else {
                        player.potionMp++;
                        addMessage(`🔮 Выпало зелье MP! +1`);
                    }
                }
                
                // Уровень ап
                while(player.exp >= player.expToNext){
                    player.exp -= player.expToNext;
                    player.level++;
                    player.maxHp = CLASSES[player.classType].baseHp + player.level * 9;
                    player.maxMp = CLASSES[player.classType].baseMp + player.level * 5;
                    player.hp = player.maxHp;
                    player.mp = player.maxMp;
                    player.expToNext = 55 + player.level * 22;
                    addMessage(`⭐ LEVEL UP! Теперь вы ${player.level} уровень! ⭐`);
                }
                // Удаляем моба из массива
                let index = mobs.indexOf(mob);
                if(index !== -1) mobs.splice(index, 1);
                return true;
            }
            return true;
        }
        
        function useSkillOnMob(mob){
            if(skillCooldown > 0){
                addMessage(`✨ Способность перезаряжается! (${skillCooldown})`, true);
                return;
            }
            if(!mob || mob.hp <= 0){
                addMessage(`👻 Нет цели!`, true);
                return;
            }
            const cls = CLASSES[player.classType];
            let manaCost = 25 + Math.floor(player.level/3);
            if(player.mp < manaCost){
                addMessage(`💙 Недостаточно маны! Нужно ${manaCost} MP`, true);
                return;
            }
            player.mp -= manaCost;
            const { dmgMin, dmgMax } = getDamageRange();
            let avgDmg = (dmgMin + dmgMax)/2;
            let skillDamage = Math.floor(avgDmg * 1.9);
            mob.hp -= skillDamage;
            skillCooldown = 28;
            addMessage(`✨ ${cls.skill}! ${skillDamage} урона по ${mob.name}!`);
            
            if(mob.hp <= 0){
                let gainedExp = mob.exp;
                player.exp += gainedExp;
                let goldDrop = Math.floor(12 + Math.random() * (player.level * 6));
                player.gold += goldDrop;
                addMessage(`✨ +${gainedExp} опыта, +${goldDrop} золота`);
                if(Math.random() < 0.35){
                    if(Math.random() < 0.6) player.potionHp++;
                    else player.potionMp++;
                    addMessage(`🧪 Выпало зелье!`);
                }
                while(player.exp >= player.expToNext){
                    player.exp -= player.expToNext;
                    player.level++;
                    player.maxHp = CLASSES[player.classType].baseHp + player.level * 9;
                    player.maxMp = CLASSES[player.classType].baseMp + player.level * 5;
                    player.hp = player.maxHp;
                    player.mp = player.maxMp;
                    player.expToNext = 55 + player.level * 22;
                    addMessage(`⭐ LEVEL UP! ${player.level} ⭐`);
                }
                let idx = mobs.indexOf(mob);
                if(idx !== -1) mobs.splice(idx,1);
            }
        }
        
        function useHpPotion(){
            if(player.potionHp <= 0){
                addMessage(`❌ Нет зелий HP!`, true);
                return;
            }
            let heal = Math.floor(player.maxHp * 0.55);
            player.hp = Math.min(player.maxHp, player.hp + heal);
            player.potionHp--;
            addMessage(`❤️ +${heal} HP (осталось ${player.potionHp} зелий)`);
        }
        
        function useMpPotion(){
            if(player.potionMp <= 0){
                addMessage(`❌ Нет зелий MP!`, true);
                return;
            }
            let mana = Math.floor(player.maxMp * 0.6);
            player.mp = Math.min(player.maxMp, player.mp + mana);
            player.potionMp--;
            addMessage(`💙 +${mana} MP (осталось ${player.potionMp} зелий)`);
        }
        
        // ========== ПЕРЕМЕЩЕНИЕ ПО КЛЕТКАМ ==========
        function tryMove(dx, dy){
            let newX = player.tileX + dx;
            let newY = player.tileY + dy;
            if(isWalkable(newX, newY)){
                player.tileX = newX;
                player.tileY = newY;
                // атака моба если есть на новой клетке
                for(let mob of mobs){
                    if(mob.tileX === player.tileX && mob.tileY === player.tileY && mob.hp > 0){
                        attackMob(mob);
                        break;
                    }
                }
                return true;
            } else {
                addMessage(`🚫 Путь прегражден!`, true);
                return false;
            }
        }
        
        // ========== АТАКА ПО КАСАНИЮ/КЛИКУ НА МОБА ==========
        function handleTileClick(tileX, tileY){
            for(let mob of mobs){
                if(mob.tileX === tileX && mob.tileY === tileY && mob.hp > 0){
                    if(currentTargetMob === mob){
                        attackMob(mob);
                    } else {
                        currentTargetMob = mob;
                        addMessage(`🎯 Цель: ${mob.name} Lv.${mob.level}`);
                    }
                    return;
                }
            }
            // если кликнули по пустой клетке - идем туда
            let dx = tileX - player.tileX;
            let dy = tileY - player.tileY;
            if(Math.abs(dx) + Math.abs(dy) === 1){
                tryMove(dx, dy);
            } else if(Math.abs(dx) + Math.abs(dy) > 1){
                addMessage(`📌 Можно ходить только на соседние клетки`, true);
            }
        }
        
        // ========== СМЕНА КЛАССА ==========
        function switchClass(){
            const classes = Object.keys(CLASSES);
            let idx = classes.indexOf(player.classType);
            let next = (idx + 1) % classes.length;
            player.classType = classes[next];
            player.maxHp = CLASSES[player.classType].baseHp + player.level * 9;
            player.maxMp = CLASSES[player.classType].baseMp + player.level * 5;
            player.hp = Math.min(player.hp, player.maxHp);
            player.mp = Math.min(player.mp, player.maxMp);
            addMessage(`🔄 Класс сменен на ${CLASSES[player.classType].name}`);
        }
        
        // ========== ОТРИСОВКА (ПИКСЕЛЬНАЯ ГРАФИКА) ==========
        function drawTile(x, y, type){
            let screenX = x * TILE_SIZE;
            let screenY = y * TILE_SIZE;
            if(type === 0){ // трава
                ctx.fillStyle = "#4a7a3a";
                ctx.fillRect(screenX, screenY, TILE_SIZE-1, TILE_SIZE-1);
                ctx.fillStyle = "#5c9c4a";
                for(let i=0;i<4;i++) ctx.fillRect(screenX+5+Math.random()*30, screenY+10+Math.random()*30, 2, 2);
            } else if(type === 1){ // камень
                ctx.fillStyle = "#6a6e7a";
                ctx.fillRect(screenX, screenY, TILE_SIZE-1, TILE_SIZE-1);
                ctx.fillStyle = "#4a4e5a";
                for(let i=0;i<6;i++) ctx.fillRect(screenX+8+Math.random()*30, screenY+8+Math.random()*30, 4, 4);
            } else if(type === 2){ // вода
                ctx.fillStyle = "#3a7a9e";
                ctx.fillRect(screenX, screenY, TILE_SIZE-1, TILE_SIZE-1);
                ctx.fillStyle = "#5aaece";
                for(let i=0;i<8;i++) ctx.fillRect(screenX+5+Math.random()*35, screenY+5+Math.random()*35, 3, 3);
            } else if(type === 3){ // грязь
                ctx.fillStyle = "#8a6a4a";
                ctx.fillRect(screenX, screenY, TILE_SIZE-1, TILE_SIZE-1);
                ctx.fillStyle = "#6a4a2a";
                ctx.fillRect(screenX+12, screenY+12, 8, 8);
            }
            ctx.strokeStyle = "#2a2e2a";
            ctx.strokeRect(screenX, screenY, TILE_SIZE, TILE_SIZE);
        }
        
        function drawPlayer(){
            let x = player.tileX * TILE_SIZE;
            let y = player.tileY * TILE_SIZE;
            const cls = CLASSES[player.classType];
            ctx.fillStyle = cls.color;
            ctx.fillRect(x+8, y+8, 32, 34);
            ctx.fillStyle = cls.armorColor;
            ctx.fillRect(x+12, y+18, 24, 20);
            ctx.fillStyle = "#f5c88a";
            ctx.fillRect(x+18, y+14, 6, 6);
            ctx.fillRect(x+26, y+14, 6, 6);
            ctx.fillStyle = "#221c14";
            ctx.fillRect(x+19, y+15, 4, 4);
            ctx.fillRect(x+27, y+15, 4, 4);
            ctx.fillStyle = "#c9a56e";
            ctx.fillRect(x+20, y+24, 12, 5);
            ctx.font = "bold 22px monospace";
            ctx.fillStyle = "#fff2c0";
            ctx.fillText(cls.icon, x+10, y+20);
        }
        
        function drawMobOnTile(mob){
            let x = mob.tileX * TILE_SIZE;
            let y = mob.tileY * TILE_SIZE;
            ctx.fillStyle = mob.color;
            ctx.fillRect(x+6, y+8, 36, 34);
            ctx.fillStyle = "#aa6666";
            ctx.fillRect(x+16, y+16, 6, 6);
            ctx.fillRect(x+26, y+16, 6, 6);
            ctx.font = "24px monospace";
            ctx.fillStyle = "#ffffff";
            ctx.fillText(mob.icon, x+14, y+34);
            // полоска HP
            let hpPercent = mob.hp / mob.maxHp;
            ctx.fillStyle = "#aa3333";
            ctx.fillRect(x+8, y+4, 40, 6);
            ctx.fillStyle = "#44ff66";
            ctx.fillRect(x+8, y+4, 40 * hpPercent, 6);
            ctx.font = "bold 9px monospace";
            ctx.fillStyle = "#ffffaa";
            ctx.fillText(`${mob.hp}/${mob.maxHp}`, x+12, y+12);
        }
        
        function drawUI(){
            const cls = CLASSES[player.classType];
            // Левая верхняя панель (HP/MP)
            ctx.fillStyle = "#000000aa";
            ctx.fillRect(12, 12, 220, 70);
            ctx.fillStyle = "#aa4444";
            ctx.fillRect(18, 20, 200, 18);
            ctx.fillStyle = "#ff6644";
            ctx.fillRect(18, 20, 200 * (player.hp/player.maxHp), 18);
            ctx.fillStyle = "#4488ff";
            ctx.fillRect(18, 42, 200 * (player.mp/player.maxMp), 16);
            ctx.fillStyle = "#ffffff";
            ctx.font = "bold 12px monospace";
            ctx.fillText(`❤️ ${Math.floor(player.hp)}/${player.maxHp}`, 22, 36);
            ctx.fillText(`💙 ${Math.floor(player.mp)}/${player.maxMp}`, 22, 56);
            ctx.fillStyle = "#ffdd99";
            ctx.fillText(`${cls.name} ${cls.icon}  Lv.${player.level}`, 22, 78);
            
            // Правая верхняя панель (статы)
            ctx.fillStyle = "#000000aa";
            ctx.fillRect(canvas.width-180, 12, 168, 70);
            ctx.fillStyle = "#ffcc88";
            ctx.font = "11px monospace";
            ctx.fillText(`⚔️ Урон: ${Math.floor(cls.baseDmgMin + player.level*1.4)}-${Math.floor(cls.baseDmgMax + player.level*1.9)}`, canvas.width-172, 28);
            ctx.fillText(`⭐ EXP: ${player.exp}/${player.expToNext}`, canvas.width-172, 44);
            ctx.fillText(`💰 ${player.gold} золота`, canvas.width-172, 60);
            ctx.fillText(`✨ ${cls.skill}`, canvas.width-172, 76);
            
            // Левая нижняя панель (зелья)
            ctx.fillStyle = "#000000aa";
            ctx.fillRect(12, canvas.height-70, 160, 58);
            ctx.fillStyle = "#ffaa88";
            ctx.font = "bold 14px monospace";
            ctx.fillText(`🧪 HP: ${player.potionHp}`, 20, canvas.height-44);
            ctx.fillText(`🔮 MP: ${player.potionMp}`, 20, canvas.height-24);
            
            // Лог сообщений справа снизу
            ctx.fillStyle = "#000000aa";
            ctx.fillRect(canvas.width-220, canvas.height-130, 208, 120);
            ctx.fillStyle = "#ddcc99";
            ctx.font = "9px monospace";
            for(let i=0; i<Math.min(7, messageLog.length); i++){
                let msg = messageLog[i];
                ctx.fillStyle = msg.isError ? "#ff8866" : "#eeddbb";
                ctx.fillText(msg.text.substring(0, 28), canvas.width-212, canvas.height-115 + i*14);
            }
        }
        
        function drawTarget(){
            if(currentTargetMob && currentTargetMob.hp > 0){
                let x = currentTargetMob.tileX * TILE_SIZE;
                let y = currentTargetMob.tileY * TILE_SIZE;
                ctx.strokeStyle = "#ffaa44";
                ctx.lineWidth = 3;
                ctx.strokeRect(x+2, y+2, 44, 44);
            }
        }
        
        // ========== ОБНОВЛЕНИЕ ==========
        function updateGame(){
            if(attackCooldown > 0) attackCooldown--;
            if(skillCooldown > 0) skillCooldown--;
            respawnMobs();
            for(let msg of messageLog){
                if(msg.life) msg.life--;
            }
            messageLog = messageLog.filter(m => !m.life || m.life > 0);
        }
        
        // ========== УПРАВЛЕНИЕ ==========
        function getTileFromClick(clientX, clientY){
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let canvasX = (clientX - rect.left) * scaleX;
            let canvasY = (clientY - rect.top) * scaleY;
            let tileX = Math.floor(canvasX / TILE_SIZE);
            let tileY = Math.floor(canvasY / TILE_SIZE);
            if(tileX >= 0 && tileX < MAP_WIDTH && tileY >= 0 && tileY < MAP_HEIGHT){
                return {tileX, tileY};
            }
            return null;
        }
        
        canvas.addEventListener('click', (e) => {
            let tile = getTileFromClick(e.clientX, e.clientY);
            if(tile) handleTileClick(tile.tileX, tile.tileY);
        });
        
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            let rect = canvas.getBoundingClientRect();
            let touch = e.touches[0];
            let tile = getTileFromClick(touch.clientX, touch.clientY);
            if(tile) handleTileClick(tile.tileX, tile.tileY);
        });
        
        // Клавиатура (для ПК)
        window.addEventListener('keydown', (e) => {
            if(e.key === 'ArrowUp') tryMove(0, -1);
            if(e.key === 'ArrowDown') tryMove(0, 1);
            if(e.key === 'ArrowLeft') tryMove(-1, 0);
            if(e.key === 'ArrowRight') tryMove(1, 0);
            if(e.key === ' ' || e.key === 'a') { if(currentTargetMob) attackMob(currentTargetMob); }
            if(e.key === 's') { if(currentTargetMob) useSkillOnMob(currentTargetMob); }
            if(e.key === 'q') useHpPotion();
            if(e.key === 'w') useMpPotion();
            if(e.key === 'c') switchClass();
            if(e.key === 'r') { player.hp = player.maxHp; player.mp = player.maxMp; addMessage("💚 Полное восстановление"); }
        });
        
        // ========== ИНИЦИАЛИЗАЦИЯ ==========
        function init(){
            player.tileX = 9;
            player.tileY = 6;
            player.hp = player.maxHp;
            player.mp = player.maxMp;
            mobs = [];
            for(let i=0; i<6; i++) spawnMob();
            addMessage("✨ Добро пожаловать! Нажмите на моба для атаки, на клетку - для ходьбы");
        }
        
        init();
        
        function render(){
            // Отрисовка карты
            for(let y=0; y<MAP_HEIGHT; y++){
                for(let x=0; x<MAP_WIDTH; x++){
                    drawTile(x, y, tileMap[y][x]);
                }
            }
            // Мобы
            for(let mob of mobs) drawMobOnTile(mob);
            drawPlayer();
            drawTarget();
            drawUI();
        }
        
        function gameLoop(){
            updateGame();
            render();
            requestAnimationFrame(gameLoop);
        }
        gameLoop();
    })();
</script>
</body>
</html>
