<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=no">
    <title>Rucoy Online - New UI | Horizontal RPG</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #0a0c12;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
            font-family: 'Courier New', monospace;
            touch-action: none;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
            background: #1a2a1a;
        }
        
        /* Мобильные кнопки слева в углу (маленькие) */
        .mobile-buttons {
            position: fixed;
            bottom: 20px;
            left: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 100;
            pointer-events: auto;
        }
        
        .mobile-btn {
            background: #2c2f4a;
            border: none;
            color: #ffcc88;
            font-size: 14px;
            padding: 6px 12px;
            border-radius: 30px;
            font-weight: bold;
            box-shadow: 0 2px 0 #121420;
            touch-action: manipulation;
            font-family: monospace;
            cursor: pointer;
            transition: 0.03s linear;
            text-align: center;
            min-width: 70px;
        }
        
        .mobile-btn:active {
            transform: translateY(2px);
        }
        
        /* Правая нижняя кнопка для инвентаря/статистики */
        .right-bottom-btn {
            position: fixed;
            bottom: 20px;
            right: 15px;
            background: #2c2f4a;
            border: none;
            color: #ffcc88;
            font-size: 18px;
            padding: 10px 16px;
            border-radius: 40px;
            font-weight: bold;
            box-shadow: 0 3px 0 #121420;
            z-index: 100;
            pointer-events: auto;
            cursor: pointer;
            font-family: monospace;
        }
        
        .right-bottom-btn:active {
            transform: translateY(2px);
        }
        
        @media (min-width: 1024px) {
            .mobile-btn { font-size: 16px; padding: 8px 16px; min-width: 90px; }
            .right-bottom-btn { font-size: 20px; padding: 12px 20px; }
        }
        
        @media (orientation: portrait) {
            .mobile-btn { font-size: 12px; padding: 5px 10px; min-width: 60px; }
            .right-bottom-btn { font-size: 14px; padding: 8px 12px; }
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <!-- Кнопки слева в углу (маленькие) -->
    <div class="mobile-buttons">
        <button class="mobile-btn" id="mobileClassBtn">🔄 КЛАСС</button>
        <button class="mobile-btn" id="mobileSkillBtn">✨ СКИЛЛ</button>
        <button class="mobile-btn" id="mobileHpBtn">❤️ ЗЕЛЬЕ</button>
        <button class="mobile-btn" id="mobileMpBtn">💙 ЗЕЛЬЕ</button>
        <button class="mobile-btn" id="mobileShopBtn">🏪 МАГАЗИН</button>
    </div>
    
    <!-- Кнопка статистики/инвентаря справа снизу -->
    <button class="right-bottom-btn" id="statsBtn">⚙️ СТАТИСТИКА</button>

<script>
    (function(){
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // ========== РАЗМЕР МИРА ==========
        const WORLD_WIDTH = 6200;
        const WORLD_HEIGHT = 4800;
        
        let cameraX = 0, cameraY = 0;
        let canvasWidth = window.innerWidth;
        let canvasHeight = window.innerHeight;
        
        function resizeCanvas() {
            canvasWidth = window.innerWidth;
            canvasHeight = window.innerHeight;
            canvas.width = canvasWidth;
            canvas.height = canvasHeight;
        }
        window.addEventListener('resize', () => {
            resizeCanvas();
            updateCamera();
        });
        resizeCanvas();
        
        // ========== СТАТИСТИКА ИГРОКА ==========
        let stats = {
            mobsKilled: 0,
            totalGoldEarned: 0,
            totalDamageDealt: 0,
            totalDamageTaken: 0,
            playTimeSeconds: 0,
            startTime: Date.now()
        };
        
        function updatePlayTime() {
            stats.playTimeSeconds = Math.floor((Date.now() - stats.startTime) / 1000);
        }
        
        // ========== БЕЗОПАСНАЯ ЗОНА С ВОРОТАМИ ==========
        let safeZone = { x: 520, y: 440, width: 560, height: 440 };
        
        let gates = [
            { x: safeZone.x + safeZone.width/2 - 50, y: safeZone.y - 30, width: 100, height: 40, side: "top" },
            { x: safeZone.x + safeZone.width/2 - 50, y: safeZone.y + safeZone.height - 10, width: 100, height: 40, side: "bottom" },
            { x: safeZone.x - 30, y: safeZone.y + safeZone.height/2 - 50, width: 40, height: 100, side: "left" },
            { x: safeZone.x + safeZone.width - 10, y: safeZone.y + safeZone.height/2 - 50, width: 40, height: 100, side: "right" }
        ];
        
        function isInSafeZone(x, y){
            return (x > safeZone.x && x < safeZone.x + safeZone.width && y > safeZone.y && y < safeZone.y + safeZone.height);
        }
        
        function isAtAnyGate(x, y){
            for(let gate of gates){
                if(x > gate.x && x < gate.x + gate.width && y > gate.y && y < gate.y + gate.height) return true;
            }
            return false;
        }
        
        function canCrossSafeZoneBoundary(fromX, fromY, toX, toY){
            let wasInside = isInSafeZone(fromX, fromY);
            let willBeInside = isInSafeZone(toX, toY);
            if(wasInside === willBeInside) return true;
            let midX = (fromX + toX) / 2;
            let midY = (fromY + toY) / 2;
            if(isAtAnyGate(midX, midY) || isAtAnyGate(toX, toY) || isAtAnyGate(fromX, fromY)) return true;
            return false;
        }
        
        // ========== ПРЕПЯТСТВИЯ ==========
        let obstacles = [];
        
        function generateWorld(){
            obstacles = [];
            for(let i = 0; i < 40; i++){
                let fenceX = safeZone.x + i * 28;
                let isTopGateArea = (fenceX > gates[0].x - 20 && fenceX < gates[0].x + gates[0].width + 20);
                if(!isTopGateArea) obstacles.push({ x: fenceX, y: safeZone.y - 20, radius: 14, type: 'fence' });
                let isBottomGateArea = (fenceX > gates[1].x - 20 && fenceX < gates[1].x + gates[1].width + 20);
                if(!isBottomGateArea) obstacles.push({ x: fenceX, y: safeZone.y + safeZone.height + 10, radius: 14, type: 'fence' });
            }
            for(let i = 0; i < 32; i++){
                let fenceY = safeZone.y + i * 28;
                let isLeftGateArea = (fenceY > gates[2].y - 20 && fenceY < gates[2].y + gates[2].height + 20);
                if(!isLeftGateArea) obstacles.push({ x: safeZone.x - 20, y: fenceY, radius: 14, type: 'fence' });
                let isRightGateArea = (fenceY > gates[3].y - 20 && fenceY < gates[3].y + gates[3].height + 20);
                if(!isRightGateArea) obstacles.push({ x: safeZone.x + safeZone.width + 10, y: fenceY, radius: 14, type: 'fence' });
            }
            for(let i=0; i<400; i++){
                let x = 80 + Math.random() * (WORLD_WIDTH - 160);
                let y = 80 + Math.random() * (WORLD_HEIGHT - 160);
                if(x > safeZone.x-80 && x < safeZone.x+safeZone.width+80 && y > safeZone.y-80 && y < safeZone.y+safeZone.height+80) continue;
                obstacles.push({ x: x, y: y, radius: 26, type: 'tree' });
            }
            for(let i=0; i<80; i++){
                let x = 120 + Math.random() * (WORLD_WIDTH - 240);
                let y = 100 + Math.random() * (WORLD_HEIGHT - 200);
                if(x > safeZone.x-100 && x < safeZone.x+safeZone.width+100 && y > safeZone.y-100 && y < safeZone.y+safeZone.height+100) continue;
                obstacles.push({ x: x, y: y, radius: 38, type: 'mountain' });
            }
            for(let i=0; i<240; i++){
                let x = 60 + Math.random() * (WORLD_WIDTH - 120);
                let y = 60 + Math.random() * (WORLD_HEIGHT - 120);
                if(x > safeZone.x-60 && x < safeZone.x+safeZone.width+60 && y > safeZone.y-60 && y < safeZone.y+safeZone.height+60) continue;
                obstacles.push({ x: x, y: y, radius: 16, type: 'rock' });
            }
        }
        
        function isWalkable(x, y, radius=24){
            if(x - radius < 25 || x + radius > WORLD_WIDTH - 25 || y - radius < 25 || y + radius > WORLD_HEIGHT - 25) return false;
            for(let obs of obstacles){
                if(Math.hypot(x - obs.x, y - obs.y) < radius + obs.radius) return false;
            }
            return true;
        }
        
        function canMoveTo(x, y, radius=24){
            if(!isWalkable(x, y, radius)) return false;
            if(!canCrossSafeZoneBoundary(player.x, player.y, x, y)) return false;
            return true;
        }
        
        // ========== КЛАССЫ С ДАЛЬНОСТЬЮ АТАКИ ==========
        const CLASSES = {
            warrior: { 
                name: "Мечник", icon: "⚔️", color: "#6c8cae", armorColor: "#5a7a9a", 
                baseHp: 300, baseMp: 70, baseDmgMin: 32, baseDmgMax: 58, 
                skill: "Смертельный удар", attackRange: 55, skillRange: 70,
                isMelee: true
            },
            archer: { 
                name: "Лучник", icon: "🏹", color: "#7cae6c", armorColor: "#6a8a5a", 
                baseHp: 240, baseMp: 110, baseDmgMin: 30, baseDmgMax: 56, 
                skill: "Точный выстрел", attackRange: 150, skillRange: 180,
                isMelee: false
            },
            mage: { 
                name: "Маг", icon: "🔮", color: "#b57ad6", armorColor: "#9a6aba", 
                baseHp: 190, baseMp: 200, baseDmgMin: 38, baseDmgMax: 68, 
                skill: "Огненный шар", attackRange: 140, skillRange: 170,
                isMelee: false
            }
        };
        
        // ========== МОБЫ ==========
        const MOB_TYPES = [
            { name: "Гоблин", baseHp: 65, baseDmg: 15, exp: 36, color: "#6f8c5a", skinColor: "#8cae6a", icon: "👺", speed: 1.0, attackRange: 55 },
            { name: "Тролль", baseHp: 120, baseDmg: 24, exp: 62, color: "#7a6a4a", skinColor: "#9a8a62", icon: "👹", speed: 0.75, attackRange: 60 },
            { name: "Скелет", baseHp: 160, baseDmg: 30, exp: 90, color: "#b8b8cc", skinColor: "#d0d0e0", icon: "💀", speed: 1.1, attackRange: 55 },
            { name: "Орк", baseHp: 220, baseDmg: 42, exp: 125, color: "#8a6a4a", skinColor: "#aa8262", icon: "👺", speed: 0.9, attackRange: 58 },
            { name: "Волк", baseHp: 90, baseDmg: 22, exp: 52, color: "#8a7a6a", skinColor: "#c0a890", icon: "🐺", speed: 1.3, attackRange: 50 },
            { name: "Дракончик", baseHp: 290, baseDmg: 54, exp: 195, color: "#c97a3a", skinColor: "#e09a5a", icon: "🐉", speed: 0.65, attackRange: 65 }
        ];
        
        let mobs = [];
        let spawnTimer = 0;
        const MAX_MOBS = 28;
        
        function getMobByLevel(){
            let available = MOB_TYPES;
            let selected = available[Math.floor(Math.random() * available.length)];
            let mobLevel = Math.max(1, player.level + Math.floor(Math.random() * 4) - 2);
            let hpMult = 1 + (mobLevel-1) * 0.14;
            let dmgMult = 1 + (mobLevel-1) * 0.12;
            return {
                name: `${selected.name} Lv.${mobLevel}`,
                level: mobLevel,
                hp: Math.floor(selected.baseHp * hpMult),
                maxHp: Math.floor(selected.baseHp * hpMult),
                dmg: Math.floor(selected.baseDmg * dmgMult),
                exp: Math.floor(selected.exp * (0.85 + mobLevel * 0.12)),
                color: selected.color,
                skinColor: selected.skinColor,
                icon: selected.icon,
                speed: selected.speed,
                attackRange: selected.attackRange,
                x: 0, y: 0,
                attackTimer: 0
            };
        }
        
        function spawnMob(){
            if(mobs.length >= MAX_MOBS) return;
            let attempts = 0;
            while(attempts < 80){
                let x = 120 + Math.random() * (WORLD_WIDTH - 240);
                let y = 100 + Math.random() * (WORLD_HEIGHT - 200);
                if(isWalkable(x, y, 26) && !isInSafeZone(x, y) && Math.hypot(x - player.x, y - player.y) > 250){
                    let newMob = getMobByLevel();
                    newMob.x = x;
                    newMob.y = y;
                    mobs.push(newMob);
                    return;
                }
                attempts++;
            }
        }
        
        // ========== ИГРОК ==========
        let player = {
            x: safeZone.x + safeZone.width/2,
            y: safeZone.y + safeZone.height/2,
            targetX: null, targetY: null,
            path: [],
            hp: 300, maxHp: 300,
            mp: 70, maxMp: 70,
            level: 1, exp: 0, expToNext: 85,
            classType: "warrior",
            potionHp: 5, potionMp: 5,
            gold: 400,
            moveSpeed: 4.2,
            defense: 14,
            attackTimer: 0
        };
        
        // ========== ПУТЬ ==========
        function findPath(startX, startY, targetX, targetY){
            let path = [];
            let dx = targetX - startX;
            let dy = targetY - startY;
            let distance = Math.hypot(dx, dy);
            if(distance < 12) return path;
            let steps = Math.min(60, Math.floor(distance / 12));
            for(let i = 1; i <= steps; i++){
                let t = i / steps;
                let nx = startX + dx * t;
                let ny = startY + dy * t;
                if(canMoveTo(nx, ny, 24)){
                    path.push({x: nx, y: ny});
                } else {
                    let angle = Math.atan2(dy, dx);
                    for(let offset of [-1.6, 1.6, -2.4, 2.4]){
                        let newX = startX + dx * t + Math.cos(angle + offset) * 40;
                        let newY = startY + dy * t + Math.sin(angle + offset) * 40;
                        if(canMoveTo(newX, newY, 24)){
                            path.push({x: newX, y: newY});
                            break;
                        }
                    }
                }
            }
            path.push({x: targetX, y: targetY});
            return path;
        }
        
        function moveToTarget(tx, ty){
            player.targetX = tx;
            player.targetY = ty;
            player.path = findPath(player.x, player.y, tx, ty);
        }
        
        function updateMovement(){
            if(player.path && player.path.length > 0){
                let next = player.path[0];
                let dx = next.x - player.x;
                let dy = next.y - player.y;
                let dist = Math.hypot(dx, dy);
                if(dist < 8){
                    player.path.shift();
                } else {
                    let step = Math.min(player.moveSpeed, dist);
                    let angle = Math.atan2(dy, dx);
                    let newX = player.x + Math.cos(angle) * step;
                    let newY = player.y + Math.sin(angle) * step;
                    if(canMoveTo(newX, newY, 24)){
                        player.x = newX;
                        player.y = newY;
                    } else {
                        player.path = [];
                        player.targetX = null;
                    }
                }
            }
        }
        
        // ========== АТАКА МОБОВ (раз в 2 секунды) ==========
        function updateMobs(){
            for(let mob of mobs){
                if(mob.hp <= 0) continue;
                
                let dx = player.x - mob.x;
                let dy = player.y - mob.y;
                let distToPlayer = Math.hypot(dx, dy);
                
                if(distToPlayer < 240 && !isInSafeZone(player.x, player.y)){
                    let angle = Math.atan2(dy, dx);
                    let step = Math.min(mob.speed, distToPlayer - 50);
                    if(step > 0){
                        let newX = mob.x + Math.cos(angle) * step;
                        let newY = mob.y + Math.sin(angle) * step;
                        if(isWalkable(newX, newY, 26) && !isInSafeZone(newX, newY)){
                            mob.x = newX;
                            mob.y = newY;
                        }
                    }
                    
                    // Атака моба раз в 2 секунды (30 фреймов)
                    if(distToPlayer < mob.attackRange + 15){
                        if(mob.attackTimer <= 0){
                            let damage = Math.max(5, mob.dmg - Math.floor(player.defense / 2.5));
                            player.hp -= damage;
                            stats.totalDamageTaken += damage;
                            mob.attackTimer = 30;
                            addMessage(`💀 ${mob.name} нанес ${damage} урона!`, true);
                            showDamageNumber(mob.x, mob.y, damage, true);
                            if(player.hp <= 0){
                                player.hp = player.maxHp;
                                player.mp = player.maxMp;
                                player.x = safeZone.x + safeZone.width/2;
                                player.y = safeZone.y + safeZone.height/2;
                                player.targetX = null;
                                player.path = [];
                                addMessage(`💀 ВЫ ВОСКРЕСЛИ В БЕЗОПАСНОЙ ЗОНЕ 💀`, true);
                            }
                        } else {
                            mob.attackTimer--;
                        }
                    } else {
                        if(mob.attackTimer > 0) mob.attackTimer--;
                    }
                } else {
                    if(mob.attackTimer > 0) mob.attackTimer--;
                }
            }
        }
        
        // ========== БОЕВАЯ СИСТЕМА ==========
        let selectedMob = null;
        let messages = [];
        let damageEffects = [];
        let showStats = false;
        
        function addMessage(text, isError=false){
            messages.unshift({text, isError, life: 200});
            if(messages.length > 6) messages.pop();
        }
        
        function getDamage(){
            const cls = CLASSES[player.classType];
            let min = cls.baseDmgMin + Math.floor(player.level * 1.9);
            let max = cls.baseDmgMax + Math.floor(player.level * 2.6);
            return { min, max };
        }
        
        function showDamageNumber(x, y, dmg, isPlayerDamaged=false){
            damageEffects.push({ x: x, y: y, dmg: dmg, life: 20, isPlayer: isPlayerDamaged });
        }
        
        // Атака игрока (раз в 2 секунды)
        function playerAttack(){
            if(!selectedMob || selectedMob.hp <= 0){
                selectedMob = null;
                return false;
            }
            if(player.attackTimer > 0){
                return false;
            }
            
            const cls = CLASSES[player.classType];
            let dist = Math.hypot(player.x - selectedMob.x, player.y - selectedMob.y);
            if(dist > cls.attackRange){
                addMessage(`🏃 Слишком далеко для атаки! (нужно ${Math.floor(cls.attackRange)}px)`, true);
                return false;
            }
            
            const { min, max } = getDamage();
            let damage = Math.floor(Math.random() * (max - min + 1) + min);
            selectedMob.hp -= damage;
            stats.totalDamageDealt += damage;
            player.attackTimer = 30; // 2 секунды при 60fps
            
            let rangeText = cls.isMelee ? "🗡️" : "🏹";
            addMessage(`${rangeText} ${cls.name} нанес ${damage} урона ${selectedMob.name}!`);
            showDamageNumber(selectedMob.x, selectedMob.y, damage);
            
            if(selectedMob.hp <= 0){
                let gainedExp = selectedMob.exp;
                let goldGain = Math.floor(22 + Math.random() * (player.level * 12));
                player.exp += gainedExp;
                player.gold += goldGain;
                stats.mobsKilled++;
                stats.totalGoldEarned += goldGain;
                addMessage(`✨ +${gainedExp} опыта, +${goldGain} золота`);
                
                if(Math.random() < 0.45){
                    if(Math.random() < 0.6) player.potionHp++;
                    else player.potionMp++;
                    addMessage(`🧪 Выпало зелье!`);
                }
                
                let idx = mobs.indexOf(selectedMob);
                if(idx !== -1) mobs.splice(idx, 1);
                selectedMob = null;
                
                while(player.exp >= player.expToNext){
                    player.exp -= player.expToNext;
                    player.level++;
                    player.maxHp = CLASSES[player.classType].baseHp + player.level * 14;
                    player.maxMp = CLASSES[player.classType].baseMp + player.level * 10;
                    player.hp = player.maxHp;
                    player.mp = player.maxMp;
                    player.expToNext = 85 + player.level * 35;
                    addMessage(`⭐⭐ УРОВЕНЬ ${player.level}! ⭐⭐`);
                }
                return true;
            }
            return true;
        }
        
        function useSkill(){
            if(!selectedMob || selectedMob.hp <= 0){
                addMessage(`🎯 Выберите цель (нажмите на моба)`, true);
                return;
            }
            const cls = CLASSES[player.classType];
            let dist = Math.hypot(player.x - selectedMob.x, player.y - selectedMob.y);
            if(dist > cls.skillRange){
                addMessage(`🏃 Слишком далеко для способности!`, true);
                return;
            }
            let manaCost = 28 + Math.floor(player.level / 2);
            if(player.mp < manaCost){
                addMessage(`💙 Не хватает маны! Нужно ${manaCost}`, true);
                return;
            }
            player.mp -= manaCost;
            const { min, max } = getDamage();
            let avgDmg = (min + max) / 2;
            let skillDmg = Math.floor(avgDmg * 2.3);
            selectedMob.hp -= skillDmg;
            stats.totalDamageDealt += skillDmg;
            addMessage(`✨ ${cls.skill}! ${skillDmg} урона по ${selectedMob.name}!`);
            showDamageNumber(selectedMob.x, selectedMob.y, skillDmg);
            
            if(selectedMob.hp <= 0){
                let gainedExp = selectedMob.exp;
                let goldGain = Math.floor(22 + Math.random() * (player.level * 12));
                player.exp += gainedExp;
                player.gold += goldGain;
                stats.mobsKilled++;
                stats.totalGoldEarned += goldGain;
                addMessage(`✨ +${gainedExp} опыта, +${goldGain} золота`);
                if(Math.random() < 0.45){
                    if(Math.random() < 0.6) player.potionHp++;
                    else player.potionMp++;
                }
                let idx = mobs.indexOf(selectedMob);
                if(idx !== -1) mobs.splice(idx, 1);
                selectedMob = null;
                while(player.exp >= player.expToNext){
                    player.exp -= player.expToNext;
                    player.level++;
                    player.maxHp = CLASSES[player.classType].baseHp + player.level * 14;
                    player.maxMp = CLASSES[player.classType].baseMp + player.level * 10;
                    player.hp = player.maxHp;
                    player.mp = player.maxMp;
                    player.expToNext = 85 + player.level * 35;
                    addMessage(`⭐⭐ УРОВЕНЬ ${player.level}! ⭐⭐`);
                }
            }
        }
        
        function useHpPotion(){
            if(isInSafeZone(player.x, player.y)){
                if(player.potionHp <= 0){
                    addMessage(`❌ Нет зелий HP! Купите в магазине`, true);
                    return;
                }
                let heal = Math.floor(player.maxHp * 0.72);
                player.hp = Math.min(player.maxHp, player.hp + heal);
                player.potionHp--;
                addMessage(`❤️ Вылечено ${heal} HP! Осталось: ${player.potionHp}`);
            } else {
                addMessage(`🏪 Зелья можно использовать только в безопасной зоне!`, true);
            }
        }
        
        function useMpPotion(){
            if(isInSafeZone(player.x, player.y)){
                if(player.potionMp <= 0){
                    addMessage(`❌ Нет зелий MP! Купите в магазине`, true);
                    return;
                }
                let mana = Math.floor(player.maxMp * 0.78);
                player.mp = Math.min(player.maxMp, player.mp + mana);
                player.potionMp--;
                addMessage(`💙 Восстановлено ${mana} MP! Осталось: ${player.potionMp}`);
            } else {
                addMessage(`🏪 Зелья можно использовать только в безопасной зоне!`, true);
            }
        }
        
        // ========== МАГАЗИН ==========
        let shopOpen = false;
        const SHOP_ITEMS = [
            { name: "Зелье HP", type: "hp", price: 55, icon: "❤️" },
            { name: "Зелье MP", type: "mp", price: 50, icon: "💙" },
            { name: "Большое зелье HP", type: "hp_big", price: 150, icon: "❤️✨" },
            { name: "Большое зелье MP", type: "mp_big", price: 140, icon: "💙✨" }
        ];
        
        function openShop(){
            if(isInSafeZone(player.x, player.y)){
                shopOpen = !shopOpen;
                if(shopOpen) addMessage(`🏪 Магазин открыт! Нажмите на предмет для покупки`);
                else addMessage(`🏪 Магазин закрыт`);
            } else {
                addMessage(`🏪 Магазин только в безопасной зоне!`, true);
            }
        }
        
        function buyItem(item){
            if(player.gold >= item.price){
                player.gold -= item.price;
                if(item.type === "hp") player.potionHp++;
                else if(item.type === "mp") player.potionMp++;
                else if(item.type === "hp_big") player.potionHp += 2;
                else if(item.type === "mp_big") player.potionMp += 2;
                addMessage(`✅ Куплен ${item.name}! Осталось золота: ${player.gold}`);
            } else {
                addMessage(`💰 Не хватает золота! Нужно ${item.price}`, true);
            }
        }
        
        function switchClass(){
            let classes = Object.keys(CLASSES);
            let idx = classes.indexOf(player.classType);
            let newClass = classes[(idx+1)%classes.length];
            let hpPercent = player.hp / player.maxHp;
            let mpPercent = player.mp / player.maxMp;
            player.classType = newClass;
            player.maxHp = CLASSES[newClass].baseHp + player.level * 14;
            player.maxMp = CLASSES[newClass].baseMp + player.level * 10;
            player.hp = Math.max(1, Math.min(player.maxHp, Math.floor(player.maxHp * hpPercent)));
            player.mp = Math.max(1, Math.min(player.maxMp, Math.floor(player.maxMp * mpPercent)));
            if(player.hp <= 0) player.hp = Math.floor(player.maxHp * 0.5);
            if(player.mp <= 0) player.mp = Math.floor(player.maxMp * 0.3);
            addMessage(`🔄 Класс сменен на ${CLASSES[newClass].name} ${CLASSES[newClass].icon}`);
        }
        
        // ========== ВЫБОР ЦЕЛИ И ПЕРЕМЕЩЕНИЕ ==========
        function selectMobAt(x, y){
            for(let mob of mobs){
                if(Math.hypot(mob.x - x, mob.y - y) < 50 && mob.hp > 0){
                    selectedMob = mob;
                    addMessage(`🎯 Цель: ${mob.name} (HP: ${mob.hp}/${mob.maxHp})`);
                    return true;
                }
            }
            return false;
        }
        
        function handleWorldClick(worldX, worldY){
            if(shopOpen){
                let shopCenterX = canvasWidth/2;
                let shopCenterY = canvasHeight/2 - 40;
                for(let i=0; i<SHOP_ITEMS.length; i++){
                    let itemY = shopCenterY - 20 + i * 62;
                    if(worldY > cameraY + itemY - 25 && worldY < cameraY + itemY + 35){
                        buyItem(SHOP_ITEMS[i]);
                        return;
                    }
                }
                shopOpen = false;
            }
            if(showStats){
                showStats = false;
                return;
            }
            if(selectMobAt(worldX, worldY)) return;
            moveToTarget(worldX, worldY);
        }
        
        // ========== КАМЕРА ==========
        function updateCamera(){
            let targetCamX = player.x - canvasWidth/2;
            let targetCamY = player.y - canvasHeight/2;
            targetCamX = Math.min(Math.max(targetCamX, 0), WORLD_WIDTH - canvasWidth);
            targetCamY = Math.min(Math.max(targetCamY, 0), WORLD_HEIGHT - canvasHeight);
            cameraX += (targetCamX - cameraX) * 0.09;
            cameraY += (targetCamY - cameraY) * 0.09;
        }
        
        // ========== ОТРИСОВКА ==========
        function drawWorld(){
            for(let i=0; i<WORLD_WIDTH/52+10; i++){
                for(let j=0; j<WORLD_HEIGHT/52+10; j++){
                    let x = i*52 - cameraX;
                    let y = j*52 - cameraY;
                    if(x > -60 && x < canvasWidth + 60 && y > -60 && y < canvasHeight + 60){
                        let grad = ctx.createLinearGradient(x, y, x+52, y+52);
                        grad.addColorStop(0, '#4a8c3a');
                        grad.addColorStop(1, '#3a6c2a');
                        ctx.fillStyle = grad;
                        ctx.fillRect(x, y, 51, 51);
                    }
                }
            }
            for(let obs of obstacles){
                let x = obs.x - cameraX;
                let y = obs.y - cameraY;
                if(x > -120 && x < canvasWidth+120 && y > -120 && y < canvasHeight+120){
                    if(obs.type === 'tree'){
                        ctx.fillStyle = '#3c9e3c';
                        ctx.fillRect(x-18, y-32, 36, 58);
                        ctx.fillStyle = '#8b5a2b';
                        ctx.fillRect(x-10, y-8, 20, 32);
                        ctx.fillStyle = '#5aac3a';
                        ctx.beginPath();
                        ctx.ellipse(x, y-42, 26, 30, 0, 0, Math.PI*2);
                        ctx.fill();
                    } else if(obs.type === 'mountain'){
                        ctx.fillStyle = '#6e6e7a';
                        ctx.beginPath();
                        ctx.moveTo(x, y-45);
                        ctx.lineTo(x-40, y+15);
                        ctx.lineTo(x+40, y+15);
                        ctx.fill();
                        ctx.fillStyle = '#8e8e9a';
                        ctx.beginPath();
                        ctx.moveTo(x-12, y-15);
                        ctx.lineTo(x, y-38);
                        ctx.lineTo(x+12, y-15);
                        ctx.fill();
                    } else if(obs.type === 'rock'){
                        ctx.fillStyle = '#7a6a5a';
                        ctx.beginPath();
                        ctx.ellipse(x, y, 18, 14, 0, 0, Math.PI*2);
                        ctx.fill();
                    } else if(obs.type === 'fence'){
                        ctx.fillStyle = '#c99e6f';
                        ctx.fillRect(x-10, y-14, 20, 32);
                        for(let i=0;i<3;i++) ctx.fillRect(x-6+i*6, y-22, 3, 14);
                    }
                }
            }
            
            let szX = safeZone.x - cameraX;
            let szY = safeZone.y - cameraY;
            ctx.fillStyle = '#88aa66aa';
            ctx.fillRect(szX, szY, safeZone.width, safeZone.height);
            
            for(let gate of gates){
                let gx = gate.x - cameraX;
                let gy = gate.y - cameraY;
                ctx.fillStyle = '#c9a87a';
                ctx.fillRect(gx, gy, gate.width, gate.height);
                ctx.fillStyle = '#e8c28a';
                if(gate.side === "top" || gate.side === "bottom"){
                    for(let i=0; i<3; i++) ctx.fillRect(gx + 15 + i*25, gy + 10, 12, 20);
                } else {
                    for(let i=0; i<3; i++) ctx.fillRect(gx + 10, gy + 15 + i*25, 20, 12);
                }
            }
        }
        
        function drawPlayer(){
            let x = player.x - cameraX;
            let y = player.y - cameraY;
            const cls = CLASSES[player.classType];
            ctx.fillStyle = "#e0c8a0";
            ctx.fillRect(x-16, y-22, 32, 44);
            ctx.fillStyle = cls.color;
            ctx.fillRect(x-14, y-14, 28, 32);
            ctx.fillStyle = cls.armorColor;
            ctx.fillRect(x-12, y-8, 24, 24);
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(x-9, y-16, 6, 6);
            ctx.fillRect(x+3, y-16, 6, 6);
            ctx.fillStyle = "#1a1a1a";
            ctx.fillRect(x-8, y-15, 4, 4);
            ctx.fillRect(x+4, y-15, 4, 4);
            ctx.font = `${Math.min(24, canvasWidth/32)}px monospace`;
            ctx.fillStyle = "#ffffaa";
            ctx.fillText(cls.icon, x-12, y+8);
            ctx.fillStyle = "#aa3333";
            ctx.fillRect(x-24, y-36, 64, 8);
            ctx.fillStyle = "#44ff66";
            ctx.fillRect(x-24, y-36, 64 * (player.hp/player.maxHp), 8);
        }
        
        function drawMob(mob){
            let x = mob.x - cameraX;
            let y = mob.y - cameraY;
            if(x < -120 || x > canvasWidth+120) return;
            ctx.fillStyle = mob.skinColor;
            ctx.fillRect(x-16, y-22, 32, 44);
            ctx.fillStyle = mob.color;
            ctx.fillRect(x-14, y-14, 28, 32);
            ctx.fillStyle = "#000000";
            ctx.fillRect(x-9, y-16, 5, 5);
            ctx.fillRect(x+4, y-16, 5, 5);
            ctx.font = `${Math.min(24, canvasWidth/32)}px monospace`;
            ctx.fillStyle = "#ffffff";
            ctx.fillText(mob.icon, x-10, y+6);
            let hpPercent = mob.hp / mob.maxHp;
            ctx.fillStyle = "#aa3333";
            ctx.fillRect(x-24, y-36, 64, 6);
            ctx.fillStyle = "#44ff66";
            ctx.fillRect(x-24, y-36, 64 * hpPercent, 6);
        }
        
        // ========== НОВЫЙ UI (как на фото) ==========
        function drawUI(){
            const cls = CLASSES[player.classType];
            let fontSize = Math.max(12, Math.min(16, canvasWidth/60));
            
            // Левая верхняя панель - здоровье и мана
            ctx.fillStyle = "#000000aa";
            ctx.fillRect(12, 12, 220, 70);
            ctx.fillStyle = "#cc5555";
            ctx.fillRect(18, 18, 200, 18);
            ctx.fillStyle = "#ff7755";
            ctx.fillRect(18, 18, 200 * (player.hp/player.maxHp), 18);
            ctx.fillStyle = "#5588ff";
            ctx.fillRect(18, 42, 200 * (player.mp/player.maxMp), 16);
            ctx.fillStyle = "#ffffff";
            ctx.font = `bold ${fontSize}px monospace`;
            ctx.fillText(`❤️ ${Math.floor(player.hp)}/${player.maxHp}`, 22, 34);
            ctx.fillText(`💙 ${Math.floor(player.mp)}/${player.maxMp}`, 22, 56);
            
            // Имя и уровень
            ctx.fillStyle = "#ffdd99";
            ctx.font = `bold ${fontSize+2}px monospace`;
            ctx.fillText(`${cls.name} Lv.${player.level}`, 22, 88);
            
            // Опыт
            ctx.fillStyle = "#000000aa";
            ctx.fillRect(12, 98, 220, 16);
            ctx.fillStyle = "#88aaff";
            ctx.fillRect(12, 98, 220 * (player.exp/player.expToNext), 16);
            ctx.fillStyle = "#ffffff";
            ctx.font = `${fontSize-2}px monospace`;
            ctx.fillText(`EXP: ${player.exp}/${player.expToNext}`, 18, 111);
            
            // Правая верхняя панель - золото и зелья
            ctx.fillStyle = "#000000aa";
            ctx.fillRect(canvasWidth-160, 12, 148, 70);
            ctx.fillStyle = "#ffcc88";
            ctx.font = `bold ${fontSize}px monospace`;
            ctx.fillText(`💰 ${player.gold}`, canvasWidth-145, 35);
            ctx.fillText(`🧪 ${player.potionHp}  🔮 ${player.potionMp}`, canvasWidth-145, 60);
            
            // Магазин окно
            if(shopOpen && isInSafeZone(player.x, player.y)){
                ctx.fillStyle = "#000000dd";
                ctx.fillRect(canvasWidth/2-220, canvasHeight/2-150, 440, 300);
                ctx.fillStyle = "#ffdd99";
                ctx.font = `bold ${Math.min(26, canvasWidth/30)}px monospace`;
                ctx.fillText("🏪 МАГАЗИН", canvasWidth/2-80, canvasHeight/2-90);
                for(let i=0; i<SHOP_ITEMS.length; i++){
                    let item = SHOP_ITEMS[i];
                    let y = canvasHeight/2 - 35 + i * 65;
                    ctx.fillStyle = "#aa8866";
                    ctx.fillRect(canvasWidth/2-190, y-12, 380, 52);
                    ctx.fillStyle = "#ffcc88";
                    ctx.font = `${Math.min(18, canvasWidth/45)}px monospace`;
                    ctx.fillText(`${item.icon} ${item.name} - ${item.price}💰`, canvasWidth/2-160, y+14);
                }
            }
            
            // Окно статистики (шестеренка)
            if(showStats){
                updatePlayTime();
                let hours = Math.floor(stats.playTimeSeconds / 3600);
                let minutes = Math.floor((stats.playTimeSeconds % 3600) / 60);
                let seconds = stats.playTimeSeconds % 60;
                
                ctx.fillStyle = "#000000dd";
                ctx.fillRect(canvasWidth/2-200, canvasHeight/2-180, 400, 360);
                ctx.fillStyle = "#ffdd99";
                ctx.font = `bold ${Math.min(24, canvasWidth/28)}px monospace`;
                ctx.fillText("⚙️ СТАТИСТИКА", canvasWidth/2-100, canvasHeight/2-130);
                
                ctx.font = `${Math.min(16, canvasWidth/45)}px monospace`;
                ctx.fillStyle = "#eeddbb";
                ctx.fillText(`👾 Убито мобов: ${stats.mobsKilled}`, canvasWidth/2-150, canvasHeight/2-60);
                ctx.fillText(`💰 Всего золота: ${stats.totalGoldEarned}`, canvasWidth/2-150, canvasHeight/2-25);
                ctx.fillText(`⚔️ Нанесено урона: ${stats.totalDamageDealt}`, canvasWidth/2-150, canvasHeight/2+10);
                ctx.fillText(`🛡️ Получено урона: ${stats.totalDamageTaken}`, canvasWidth/2-150, canvasHeight/2+45);
                ctx.fillText(`⏱️ Время в игре: ${hours}h ${minutes}m ${seconds}s`, canvasWidth/2-150, canvasHeight/2+80);
                ctx.fillText(`⭐ Уровень: ${player.level}`, canvasWidth/2-150, canvasHeight/2+115);
                
                ctx.fillStyle = "#88aaff";
                ctx.font = `${Math.min(12, canvasWidth/60)}px monospace`;
                ctx.fillText("Нажмите в любое место для закрытия", canvasWidth/2-130, canvasHeight/2+155);
            }
            
            // Рамка цели
            if(selectedMob && selectedMob.hp > 0){
                let x = selectedMob.x - cameraX;
                let y = selectedMob.y - cameraY;
                ctx.strokeStyle = "#ffaa44";
                ctx.lineWidth = 4;
                ctx.strokeRect(x-20, y-30, 56, 56);
            }
            
            // Желтая метка цели
            if(player.targetX && player.path && player.path.length > 0){
                let tx = player.targetX - cameraX;
                let ty = player.targetY - cameraY;
                ctx.fillStyle = "#ffcc44aa";
                ctx.beginPath();
                ctx.arc(tx, ty, 16, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = "#ffaa00";
                ctx.beginPath();
                ctx.arc(tx, ty, 8, 0, Math.PI*2);
                ctx.fill();
            }
            
            // Урон
            for(let i=0;i<damageEffects.length;i++){
                let d = damageEffects[i];
                let x = d.x - cameraX;
                let y = d.y - cameraY;
                ctx.font = `bold ${d.isPlayer ? 18 : 22}px monospace`;
                ctx.fillStyle = d.isPlayer ? "#ffaa66" : "#ff8844";
                ctx.fillText(`-${d.dmg}`, x-12, y-28);
                d.life--;
                if(d.life<=0) damageEffects.splice(i,1), i--;
            }
            
            // Сообщения (убран лог, оставлены только временные)
            for(let i=0; i<Math.min(3, messages.length); i++){
                let msg = messages[i];
                ctx.fillStyle = msg.isError ? "#ff8866cc" : "#eeddbbcc";
                ctx.font = `${fontSize-2}px monospace`;
                ctx.fillText(msg.text.substring(0, 35), 15, canvasHeight-40 - i*18);
            }
        }
        
        // ========== ОБНОВЛЕНИЕ ==========
        function updateGame(){
            updateMovement();
            updateMobs();
            updateCamera();
            updatePlayTime();
            
            if(player.attackTimer > 0) player.attackTimer--;
            
            if(spawnTimer <= 0){
                if(mobs.length < MAX_MOBS) spawnMob();
                spawnTimer = 26;
            } else {
                spawnTimer--;
            }
            
            for(let i=0; i<messages.length; i++){
                if(messages[i].life) messages[i].life--;
            }
            messages = messages.filter(m => !m.life || m.life > 0);
        }
        
        // ========== УПРАВЛЕНИЕ ==========
        function getWorldFromClick(clientX, clientY){
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvasWidth / rect.width;
            const scaleY = canvasHeight / rect.height;
            let canvasX = (clientX - rect.left) * scaleX;
            let canvasY = (clientY - rect.top) * scaleY;
            return { x: canvasX + cameraX, y: canvasY + cameraY };
        }
        
        canvas.addEventListener('click', (e) => {
            let world = getWorldFromClick(e.clientX, e.clientY);
            handleWorldClick(world.x, world.y);
        });
        
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            let touch = e.touches[0];
            let world = getWorldFromClick(touch.clientX, touch.clientY);
            handleWorldClick(world.x, world.y);
        });
        
        // Автоатака по выбранной цели
        setInterval(() => {
            if(selectedMob && selectedMob.hp > 0){
                let dist = Math.hypot(player.x - selectedMob.x, player.y - selectedMob.y);
                let range = CLASSES[player.classType].attackRange;
                if(dist <= range + 10){
                    playerAttack();
                }
            }
        }, 2000);
        
        // Кнопки
        document.getElementById('mobileClassBtn').addEventListener('click', () => switchClass());
        document.getElementById('mobileSkillBtn').addEventListener('click', () => useSkill());
        document.getElementById('mobileHpBtn').addEventListener('click', () => useHpPotion());
        document.getElementById('mobileMpBtn').addEventListener('click', () => useMpPotion());
        document.getElementById('mobileShopBtn').addEventListener('click', () => openShop());
        document.getElementById('statsBtn').addEventListener('click', () => { showStats = !showStats; });
        
        window.addEventListener('keydown', (e) => {
            if(e.key === 's') useSkill();
            if(e.key === 'q') useHpPotion();
            if(e.key === 'w') useMpPotion();
            if(e.key === 'p') openShop();
            if(e.key === 'c') switchClass();
        });
        
        // ========== ИНИЦИАЛИЗАЦИЯ ==========
        function init(){
            generateWorld();
            player.x = safeZone.x + safeZone.width/2;
            player.y = safeZone.y + safeZone.height/2;
            player.hp = player.maxHp;
            player.mp = player.maxMp;
            for(let i=0; i<10; i++) spawnMob();
            addMessage("✨ Добро пожаловать! Нажмите на моба для выбора цели");
            addMessage("🗡️ Мечник - ближний бой | 🏹 Лучник/Маг - дальний бой");
            addMessage("⚔️ Атака автоматическая раз в 2 секунды по выбранной цели");
        }
        
        init();
        
        function render(){
            drawWorld();
            for(let mob of mobs) drawMob(mob);
            drawPlayer();
            drawUI();
        }
        
        function gameLoop(){
            updateGame();
            render();
            requestAnimationFrame(gameLoop);
        }
        gameLoop();
    })();
</script>
</body>
</html>
