<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Rucoy Online 2D - Classes & Camera | NetErrror</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #0a0f1e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            touch-action: none;
            overflow: hidden;
        }
        .game-wrapper {
            position: relative;
            background: #1a1f2e;
            padding: 10px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        canvas {
            display: block;
            margin: 0 auto;
            box-shadow: 0 0 0 2px #4a4e6b;
            border-radius: 8px;
            cursor: pointer;
        }
        .ui-panel {
            margin-top: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0f1219cc;
            backdrop-filter: blur(4px);
            padding: 8px 12px;
            border-radius: 40px;
            color: #ffd966;
            text-shadow: 0 0 2px black;
            font-weight: bold;
            flex-wrap: wrap;
            gap: 8px;
        }
        .stats {
            display: flex;
            gap: 15px;
            font-size: 12px;
        }
        .class-indicator {
            background: #2a2e4a;
            padding: 4px 12px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        button {
            background: #2c2f3f;
            border: none;
            color: white;
            font-weight: bold;
            padding: 6px 14px;
            border-radius: 40px;
            font-family: monospace;
            font-size: 14px;
            box-shadow: 0 3px 0 #0a0c14;
            transition: 0.05s linear;
            touch-action: manipulation;
        }
        button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #0a0c14;
        }
        .joystick-area {
            position: fixed;
            bottom: 30px;
            left: 30px;
            width: 130px;
            height: 130px;
            background: rgba(0,0,0,0.5);
            border-radius: 65px;
            backdrop-filter: blur(8px);
            border: 2px solid #ffaa55aa;
            touch-action: none;
            z-index: 10;
        }
        .action-btns {
            position: fixed;
            bottom: 30px;
            right: 30px;
            display: flex;
            gap: 15px;
            z-index: 10;
        }
        .action-btn {
            width: 70px;
            height: 70px;
            background: #2c2f3fdd;
            backdrop-filter: blur(8px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            color: #ffaa44;
            border: 2px solid #ffcc77;
            box-shadow: 0 5px 0 #1a1c2a;
            touch-action: manipulation;
            transition: 0.03s linear;
        }
        .action-btn:active {
            transform: translateY(2px);
        }
        .skill-btn {
            position: fixed;
            bottom: 30px;
            right: 120px;
            background: #6a4e9edd;
            border-color: #c88eff;
        }
        @media (max-width: 700px) {
            .stats { font-size: 9px; gap: 6px; }
            .action-btn { width: 55px; height: 55px; font-size: 22px; }
            .skill-btn { right: 100px; }
        }
    </style>
</head>
<body>
<div>
    <div class="game-wrapper">
        <canvas id="gameCanvas" width="900" height="560"></canvas>
        <div class="ui-panel">
            <div class="stats">
                <span>❤️ <span id="hpVal">120</span>/<span id="maxHp">120</span></span>
                <span>⚔️ DMG: <span id="dmgVal">18-28</span></span>
                <span>🛡️ ARMOR: <span id="armorVal">12</span></span>
                <span>⭐ LVL: <span id="lvlVal">1</span></span>
            </div>
            <div class="class-indicator">
                <span id="classIcon">⚔️</span>
                <span id="className">Melee</span>
                <span>🔮 MP: <span id="mpVal">50</span>/<span id="maxMp">50</span></span>
            </div>
            <div>
                <button id="resetBtn">⟳ RESPAWN</button>
                <button id="classBtn">🔄 SWITCH CLASS</button>
            </div>
        </div>
    </div>

    <div id="joystickBase" class="joystick-area"></div>
    <div class="action-btns">
        <div id="attackBtn" class="action-btn">⚔️</div>
        <div id="skillBtn" class="action-btn skill-btn">✨</div>
        <div id="healBtn" class="action-btn">💊</div>
    </div>
</div>

<script>
    (function(){
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // ==================== МИРЫ ====================
        const WORLDS = {
            forest: { name: "🌲 Forest", bg: "#2b5e3b", floor: "#3c8c40", mobBase: { name: "Goblin", baseHp: 45, baseDmg: 8, exp: 20, color: "#6b4c3b" } },
            desert: { name: "🏜️ Desert", bg: "#c9ae74", floor: "#e0b87a", mobBase: { name: "Scorpion", baseHp: 70, baseDmg: 12, exp: 35, color: "#b87c4f" } },
            castle: { name: "🏰 Castle", bg: "#4a5b6e", floor: "#6c7f8f", mobBase: { name: "Skeleton", baseHp: 110, baseDmg: 18, exp: 55, color: "#b0b7c6" } }
        };
        
        // ==================== КЛАССЫ ====================
        const CLASSES = {
            melee: {
                name: "Melee ⚔️",
                icon: "⚔️",
                baseHp: 140,
                baseMp: 30,
                baseDmgMin: 20,
                baseDmgMax: 35,
                armorBonus: 8,
                skill: { name: "Whirlwind", cost: 15, dmgMulti: 1.8, desc: "Вихревая атака" }
            },
            archer: {
                name: "Archer 🏹",
                icon: "🏹",
                baseHp: 110,
                baseMp: 50,
                baseDmgMin: 18,
                baseDmgMax: 32,
                armorBonus: 3,
                skill: { name: "Arrow Rain", cost: 20, dmgMulti: 1.5, desc: "Дождь стрел" }
            },
            mage: {
                name: "Mage 🔮",
                icon: "🔮",
                baseHp: 85,
                baseMp: 100,
                baseDmgMin: 22,
                baseDmgMax: 42,
                armorBonus: 0,
                skill: { name: "Fireball", cost: 25, dmgMulti: 2.0, desc: "Огненный шар" }
            }
        };
        
        // ==================== ЭКИПИРОВКА ====================
        const ARMOR_SET = {
            cloth: { name: "Cloth", def: 5, lvl: 1 },
            leather: { name: "Leather", def: 12, lvl: 5 },
            iron: { name: "Iron", def: 22, lvl: 12 },
            dragon: { name: "Dragon", def: 38, lvl: 25 }
        };
        const WEAPONS = {
            dagger: { name: "Dagger", dmgMin: 8, dmgMax: 14, lvl: 1 },
            sword: { name: "Sword", dmgMin: 15, dmgMax: 24, lvl: 5 },
            claymore: { name: "Claymore", dmgMin: 24, dmgMax: 38, lvl: 12 },
            dragonfang: { name: "Dragonfang", dmgMin: 40, dmgMax: 60, lvl: 25 }
        };
        
        // ==================== ИГРОК ====================
        let player = {
            x: 500, y: 300,
            hp: 120,
            maxHp: 120,
            mp: 50,
            maxMp: 50,
            level: 1,
            exp: 0,
            expToNext: 50,
            armorId: "cloth",
            weaponId: "dagger",
            worldKey: "forest",
            classType: "melee"
        };
        
        // ==================== СИСТЕМА УРОВНЕЙ МОБОВ ====================
        let currentMob = null;
        let attackCooldown = 0;
        let skillCooldown = 0;
        let invincibleFrames = 0;
        let moveVector = { x: 0, y: 0 };
        let cameraX = 0, cameraY = 0;
        
        const MOVE_SPEED = 3.2;
        const WORLD_WIDTH = 3000;
        const WORLD_HEIGHT = 2000;
        
        // Эффекты
        let damageNumbers = [];
        let skillEffects = [];
        
        // Обновление статов от класса и экипировки
        function updateStatsFromClassAndGear(){
            const cls = CLASSES[player.classType];
            const weapon = WEAPONS[player.weaponId];
            const armor = ARMOR_SET[player.armorId];
            
            player.maxHp = cls.baseHp + player.level * 8;
            player.maxMp = cls.baseMp + player.level * 4;
            if(player.hp > player.maxHp) player.hp = player.maxHp;
            if(player.mp > player.maxMp) player.mp = player.maxMp;
            
            let dmgMin = weapon.dmgMin + cls.baseDmgMin + Math.floor(player.level * 1.5);
            let dmgMax = weapon.dmgMax + cls.baseDmgMax + Math.floor(player.level * 2.2);
            let totalDef = armor.def + cls.armorBonus + Math.floor(player.level * 0.8);
            
            document.getElementById('armorVal').innerText = totalDef;
            document.getElementById('dmgVal').innerText = `${dmgMin}-${dmgMax}`;
            document.getElementById('hpVal').innerText = player.hp;
            document.getElementById('maxHp').innerText = player.maxHp;
            document.getElementById('mpVal').innerText = player.mp;
            document.getElementById('maxMp').innerText = player.maxMp;
            document.getElementById('lvlVal').innerText = player.level;
            document.getElementById('classIcon').innerText = cls.icon;
            document.getElementById('className').innerText = cls.name;
            
            return { dmgMin, dmgMax, totalDef, cls };
        }
        
        // Спавн моба с уровнем (масштабирование)
        function spawnMob(){
            const world = WORLDS[player.worldKey];
            if(!world) return;
            const mobLevel = Math.max(1, player.level + Math.floor(Math.random() * 3) - 1);
            const levelMulti = 1 + (mobLevel - 1) * 0.12;
            
            let baseHp = Math.floor(world.mobBase.baseHp * levelMulti);
            let baseDmg = Math.floor(world.mobBase.baseDmg * (1 + (mobLevel-1)*0.1));
            let expReward = Math.floor(world.mobBase.exp * (0.8 + mobLevel * 0.15));
            
            currentMob = {
                name: `${world.mobBase.name} Lv.${mobLevel}`,
                level: mobLevel,
                hp: baseHp,
                maxHp: baseHp,
                dmg: baseDmg,
                exp: expReward,
                x: player.x + (Math.random() - 0.5) * 350,
                y: player.y + (Math.random() - 0.5) * 250,
                color: world.mobBase.color
            };
            // Ограничение по миру
            currentMob.x = Math.min(Math.max(currentMob.x, 80), WORLD_WIDTH - 80);
            currentMob.y = Math.min(Math.max(currentMob.y, 80), WORLD_HEIGHT - 80);
        }
        
        // Атака (обычная)
        function playerAttack(){
            if(attackCooldown > 0) return false;
            if(!currentMob || currentMob.hp <= 0){
                spawnMob();
                return false;
            }
            const { dmgMin, dmgMax } = updateStatsFromClassAndGear();
            let damage = Math.floor(Math.random() * (dmgMax - dmgMin + 1) + dmgMin);
            currentMob.hp -= damage;
            attackCooldown = 12;
            
            damageNumbers.push({ x: currentMob.x, y: currentMob.y - 20, value: damage, life: 20 });
            
            if(currentMob.hp <= 0){
                let gainedExp = currentMob.exp;
                player.exp += gainedExp;
                while(player.exp >= player.expToNext){
                    player.exp -= player.expToNext;
                    player.level++;
                    player.expToNext = 50 + player.level * 18;
                    // автоапгрейд экипировки
                    if(player.level >= 25 && player.weaponId !== "dragonfang") player.weaponId = "dragonfang";
                    else if(player.level >= 12 && player.weaponId !== "claymore") player.weaponId = "claymore";
                    else if(player.level >= 5 && player.weaponId !== "sword") player.weaponId = "sword";
                    if(player.level >= 25 && player.armorId !== "dragon") player.armorId = "dragon";
                    else if(player.level >= 12 && player.armorId !== "iron") player.armorId = "iron";
                    else if(player.level >= 5 && player.armorId !== "leather") player.armorId = "leather";
                    player.hp = player.maxHp;
                    player.mp = player.maxMp;
                }
                updateStatsFromClassAndGear();
                spawnMob();
            }
            return true;
        }
        
        // Способность класса
        function useSkill(){
            if(skillCooldown > 0) return false;
            const cls = CLASSES[player.classType];
            if(player.mp < cls.skill.cost) return false;
            if(!currentMob || currentMob.hp <= 0) spawnMob();
            if(!currentMob) return false;
            
            player.mp -= cls.skill.cost;
            const { dmgMin, dmgMax } = updateStatsFromClassAndGear();
            let avgDmg = (dmgMin + dmgMax) / 2;
            let skillDamage = Math.floor(avgDmg * cls.skill.dmgMulti);
            currentMob.hp -= skillDamage;
            skillCooldown = 35;
            
            // Визуальный эффект способности
            skillEffects.push({
                x: currentMob.x, y: currentMob.y,
                type: player.classType,
                life: 25
            });
            damageNumbers.push({ x: currentMob.x, y: currentMob.y - 35, value: `✨${skillDamage}`, life: 25 });
            
            if(currentMob.hp <= 0){
                player.exp += currentMob.exp;
                while(player.exp >= player.expToNext){
                    player.exp -= player.expToNext;
                    player.level++;
                    player.expToNext = 50 + player.level * 18;
                    if(player.level >= 25 && player.weaponId !== "dragonfang") player.weaponId = "dragonfang";
                    else if(player.level >= 12 && player.weaponId !== "claymore") player.weaponId = "claymore";
                    else if(player.level >= 5 && player.weaponId !== "sword") player.weaponId = "sword";
                    if(player.level >= 25 && player.armorId !== "dragon") player.armorId = "dragon";
                    else if(player.level >= 12 && player.armorId !== "iron") player.armorId = "iron";
                    else if(player.level >= 5 && player.armorId !== "leather") player.armorId = "leather";
                }
                updateStatsFromClassAndGear();
                spawnMob();
            }
            return true;
        }
        
        function healPlayer(){
            if(player.hp < player.maxHp){
                player.hp = Math.min(player.maxHp, player.hp + 20);
                updateStatsFromClassAndGear();
            }
        }
        
        function damagePlayer(amount){
            if(invincibleFrames > 0) return;
            const { totalDef } = updateStatsFromClassAndGear();
            let reduced = Math.max(2, amount - Math.floor(totalDef / 2.5));
            player.hp -= reduced;
            invincibleFrames = 22;
            damageNumbers.push({ x: player.x, y: player.y - 15, value: `-${reduced}`, life: 18, isPlayer: true });
            if(player.hp <= 0){
                player.hp = player.maxHp;
                player.mp = player.maxMp;
                player.exp = Math.floor(player.exp * 0.85);
                player.x = WORLD_WIDTH/2;
                player.y = WORLD_HEIGHT/2;
                spawnMob();
                updateStatsFromClassAndGear();
            }
        }
        
        // Смена класса
        function switchClass(){
            const classes = Object.keys(CLASSES);
            let idx = classes.indexOf(player.classType);
            let next = (idx + 1) % classes.length;
            player.classType = classes[next];
            updateStatsFromClassAndGear();
            spawnMob();
        }
        
        // Обновление игры с плавной камерой
        function updateGame(){
            if(attackCooldown > 0) attackCooldown--;
            if(skillCooldown > 0) skillCooldown--;
            if(invincibleFrames > 0) invincibleFrames--;
            
            // Движение
            let newX = player.x + moveVector.x * MOVE_SPEED;
            let newY = player.y + moveVector.y * MOVE_SPEED;
            player.x = Math.min(Math.max(newX, 60), WORLD_WIDTH - 60);
            player.y = Math.min(Math.max(newY, 60), WORLD_HEIGHT - 60);
            
            // Плавная камера (интерполяция)
            let targetCamX = player.x - canvas.width/2;
            let targetCamY = player.y - canvas.height/2;
            targetCamX = Math.min(Math.max(targetCamX, 0), WORLD_WIDTH - canvas.width);
            targetCamY = Math.min(Math.max(targetCamY, 0), WORLD_HEIGHT - canvas.height);
            cameraX += (targetCamX - cameraX) * 0.1;
            cameraY += (targetCamY - cameraY) * 0.1;
            
            // Моб логика
            if(currentMob && currentMob.hp > 0){
                let dx = player.x - currentMob.x;
                let dy = player.y - currentMob.y;
                let len = Math.hypot(dx,dy);
                if(len > 8){
                    let step = Math.min(1.4, len/20);
                    currentMob.x += (dx/len)*step;
                    currentMob.y += (dy/len)*step;
                }
                if(len < 52 && attackCooldown <= 3){
                    damagePlayer(currentMob.dmg);
                }
            } else if(!currentMob || currentMob.hp <= 0){
                spawnMob();
            }
            
            // Обновление эффектов
            for(let i=0; i<damageNumbers.length; i++){
                damageNumbers[i].life--;
                if(damageNumbers[i].life <= 0) damageNumbers.splice(i,1), i--;
            }
            for(let i=0; i<skillEffects.length; i++){
                skillEffects[i].life--;
                if(skillEffects[i].life <= 0) skillEffects.splice(i,1), i--;
            }
        }
        
        // ========== ОТРИСОВКА (с учетом камеры) ==========
        function drawPixelSprite(worldX, worldY, type, color, extra={}){
            let screenX = worldX - cameraX;
            let screenY = worldY - cameraY;
            if(screenX < -50 || screenX > canvas.width+50 || screenY < -50 || screenY > canvas.height+50) return;
            
            ctx.save();
            ctx.imageSmoothingEnabled = false;
            ctx.fillStyle = color;
            ctx.fillRect(screenX-18, screenY-24, 36, 40);
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(screenX-10, screenY-16, 6, 6);
            ctx.fillRect(screenX+4, screenY-16, 6, 6);
            ctx.fillStyle = "#000000";
            ctx.fillRect(screenX-9, screenY-15, 4, 4);
            ctx.fillRect(screenX+5, screenY-15, 4, 4);
            
            if(type === "player"){
                ctx.fillStyle = "#ffaa66";
                ctx.fillRect(screenX-6, screenY-8, 12, 6);
                // Оружие по классу
                const cls = CLASSES[player.classType];
                ctx.fillStyle = cls.icon === "🏹" ? "#b8a67c" : (cls.icon === "🔮" ? "#aa88ff" : "#ccaa77");
                ctx.fillRect(screenX+14, screenY-12, 6, 18);
            } else {
                ctx.fillStyle = "#aa4444";
                ctx.fillRect(screenX-8, screenY-8, 16, 4);
                // Уровень моба
                ctx.font = "bold 10px monospace";
                ctx.fillStyle = "#ffcc88";
                ctx.fillText(`Lv.${currentMob?.level}`, screenX-15, screenY-32);
            }
            ctx.restore();
        }
        
        function render(){
            const world = WORLDS[player.worldKey];
            ctx.fillStyle = world.bg;
            ctx.fillRect(0,0,canvas.width,canvas.height);
            
            // Пол
            for(let i=0; i<50; i++){
                ctx.fillStyle = world.floor;
                let xOff = (i*47 + cameraX*0.3) % canvas.width;
                ctx.fillRect(xOff, (i*37)%canvas.height, 42, 42);
            }
            
            // Моб
            if(currentMob && currentMob.hp > 0){
                drawPixelSprite(currentMob.x, currentMob.y, "mob", currentMob.color);
                let screenX = currentMob.x - cameraX;
                let screenY = currentMob.y - cameraY;
                ctx.fillStyle = "#aa3333";
                ctx.fillRect(screenX-30, screenY-42, 60, 8);
                ctx.fillStyle = "#44ff66";
                let percent = currentMob.hp/currentMob.maxHp;
                ctx.fillRect(screenX-30, screenY-42, 60*percent, 8);
                ctx.fillStyle = "#ffffaa";
                ctx.font = "bold 12px monospace";
                ctx.fillText(currentMob.name, screenX-35, screenY-46);
            }
            
            // Игрок
            drawPixelSprite(player.x, player.y, "player", "#7c6e65");
            let pScreenX = player.x - cameraX;
            let pScreenY = player.y - cameraY;
            ctx.fillStyle = "#aa5555";
            ctx.fillRect(pScreenX-32, pScreenY-48, 64, 8);
            ctx.fillStyle = "#ff6644";
            ctx.fillRect(pScreenX-32, pScreenY-48, 64*(player.hp/player.maxHp), 8);
            ctx.fillStyle = "#88aaff";
            ctx.fillRect(pScreenX-32, pScreenY-56, 64*(player.mp/player.maxMp), 5);
            
            // Эффекты способностей
            for(let fx of skillEffects){
                let sx = fx.x - cameraX;
                let sy = fx.y - cameraY;
                ctx.font = "bold 26px monospace";
                ctx.shadowBlur = 8;
                if(fx.type === "mage") ctx.fillStyle = "#ff8844";
                else if(fx.type === "archer") ctx.fillStyle = "#88ff88";
                else ctx.fillStyle = "#ffaa88";
                ctx.fillText(fx.type === "mage" ? "🔥" : (fx.type === "archer" ? "🏹✨" : "🌀"), sx-20, sy-30);
                ctx.shadowBlur = 0;
            }
            
            // Урон
            for(let dmg of damageNumbers){
                let sx = dmg.x - cameraX;
                let sy = dmg.y - cameraY;
                ctx.font = `bold ${dmg.isPlayer ? 14 : 18}px monospace`;
                ctx.fillStyle = dmg.isPlayer ? "#ffaa66" : "#ff6644";
                ctx.fillText(dmg.value, sx-15, sy - dmg.life/2);
            }
            
            ctx.font = "bold 14px monospace";
            ctx.fillStyle = "#ffffcc";
            ctx.fillText(`EXP: ${player.exp}/${player.expToNext}`, 12, 30);
            ctx.fillStyle = "#ccccaa";
            ctx.fillText(`Class Skill: ${CLASSES[player.classType].skill.name} (${CLASSES[player.classType].skill.cost} MP)`, 12, 55);
        }
        
        // ========== УПРАВЛЕНИЕ ==========
        let joystickActive = false;
        const joystickBase = document.getElementById('joystickBase');
        function handleTouchStart(e){ e.preventDefault(); joystickActive = true; }
        function handleTouchMove(e){
            if(!joystickActive) return;
            e.preventDefault();
            const rect = joystickBase.getBoundingClientRect();
            const centerX = rect.left + rect.width/2;
            const centerY = rect.top + rect.height/2;
            let touch = e.touches[0];
            let dx = touch.clientX - centerX;
            let dy = touch.clientY - centerY;
            let len = Math.hypot(dx,dy);
            let maxRad = rect.width/2;
            if(len > maxRad) { dx = dx/len * maxRad; dy = dy/len * maxRad; }
            moveVector.x = dx / (maxRad/1.5);
            moveVector.y = dy / (maxRad/1.5);
            if(Math.abs(moveVector.x) < 0.2) moveVector.x = 0;
            if(Math.abs(moveVector.y) < 0.2) moveVector.y = 0;
        }
        function handleTouchEnd(e){ joystickActive = false; moveVector.x = 0; moveVector.y = 0; }
        joystickBase.addEventListener('touchstart', handleTouchStart);
        joystickBase.addEventListener('touchmove', handleTouchMove);
        joystickBase.addEventListener('touchend', handleTouchEnd);
        
        document.getElementById('attackBtn').addEventListener('touchstart', (e) => { e.preventDefault(); playerAttack(); });
        document.getElementById('skillBtn').addEventListener('touchstart', (e) => { e.preventDefault(); useSkill(); });
        document.getElementById('healBtn').addEventListener('touchstart', (e) => { e.preventDefault(); healPlayer(); });
        document.getElementById('resetBtn').addEventListener('click', () => { player.hp = player.maxHp; player.mp = player.maxMp; spawnMob(); });
        document.getElementById('classBtn').addEventListener('click', () => switchClass());
        
        // Клавиатура
        window.addEventListener('keydown', (e) => {
            if(e.key === 'ArrowUp') moveVector.y = -1;
            if(e.key === 'ArrowDown') moveVector.y = 1;
            if(e.key === 'ArrowLeft') moveVector.x = -1;
            if(e.key === 'ArrowRight') moveVector.x = 1;
            if(e.key === ' ') playerAttack();
            if(e.key === 'e') useSkill();
            if(e.key === 'h') healPlayer();
            if(e.key === 'c') switchClass();
        });
        window.addEventListener('keyup', (e) => {
            if(e.key === 'ArrowUp' && moveVector.y === -1) moveVector.y = 0;
            if(e.key === 'ArrowDown' && moveVector.y === 1) moveVector.y = 0;
            if(e.key === 'ArrowLeft' && moveVector.x === -1) moveVector.x = 0;
            if(e.key === 'ArrowRight' && moveVector.x === 1) moveVector.x = 0;
        });
        
        // Инициализация
        player.x = WORLD_WIDTH/2;
        player.y = WORLD_HEIGHT/2;
        updateStatsFromClassAndGear();
        spawnMob();
        
        function gameLoop(){
            updateGame();
            render();
            requestAnimationFrame(gameLoop);
        }
        gameLoop();
    })();
</script>
</body>
</html>
