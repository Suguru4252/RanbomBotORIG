<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Rucoy Online</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: #0a2a0a;
            overflow: hidden;
            font-family: monospace;
        }
        canvas {
            display: block;
            background: #2a5a2a;
            cursor: crosshair;
        }
        .ui-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.9);
            border-top: 2px solid gold;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            z-index: 100;
        }
        .stat {
            background: #000000aa;
            padding: 4px 10px;
            border-radius: 20px;
            color: gold;
            font-weight: bold;
        }
        .hp-bar {
            width: 180px;
            height: 16px;
            background: #3a1f1f;
            border-radius: 8px;
            overflow: hidden;
        }
        .hp-fill {
            height: 100%;
            background: #d44a4a;
            width: 100%;
        }
        .xp-bar {
            width: 200px;
            height: 8px;
            background: #2a2a2a;
            border-radius: 4px;
            overflow: hidden;
        }
        .xp-fill {
            height: 100%;
            background: #6a9eff;
            width: 0%;
        }
        button {
            background: #4a3e2a;
            border: none;
            color: gold;
            padding: 4px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-family: monospace;
        }
        .class-btn {
            background: #2c2f3f;
        }
        .class-btn.active {
            background: #6a3e9e;
        }
        .panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #000000dd;
            border: 2px solid gold;
            border-radius: 16px;
            padding: 20px;
            width: 280px;
            display: none;
            z-index: 200;
            color: white;
        }
        .log {
            position: fixed;
            bottom: 70px;
            left: 10px;
            background: #000000aa;
            border-left: 3px solid gold;
            padding: 4px 8px;
            color: gold;
            font-size: 11px;
            animation: fadeOut 2s forwards;
            pointer-events: none;
        }
        .damage {
            position: fixed;
            font-weight: bold;
            font-size: 18px;
            color: #ffaa44;
            text-shadow: 1px 1px 0 black;
            pointer-events: none;
            animation: floatUp 0.8s forwards;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-40px); }
        }
        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; }
        }
        .death-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #000000dd;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 500;
        }
        .death-screen h1 { color: red; font-size: 48px; }
        .death-screen p { color: gold; font-size: 24px; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="ui-panel">
        <div style="display: flex; gap: 8px;">
            <div class="stat">Lv.<span id="lv">1</span></div>
            <div class="hp-bar"><div class="hp-fill" id="hpFill"></div></div>
            <div class="stat">❤️ <span id="hpText">120/120</span></div>
        </div>
        <div class="xp-bar"><div class="xp-fill" id="xpFill"></div></div>
        <div style="display: flex; gap: 6px;">
            <button id="btnKnight" class="class-btn active">⚔️ Рыцарь</button>
            <button id="btnArcher" class="class-btn">🏹 Лучник</button>
            <button id="btnMage" class="class-btn">🔮 Маг</button>
            <button id="btnHeal">💊 Лечить</button>
            <button id="btnSpell">✨ Удар</button>
            <button id="btnInv">🎒 Инв</button>
            <button id="btnStats">📊 Стат</button>
        </div>
        <div class="stat">💰 <span id="gold">500</span></div>
    </div>

    <div class="panel" id="invPanel">
        <h3 style="color:gold;">Инвентарь</h3>
        <div id="invList" style="margin: 15px 0;"></div>
        <button id="closeInv">Закрыть</button>
    </div>

    <div class="panel" id="statsPanel">
        <h3 style="color:gold;">Статистика</h3>
        <div id="statsList"></div>
        <button id="closeStats">Закрыть</button>
    </div>

    <div class="panel" id="shopPanel">
        <h3 style="color:gold;">Торговец</h3>
        <div id="shopList"></div>
        <button id="closeShop">Закрыть</button>
    </div>

    <div class="death-screen" id="deathScreen">
        <h1>💀 ВЫ УМЕРЛИ 💀</h1>
        <p>Возрождение через <span id="deathTimer">10</span> сек</p>
    </div>

    <script>
        // ========== КАНВАС ==========
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        function setSize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        setSize();
        window.addEventListener('resize', setSize);
        
        // ========== МИР ==========
        const TILE = 48;
        const W = 35;
        const H = 35;
        
        let cam = { x: 0, y: 0 };
        let selectedMonster = null;
        let targetTile = null;
        
        // карта
        let map = [];
        const safeX = 17, safeY = 17;
        
        for (let y = 0; y < H; y++) {
            map[y] = [];
            for (let x = 0; x < W; x++) {
                if (x === 0 || y === 0 || x === W-1 || y === H-1) map[y][x] = 1;
                else if (Math.abs(x - safeX) <= 3 && Math.abs(y - safeY) <= 3) map[y][x] = 0;
                else if (Math.random() < 0.03) map[y][x] = 1;
                else map[y][x] = 0;
            }
        }
        
        // ========== ИГРОК ==========
        let player = {
            x: safeX * TILE, y: safeY * TILE,
            tx: safeX, ty: safeY,
            targetX: safeX * TILE, targetY: safeY * TILE,
            level: 1, xp: 0,
            hp: 120, maxHp: 120,
            mp: 60, maxMp: 60,
            attack: 22, defense: 12,
            class: 'knight',
            gold: 500,
            kills: 0,
            lastAttack: 0,
            inventory: [],
            
            get totalAttack() {
                let bonus = this.class === 'knight' ? 6 : (this.class === 'archer' ? 8 : 7);
                return this.attack + bonus;
            },
            
            moveTo(wx, wy) {
                let tx = Math.floor(wx / TILE);
                let ty = Math.floor(wy / TILE);
                if (tx < 0 || tx >= W || ty < 0 || ty >= H) return;
                if (map[ty][tx] === 1) return;
                for (let m of monsters) if (m.alive && m.tx === tx && m.ty === ty) return;
                this.targetX = tx * TILE;
                this.targetY = ty * TILE;
                targetTile = { x: tx, y: ty };
                setTimeout(() => { if (targetTile && targetTile.x === tx && targetTile.y === ty) targetTile = null; }, 300);
            },
            
            update(dt) {
                let dx = this.targetX - this.x;
                let dy = this.targetY - this.y;
                let dist = Math.hypot(dx, dy);
                if (dist > 2) {
                    let step = 180 * dt;
                    if (dist < step) {
                        this.x = this.targetX;
                        this.y = this.targetY;
                        this.tx = Math.floor(this.x / TILE);
                        this.ty = Math.floor(this.y / TILE);
                    } else {
                        let ang = Math.atan2(dy, dx);
                        this.x += Math.cos(ang) * step;
                        this.y += Math.sin(ang) * step;
                    }
                }
            },
            
            takeDamage(dmg) {
                let actual = Math.max(1, Math.floor(dmg - this.defense * 0.3));
                this.hp = Math.max(0, this.hp - actual);
                if (this.hp <= 0) this.die();
                return actual;
            },
            
            die() {
                this.hp = 0;
                let screen = document.getElementById('deathScreen');
                screen.style.display = 'flex';
                let timerSpan = document.getElementById('deathTimer');
                let count = 10;
                let interval = setInterval(() => {
                    count--;
                    timerSpan.innerText = count;
                    if (count <= 0) {
                        clearInterval(interval);
                        screen.style.display = 'none';
                        this.respawn();
                    }
                }, 1000);
            },
            
            respawn() {
                this.hp = this.maxHp;
                this.mp = this.maxMp;
                this.x = safeX * TILE;
                this.y = safeY * TILE;
                this.targetX = this.x;
                this.targetY = this.y;
                this.tx = safeX;
                this.ty = safeY;
                addLog('🌟 Вы возродились!');
                updateUI();
            },
            
            addExp(amount) {
                this.xp += amount;
                let need = 100 + (this.level - 1) * 50;
                while (this.xp >= need) {
                    this.xp -= need;
                    this.level++;
                    this.maxHp += 30;
                    this.hp = this.maxHp;
                    this.maxMp += 15;
                    this.mp = this.maxMp;
                    this.attack += 5;
                    this.defense += 2;
                    addLog(`✨ УРОВЕНЬ ${this.level}! ✨`);
                    need = 100 + (this.level - 1) * 50;
                }
                updateUI();
            },
            
            attackMonster(m) {
                let now = Date.now() / 1000;
                if (now - this.lastAttack < 0.85) {
                    addLog('⚔️ Атака перезаряжается!');
                    return;
                }
                let dist = Math.abs(this.tx - m.tx) + Math.abs(this.ty - m.ty);
                if (this.class === 'knight' && dist > 1) { addLog('🏃 Подойдите ближе!'); return; }
                if ((this.class === 'archer' || this.class === 'mage') && dist > 10) { addLog('📡 Слишком далеко!'); return; }
                
                let dmg = this.totalAttack - m.defense + Math.random() * 15;
                dmg = Math.max(5, Math.floor(dmg));
                m.hp -= dmg;
                this.lastAttack = now;
                addLog(`⚔️ Вы нанесли ${dmg} урона ${m.name}`);
                showDamage(m.x, m.y, dmg);
                
                if (m.hp <= 0) {
                    this.addExp(m.xp);
                    this.gold += m.gold;
                    this.kills++;
                    addLog(`🏆 Убит ${m.name}! +${m.xp} XP +${m.gold}💰`);
                    m.respawn();
                }
                updateUI();
            }
        };
        
        // ========== МОНСТРЫ ==========
        let monsters = [];
        
        const MONSTER_DATA = {
            goblin: { name: 'Гоблин', hp: 45, attack: 16, defense: 3, xp: 35, gold: 12, color: '#6b8c42', size: 30 },
            wolf: { name: 'Волк', hp: 55, attack: 20, defense: 4, xp: 45, gold: 18, color: '#8a8a6a', size: 30 },
            skeleton: { name: 'Скелет', hp: 75, attack: 24, defense: 6, xp: 60, gold: 25, color: '#bdb28c', size: 32 },
            orc: { name: 'Орк', hp: 110, attack: 30, defense: 8, xp: 95, gold: 35, color: '#7a6a4a', size: 36 },
            minotaur: { name: 'Минотавр', hp: 180, attack: 38, defense: 12, xp: 150, gold: 55, color: '#9b5e2c', size: 40 }
        };
        
        class MonsterObj {
            constructor(type, tx, ty) {
                let d = MONSTER_DATA[type];
                this.type = type;
                this.name = d.name;
                this.hp = d.hp;
                this.maxHp = d.hp;
                this.attack = d.attack;
                this.defense = d.defense;
                this.xp = d.xp;
                this.gold = d.gold;
                this.color = d.color;
                this.size = d.size;
                this.tx = tx;
                this.ty = ty;
                this.x = tx * TILE;
                this.y = ty * TILE;
                this.alive = true;
                this.aggro = false;
                this.attackCd = 0;
                this.moveCd = 0;
            }
            
            canMoveTo(tx, ty) {
                if (tx < 0 || tx >= W || ty < 0 || ty >= H) return false;
                if (map[ty][tx] === 1) return false;
                if (Math.abs(tx - safeX) <= 3 && Math.abs(ty - safeY) <= 3) return false;
                if (player.tx === tx && player.ty === ty) return true;
                for (let m of monsters) if (m !== this && m.alive && m.tx === tx && m.ty === ty) return false;
                return true;
            }
            
            moveToPlayer() {
                let dx = player.tx - this.tx;
                let dy = player.ty - this.ty;
                let moves = [];
                if (dx > 0) moves.push({ tx: this.tx + 1, ty: this.ty });
                if (dx < 0) moves.push({ tx: this.tx - 1, ty: this.ty });
                if (dy > 0) moves.push({ tx: this.tx, ty: this.ty + 1 });
                if (dy < 0) moves.push({ tx: this.tx, ty: this.ty - 1 });
                for (let m of moves) {
                    if (this.canMoveTo(m.tx, m.ty)) {
                        this.tx = m.tx;
                        this.ty = m.ty;
                        this.x = this.tx * TILE;
                        this.y = this.ty * TILE;
                        return true;
                    }
                }
                return false;
            }
            
            update(dt) {
                if (!this.alive) return;
                if (this.attackCd > 0) this.attackCd -= dt;
                if (this.moveCd > 0) this.moveCd -= dt;
                let dist = Math.abs(this.tx - player.tx) + Math.abs(this.ty - player.ty);
                if (dist <= 5) this.aggro = true;
                if (dist > 7) this.aggro = false;
                if (this.aggro && player.hp > 0) {
                    if (dist > 1 && this.moveCd <= 0) {
                        this.moveToPlayer();
                        this.moveCd = 0.5;
                    } else if (dist <= 1 && this.attackCd <= 0) {
                        let dmg = Math.max(5, this.attack - player.defense + Math.random() * 12);
                        let actual = player.takeDamage(Math.floor(dmg));
                        this.attackCd = 1.2;
                        addLog(`💔 ${this.name} атакует! -${actual} HP`);
                        showDamage(player.x, player.y, actual);
                        updateUI();
                    }
                }
            }
            
            respawn() {
                setTimeout(() => {
                    this.hp = this.maxHp;
                    this.alive = true;
                    this.aggro = false;
                    for (let i = 0; i < 30; i++) {
                        let tx = 3 + Math.random() * (W - 6);
                        let ty = 3 + Math.random() * (H - 6);
                        if (map[ty][tx] === 0 && Math.abs(tx - safeX) > 4) {
                            let clash = false;
                            for (let m of monsters) if (m !== this && m.alive && m.tx === tx && m.ty === ty) clash = true;
                            if (!clash && !(player.tx === tx && player.ty === ty)) {
                                this.tx = tx;
                                this.ty = ty;
                                this.x = tx * TILE;
                                this.y = ty * TILE;
                                return;
                            }
                        }
                    }
                }, 8000);
            }
        }
        
        function spawnMonsters() {
            let types = ['goblin', 'wolf', 'skeleton', 'orc', 'minotaur'];
            for (let i = 0; i < 28; i++) {
                let type = types[Math.floor(Math.random() * types.length)];
                for (let a = 0; a < 30; a++) {
                    let tx = 3 + Math.random() * (W - 6);
                    let ty = 3 + Math.random() * (H - 6);
                    if (map[ty][tx] === 0 && Math.abs(tx - safeX) > 4) {
                        let clash = false;
                        for (let m of monsters) if (m.tx === tx && m.ty === ty) clash = true;
                        if (!clash) {
                            monsters.push(new MonsterObj(type, Math.floor(tx), Math.floor(ty)));
                            break;
                        }
                    }
                }
            }
        }
        
        // ========== ИНВЕНТАРЬ ==========
        function initInv() {
            player.inventory.push({ name: 'Малая настойка HP', icon: '🧪', heal: 60, count: 3 });
            player.inventory.push({ name: 'Малая настойка MP', icon: '💙', mana: 40, count: 2 });
        }
        
        function heal() {
            let pot = player.inventory.find(i => i.heal);
            if (!pot) { addLog('🧪 Нет зелий!'); return; }
            player.hp = Math.min(player.maxHp, player.hp + pot.heal);
            pot.count--;
            if (pot.count <= 0) {
                let idx = player.inventory.indexOf(pot);
                player.inventory.splice(idx, 1);
            }
            addLog(`💚 +${pot.heal} HP`);
            updateUI();
            updateInvUI();
        }
        
        function mana() {
            let pot = player.inventory.find(i => i.mana);
            if (!pot) { addLog('💙 Нет зелий маны!'); return; }
            player.mp = Math.min(player.maxMp, player.mp + pot.mana);
            pot.count--;
            if (pot.count <= 0) {
                let idx = player.inventory.indexOf(pot);
                player.inventory.splice(idx, 1);
            }
            addLog(`💙 +${pot.mana} MP`);
            updateUI();
            updateInvUI();
        }
        
        let lastSpell = 0;
        function spell() {
            let now = Date.now() / 1000;
            if (now - lastSpell < 5) { addLog('⏳ Перезарядка!'); return; }
            if (player.mp < 20) { addLog('💧 Не хватает маны!'); return; }
            player.mp -= 20;
            let hit = false;
            for (let m of monsters) {
                if (!m.alive) continue;
                let dist = Math.abs(m.tx - player.tx) + Math.abs(m.ty - player.ty);
                if ((player.class === 'knight' && dist <= 2) ||
                    (player.class === 'archer' && dist <= 10) ||
                    (player.class === 'mage' && dist <= 4)) {
                    let dmg = Math.floor(player.totalAttack * 1.6);
                    m.hp -= dmg;
                    showDamage(m.x, m.y, dmg);
                    hit = true;
                    if (m.hp <= 0) {
                        player.addExp(m.xp);
                        player.gold += m.gold;
                        player.kills++;
                        m.respawn();
                    }
                }
            }
            if (hit) addLog(`✨ Суперудар! ✨`);
            else addLog('Нет врагов рядом');
            lastSpell = now;
            updateUI();
        }
        
        // ========== МАГАЗИН ==========
        const SHOP = [
            { name: 'Малая настойка HP', icon: '🧪', heal: 60, price: 20 },
            { name: 'Малая настойка MP', icon: '💙', mana: 40, price: 18 }
        ];
        
        function openShop() {
            let div = document.getElementById('shopList');
            div.innerHTML = '';
            for (let item of SHOP) {
                let row = document.createElement('div');
                row.style.display = 'flex';
                row.style.justifyContent = 'space-between';
                row.style.alignItems = 'center';
                row.style.padding = '8px';
                row.style.borderBottom = '1px solid #333';
                row.innerHTML = `
                    <span style="font-size:24px;">${item.icon}</span>
                    <span style="flex:1; margin-left:10px;">${item.name}</span>
                    <span>💰 ${item.price}</span>
                    <button class="buyBtn" data-name="${item.name}">Купить</button>
                `;
                div.appendChild(row);
            }
            document.getElementById('shopPanel').style.display = 'block';
            document.querySelectorAll('.buyBtn').forEach(btn => {
                btn.onclick = () => {
                    let name = btn.dataset.name;
                    let item = SHOP.find(i => i.name === name);
                    if (player.gold >= item.price) {
                        player.gold -= item.price;
                        let existing = player.inventory.find(i => i.name === item.name);
                        if (existing) existing.count++;
                        else player.inventory.push({ ...item, count: 1 });
                        addLog(`🛒 Куплено: ${item.name}`);
                        updateUI();
                        updateInvUI();
                    } else addLog('💰 Нет денег!');
                };
            });
        }
        
        // ========== UI ==========
        function updateUI() {
            document.getElementById('lv').innerText = player.level;
            document.getElementById('hpText').innerHTML = `${Math.floor(player.hp)}/${player.maxHp}`;
            document.getElementById('hpFill').style.width = (player.hp / player.maxHp * 100) + '%';
            document.getElementById('gold').innerText = player.gold;
            let need = 100 + (player.level - 1) * 50;
            document.getElementById('xpFill').style.width = (player.xp / need * 100) + '%';
            
            let statsHtml = `
                <div style="display:flex; justify-content:space-between; padding:5px 0;"><span>Уровень:</span><span>${player.level}</span></div>
                <div style="display:flex; justify-content:space-between; padding:5px 0;"><span>Опыт:</span><span>${player.xp}/${need}</span></div>
                <div style="display:flex; justify-content:space-between; padding:5px 0;"><span>❤️ Здоровье:</span><span>${player.maxHp}</span></div>
                <div style="display:flex; justify-content:space-between; padding:5px 0;"><span>💙 Мана:</span><span>${player.maxMp}</span></div>
                <div style="display:flex; justify-content:space-between; padding:5px 0;"><span>⚔️ Атака:</span><span>${player.totalAttack}</span></div>
                <div style="display:flex; justify-content:space-between; padding:5px 0;"><span>🛡️ Защита:</span><span>${player.defense}</span></div>
                <div style="display:flex; justify-content:space-between; padding:5px 0;"><span>💰 Золото:</span><span>${player.gold}</span></div>
                <div style="display:flex; justify-content:space-between; padding:5px 0;"><span>👹 Убито:</span><span>${player.kills}</span></div>
            `;
            document.getElementById('statsList').innerHTML = statsHtml;
        }
        
        function updateInvUI() {
            let div = document.getElementById('invList');
            div.innerHTML = '';
            for (let i = 0; i < player.inventory.length; i++) {
                let item = player.inventory[i];
                let slot = document.createElement('div');
                slot.style.background = '#2c2f3f';
                slot.style.border = '1px solid gold';
                slot.style.borderRadius = '8px';
                slot.style.padding = '8px';
                slot.style.margin = '5px';
                slot.style.display = 'inline-block';
                slot.style.textAlign = 'center';
                slot.style.minWidth = '70px';
                slot.innerHTML = `${item.icon}<br>${item.name}<br>x${item.count}`;
                div.appendChild(slot);
            }
        }
        
        // ========== ОТРИСОВКА ==========
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            cam.x = player.x - canvas.width / 2;
            cam.y = player.y - canvas.height / 2;
            cam.x = Math.max(0, Math.min(cam.x, W * TILE - canvas.width));
            cam.y = Math.max(0, Math.min(cam.y, H * TILE - canvas.height));
            
            let sx = Math.max(0, Math.floor(cam.x / TILE));
            let sy = Math.max(0, Math.floor(cam.y / TILE));
            let ex = Math.min(W, sx + Math.ceil(canvas.width / TILE) + 2);
            let ey = Math.min(H, sy + Math.ceil(canvas.height / TILE) + 2);
            
            for (let y = sy; y < ey; y++) {
                for (let x = sx; x < ex; x++) {
                    let cx = x * TILE - cam.x;
                    let cy = y * TILE - cam.y;
                    if (map[y][x] === 1) {
                        ctx.fillStyle = '#4a3e35';
                        ctx.fillRect(cx, cy, TILE - 1, TILE - 1);
                    } else {
                        if (Math.abs(x - safeX) <= 3 && Math.abs(y - safeY) <= 3) ctx.fillStyle = '#8aae6a';
                        else ctx.fillStyle = '#5cae4a';
                        ctx.fillRect(cx, cy, TILE - 1, TILE - 1);
                        ctx.fillStyle = '#6cbe5a';
                        ctx.fillRect(cx + 4, cy + 4, TILE - 9, TILE - 9);
                    }
                    if (x === safeX && y === safeY) {
                        ctx.fillStyle = '#ffaa66';
                        ctx.font = '24px monospace';
                        ctx.fillText('🏪', cx + 14, cy + 34);
                    }
                    if (targetTile && targetTile.x === x && targetTile.y === y) {
                        ctx.strokeStyle = '#ffdd88';
                        ctx.lineWidth = 2;
                        ctx.strokeRect(cx + 2, cy + 2, TILE - 5, TILE - 5);
                    }
                }
            }
            
            for (let m of monsters) {
                if (!m.alive) continue;
                let cx = m.x - cam.x - m.size / 2;
                let cy = m.y - cam.y - m.size / 2;
                ctx.fillStyle = m.color;
                ctx.fillRect(cx, cy, m.size, m.size);
                ctx.fillStyle = 'black';
                ctx.fillRect(cx + m.size/2 - 6, cy + m.size/2 - 4, 4, 4);
                ctx.fillRect(cx + m.size/2 + 2, cy + m.size/2 - 4, 4, 4);
                let hpP = m.hp / m.maxHp;
                ctx.fillStyle = '#a13333';
                ctx.fillRect(cx, cy - 6, m.size, 4);
                ctx.fillStyle = '#d65c5c';
                ctx.fillRect(cx, cy - 6, m.size * hpP, 4);
                ctx.fillStyle = 'white';
                ctx.font = 'bold 10px monospace';
                ctx.fillText(m.name, cx + 4, cy - 2);
                if (selectedMonster === m) {
                    ctx.strokeStyle = 'red';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(cx - 1, cy - 1, m.size + 2, m.size + 2);
                }
            }
            
            let px = player.x - cam.x - 18;
            let py = player.y - cam.y - 18;
            ctx.fillStyle = '#3a6ea5';
            ctx.fillRect(px + 4, py + 6, 28, 24);
            ctx.fillStyle = '#f9c87a';
            ctx.beginPath();
            ctx.arc(px + 18, py + 12, 8, 0, Math.PI * 2);
            ctx.fill();
            if (player.class === 'knight') {
                ctx.fillStyle = '#ccccaa';
                ctx.fillRect(px + 26, py + 18, 10, 5);
            } else if (player.class === 'archer') {
                ctx.fillStyle = '#ccaa66';
                ctx.fillRect(px + 24, py + 20, 12, 4);
            } else {
                ctx.fillStyle = '#ff88aa';
                ctx.fillRect(px + 22, py + 20, 16, 5);
            }
            let hpP = player.hp / player.maxHp;
            ctx.fillStyle = '#a13333';
            ctx.fillRect(px, py - 6, 36, 4);
            ctx.fillStyle = '#d65c5c';
            ctx.fillRect(px, py - 6, 36 * hpP, 4);
        }
        
        // ========== КЛИКИ ==========
        function onClick(e) {
            let rect = canvas.getBoundingClientRect();
            let cx = (e.clientX - rect.left) * (canvas.width / rect.width);
            let cy = (e.clientY - rect.top) * (canvas.height / rect.height);
            let wx = cx + cam.x;
            let wy = cy + cam.y;
            let tx = Math.floor(wx / TILE);
            let ty = Math.floor(wy / TILE);
            if (tx < 0 || tx >= W || ty < 0 || ty >= H) return;
            
            let clicked = null;
            for (let m of monsters) if (m.alive && m.tx === tx && m.ty === ty) { clicked = m; break; }
            if (clicked) {
                selectedMonster = clicked;
                player.attackMonster(clicked);
            } else {
                if (tx === safeX && ty === safeY) openShop();
                else player.moveTo(wx, wy);
            }
        }
        
        // автоатака
        setInterval(() => {
            if (selectedMonster && selectedMonster.alive && player.hp > 0) {
                let dist = Math.abs(player.tx - selectedMonster.tx) + Math.abs(player.ty - selectedMonster.ty);
                let maxD = player.class === 'knight' ? 1 : 10;
                if (dist <= maxD) player.attackMonster(selectedMonster);
            }
        }, 500);
        
        // реген
        setInterval(() => {
            if (player.hp > 0 && player.hp < player.maxHp) {
                let regen = Math.floor(player.maxHp * 0.03);
                player.hp = Math.min(player.maxHp, player.hp + regen);
                updateUI();
            }
            if (player.mp < player.maxMp) {
                let regen = Math.floor(player.maxMp * 0.05);
                player.mp = Math.min(player.maxMp, player.mp + regen);
                updateUI();
            }
        }, 1000);
        
        // логи
        function addLog(msg) {
            let d = document.createElement('div');
            d.className = 'log';
            d.innerText = msg;
            document.body.appendChild(d);
            setTimeout(() => d.remove(), 2500);
        }
        
        function showDamage(x, y, dmg) {
            let d = document.createElement('div');
            d.className = 'damage';
            d.innerText = `-${Math.floor(dmg)}`;
            let sx = x - cam.x;
            let sy = y - cam.y;
            d.style.left = sx + 'px';
            d.style.top = sy + 'px';
            document.body.appendChild(d);
            setTimeout(() => d.remove(), 700);
        }
        
        // ========== ЗАПУСК ==========
        spawnMonsters();
        initInv();
        updateUI();
        updateInvUI();
        
        canvas.addEventListener('click', onClick);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            let t = e.touches[0];
            let rect = canvas.getBoundingClientRect();
            let cx = (t.clientX - rect.left) * (canvas.width / rect.width);
            let cy = (t.clientY - rect.top) * (canvas.height / rect.height);
            let wx = cx + cam.x;
            let wy = cy + cam.y;
            let tx = Math.floor(wx / TILE);
            let ty = Math.floor(wy / TILE);
            if (tx < 0 || tx >= W || ty < 0 || ty >= H) return;
            let clicked = null;
            for (let m of monsters) if (m.alive && m.tx === tx && m.ty === ty) { clicked = m; break; }
            if (clicked) {
                selectedMonster = clicked;
                player.attackMonster(clicked);
            } else {
                if (tx === safeX && ty === safeY) openShop();
                else player.moveTo(wx, wy);
            }
        });
        
        document.getElementById('btnHeal').onclick = heal;
        document.getElementById('btnSpell').onclick = spell;
        document.getElementById('btnInv').onclick = () => document.getElementById('invPanel').style.display = 'block';
        document.getElementById('closeInv').onclick = () => document.getElementById('invPanel').style.display = 'none';
        document.getElementById('btnStats').onclick = () => document.getElementById('statsPanel').style.display = 'block';
        document.getElementById('closeStats').onclick = () => document.getElementById('statsPanel').style.display = 'none';
        document.getElementById('closeShop').onclick = () => document.getElementById('shopPanel').style.display = 'none';
        
        document.getElementById('btnKnight').onclick = () => { player.class = 'knight'; addLog('Класс: Рыцарь'); updateUI(); };
        document.getElementById('btnArcher').onclick = () => { player.class = 'archer'; addLog('Класс: Лучник'); updateUI(); };
        document.getElementById('btnMage').onclick = () => { player.class = 'mage'; addLog('Класс: Маг'); updateUI(); };
        
        let last = 0;
        function loop(now) {
            let dt = Math.min(0.033, (now - last) / 1000);
            last = now;
            player.update(dt);
            for (let m of monsters) m.update(dt);
            draw();
            requestAnimationFrame(loop);
        }
        requestAnimationFrame(loop);
        
        addLog('⚔️ Добро пожаловать! ⚔️');
        addLog('👆 Нажми на монстра - атака | На землю - движение');
        addLog('🏪 Нажми на 🏪 чтобы купить зелья');
        addLog('💀 При смерти экран на 10 секунд');
    </script>
</body>
</html>
