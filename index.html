<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=no">
    <title>Rucoy Online - Full Screen RPG</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #0a0c12;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
            font-family: 'Courier New', monospace;
            touch-action: none;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
            background: #1a2a1a;
        }
        
        .mobile-controls {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 12px;
            padding: 10px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(12px);
            z-index: 100;
            pointer-events: auto;
        }
        
        .mobile-btn {
            background: #2c2f4a;
            border: none;
            color: #ffcc88;
            font-size: 20px;
            padding: 10px 18px;
            border-radius: 40px;
            font-weight: bold;
            box-shadow: 0 3px 0 #121420;
            touch-action: manipulation;
            font-family: monospace;
            cursor: pointer;
            transition: 0.03s linear;
        }
        
        .mobile-btn:active {
            transform: translateY(2px);
        }
        
        @media (min-width: 1024px) {
            .mobile-controls {
                bottom: 25px;
                gap: 20px;
            }
            .mobile-btn {
                font-size: 22px;
                padding: 12px 24px;
            }
        }
        
        @media (orientation: portrait) {
            .mobile-controls {
                bottom: 15px;
                gap: 8px;
            }
            .mobile-btn {
                font-size: 16px;
                padding: 8px 14px;
            }
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div class="mobile-controls">
        <button class="mobile-btn" id="mobileShopBtn">🏪 МАГАЗИН</button>
        <button class="mobile-btn" id="mobileHpBtn">❤️ ЗЕЛЬЕ</button>
        <button class="mobile-btn" id="mobileMpBtn">💙 ЗЕЛЬЕ</button>
        <button class="mobile-btn" id="mobileSkillBtn">✨ СКИЛЛ</button>
        <button class="mobile-btn" id="mobileClassBtn">🔄 КЛАСС</button>
    </div>

<script>
    (function(){
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // ========== РАЗМЕР МИРА (ОГРОМНЫЙ) ==========
        const WORLD_WIDTH = 5500;
        const WORLD_HEIGHT = 4200;
        const TILE_SIZE = 52;
        
        let cameraX = 0, cameraY = 0;
        let canvasWidth = window.innerWidth;
        let canvasHeight = window.innerHeight;
        
        function resizeCanvas() {
            canvasWidth = window.innerWidth;
            canvasHeight = window.innerHeight;
            canvas.width = canvasWidth;
            canvas.height = canvasHeight;
        }
        window.addEventListener('resize', () => {
            resizeCanvas();
            updateCamera();
        });
        resizeCanvas();
        
        // ========== КАРТА И ПРЕПЯТСТВИЯ ==========
        let obstacles = [];
        let safeZone = { x: 450, y: 380, width: 480, height: 360 };
        
        function generateWorld(){
            obstacles = [];
            
            // Заборы вокруг безопасной зоны
            for(let i = 0; i < 32; i++){
                obstacles.push({ x: safeZone.x + i * 28, y: safeZone.y - 18, radius: 14, type: 'fence' });
                obstacles.push({ x: safeZone.x + i * 28, y: safeZone.y + safeZone.height + 8, radius: 14, type: 'fence' });
            }
            for(let i = 0; i < 24; i++){
                obstacles.push({ x: safeZone.x - 18, y: safeZone.y + i * 28, radius: 14, type: 'fence' });
                obstacles.push({ x: safeZone.x + safeZone.width + 8, y: safeZone.y + i * 28, radius: 14, type: 'fence' });
            }
            
            // Деревья
            for(let i=0; i<350; i++){
                let x = 80 + Math.random() * (WORLD_WIDTH - 160);
                let y = 80 + Math.random() * (WORLD_HEIGHT - 160);
                if(x > safeZone.x-60 && x < safeZone.x+safeZone.width+60 && y > safeZone.y-60 && y < safeZone.y+safeZone.height+60) continue;
                obstacles.push({ x: x, y: y, radius: 26, type: 'tree' });
            }
            
            // Горы
            for(let i=0; i<65; i++){
                let x = 120 + Math.random() * (WORLD_WIDTH - 240);
                let y = 100 + Math.random() * (WORLD_HEIGHT - 200);
                if(x > safeZone.x-80 && x < safeZone.x+safeZone.width+80 && y > safeZone.y-80 && y < safeZone.y+safeZone.height+80) continue;
                obstacles.push({ x: x, y: y, radius: 38, type: 'mountain' });
            }
            
            // Камни
            for(let i=0; i<200; i++){
                let x = 60 + Math.random() * (WORLD_WIDTH - 120);
                let y = 60 + Math.random() * (WORLD_HEIGHT - 120);
                if(x > safeZone.x-40 && x < safeZone.x+safeZone.width+40 && y > safeZone.y-40 && y < safeZone.y+safeZone.height+40) continue;
                obstacles.push({ x: x, y: y, radius: 16, type: 'rock' });
            }
            
            // Кусты
            for(let i=0; i<180; i++){
                let x = 40 + Math.random() * (WORLD_WIDTH - 80);
                let y = 40 + Math.random() * (WORLD_HEIGHT - 80);
                if(x > safeZone.x-30 && x < safeZone.x+safeZone.width+30 && y > safeZone.y-30 && y < safeZone.y+safeZone.height+30) continue;
                obstacles.push({ x: x, y: y, radius: 12, type: 'bush' });
            }
        }
        
        function isWalkable(x, y, radius=24){
            if(x - radius < 25 || x + radius > WORLD_WIDTH - 25 || y - radius < 25 || y + radius > WORLD_HEIGHT - 25) return false;
            for(let obs of obstacles){
                let dx = x - obs.x;
                let dy = y - obs.y;
                if(Math.hypot(dx, dy) < radius + obs.radius) return false;
            }
            return true;
        }
        
        function isInSafeZone(x, y){
            return (x > safeZone.x && x < safeZone.x + safeZone.width && y > safeZone.y && y < safeZone.y + safeZone.height);
        }
        
        // ========== КЛАССЫ ==========
        const CLASSES = {
            warrior: { name: "Рыцарь", icon: "⚔️", color: "#6c8cae", armorColor: "#5a7a9a", baseHp: 260, baseMp: 55, baseDmgMin: 28, baseDmgMax: 50, skill: "Смертельный удар", skillColor: "#ffaa66" },
            archer: { name: "Лучник", icon: "🏹", color: "#7cae6c", armorColor: "#6a8a5a", baseHp: 200, baseMp: 90, baseDmgMin: 26, baseDmgMax: 48, skill: "Точный выстрел", skillColor: "#aaff88" },
            mage: { name: "Маг", icon: "🔮", color: "#b57ad6", armorColor: "#9a6aba", baseHp: 155, baseMp: 160, baseDmgMin: 32, baseDmgMax: 60, skill: "Огненный шар", skillColor: "#ff8844" }
        };
        
        // ========== МОБЫ ==========
        const MOB_TYPES = [
            { name: "Гоблин", baseHp: 58, baseDmg: 12, exp: 30, color: "#6f8c5a", skinColor: "#8cae6a", icon: "👺", speed: 1.0 },
            { name: "Тролль", baseHp: 105, baseDmg: 21, exp: 52, color: "#7a6a4a", skinColor: "#9a8a62", icon: "👹", speed: 0.75 },
            { name: "Скелет", baseHp: 140, baseDmg: 26, exp: 75, color: "#b8b8cc", skinColor: "#d0d0e0", icon: "💀", speed: 1.1 },
            { name: "Орк", baseHp: 185, baseDmg: 35, exp: 105, color: "#8a6a4a", skinColor: "#aa8262", icon: "👺", speed: 0.9 },
            { name: "Волк", baseHp: 75, baseDmg: 18, exp: 42, color: "#8a7a6a", skinColor: "#c0a890", icon: "🐺", speed: 1.3 },
            { name: "Дракончик", baseHp: 240, baseDmg: 45, exp: 160, color: "#c97a3a", skinColor: "#e09a5a", icon: "🐉", speed: 0.65 }
        ];
        
        let mobs = [];
        let spawnTimer = 0;
        const MAX_MOBS = 22;
        
        function getMobByLevel(){
            let available = MOB_TYPES;
            let selected = available[Math.floor(Math.random() * available.length)];
            let mobLevel = Math.max(1, player.level + Math.floor(Math.random() * 4) - 2);
            let hpMult = 1 + (mobLevel-1) * 0.14;
            let dmgMult = 1 + (mobLevel-1) * 0.12;
            return {
                name: `${selected.name} Lv.${mobLevel}`,
                level: mobLevel,
                hp: Math.floor(selected.baseHp * hpMult),
                maxHp: Math.floor(selected.baseHp * hpMult),
                dmg: Math.floor(selected.baseDmg * dmgMult),
                exp: Math.floor(selected.exp * (0.85 + mobLevel * 0.12)),
                color: selected.color,
                skinColor: selected.skinColor,
                icon: selected.icon,
                speed: selected.speed,
                x: 0, y: 0,
                attackTimer: 0
            };
        }
        
        function spawnMob(){
            if(mobs.length >= MAX_MOBS) return;
            let attempts = 0;
            while(attempts < 70){
                let x = 120 + Math.random() * (WORLD_WIDTH - 240);
                let y = 100 + Math.random() * (WORLD_HEIGHT - 200);
                if(isWalkable(x, y, 26) && !isInSafeZone(x, y) && Math.hypot(x - player.x, y - player.y) > 200){
                    let newMob = getMobByLevel();
                    newMob.x = x;
                    newMob.y = y;
                    mobs.push(newMob);
                    return;
                }
                attempts++;
            }
        }
        
        // ========== ИГРОК ==========
        let player = {
            x: safeZone.x + safeZone.width/2,
            y: safeZone.y + safeZone.height/2,
            targetX: null, targetY: null,
            path: [],
            hp: 260, maxHp: 260,
            mp: 55, maxMp: 55,
            level: 1, exp: 0, expToNext: 75,
            classType: "warrior",
            potionHp: 5, potionMp: 5,
            gold: 250,
            moveSpeed: 3.8,
            defense: 8
        };
        
        // ========== ПУТЬ ==========
        function findPath(startX, startY, targetX, targetY){
            let path = [];
            let dx = targetX - startX;
            let dy = targetY - startY;
            let distance = Math.hypot(dx, dy);
            if(distance < 8) return path;
            let steps = Math.min(40, Math.floor(distance / 10));
            for(let i = 1; i <= steps; i++){
                let t = i / steps;
                let nx = startX + dx * t;
                let ny = startY + dy * t;
                if(isWalkable(nx, ny, 24)){
                    path.push({x: nx, y: ny});
                } else {
                    let angle = Math.atan2(dy, dx);
                    for(let offset of [-1.4, 1.4, -2.2, 2.2]){
                        let newX = startX + dx * t + Math.cos(angle + offset) * 32;
                        let newY = startY + dy * t + Math.sin(angle + offset) * 32;
                        if(isWalkable(newX, newY, 24)){
                            path.push({x: newX, y: newY});
                            break;
                        }
                    }
                }
            }
            path.push({x: targetX, y: targetY});
            return path;
        }
        
        function moveToTarget(tx, ty){
            player.targetX = tx;
            player.targetY = ty;
            player.path = findPath(player.x, player.y, tx, ty);
        }
        
        function updateMovement(){
            if(player.path && player.path.length > 0){
                let next = player.path[0];
                let dx = next.x - player.x;
                let dy = next.y - player.y;
                let dist = Math.hypot(dx, dy);
                if(dist < 6){
                    player.path.shift();
                } else {
                    let step = Math.min(player.moveSpeed, dist);
                    let angle = Math.atan2(dy, dx);
                    let newX = player.x + Math.cos(angle) * step;
                    let newY = player.y + Math.sin(angle) * step;
                    if(isWalkable(newX, newY, 24)){
                        player.x = newX;
                        player.y = newY;
                    } else {
                        player.path = [];
                        player.targetX = null;
                    }
                }
            }
        }
        
        // ========== МОБЫ АГРЯТСЯ ==========
        function updateMobs(){
            for(let mob of mobs){
                if(mob.hp <= 0) continue;
                
                let dx = player.x - mob.x;
                let dy = player.y - mob.y;
                let distToPlayer = Math.hypot(dx, dy);
                
                if(distToPlayer < 210 && !isInSafeZone(player.x, player.y)){
                    let angle = Math.atan2(dy, dx);
                    let step = Math.min(mob.speed, distToPlayer - 42);
                    if(step > 0){
                        let newX = mob.x + Math.cos(angle) * step;
                        let newY = mob.y + Math.sin(angle) * step;
                        if(isWalkable(newX, newY, 26) && !isInSafeZone(newX, newY)){
                            mob.x = newX;
                            mob.y = newY;
                        }
                    }
                    
                    if(distToPlayer < 65){
                        if(mob.attackTimer <= 0){
                            let damage = Math.max(4, mob.dmg - Math.floor(player.defense / 2));
                            player.hp -= damage;
                            mob.attackTimer = 32;
                            addMessage(`💀 ${mob.name} нанес ${damage} урона!`, true);
                            showDamageNumber(mob.x, mob.y, damage, true);
                            if(player.hp <= 0){
                                player.hp = player.maxHp;
                                player.mp = player.maxMp;
                                player.x = safeZone.x + safeZone.width/2;
                                player.y = safeZone.y + safeZone.height/2;
                                player.targetX = null;
                                player.path = [];
                                addMessage(`💀 ВЫ ВОСКРЕСЛИ В БЕЗОПАСНОЙ ЗОНЕ 💀`, true);
                            }
                        } else {
                            mob.attackTimer--;
                        }
                    } else {
                        if(mob.attackTimer > 0) mob.attackTimer--;
                    }
                } else {
                    if(mob.attackTimer > 0) mob.attackTimer--;
                }
            }
        }
        
        // ========== БОЕВАЯ СИСТЕМА ==========
        let selectedMob = null;
        let autoAttackTimer = 0;
        let skillCooldown = 0;
        let messages = [];
        let damageEffects = [];
        
        function addMessage(text, isError=false){
            messages.unshift({text, isError, life: 210});
            if(messages.length > 9) messages.pop();
        }
        
        function getDamage(){
            const cls = CLASSES[player.classType];
            let min = cls.baseDmgMin + Math.floor(player.level * 1.6);
            let max = cls.baseDmgMax + Math.floor(player.level * 2.3);
            return { min, max };
        }
        
        function showDamageNumber(x, y, dmg, isPlayerDamaged=false){
            damageEffects.push({ x: x, y: y, dmg: dmg, life: 22, isPlayer: isPlayerDamaged });
        }
        
        function autoAttack(){
            if(!selectedMob || selectedMob.hp <= 0){
                selectedMob = null;
                return false;
            }
            let dist = Math.hypot(player.x - selectedMob.x, player.y - selectedMob.y);
            if(dist > 90){
                addMessage(`🏃 Слишком далеко для атаки! Подойдите ближе`, true);
                return false;
            }
            const { min, max } = getDamage();
            let damage = Math.floor(Math.random() * (max - min + 1) + min);
            selectedMob.hp -= damage;
            addMessage(`⚔️ ${CLASSES[player.classType].name} нанес ${damage} урона ${selectedMob.name}!`);
            showDamageNumber(selectedMob.x, selectedMob.y, damage);
            
            if(selectedMob.hp <= 0){
                let gainedExp = selectedMob.exp;
                let goldGain = Math.floor(15 + Math.random() * (player.level * 9));
                player.exp += gainedExp;
                player.gold += goldGain;
                addMessage(`✨ +${gainedExp} опыта, +${goldGain} золота`);
                
                if(Math.random() < 0.38){
                    if(Math.random() < 0.6) player.potionHp++;
                    else player.potionMp++;
                    addMessage(`🧪 Выпало зелье!`);
                }
                
                let idx = mobs.indexOf(selectedMob);
                if(idx !== -1) mobs.splice(idx, 1);
                selectedMob = null;
                
                while(player.exp >= player.expToNext){
                    player.exp -= player.expToNext;
                    player.level++;
                    player.maxHp = CLASSES[player.classType].baseHp + player.level * 11;
                    player.maxMp = CLASSES[player.classType].baseMp + player.level * 7;
                    player.hp = player.maxHp;
                    player.mp = player.maxMp;
                    player.expToNext = 75 + player.level * 28;
                    addMessage(`⭐⭐ УРОВЕНЬ ${player.level}! ⭐⭐`);
                }
                return true;
            }
            return true;
        }
        
        function useSkill(){
            if(skillCooldown > 0){
                addMessage(`✨ Способность перезаряжается (${Math.ceil(skillCooldown/10)} сек)`, true);
                return;
            }
            if(!selectedMob || selectedMob.hp <= 0){
                addMessage(`🎯 Выберите цель (нажмите на моба)`, true);
                return;
            }
            let dist = Math.hypot(player.x - selectedMob.x, player.y - selectedMob.y);
            if(dist > 110){
                addMessage(`🏃 Слишком далеко для способности!`, true);
                return;
            }
            const cls = CLASSES[player.classType];
            let manaCost = 22 + Math.floor(player.level / 2);
            if(player.mp < manaCost){
                addMessage(`💙 Не хватает маны! Нужно ${manaCost}`, true);
                return;
            }
            player.mp -= manaCost;
            const { min, max } = getDamage();
            let avgDmg = (min + max) / 2;
            let skillDmg = Math.floor(avgDmg * 2.0);
            selectedMob.hp -= skillDmg;
            skillCooldown = 38;
            addMessage(`✨ ${cls.skill}! ${skillDmg} урона по ${selectedMob.name}!`);
            showDamageNumber(selectedMob.x, selectedMob.y, skillDmg);
            
            if(selectedMob.hp <= 0){
                let gainedExp = selectedMob.exp;
                let goldGain = Math.floor(15 + Math.random() * (player.level * 9));
                player.exp += gainedExp;
                player.gold += goldGain;
                addMessage(`✨ +${gainedExp} опыта, +${goldGain} золота`);
                if(Math.random() < 0.38){
                    if(Math.random() < 0.6) player.potionHp++;
                    else player.potionMp++;
                }
                let idx = mobs.indexOf(selectedMob);
                if(idx !== -1) mobs.splice(idx, 1);
                selectedMob = null;
                while(player.exp >= player.expToNext){
                    player.exp -= player.expToNext;
                    player.level++;
                    player.maxHp = CLASSES[player.classType].baseHp + player.level * 11;
                    player.maxMp = CLASSES[player.classType].baseMp + player.level * 7;
                    player.hp = player.maxHp;
                    player.mp = player.maxMp;
                    player.expToNext = 75 + player.level * 28;
                    addMessage(`⭐⭐ УРОВЕНЬ ${player.level}! ⭐⭐`);
                }
            }
        }
        
        function useHpPotion(){
            if(isInSafeZone(player.x, player.y)){
                if(player.potionHp <= 0){
                    addMessage(`❌ Нет зелий HP! Купите в магазине`, true);
                    return;
                }
                let heal = Math.floor(player.maxHp * 0.65);
                player.hp = Math.min(player.maxHp, player.hp + heal);
                player.potionHp--;
                addMessage(`❤️ Вылечено ${heal} HP! Осталось: ${player.potionHp}`);
            } else {
                addMessage(`🏪 Зелья можно использовать только в безопасной зоне!`, true);
            }
        }
        
        function useMpPotion(){
            if(isInSafeZone(player.x, player.y)){
                if(player.potionMp <= 0){
                    addMessage(`❌ Нет зелий MP! Купите в магазине`, true);
                    return;
                }
                let mana = Math.floor(player.maxMp * 0.7);
                player.mp = Math.min(player.maxMp, player.mp + mana);
                player.potionMp--;
                addMessage(`💙 Восстановлено ${mana} MP! Осталось: ${player.potionMp}`);
            } else {
                addMessage(`🏪 Зелья можно использовать только в безопасной зоне!`, true);
            }
        }
        
        // ========== МАГАЗИН ==========
        let shopOpen = false;
        const SHOP_ITEMS = [
            { name: "Зелье HP", type: "hp", price: 55, icon: "❤️" },
            { name: "Зелье MP", type: "mp", price: 50, icon: "💙" },
            { name: "Большое зелье HP", type: "hp_big", price: 120, icon: "❤️✨", heal: 0.85 },
            { name: "Большое зелье MP", type: "mp_big", price: 110, icon: "💙✨", mana: 0.85 }
        ];
        
        function openShop(){
            if(isInSafeZone(player.x, player.y)){
                shopOpen = !shopOpen;
                if(shopOpen) addMessage(`🏪 Магазин открыт! Нажмите на предмет для покупки`);
                else addMessage(`🏪 Магазин закрыт`);
            } else {
                addMessage(`🏪 Магазин только в безопасной зоне! Идите к зданию с забором`, true);
            }
        }
        
        function buyItem(item){
            if(player.gold >= item.price){
                player.gold -= item.price;
                if(item.type === "hp") player.potionHp++;
                else if(item.type === "mp") player.potionMp++;
                else if(item.type === "hp_big") player.potionHp += 2;
                else if(item.type === "mp_big") player.potionMp += 2;
                addMessage(`✅ Куплен ${item.name}! Осталось золота: ${player.gold}`);
            } else {
                addMessage(`💰 Не хватает золота! Нужно ${item.price}`, true);
            }
        }
        
        function switchClass(){
            let classes = Object.keys(CLASSES);
            let idx = classes.indexOf(player.classType);
            player.classType = classes[(idx+1)%classes.length];
            player.maxHp = CLASSES[player.classType].baseHp + player.level * 11;
            player.maxMp = CLASSES[player.classType].baseMp + player.level * 7;
            player.hp = Math.min(player.hp, player.maxHp);
            player.mp = Math.min(player.mp, player.maxMp);
            addMessage(`🔄 Класс сменен на ${CLASSES[player.classType].name} ${CLASSES[player.classType].icon}`);
        }
        
        // ========== ВЫБОР ЦЕЛИ И ПЕРЕМЕЩЕНИЕ ==========
        function selectMobAt(x, y){
            for(let mob of mobs){
                let dx = mob.x - x;
                let dy = mob.y - y;
                if(Math.hypot(dx, dy) < 42 && mob.hp > 0){
                    selectedMob = mob;
                    addMessage(`🎯 Цель: ${mob.name} (HP: ${mob.hp}/${mob.maxHp})`);
                    return true;
                }
            }
            return false;
        }
        
        function handleWorldClick(worldX, worldY){
            if(shopOpen){
                let shopCenterX = canvasWidth/2;
                let shopCenterY = canvasHeight/2 - 40;
                for(let i=0; i<SHOP_ITEMS.length; i++){
                    let itemY = shopCenterY - 20 + i * 55;
                    if(worldY > cameraY + itemY - 25 && worldY < cameraY + itemY + 35){
                        buyItem(SHOP_ITEMS[i]);
                        return;
                    }
                }
                shopOpen = false;
            }
            
            if(selectMobAt(worldX, worldY)) return;
            moveToTarget(worldX, worldY);
        }
        
        // ========== КАМЕРА ==========
        function updateCamera(){
            let targetCamX = player.x - canvasWidth/2;
            let targetCamY = player.y - canvasHeight/2;
            targetCamX = Math.min(Math.max(targetCamX, 0), WORLD_WIDTH - canvasWidth);
            targetCamY = Math.min(Math.max(targetCamY, 0), WORLD_HEIGHT - canvasHeight);
            cameraX += (targetCamX - cameraX) * 0.09;
            cameraY += (targetCamY - cameraY) * 0.09;
        }
        
        // ========== ОТРИСОВКА ==========
        function drawWorld(){
            // Трава
            for(let i=0; i<WORLD_WIDTH/TILE_SIZE+8; i++){
                for(let j=0; j<WORLD_HEIGHT/TILE_SIZE+8; j++){
                    let x = i*TILE_SIZE - cameraX;
                    let y = j*TILE_SIZE - cameraY;
                    if(x > -TILE_SIZE && x < canvasWidth + TILE_SIZE && y > -TILE_SIZE && y < canvasHeight + TILE_SIZE){
                        let grad = ctx.createLinearGradient(x, y, x+TILE_SIZE, y+TILE_SIZE);
                        grad.addColorStop(0, '#4a8c3a');
                        grad.addColorStop(1, '#3a6c2a');
                        ctx.fillStyle = grad;
                        ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
                        ctx.fillStyle = '#6cad4a';
                        if((i+j)%3===0) ctx.fillRect(x+20, y+25, 3, 3);
                    }
                }
            }
            
            // Препятствия
            for(let obs of obstacles){
                let x = obs.x - cameraX;
                let y = obs.y - cameraY;
                if(x > -100 && x < canvasWidth+100 && y > -100 && y < canvasHeight+100){
                    if(obs.type === 'tree'){
                        ctx.fillStyle = '#3c9e3c';
                        ctx.beginPath();
                        ctx.rect(x-18, y-32, 36, 58);
                        ctx.fill();
                        ctx.fillStyle = '#8b5a2b';
                        ctx.fillRect(x-10, y-8, 20, 32);
                        ctx.fillStyle = '#5aac3a';
                        ctx.beginPath();
                        ctx.ellipse(x, y-42, 26, 30, 0, 0, Math.PI*2);
                        ctx.fill();
                    } else if(obs.type === 'mountain'){
                        ctx.fillStyle = '#6e6e7a';
                        ctx.beginPath();
                        ctx.moveTo(x, y-45);
                        ctx.lineTo(x-40, y+15);
                        ctx.lineTo(x+40, y+15);
                        ctx.fill();
                        ctx.fillStyle = '#8e8e9a';
                        ctx.beginPath();
                        ctx.moveTo(x-12, y-15);
                        ctx.lineTo(x, y-38);
                        ctx.lineTo(x+12, y-15);
                        ctx.fill();
                    } else if(obs.type === 'rock'){
                        ctx.fillStyle = '#7a6a5a';
                        ctx.beginPath();
                        ctx.ellipse(x, y, 18, 14, 0, 0, Math.PI*2);
                        ctx.fill();
                    } else if(obs.type === 'fence'){
                        ctx.fillStyle = '#c99e6f';
                        ctx.fillRect(x-10, y-14, 20, 32);
                        for(let i=0;i<3;i++) ctx.fillRect(x-6+i*6, y-22, 3, 14);
                    } else if(obs.type === 'bush'){
                        ctx.fillStyle = '#5a9e4a';
                        ctx.beginPath();
                        ctx.ellipse(x, y, 14, 12, 0, 0, Math.PI*2);
                        ctx.fill();
                    }
                }
            }
            
            // Безопасная зона
            let szX = safeZone.x - cameraX;
            let szY = safeZone.y - cameraY;
            ctx.fillStyle = '#88aa66aa';
            ctx.fillRect(szX, szY, safeZone.width, safeZone.height);
            ctx.fillStyle = '#ffdd99';
            ctx.font = `bold ${Math.min(24, canvasWidth/25)}px monospace`;
            ctx.fillText("🏪 БЕЗОПАСНАЯ ЗОНА 🏪", szX + 50, szY + 55);
            ctx.font = `${Math.min(14, canvasWidth/50)}px monospace`;
            ctx.fillText("Нажмите SHOP для покупки зелий", szX + 80, szY + 100);
        }
        
        function drawPlayer(){
            let x = player.x - cameraX;
            let y = player.y - cameraY;
            const cls = CLASSES[player.classType];
            
            ctx.fillStyle = "#e0c8a0";
            ctx.fillRect(x-16, y-22, 32, 44);
            ctx.fillStyle = cls.color;
            ctx.fillRect(x-14, y-14, 28, 32);
            ctx.fillStyle = cls.armorColor;
            ctx.fillRect(x-12, y-8, 24, 24);
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(x-9, y-16, 6, 6);
            ctx.fillRect(x+3, y-16, 6, 6);
            ctx.fillStyle = "#1a1a1a";
            ctx.fillRect(x-8, y-15, 4, 4);
            ctx.fillRect(x+4, y-15, 4, 4);
            ctx.font = `${Math.min(24, canvasWidth/30)}px monospace`;
            ctx.fillStyle = "#ffffaa";
            ctx.fillText(cls.icon, x-12, y+8);
            
            ctx.fillStyle = "#aa3333";
            ctx.fillRect(x-24, y-36, 64, 8);
            ctx.fillStyle = "#44ff66";
            ctx.fillRect(x-24, y-36, 64 * (player.hp/player.maxHp), 8);
        }
        
        function drawMob(mob){
            let x = mob.x - cameraX;
            let y = mob.y - cameraY;
            if(x < -100 || x > canvasWidth+100) return;
            
            ctx.fillStyle = mob.skinColor;
            ctx.fillRect(x-16, y-22, 32, 44);
            ctx.fillStyle = mob.color;
            ctx.fillRect(x-14, y-14, 28, 32);
            ctx.fillStyle = "#000000";
            ctx.fillRect(x-9, y-16, 5, 5);
            ctx.fillRect(x+4, y-16, 5, 5);
            ctx.font = `${Math.min(24, canvasWidth/30)}px monospace`;
            ctx.fillStyle = "#ffffff";
            ctx.fillText(mob.icon, x-10, y+6);
            
            let hpPercent = mob.hp / mob.maxHp;
            ctx.fillStyle = "#aa3333";
            ctx.fillRect(x-24, y-36, 64, 6);
            ctx.fillStyle = "#44ff66";
            ctx.fillRect(x-24, y-36, 64 * hpPercent, 6);
            ctx.font = `${Math.min(9, canvasWidth/70)}px monospace`;
            ctx.fillStyle = "#ffffcc";
            ctx.fillText(`${mob.hp}/${mob.maxHp}`, x-20, y-40);
        }
        
        function drawUI(){
            const cls = CLASSES[player.classType];
            let scale = Math.min(1, canvasWidth / 1400);
            let fontSize = Math.max(10, Math.min(14, canvasWidth/70));
            
            ctx.fillStyle = "#000000cc";
            ctx.fillRect(12, 12, 280 * scale, 110 * scale);
            ctx.fillStyle = "#cc5555";
            ctx.fillRect(18, 20, 260 * scale, 20 * scale);
            ctx.fillStyle = "#ff7755";
            ctx.fillRect(18, 20, 260 * scale * (player.hp/player.maxHp), 20 * scale);
            ctx.fillStyle = "#5588ff";
            ctx.fillRect(18, 48, 260 * scale * (player.mp/player.maxMp), 18 * scale);
            ctx.fillStyle = "#ffffff";
            ctx.font = `bold ${fontSize}px monospace`;
            ctx.fillText(`❤️ ${Math.floor(player.hp)}/${player.maxHp}`, 22, 38);
            ctx.fillText(`💙 ${Math.floor(player.mp)}/${player.maxMp}`, 22, 64);
            ctx.fillText(`${cls.name} ${cls.icon} Lv.${player.level}`, 22, 90);
            
            ctx.fillStyle = "#000000cc";
            ctx.fillRect(canvasWidth-220 * scale, 12, 208 * scale, 110 * scale);
            let {min,max} = getDamage();
            ctx.fillStyle = "#ffcc88";
            ctx.font = `${fontSize-2}px monospace`;
            ctx.fillText(`⚔️ Урон: ${min}-${max}`, canvasWidth-210 * scale, 30);
            ctx.fillText(`⭐ EXP: ${player.exp}/${player.expToNext}`, canvasWidth-210 * scale, 48);
            ctx.fillText(`💰 ${player.gold} золота`, canvasWidth-210 * scale, 66);
            ctx.fillText(`✨ ${cls.skill}`, canvasWidth-210 * scale, 84);
            
            ctx.fillStyle = "#000000cc";
            ctx.fillRect(12, canvasHeight-75, 190 * scale, 63 * scale);
            ctx.fillStyle = "#ffaa88";
            ctx.font = `bold ${fontSize}px monospace`;
            ctx.fillText(`🧪 HP: ${player.potionHp}`, 18, canvasHeight-48);
            ctx.fillText(`🔮 MP: ${player.potionMp}`, 18, canvasHeight-28);
            
            ctx.fillStyle = "#000000aa";
            ctx.fillRect(canvasWidth-270 * scale, canvasHeight-150, 258 * scale, 140 * scale);
            ctx.font = `${fontSize-3}px monospace`;
            for(let i=0; i<Math.min(8, messages.length); i++){
                ctx.fillStyle = messages[i].isError ? "#ff8866" : "#eeddbb";
                ctx.fillText(messages[i].text.substring(0, 34), canvasWidth-260 * scale, canvasHeight-135 + i*15);
            }
            
            if(selectedMob && selectedMob.hp > 0){
                let x = selectedMob.x - cameraX;
                let y = selectedMob.y - cameraY;
                ctx.strokeStyle = "#ffaa44";
                ctx.lineWidth = 4;
                ctx.strokeRect(x-20, y-30, 56, 56);
            }
            
            if(player.targetX && player.path && player.path.length > 0){
                let tx = player.targetX - cameraX;
                let ty = player.targetY - cameraY;
                ctx.fillStyle = "#ffcc44aa";
                ctx.beginPath();
                ctx.arc(tx, ty, 14, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = "#ffaa00";
                ctx.beginPath();
                ctx.arc(tx, ty, 7, 0, Math.PI*2);
                ctx.fill();
            }
            
            for(let i=0;i<damageEffects.length;i++){
                let d = damageEffects[i];
                let x = d.x - cameraX;
                let y = d.y - cameraY;
                ctx.font = `bold ${d.isPlayer ? 18 : 22}px monospace`;
                ctx.fillStyle = d.isPlayer ? "#ffaa66" : "#ff8844";
                ctx.fillText(`-${d.dmg}`, x-12, y-28);
                d.life--;
                if(d.life<=0) damageEffects.splice(i,1), i--;
            }
            
            if(shopOpen && isInSafeZone(player.x, player.y)){
                ctx.fillStyle = "#000000dd";
                ctx.fillRect(canvasWidth/2-220, canvasHeight/2-140, 440, 280);
                ctx.fillStyle = "#ffdd99";
                ctx.font = `bold ${Math.min(26, canvasWidth/30)}px monospace`;
                ctx.fillText("🏪 МАГАЗИН", canvasWidth/2-80, canvasHeight/2-85);
                for(let i=0; i<SHOP_ITEMS.length; i++){
                    let item = SHOP_ITEMS[i];
                    let y = canvasHeight/2 - 30 + i * 58;
                    ctx.fillStyle = "#aa8866";
                    ctx.fillRect(canvasWidth/2-180, y-12, 360, 48);
                    ctx.fillStyle = "#ffcc88";
                    ctx.font = `${Math.min(18, canvasWidth/45)}px monospace`;
                    ctx.fillText(`${item.icon} ${item.name} - ${item.price}💰`, canvasWidth/2-150, y+12);
                }
                ctx.fillStyle = "#ccaa88";
                ctx.font = `${Math.min(12, canvasWidth/60)}px monospace`;
                ctx.fillText("Нажмите на предмет для покупки", canvasWidth/2-120, canvasHeight/2+100);
            }
        }
        
        // ========== ОБНОВЛЕНИЕ ==========
        function updateGame(){
            updateMovement();
            updateMobs();
            updateCamera();
            
            if(autoAttackTimer <= 0){
                if(selectedMob && selectedMob.hp > 0){
                    let dist = Math.hypot(player.x - selectedMob.x, player.y - selectedMob.y);
                    if(dist < 95) autoAttack();
                }
                autoAttackTimer = 30;
            } else {
                autoAttackTimer--;
            }
            
            if(skillCooldown > 0) skillCooldown--;
            
            if(spawnTimer <= 0){
                if(mobs.length < MAX_MOBS) spawnMob();
                spawnTimer = 32;
            } else {
                spawnTimer--;
            }
            
            for(let i=0; i<messages.length; i++){
                if(messages[i].life) messages[i].life--;
            }
            messages = messages.filter(m => !m.life || m.life > 0);
        }
        
        // ========== УПРАВЛЕНИЕ ==========
        function getWorldFromClick(clientX, clientY){
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvasWidth / rect.width;
            const scaleY = canvasHeight / rect.height;
            let canvasX = (clientX - rect.left) * scaleX;
            let canvasY = (clientY - rect.top) * scaleY;
            return { x: canvasX + cameraX, y: canvasY + cameraY };
        }
        
        canvas.addEventListener('click', (e) => {
            let world = getWorldFromClick(e.clientX, e.clientY);
            handleWorldClick(world.x, world.y);
        });
        
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            let rect = canvas.getBoundingClientRect();
            let touch = e.touches[0];
            let world = getWorldFromClick(touch.clientX, touch.clientY);
            handleWorldClick(world.x, world.y);
        });
        
        window.addEventListener('keydown', (e) => {
            if(e.key === 's') useSkill();
            if(e.key === 'q') useHpPotion();
            if(e.key === 'w') useMpPotion();
            if(e.key === 'p') openShop();
            if(e.key === 'c') switchClass();
            if(e.key === 'r') { player.hp = player.maxHp; player.mp = player.maxMp; addMessage("💚 Полное восстановление"); }
        });
        
        document.getElementById('mobileShopBtn').addEventListener('click', () => openShop());
        document.getElementById('mobileHpBtn').addEventListener('click', () => useHpPotion());
        document.getElementById('mobileMpBtn').addEventListener('click', () => useMpPotion());
        document.getElementById('mobileSkillBtn').addEventListener('click', () => useSkill());
        document.getElementById('mobileClassBtn').addEventListener('click', () => switchClass());
        
        // ========== ИНИЦИАЛИЗАЦИЯ ==========
        function init(){
            generateWorld();
            player.x = safeZone.x + safeZone.width/2;
            player.y = safeZone.y + safeZone.height/2;
            player.hp = player.maxHp;
            player.mp = player.maxMp;
            for(let i=0; i<8; i++) spawnMob();
            addMessage("✨ Добро пожаловать! Нажмите на любую клетку для перемещения");
            addMessage("🏪 Нажмите P (или кнопку SHOP) для магазина в безопасной зоне");
            addMessage("👹 Мобы агрессивны! Держитесь безопасной зоны для лечения");
        }
        
        init();
        
        function render(){
            drawWorld();
            for(let mob of mobs) drawMob(mob);
            drawPlayer();
            drawUI();
        }
        
        function gameLoop(){
            updateGame();
            render();
            requestAnimationFrame(gameLoop);
        }
        gameLoop();
    })();
</script>
</body>
</html>
