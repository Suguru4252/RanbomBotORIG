<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Rucoy Online - Полная версия</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #0a0c15;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        /* Верхняя панель */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.85);
            padding: 6px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 200;
            border-bottom: 1px solid #ffd966;
            flex-wrap: wrap;
            gap: 5px;
        }
        .stats-top {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }
        .hp-stat, .mp-stat {
            display: flex;
            align-items: center;
            gap: 4px;
            background: rgba(0,0,0,0.6);
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
        }
        .level-stat {
            background: #2c2f3f;
            padding: 3px 12px;
            border-radius: 20px;
            color: #ffd966;
            font-weight: bold;
            font-size: 12px;
        }
        .xp-bar-top {
            width: 120px;
            height: 8px;
            background: #2a2a2a;
            border-radius: 4px;
            overflow: hidden;
        }
        .xp-fill-top {
            height: 100%;
            background: linear-gradient(90deg, #6a9eff, #3a6eff);
            width: 0%;
        }
        .top-buttons {
            display: flex;
            gap: 8px;
        }
        .top-buttons button {
            background: #2c2f3f;
            border: 1px solid #ffd966;
            color: #ffd966;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
        }
        /* Кнопки классов */
        .class-bar {
            position: fixed;
            top: 55px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 5px;
            background: rgba(0,0,0,0.6);
            z-index: 200;
            flex-wrap: wrap;
        }
        .class-btn {
            background: #2c2f3f;
            border: 1px solid #ffd966;
            color: #ffd966;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            cursor: pointer;
        }
        .class-btn.active { background: #6a3e9e; }
        /* Нижняя панель (ПК) */
        .bottom-panel {
            position: fixed;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            background: rgba(0,0,0,0.8);
            padding: 8px 20px;
            border-radius: 50px;
            border: 1px solid #ffd966;
            z-index: 200;
        }
        .bottom-btn {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: #2c2f3f;
            border: 2px solid #ffd966;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 24px;
            position: relative;
        }
        .bottom-btn:active { transform: scale(0.95); }
        .bottom-btn span { font-size: 8px; color: #ffd966; margin-top: 2px; }
        .hotkey-hint {
            position: absolute;
            bottom: -18px;
            font-size: 8px;
            color: #aaa;
            background: rgba(0,0,0,0.6);
            padding: 1px 4px;
            border-radius: 8px;
        }
        /* Сенсорные кнопки для телефона */
        .touch-controls {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            display: none;
            justify-content: space-between;
            padding: 0 20px;
            pointer-events: none;
            z-index: 250;
        }
        .touch-left, .touch-right {
            display: flex;
            gap: 15px;
            pointer-events: auto;
        }
        .touch-btn {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            background: rgba(0,0,0,0.6);
            border: 2px solid #ffd966;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }
        .touch-btn:active { transform: scale(0.95); background: rgba(255,217,102,0.3); }
        .touch-move {
            display: flex;
            gap: 10px;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 80px;
            backdrop-filter: blur(5px);
        }
        .move-btn {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: rgba(0,0,0,0.7);
            border: 1px solid #ffd966;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            cursor: pointer;
        }
        /* Панели */
        .inventory-panel, .stats-panel, .shop-panel, .settings-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.96);
            border: 2px solid #ffd966;
            border-radius: 16px;
            padding: 15px;
            width: 90%;
            max-width: 400px;
            max-height: 80vh;
            overflow-y: auto;
            display: none;
            z-index: 500;
        }
        .inventory-slots {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-bottom: 15px;
        }
        .inv-slot {
            background: rgba(0,0,0,0.6);
            border: 1px solid #ffd966;
            border-radius: 8px;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            position: relative;
        }
        .slot-count {
            position: absolute;
            bottom: 2px;
            right: 4px;
            font-size: 10px;
            color: #ffd966;
        }
        .shop-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #333;
        }
        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            color: #fff;
            border-bottom: 1px solid #333;
        }
        .settings-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #333;
        }
        .toggle-switch {
            width: 50px;
            height: 24px;
            background: #333;
            border-radius: 30px;
            cursor: pointer;
            position: relative;
            transition: 0.2s;
        }
        .toggle-switch.active {
            background: #6a9eff;
        }
        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            top: 2px;
            left: 3px;
            transition: 0.2s;
        }
        .toggle-switch.active::after {
            left: 27px;
        }
        button {
            background: #4a3e2a;
            color: #ffd966;
            border: none;
            padding: 8px;
            border-radius: 20px;
            cursor: pointer;
        }
        .log-message {
            position: fixed;
            bottom: 90px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            border-left: 3px solid #ffd966;
            padding: 5px 10px;
            color: #ffd966;
            font-size: 10px;
            border-radius: 4px;
            animation: fadeOut 2.5s forwards;
            pointer-events: none;
            z-index: 200;
        }
        .damage-number {
            position: fixed;
            font-weight: bold;
            font-size: 18px;
            color: #ffaa44;
            text-shadow: 1px 1px 0 #000;
            pointer-events: none;
            animation: floatUp 0.8s ease-out forwards;
            z-index: 400;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-40px); }
        }
        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; }
        }
        @media (max-width: 700px) {
            .bottom-btn { width: 50px; height: 50px; font-size: 22px; }
            .touch-btn { width: 55px; height: 55px; font-size: 28px; }
            .move-btn { width: 50px; height: 50px; font-size: 24px; }
            .inventory-slots { grid-template-columns: repeat(4, 1fr); }
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <!-- Верхняя панель -->
    <div class="top-bar">
        <div class="stats-top">
            <div class="level-stat">Lv.<span id="topLevel">1</span></div>
            <div class="hp-stat"><span>❤️</span><span id="topHp">120/120</span></div>
            <div class="mp-stat"><span>💙</span><span id="topMp">60/60</span></div>
            <div class="xp-bar-top"><div class="xp-fill-top" id="topXpFill"></div></div>
        </div>
        <div class="top-buttons">
            <div style="color:#ffd966; font-size:12px;">💰 <span id="topGold">0</span></div>
            <button id="statsBtn">📊</button>
            <button id="invTopBtn">🎒</button>
            <button id="settingsBtn">⚙️</button>
        </div>
    </div>

    <!-- Кнопки классов -->
    <div class="class-bar">
        <button id="classKnightBtn" class="class-btn active">🛡️ Рыцарь</button>
        <button id="classArcherBtn" class="class-btn">🏹 Лучник</button>
        <button id="classMageBtn" class="class-btn">🔮 Маг</button>
    </div>

    <!-- Нижняя панель (ПК) -->
    <div class="bottom-panel" id="pcPanel">
        <div class="bottom-btn" id="healPotionBtn">🧪<span>Леч</span><div class="hotkey-hint">1</div></div>
        <div class="bottom-btn" id="manaPotionBtn">💙<span>Мана</span><div class="hotkey-hint">2</div></div>
        <div class="bottom-btn" id="superSkillBtn">⚔️<span>Супер</span><div class="hotkey-hint">3</div></div>
    </div>

    <!-- Сенсорные кнопки для телефона -->
    <div class="touch-controls" id="touchControls">
        <div class="touch-left">
            <div class="touch-move">
                <div class="move-btn" id="touchUp">▲</div>
                <div class="move-btn" id="touchLeft">◀</div>
                <div class="move-btn" id="touchDown">▼</div>
                <div class="move-btn" id="touchRight">▶</div>
            </div>
        </div>
        <div class="touch-right">
            <div class="touch-btn" id="touchHeal">🧪</div>
            <div class="touch-btn" id="touchMana">💙</div>
            <div class="touch-btn" id="touchSuper">⚔️</div>
        </div>
    </div>

    <!-- Инвентарь -->
    <div class="inventory-panel" id="inventoryPanel">
        <h3 style="color:#ffd966;">🎒 Инвентарь</h3>
        <div class="inventory-slots" id="inventorySlots"></div>
        <div style="display:flex; gap:10px; margin-top:10px;">
            <div style="background:#2c2f3f; border-radius:8px; padding:8px; flex:1; text-align:center;">
                <div>🧪 HP</div>
                <div id="quickHealDisplay" style="font-size:10px;">-</div>
            </div>
            <div style="background:#2c2f3f; border-radius:8px; padding:8px; flex:1; text-align:center;">
                <div>💙 MP</div>
                <div id="quickManaDisplay" style="font-size:10px;">-</div>
            </div>
        </div>
        <button id="closeInv" style="margin-top:15px;">Закрыть</button>
    </div>

    <!-- Статистика -->
    <div class="stats-panel" id="statsPanel">
        <h3 style="color:#ffd966;">📊 Статистика</h3>
        <div id="statsContent"></div>
        <button id="closeStats">Закрыть</button>
    </div>

    <!-- Магазин -->
    <div class="shop-panel" id="shopPanel">
        <h3 style="color:#ffd966;">🏪 Торговец</h3>
        <div id="shopItems"></div>
        <button id="closeShop">Закрыть</button>
    </div>

    <!-- Настройки -->
    <div class="settings-panel" id="settingsPanel">
        <h3 style="color:#ffd966;">⚙️ Настройки</h3>
        <div class="settings-row">
            <span>🎮 Режим управления:</span>
            <div style="display:flex; gap:10px;">
                <button id="modePcBtn" style="background:#6a3e9e;">ПК</button>
                <button id="modeMobileBtn">Телефон</button>
            </div>
        </div>
        <div class="settings-row" id="touchToggleRow">
            <span>📱 Сенсорные кнопки:</span>
            <div class="toggle-switch" id="touchToggle"></div>
        </div>
        <div class="settings-row">
            <span>🔊 Звук:</span>
            <div class="toggle-switch" id="soundToggle"></div>
        </div>
        <div class="settings-row">
            <span>💾 Автосохранение:</span>
            <div class="toggle-switch" id="autoSaveToggle"></div>
        </div>
        <button id="closeSettings" style="margin-top:15px;">Закрыть</button>
    </div>

    <script>
        // ==================== RUCOY ONLINE - ПОЛНАЯ ВЕРСИЯ ====================
        // ИНИЦИАЛИЗАЦИЯ КАНВАСА
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        // ==================== НАСТРОЙКИ ====================
        let settings = {
            controlMode: 'pc',
            touchEnabled: true,
            soundEnabled: true,
            autoSave: true
        };
        
        // Функция применения настроек
        function applySettings() {
            const pcPanel = document.getElementById('pcPanel');
            const touchControls = document.getElementById('touchControls');
            const touchToggleRow = document.getElementById('touchToggleRow');
            if (!pcPanel || !touchControls) return;
            
            if (settings.controlMode === 'pc') {
                pcPanel.style.display = 'flex';
                touchControls.style.display = 'none';
                if (touchToggleRow) touchToggleRow.style.display = 'none';
            } else {
                pcPanel.style.display = 'none';
                touchControls.style.display = 'flex';
                if (touchToggleRow) touchToggleRow.style.display = 'flex';
                if (!settings.touchEnabled) {
                    touchControls.style.display = 'none';
                }
            }
            
            // Обновление переключателей
            const touchToggle = document.getElementById('touchToggle');
            const soundToggle = document.getElementById('soundToggle');
            const autoSaveToggle = document.getElementById('autoSaveToggle');
            if (touchToggle) settings.touchEnabled ? touchToggle.classList.add('active') : touchToggle.classList.remove('active');
            if (soundToggle) settings.soundEnabled ? soundToggle.classList.add('active') : soundToggle.classList.remove('active');
            if (autoSaveToggle) settings.autoSave ? autoSaveToggle.classList.add('active') : autoSaveToggle.classList.remove('active');
        }
        
        function loadSettings() {
            const saved = localStorage.getItem('rucoy_settings');
            if (saved) {
                try {
                    const s = JSON.parse(saved);
                    settings.controlMode = s.controlMode || 'pc';
                    settings.touchEnabled = s.touchEnabled !== false;
                    settings.soundEnabled = s.soundEnabled !== false;
                    settings.autoSave = s.autoSave !== false;
                } catch(e) {}
            }
            applySettings();
        }
        
        function saveSettings() {
            localStorage.setItem('rucoy_settings', JSON.stringify(settings));
        }
        
        // ==================== ИГРОВЫЕ ПАРАМЕТРЫ ====================
        const TILE_SIZE = 44;
        const WORLD_WIDTH = 50;
        const WORLD_HEIGHT = 50;
        
        let camera = { x: 0, y: 0 };
        let selectedMonsterId = null;
        let currentTargetMonster = null;
        let targetTileX = null, targetTileY = null;
        let quickHealPotion = null, quickManaPotion = null;
        let lastPotionTime = 0, lastSuperTime = 0;
        const POTION_COOLDOWN = 3;
        
        let stats = {
            playTime: 0,
            monstersKilled: 0,
            bossesKilled: 0,
            portalOpen: false,
            bossSpawned: false
        };
        
        // Карта
        let worldMap = [], worldBiome = [], worldObjects = [];
        let safeZone = { x: 5, y: 5, radius: 5 };
        let portalPos = { x: WORLD_WIDTH-5, y: 5, active: false };
        
        function generateWorld() {
            for (let y = 0; y < WORLD_HEIGHT; y++) {
                worldMap[y] = [];
                worldBiome[y] = [];
                for (let x = 0; x < WORLD_WIDTH; x++) {
                    if (x === 0 || y === 0 || x === WORLD_WIDTH-1 || y === WORLD_HEIGHT-1) {
                        worldMap[y][x] = 1; worldBiome[y][x] = 'wall';
                    }
                    else if (Math.abs(x-safeZone.x) <= safeZone.radius && Math.abs(y-safeZone.y) <= safeZone.radius) {
                        worldMap[y][x] = 0; worldBiome[y][x] = 'shop';
                    }
                    else if (Math.sin(x*0.2)*Math.cos(y*0.2) < -0.5) {
                        worldMap[y][x] = 1; worldBiome[y][x] = 'water';
                    }
                    else if (Math.sin(x*0.3)*Math.cos(y*0.3) > 0.6) {
                        worldMap[y][x] = 1; worldBiome[y][x] = 'mountain';
                    }
                    else {
                        worldMap[y][x] = 0; worldBiome[y][x] = 'grass';
                    }
                }
            }
            // Зона спавна
            for (let dy = -safeZone.radius; dy <= safeZone.radius; dy++) {
                for (let dx = -safeZone.radius; dx <= safeZone.radius; dx++) {
                    let nx = safeZone.x+dx, ny = safeZone.y+dy;
                    if (nx>=0 && nx<WORLD_WIDTH && ny>=0 && ny<WORLD_HEIGHT) {
                        worldMap[ny][nx] = 0;
                        worldBiome[ny][nx] = 'shop';
                    }
                }
            }
            // Украшения: забор вокруг спавна
            for (let i = -safeZone.radius-1; i <= safeZone.radius+1; i++) {
                let x1 = safeZone.x + i, y1 = safeZone.y - safeZone.radius - 1;
                let x2 = safeZone.x + i, y2 = safeZone.y + safeZone.radius + 1;
                let y3 = safeZone.y + i, x3 = safeZone.x - safeZone.radius - 1;
                let y4 = safeZone.y + i, x4 = safeZone.x + safeZone.radius + 1;
                if (x1>=0 && x1<WORLD_WIDTH && y1>=0 && y1<WORLD_HEIGHT && worldMap[y1][x1] !== 1) worldObjects.push({x:x1, y:y1, type:'fence'});
                if (x2>=0 && x2<WORLD_WIDTH && y2>=0 && y2<WORLD_HEIGHT && worldMap[y2][x2] !== 1) worldObjects.push({x:x2, y:y2, type:'fence'});
                if (x3>=0 && x3<WORLD_WIDTH && y3>=0 && y3<WORLD_HEIGHT && worldMap[y3][x3] !== 1) worldObjects.push({x:x3, y:y3, type:'fence'});
                if (x4>=0 && x4<WORLD_WIDTH && y4>=0 && y4<WORLD_HEIGHT && worldMap[y4][x4] !== 1) worldObjects.push({x:x4, y:y4, type:'fence'});
            }
            worldObjects.push({x:safeZone.x, y:safeZone.y-safeZone.radius-1, type:'gate'});
            worldObjects.push({x:safeZone.x, y:safeZone.y+safeZone.radius+1, type:'gate'});
        }
        
        // Поиск пути (BFS)
        function findPath(startX, startY, targetX, targetY) {
            if (startX===targetX && startY===targetY) return [];
            let queue = [{x:startX, y:startY, path:[]}];
            let visited = Array(WORLD_HEIGHT).fill().map(()=>Array(WORLD_WIDTH).fill(false));
            visited[startY][startX] = true;
            let dirs = [[1,0],[-1,0],[0,1],[0,-1]];
            while(queue.length) {
                let curr = queue.shift();
                for(let [dx,dy] of dirs) {
                    let nx = curr.x+dx, ny = curr.y+dy;
                    if(nx>=0 && nx<WORLD_WIDTH && ny>=0 && ny<WORLD_HEIGHT && !visited[ny][nx]) {
                        if(worldMap[ny][nx]===0 && !monsters.some(m=>m.alive && m.tileX===nx && m.tileY===ny)) {
                            if(nx===targetX && ny===targetY) return [...curr.path, {x:nx,y:ny}];
                            visited[ny][nx] = true;
                            queue.push({x:nx, y:ny, path:[...curr.path, {x:nx,y:ny}]});
                        }
                    }
                }
            }
            return [];
        }
        
        let player = {
            tileX: safeZone.x, tileY: safeZone.y,
            x: safeZone.x*TILE_SIZE, y: safeZone.y*TILE_SIZE,
            targetTileX: safeZone.x, targetTileY: safeZone.y,
            path: [],
            level:1, xp:0, maxHp:120, hp:120, maxMp:60, mp:60,
            baseAttack:22, baseDefense:12, className:'knight', gold:800,
            inventory: [], equipment: { weapon: null, armor: null },
            get attack() { let b = this.className==='knight'?6:(this.className==='archer'?8:7); if(this.equipment.weapon) b+=this.equipment.weapon.damage||0; return this.baseAttack+b; },
            get defense() { let b=this.baseDefense; if(this.equipment.armor) b+=this.equipment.armor.defense||0; return b; },
            
            moveToTile(tx, ty) {
                if(this.hp<=0) return false;
                if(worldMap[ty][tx]===1) return false;
                let path = findPath(this.tileX, this.tileY, tx, ty);
                if(path.length>0) {
                    this.path = path;
                    return true;
                }
                return false;
            },
            
            updateMovement(deltaTime) {
                if(this.path.length>0) {
                    let next = this.path[0];
                    let targetX = next.x*TILE_SIZE, targetY = next.y*TILE_SIZE;
                    let dx = targetX-this.x, dy = targetY-this.y;
                    let dist = Math.hypot(dx,dy);
                    let step = 150 * deltaTime;
                    if(dist<step) {
                        this.x = targetX; this.y = targetY;
                        this.tileX = next.x; this.tileY = next.y;
                        this.path.shift();
                        targetTileX = next.x; targetTileY = next.y;
                        setTimeout(()=>{if(targetTileX===next.x && targetTileY===next.y){targetTileX=null;targetTileY=null;}},300);
                    } else {
                        let angle = Math.atan2(dy,dx);
                        this.x += Math.cos(angle)*step;
                        this.y += Math.sin(angle)*step;
                    }
                }
            },
            
            takeDamage(dmg) {
                let actual = Math.max(1, Math.floor(dmg - this.defense*0.3));
                this.hp = Math.max(0, this.hp-actual);
                if(this.hp<=0) this.die();
                return actual;
            },
            die() {
                addLog('💀 ВЫ ПОГИБЛИ! Возрождение...');
                this.hp=0;
                setTimeout(()=>{
                    this.hp=this.maxHp; this.mp=this.maxMp;

                    this.path=[];
                    currentTargetMonster=null;

            addExp(amount) {
                this.xp+=amount;
                let need=100+(this.level-1)*50;
                while(this.xp>=need){ this.xp-=need; this.levelUp(); need=100+(this.level-1)*50; }

            },

                this.level++; this.maxHp+=30; this.hp=this.maxHp; this.maxMp+=15; this.mp=this.maxMp;
                this.baseAttack+=6; this.baseDefense+=3;

            attackMonster(m) {
                let now=Date.now()/1000;
                if(now-this.lastAttack<this.attackSpeed) return false;
                let dist=Math.abs(this.tileX-m.tileX)+Math.abs(this.tileY-m.tileY);
                if(this.className==='knight' && dist>1) return false;
                if((this.className==='archer'||this.className==='mage') && dist>12) return false;
                let dmg=this.attack-m.defense+Math.random()*20;

                addLog(`⚔️ Вы нанесли ${dmg} урона ${m.name}`);

                if(m.hp<=0){ m.die(this); this.addExp(m.xp); let gold=m.goldMin+Math.floor(Math.random()*(m.goldMax-m.goldMin)); this.gold+=gold; addLog(`💰 +${gold} золота!`); stats.monstersKilled++; if(currentTargetMonster===m) currentTargetMonster=null; checkBossSpawn(); }
                updateUI();
                return true;
            },
            attackSpeed:0.85, lastAttack:0
        };
        
        // Монстры
        let monsters = [];
        let nextMonsterId=1;
        const MONSTER_TYPES = {
            goblin:{name:'Гоблин', lvl:1, hp:45, attack:16, defense:3, xp:35, goldMin:8, goldMax:18, size:30, color:'#6b8c42', aggroRange:5, attackRange:1, speed:1.2},

            skeleton:{name:'Скелет', lvl:3, hp:75, attack:24, defense:6, xp:60, goldMin:15, goldMax:30, size:32, color:'#bdb28c', aggroRange:5, attackRange:1, speed:1},

            minotaur:{name:'Минотавр', lvl:8, hp:180, attack:40, defense:12, xp:150, goldMin:40, goldMax:70, size:40, color:'#9b5e2c', aggroRange:5, attackRange:1, speed:0.8}
        };
        const BOSS = { name:'ЦЕРБЕР', lvl:30, hp:1200, attack:85, defense:35, xp:800, goldMin:300, goldMax:500, size:48, color:'#aa4a2a', aggroRange:7, attackRange:1, speed:1.2 };
        
        class Monster {
            constructor(type, tx, ty, isBoss=false) {
                let d = isBoss ? BOSS : MONSTER_TYPES[type];
                this.id=nextMonsterId++;
                this.isBoss=isBoss;
                this.name=d.name;
                this.hp=d.hp; this.maxHp=d.hp;
                this.attack=d.attack; this.defense=d.defense;
                this.xp=d.xp; this.goldMin=d.goldMin; this.goldMax=d.goldMax;
                this.size=d.size; this.color=d.color;
                this.aggroRange=d.aggroRange; this.attackRange=d.attackRange;
                this.speed=d.speed;
                this.tileX=tx; this.tileY=ty;
                this.x=tx*TILE_SIZE; this.y=ty*TILE_SIZE;
                this.alive=true; this.aggro=false; this.attackCooldown=0; this.moveCooldown=0;
            }
            canMoveTo(tx,ty){
                if(tx<0||tx>=WORLD_WIDTH||ty<0||ty>=WORLD_HEIGHT) return false;
                if(worldMap[ty][tx]===1) return false;
                if(Math.abs(tx-safeZone.x)<=safeZone.radius && Math.abs(ty-safeZone.y)<=safeZone.radius) return false;
                if(player.tileX===tx && player.tileY===ty) return true;
                for(let m of monsters) if(m!==this && m.alive && m.tileX===tx && m.tileY===ty) return false;
                return true;
            }
            moveTowards(ptx,pty){
                let dx=ptx-this.tileX, dy=pty-this.tileY;
                let moves=[];
                if(dx>0) moves.push({tx:this.tileX+1,ty:this.tileY});
                if(dx<0) moves.push({tx:this.tileX-1,ty:this.tileY});
                if(dy>0) moves.push({tx:this.tileX,ty:this.tileY+1});
                if(dy<0) moves.push({tx:this.tileX,ty:this.tileY-1});
                for(let m of moves) if(this.canMoveTo(m.tx,m.ty)){ this.tileX=m.tx; this.tileY=m.ty; this.x=this.tileX*TILE_SIZE; this.y=this.tileY*TILE_SIZE; return true; }
                return false;
            }
            update(dt,p){
                if(!this.alive) return;
                if(this.attackCooldown>0) this.attackCooldown-=dt;
                if(this.moveCooldown>0) this.moveCooldown-=dt;
                let dist=Math.abs(this.tileX-p.tileX)+Math.abs(this.tileY-p.tileY);
                if(dist<=this.aggroRange) this.aggro=true;
                if(dist>this.aggroRange+2) this.aggro=false;
                if(this.aggro && p.hp>0){
                    if(dist>this.attackRange && this.moveCooldown<=0){ this.moveTowards(p.tileX,p.tileY); this.moveCooldown=0.4/this.speed; }
                    else if(dist<=this.attackRange && this.attackCooldown<=0){
                        let dmg=Math.max(5,this.attack-p.defense+Math.random()*15);
                        let actual=p.takeDamage(Math.floor(dmg));
                        this.attackCooldown=1.2;
                        addLog(`💔 ${this.name} атакует! -${actual} HP`);
                        showDamage(p.x,p.y,actual);
                        updateUI();
                    }
                }
            }
            die(killer){
                this.alive=false;
                if(this.isBoss){ stats.bossesKilled++; portalPos.active=true; addLog(`🏆 БОСС ${this.name} ПОВЕРЖЕН! ОТКРЫТ ПОРТАЛ! 🏆`); }
                setTimeout(()=>this.respawn(), this.isBoss?120000:8000);
            }
            respawn(){
                this.hp=this.maxHp; this.alive=true; this.aggro=false;
                for(let a=0;a<50;a++){
                    let tx=5+Math.random()*(WORLD_WIDTH-10), ty=5+Math.random()*(WORLD_HEIGHT-10);
                    if(worldMap[ty][tx]===0 && Math.abs(tx-safeZone.x)>4){
                        let clash=false;
                        for(let m of monsters) if(m!==this && m.alive && m.tileX===tx && m.tileY===ty) clash=true;
                        if(!clash && !(player.tileX===tx && player.tileY===ty)){ this.tileX=tx; this.tileY=ty; this.x=tx*TILE_SIZE; this.y=ty*TILE_SIZE; return; }
                    }
                }
            }
        }
        
        function spawnMonsters(){
            let types=['goblin','wolf','skeleton','orc','minotaur'];
            for(let i=0;i<45;i++){

        function useHealPotion(){

        // Отрисовка
        function draw(){
            ctx.clearRect(0,0,canvas.width,canvas.height);
            camera.x=player.x-canvas.width/2; camera.y=player.y-canvas.height/2;
            camera.x=Math.max(0,Math.min(camera.x,WORLD_WIDTH*TILE_SIZE-canvas.width));
            camera.y=Math.max(0,Math.min(camera.y,WORLD_HEIGHT*TILE_SIZE-canvas.height));
            let sx=Math.max(0,Math.floor(camera.x/TILE_SIZE)), sy=Math.max(0,Math.floor(camera.y/TILE_SIZE));
            let ex=Math.min(WORLD_WIDTH,sx+Math.ceil(canvas.width/TILE_SIZE)+2), ey=Math.min(WORLD_HEIGHT,sy+Math.ceil(canvas.height/TILE_SIZE)+2);
            for(let y=sy;y<ey;y++) for(let x=sx;x<ex;x++){
                let scx=x*TILE_SIZE-camera.x, scy=y*TILE_SIZE-camera.y;
                if(worldMap[y][x]===1){
                    if(worldBiome[y][x]==='water') ctx.fillStyle='#4a7a9a';
                    else if(worldBiome[y][x]==='mountain') ctx.fillStyle='#8a8a8a';
                    else ctx.fillStyle='#5a5a5a';
                    ctx.fillRect(scx,scy,TILE_SIZE-1,TILE_SIZE-1);
                } else {
                    if(worldBiome[y][x]==='grass') ctx.fillStyle='#5cae4a';
                    else if(worldBiome[y][x]==='shop') ctx.fillStyle='#8aae6a';
                    else ctx.fillStyle='#5c6e4a';
                    ctx.fillRect(scx,scy,TILE_SIZE-1,TILE_SIZE-1);
                    if(worldBiome[y][x]==='grass') for(let i=0;i<5;i++){ ctx.fillStyle='#6cbe5a'; ctx.fillRect(scx+6+i*6,scy+TILE_SIZE-10,2,6); }
                }
                if(x===safeZone.x && y===safeZone.y){ ctx.fillStyle='#ffaa66'; ctx.font=`${Math.min(24,TILE_SIZE-10)}px monospace`; ctx.fillText('🏪',scx+12,scy+34); }
                if(portalPos.active && x===portalPos.x && y===portalPos.y){ ctx.fillStyle='#aa66ff'; ctx.fillRect(scx+4,scy+4,TILE_SIZE-8,TILE_SIZE-8); ctx.fillStyle='#fff'; ctx.font='10px monospace'; ctx.fillText('🌊',scx+18,scy+30); }
            }
            for(let obj of worldObjects){
                let scx=obj.x*TILE_SIZE-camera.x, scy=obj.y*TILE_SIZE-camera.y;
                if(obj.type==='fence'){ ctx.fillStyle='#8b5a2b'; ctx.fillRect(scx+4,scy+4,TILE_SIZE-8,8); ctx.fillRect(scx+4,scy+TILE_SIZE-12,TILE_SIZE-8,8); }
                if(obj.type==='gate'){ ctx.fillStyle='#c97e3a'; ctx.fillRect(scx+12,scy+4,20,TILE_SIZE-8); }
            }
            for(let m of monsters){
                if(!m.alive) continue;
                let scx=m.x-camera.x-m.size/2, scy=m.y-camera.y-m.size/2;
                ctx.fillStyle=m.color; ctx.fillRect(scx,scy,m.size,m.size);
                ctx.fillStyle='#000'; ctx.fillRect(scx+m.size/2-6,scy+m.size/2-4,4,4); ctx.fillRect(scx+m.size/2+2,scy+m.size/2-4,4,4);
                let hpP=m.hp/m.maxHp; ctx.fillStyle='#a13333'; ctx.fillRect(scx,scy-6,m.size,4); ctx.fillStyle='#d65c5c'; ctx.fillRect(scx,scy-6,m.size*hpP,4);
                ctx.fillStyle='#fff'; ctx.font='bold 8px monospace'; ctx.fillText(`${m.name} Lv.${m.isBoss?30:MONSTER_TYPES[m.type]?.lvl||1}`,scx+4,scy-2);
                if(selectedMonsterId===m.id){ ctx.strokeStyle='#ff4444'; ctx.lineWidth=2; ctx.strokeRect(scx-1,scy-1,m.size+2,m.size+2); }
            }
            let psx=player.x-camera.x-18, psy=player.y-camera.y-18;
            if(player.className==='knight'){ ctx.fillStyle='#3a6ea5'; ctx.fillRect(psx+4,psy+6,28,24); ctx.fillStyle='#f9c87a'; ctx.beginPath(); ctx.arc(psx+18,psy+12,8,0,Math.PI*2); ctx.fill(); }
            else if(player.className==='archer'){ ctx.fillStyle='#6f9e4f'; ctx.fillRect(psx+4,psy+6,28,24); ctx.fillStyle='#f9c87a'; ctx.beginPath(); ctx.arc(psx+18,psy+12,8,0,Math.PI*2); ctx.fill(); }
            else{ ctx.fillStyle='#a367c2'; ctx.fillRect(psx+4,psy+6,28,24); ctx.fillStyle='#f9c87a'; ctx.beginPath(); ctx.arc(psx+18,psy+12,8,0,Math.PI*2); ctx.fill(); }
            let hpP=player.hp/player.maxHp; ctx.fillStyle='#a13333'; ctx.fillRect(psx,psy-6,36,4); ctx.fillStyle='#d65c5c'; ctx.fillRect(psx,psy-6,36*hpP,4);
        }
        
        function handleClick(e){
            let rect=canvas.getBoundingClientRect();
            let clickX=(e.clientX-rect.left)*(canvas.width/rect.width);
            let clickY=(e.clientY-rect.top)*(canvas.height/rect.height);
            let wx=clickX+camera.x, wy=clickY+camera.y;
            let tx=Math.floor(wx/TILE_SIZE), ty=Math.floor(wy/TILE_SIZE);
            if(tx<0||tx>=WORLD_WIDTH||ty<0||ty>=WORLD_HEIGHT) return;
            let clicked=null;
            for(let m of monsters) if(m.alive && m.tileX===tx && m.tileY===ty){ clicked=m; break; }
            if(clicked){ selectedMonsterId=clicked.id; currentTargetMonster=clicked; player.attackMonster(clicked); }
            else{ if(tx===safeZone.x && ty===safeZone.y) openShop(); else if(portalPos.active && tx===portalPos.x && ty===portalPos.y){ addLog('🌊 Портал ведет в новое измерение...'); } else player.moveToTile(tx,ty); }
        }
        
        function setupTouchControls() {
            const touchUp = document.getElementById('touchUp');
            const touchDown = document.getElementById('touchDown');
            const touchLeft = document.getElementById('touchLeft');
            const touchRight = document.getElementById('touchRight');
            const touchHeal = document.getElementById('touchHeal');
            const touchMana = document.getElementById('touchMana');
            const touchSuper = document.getElementById('touchSuper');
            if(touchUp) touchUp.onclick = () => player.moveToTile(player.tileX, player.tileY-1);
            if(touchDown) touchDown.onclick = () => player.moveToTile(player.tileX, player.tileY+1);
            if(touchLeft) touchLeft.onclick = () => player.moveToTile(player.tileX-1, player.tileY);
            if(touchRight) touchRight.onclick = () => player.moveToTile(player.tileX+1, player.tileY);
            if(touchHeal) touchHeal.onclick = useHealPotion;
            if(touchMana) touchMana.onclick = useManaPotion;
            if(touchSuper) touchSuper.onclick = useSuperSkill;
        }
        
        setInterval(()=>{ if(currentTargetMonster && currentTargetMonster.alive && player.hp>0){ let dist=Math.abs(player.tileX-currentTargetMonster.tileX)+Math.abs(player.tileY-currentTargetMonster.tileY); let maxD=player.className==='knight'?1:12; if(dist<=maxD) player.attackMonster(currentTargetMonster); else if(dist>10) currentTargetMonster=null; } },500);
        
        document.addEventListener('keydown',(e)=>{ if(e.key==='1') useHealPotion(); if(e.key==='2') useManaPotion(); if(e.key==='3') useSuperSkill(); });
        
        function addLog(msg){ let d=document.createElement('div'); d.className='log-message'; d.innerText=msg; document.body.appendChild(d); setTimeout(()=>d.remove(),2500); }
        function showDamage(x,y,d){ let dmg=document.createElement('div'); dmg.className='damage-number'; dmg.innerText=`-${Math.floor(d)}`; let sx=x-camera.x, sy=y-camera.y; dmg.style.left=sx+'px'; dmg.style.top=sy+'px'; document.body.appendChild(dmg); setTimeout(()=>dmg.remove(),700); }
        
        // Инициализация
        generateWorld();
        spawnMonsters();
        initInventory();
        loadSettings();
        loadGame();
        updateUI();
        updateInventoryUI();
        setupTouchControls();
        
        canvas.addEventListener('click', handleClick);
        canvas.addEventListener('touchstart',(e)=>{ e.preventDefault(); let t=e.touches[0]; let rect=canvas.getBoundingClientRect(); let cx=(t.clientX-rect.left)*(canvas.width/rect.width); let cy=(t.clientY-rect.top)*(canvas.height/rect.height); let wx=cx+camera.x, wy=cy+camera.y; let tx=Math.floor(wx/TILE_SIZE), ty=Math.floor(wy/TILE_SIZE); if(tx<0||tx>=WORLD_WIDTH||ty<0||ty>=WORLD_HEIGHT) return; let clicked=null; for(let m of monsters) if(m.alive && m.tileX===tx && m.tileY===ty){ clicked=m; break; } if(clicked){ selectedMonsterId=clicked.id; currentTargetMonster=clicked; player.attackMonster(clicked); } else{ if(tx===safeZone.x && ty===safeZone.y) openShop(); else if(portalPos.active && tx===portalPos.x && ty===portalPos.y) addLog('🌊 Портал ведет в новое измерение...'); else player.moveToTile(tx,ty); } });
        
        // Кнопки интерфейса
        document.getElementById('healPotionBtn').onclick=useHealPotion;
        document.getElementById('manaPotionBtn').onclick=useManaPotion;
        document.getElementById('superSkillBtn').onclick=useSuperSkill;
        document.getElementById('statsBtn').onclick=()=>document.getElementById('statsPanel').style.display='block';
        document.getElementById('closeStats').onclick=()=>document.getElementById('statsPanel').style.display='none';
        document.getElementById('invTopBtn').onclick=()=>{ let p=document.getElementById('inventoryPanel'); p.style.display=p.style.display==='none'?'flex':'none'; updateInventoryUI(); };
        document.getElementById('closeInv').onclick=()=>document.getElementById('inventoryPanel').style.display='none';
        document.getElementById('closeShop').onclick=()=>document.getElementById('shopPanel').style.display='none';
        document.getElementById('settingsBtn').onclick=()=>document.getElementById('settingsPanel').style.display='block';
        document.getElementById('closeSettings').onclick=()=>document.getElementById('settingsPanel').style.display='none';
        
        document.getElementById('modePcBtn').onclick=()=>{ settings.controlMode='pc'; applySettings(); saveSettings(); };
        document.getElementById('modeMobileBtn').onclick=()=>{ settings.controlMode='mobile'; applySettings(); saveSettings(); };
        document.getElementById('touchToggle').onclick=()=>{ settings.touchEnabled=!settings.touchEnabled; applySettings(); saveSettings(); };
        document.getElementById('soundToggle').onclick=()=>{ settings.soundEnabled=!settings.soundEnabled; applySettings(); saveSettings(); };
        document.getElementById('autoSaveToggle').onclick=()=>{ settings.autoSave=!settings.autoSave; applySettings(); saveSettings(); };
        
        document.getElementById('classKnightBtn').onclick=()=>{ player.className='knight'; addLog('Класс: Рыцарь'); updateUI(); };
        document.getElementById('classArcherBtn').onclick=()=>{ player.className='archer'; addLog('Класс: Лучник'); updateUI(); };
        document.getElementById('classMageBtn').onclick=()=>{ player.className='mage'; addLog('Класс: Маг'); updateUI(); };
        
        let lt=0;
        function loop(t){ let dt=Math.min(0.033,(t-lt)/1000); lt=t; player.updateMovement(dt); for(let m of monsters) m.update(dt,player); draw(); requestAnimationFrame(loop); }
        requestAnimationFrame(loop);
        addLog('⚔️ Добро пожаловать! ⚔️');
        addLog('👆 Нажми на монстра - атака | На землю - движение');
        addLog('🏆 Убей 200 монстров, чтобы вызвать босса!');
        addLog('⚙️ В настройках можно переключить режим управления');
    </script>
</body>
</html>
