<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=no">
    <title>Rucoy Online - ПОЛНАЯ ВЕРСИЯ</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { background: #0a0c12; overflow: hidden; position: fixed; width: 100%; height: 100%; font-family: 'Courier New', monospace; touch-action: none; }
        canvas { display: block; position: fixed; top: 0; left: 0; width: 100%; height: 100%; cursor: pointer; background: #1a2a1a; }
        .vertical-buttons { position: fixed; bottom: 20px; left: 15px; display: flex; flex-direction: column; gap: 12px; z-index: 100; pointer-events: auto; }
        .v-btn { width: 60px; height: 60px; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); border: 2px solid #ffaa55; border-radius: 50%; color: #ffcc88; font-size: 28px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 0 #1a1c2a; cursor: pointer; transition: 0.03s linear; }
        .v-btn:active { transform: translateY(2px); }
        .super-btn { background: rgba(200,100,50,0.9); border-color: #ffaa66; color: #ffffaa; }
        .hp-btn { background: rgba(180,60,60,0.9); border-color: #ff8866; }
        .mp-btn { background: rgba(60,80,180,0.9); border-color: #88aaff; }
        .corner-btn { position: fixed; top: 15px; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); border: 1px solid #ffaa55; color: #ffcc88; font-size: 14px; font-weight: bold; padding: 8px 14px; border-radius: 30px; box-shadow: 0 2px 0 #121420; cursor: pointer; font-family: monospace; z-index: 100; pointer-events: auto; }
        .stats-btn { right: 15px; }
        .inventory-btn { left: 15px; }
        .corner-btn:active { transform: translateY(2px); }
        @media (max-width: 700px) { .v-btn { width: 50px; height: 50px; font-size: 24px; } .corner-btn { font-size: 11px; padding: 5px 10px; } }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div class="vertical-buttons">
        <div class="v-btn super-btn" id="superBtn">🌟</div>
        <div class="v-btn hp-btn" id="hpBtn">❤️</div>
        <div class="v-btn mp-btn" id="mpBtn">💙</div>
    </div>
    <button class="corner-btn stats-btn" id="statsBtn">📊 СТАТИСТИКА</button>
    <button class="corner-btn inventory-btn" id="inventoryBtn">🎒 ИНВЕНТАРЬ</button>

<script>
(function(){
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // РАЗМЕР МИРА (ОГРОМНЫЙ)
    const WORLD_WIDTH = 7000;
    const WORLD_HEIGHT = 5600;
    
    let cameraX = 0, cameraY = 0;
    let canvasWidth = window.innerWidth;
    let canvasHeight = window.innerHeight;
    
    function resizeCanvas() { canvasWidth = window.innerWidth; canvasHeight = window.innerHeight; canvas.width = canvasWidth; canvas.height = canvasHeight; }
    window.addEventListener('resize', () => { resizeCanvas(); updateCamera(); });
    resizeCanvas();
    
    // СТАТИСТИКА
    let stats = {
        mobsKilled: 0, totalGold: 0, totalDamage: 0, totalDamageTaken: 0,
        criticalHits: 0, dodges: 0, skillsUsed: 0, potionsUsed: 0,
        playTime: 0, startTime: Date.now()
    };
    function updatePlayTime() { stats.playTime = Math.floor((Date.now() - stats.startTime) / 1000); }
    function getPlayTime() { let s=stats.playTime; return { h:Math.floor(s/3600), m:Math.floor((s%3600)/60), s:s%60 }; }
    
    // ИНВЕНТАРЬ (ПОЛНЫЙ)
    let inventory = {
        potionHp: 5, potionMp: 5,
        potionBigHp: 1, potionBigMp: 1,
        armor: "Кожаная броня", armorLevel: 2, armorDef: 12,
        weapon: "Стальной меч", weaponLevel: 2, weaponDmg: 18,
        helmet: "Кожаный шлем", helmetLevel: 2, helmetDef: 5,
        boots: "Кожаные сапоги", bootsLevel: 2, bootsDef: 3,
        ring: "Простое кольцо", ringLevel: 1, ringBonus: 2
    };
    
    // БЕЗОПАСНАЯ ЗОНА
    let safeZone = { x: 650, y: 560, width: 660, height: 500 };
    let shopNPC = { x: safeZone.x + safeZone.width - 110, y: safeZone.y + safeZone.height - 80, radius: 32, name: "Торговец" };
    let healerNPC = { x: safeZone.x + 90, y: safeZone.y + safeZone.height - 80, radius: 32, name: "Лекарь" };
    let bankerNPC = { x: safeZone.x + safeZone.width/2, y: safeZone.y + 70, radius: 32, name: "Банкир" };
    
    let gates = [
        { x: safeZone.x + safeZone.width/2 - 70, y: safeZone.y - 40, width: 140, height: 50 },
        { x: safeZone.x + safeZone.width/2 - 70, y: safeZone.y + safeZone.height - 10, width: 140, height: 50 },
        { x: safeZone.x - 40, y: safeZone.y + safeZone.height/2 - 70, width: 50, height: 140 },
        { x: safeZone.x + safeZone.width - 10, y: safeZone.y + safeZone.height/2 - 70, width: 50, height: 140 }
    ];
    function isInSafeZone(x,y) { return x>safeZone.x && x<safeZone.x+safeZone.width && y>safeZone.y && y<safeZone.y+safeZone.height; }
    function isAtGate(x,y) { for(let g of gates) if(x>g.x && x<g.x+g.width && y>g.y && y<g.y+g.height) return true; return false; }
    function canCrossBoundary(fx,fy,tx,ty) { let was=isInSafeZone(fx,fy), will=isInSafeZone(tx,ty); if(was===will) return true; let mx=(fx+tx)/2, my=(fy+ty)/2; return isAtGate(mx,my) || isAtGate(tx,ty) || isAtGate(fx,fy); }
    
    // ПРЕПЯТСТВИЯ
    let obstacles = [];
    function generateWorld() {
        obstacles = [];
        for(let i=0;i<48;i++) { let fx=safeZone.x+i*28; if(!(fx>gates[0].x-30 && fx<gates[0].x+gates[0].width+30)) obstacles.push({x:fx,y:safeZone.y-25,radius:14,type:'fence'}); if(!(fx>gates[1].x-30 && fx<gates[1].x+gates[1].width+30)) obstacles.push({x:fx,y:safeZone.y+safeZone.height+15,radius:14,type:'fence'}); }
        for(let i=0;i<40;i++) { let fy=safeZone.y+i*28; if(!(fy>gates[2].y-30 && fy<gates[2].y+gates[2].height+30)) obstacles.push({x:safeZone.x-25,y:fy,radius:14,type:'fence'}); if(!(fy>gates[3].y-30 && fy<gates[3].y+gates[3].height+30)) obstacles.push({x:safeZone.x+safeZone.width+15,y:fy,radius:14,type:'fence'}); }
        for(let i=0;i<600;i++) { let x=100+Math.random()*(WORLD_WIDTH-200), y=100+Math.random()*(WORLD_HEIGHT-200); if(x>safeZone.x-100 && x<safeZone.x+safeZone.width+100 && y>safeZone.y-100 && y<safeZone.y+safeZone.height+100) continue; obstacles.push({x,y,radius:28,type:'tree'}); }
        for(let i=0;i<120;i++) { let x=120+Math.random()*(WORLD_WIDTH-240), y=120+Math.random()*(WORLD_HEIGHT-240); if(x>safeZone.x-120 && x<safeZone.x+safeZone.width+120 && y>safeZone.y-120 && y<safeZone.y+safeZone.height+120) continue; obstacles.push({x,y,radius:44,type:'mountain'}); }
        for(let i=0;i<350;i++) { let x=60+Math.random()*(WORLD_WIDTH-120), y=60+Math.random()*(WORLD_HEIGHT-120); if(x>safeZone.x-80 && x<safeZone.x+safeZone.width+80 && y>safeZone.y-80 && y<safeZone.y+safeZone.height+80) continue; obstacles.push({x,y,radius:18,type:'rock'}); }
        for(let i=0;i<300;i++) { let x=40+Math.random()*(WORLD_WIDTH-80), y=40+Math.random()*(WORLD_HEIGHT-80); if(x>safeZone.x-60 && x<safeZone.x+safeZone.width+60 && y>safeZone.y-60 && y<safeZone.y+safeZone.height+60) continue; obstacles.push({x,y,radius:12,type:'bush'}); }
    }
    function isWalkable(x,y,r=26) { if(x-r<35 || x+r>WORLD_WIDTH-35 || y-r<35 || y+r>WORLD_HEIGHT-35) return false; for(let o of obstacles) if(Math.hypot(x-o.x,y-o.y)<r+o.radius) return false; return true; }
    function canMoveTo(x,y,r=26) { return isWalkable(x,y,r) && canCrossBoundary(player.x,player.y,x,y); }
    
    // КЛАССЫ
    const CLASSES = {
        warrior: { name: "Мечник", icon: "⚔️", color: "#6c8cae", armorColor: "#5a7a9a", hp: 420, mp: 90, dmgMin: 42, dmgMax: 74, skill: "Вихрь", range: 62, skillRange: 78, isMelee: true, crit: 10, dodge: 5, superCd: 180, superDmg: 2.2, superRadius: 110 },
        archer: { name: "Лучник", icon: "🏹", color: "#7cae6c", armorColor: "#6a8a5a", hp: 330, mp: 160, dmgMin: 40, dmgMax: 72, skill: "Тройной выстрел", range: 170, skillRange: 210, isMelee: false, crit: 15, dodge: 10, superCd: 180, superDmg: 3.2, superTargets: 3 },
        mage: { name: "Маг", icon: "🔮", color: "#b57ad6", armorColor: "#9a6aba", hp: 280, mp: 280, dmgMin: 48, dmgMax: 84, skill: "Огненный взрыв", range: 160, skillRange: 200, isMelee: false, crit: 12, dodge: 8, superCd: 180, superDmg: 2.8, superRadius: 95 }
    };
    
    // МОБЫ (10+ ВИДОВ)
    const MOB_TYPES = [
        { name: "Гоблин", hp: 80, dmg: 20, exp: 45, color: "#6f8c5a", skin: "#8cae6a", icon: "👺", speed: 1.05, range: 60, levelMin: 1, goldMin: 22, goldMax: 48 },
        { name: "Тролль", hp: 155, dmg: 30, exp: 78, color: "#7a6a4a", skin: "#9a8a62", icon: "👹", speed: 0.78, range: 64, levelMin: 2, goldMin: 38, goldMax: 75 },
        { name: "Скелет", hp: 205, dmg: 38, exp: 112, color: "#b8b8cc", skin: "#d0d0e0", icon: "💀", speed: 1.12, range: 60, levelMin: 3, goldMin: 55, goldMax: 100 },
        { name: "Орк", hp: 285, dmg: 52, exp: 158, color: "#8a6a4a", skin: "#aa8262", icon: "👺", speed: 0.88, range: 64, levelMin: 4, goldMin: 75, goldMax: 140 },
        { name: "Волк", hp: 120, dmg: 28, exp: 68, color: "#8a9ac6", skin: "#c0d0f0", icon: "🐺", speed: 1.35, range: 56, levelMin: 2, goldMin: 32, goldMax: 65 },
        { name: "Элементаль", hp: 175, dmg: 42, exp: 102, color: "#d97a3a", skin: "#f0a060", icon: "🔥", speed: 0.95, range: 62, levelMin: 3, goldMin: 48, goldMax: 90 },
        { name: "Голем", hp: 365, dmg: 58, exp: 198, color: "#8a8a7a", skin: "#aaa890", icon: "🗿", speed: 0.55, range: 70, levelMin: 5, goldMin: 95, goldMax: 170 },
        { name: "Дракон", hp: 390, dmg: 68, exp: 250, color: "#c97a3a", skin: "#e09a5a", icon: "🐉", speed: 0.62, range: 70, levelMin: 6, goldMin: 115, goldMax: 210 },
        { name: "Призрак", hp: 215, dmg: 48, exp: 135, color: "#6a5a8a", skin: "#8a7ab0", icon: "👻", speed: 1.2, range: 58, levelMin: 4, goldMin: 65, goldMax: 115 },
        { name: "Энт", hp: 450, dmg: 60, exp: 295, color: "#5a8a4a", skin: "#7aaa62", icon: "🌳", speed: 0.5, range: 72, levelMin: 7, goldMin: 150, goldMax: 260 }
    ];
    
    let mobs = [], spawnTimer = 0;
    const MAX_MOBS = 42;
    function createMob() { let avail=MOB_TYPES.filter(m=>player.level>=m.levelMin); if(avail.length===0) avail=MOB_TYPES; let t=avail[Math.floor(Math.random()*avail.length)]; let lvl=Math.max(1,player.level+Math.floor(Math.random()*5)-2); let hpMult=1+(lvl-1)*0.16, dmgMult=1+(lvl-1)*0.14; return { name:`${t.name} Lv.${lvl}`, level:lvl, hp:Math.floor(t.hp*hpMult), maxHp:Math.floor(t.hp*hpMult), dmg:Math.floor(t.dmg*dmgMult), exp:Math.floor(t.exp*(0.85+lvl*0.13)), goldMin:Math.floor(t.goldMin*(0.8+lvl*0.05)), goldMax:Math.floor(t.goldMax*(0.9+lvl*0.07)), color:t.color, skin:t.skin, icon:t.icon, speed:t.speed, attackRange:t.range, x:0, y:0, attackTimer:0 }; }
    function spawnMob() { if(mobs.length>=MAX_MOBS) return; for(let a=0;a<70;a++) { let x=180+Math.random()*(WORLD_WIDTH-360), y=150+Math.random()*(WORLD_HEIGHT-300); if(isWalkable(x,y,28) && !isInSafeZone(x,y) && Math.hypot(x-player.x,y-player.y)>240) { let m=createMob(); m.x=x; m.y=y; mobs.push(m); return; } } }
    
    // ИГРОК
    let player = {
        x: safeZone.x + safeZone.width/2, y: safeZone.y + safeZone.height/2,
        targetX: null, targetY: null, path: [],
        hp: 420, maxHp: 420, mp: 90, maxMp: 90,
        level: 1, exp: 0, expToNext: 110,
        classType: "warrior",
        gold: 700, bankGold: 0,
        speed: 5.0, defense: 20,
        attackTimer: 0, superCooldown: 0,
        critChance: 10, dodgeChance: 5
    };
    
    function updateGear() { let lvl=player.level; if(lvl>=20) { inventory.armor="Драконья броня"; inventory.armorLevel=5; inventory.armorDef=52; inventory.weapon="Легендарный меч"; inventory.weaponLevel=5; inventory.weaponDmg=58; inventory.helmet="Драконий шлем"; inventory.helmetLevel=5; inventory.helmetDef=22; inventory.boots="Драконьи сапоги"; inventory.bootsLevel=5; inventory.bootsDef=15; inventory.ring="Кольцо дракона"; inventory.ringLevel=5; inventory.ringBonus=18; } else if(lvl>=12) { inventory.armor="Железная броня"; inventory.armorLevel=3; inventory.armorDef=32; inventory.weapon="Рунический клинок"; inventory.weaponLevel=3; inventory.weaponDmg=38; inventory.helmet="Железный шлем"; inventory.helmetLevel=3; inventory.helmetDef=12; inventory.boots="Железные сапоги"; inventory.bootsLevel=3; inventory.bootsDef=8; inventory.ring="Серебряное кольцо"; inventory.ringLevel=3; inventory.ringBonus=9; } else if(lvl>=5) { inventory.armor="Кожаная броня"; inventory.armorLevel=2; inventory.armorDef=18; inventory.weapon="Стальной меч"; inventory.weaponLevel=2; inventory.weaponDmg=22; inventory.helmet="Кожаный шлем"; inventory.helmetLevel=2; inventory.helmetDef=7; inventory.boots="Кожаные сапоги"; inventory.bootsLevel=2; inventory.bootsDef=5; inventory.ring="Простое кольцо"; inventory.ringLevel=2; inventory.ringBonus=5; } else { inventory.armor="Тканевая броня"; inventory.armorLevel=1; inventory.armorDef=8; inventory.weapon="Деревянный меч"; inventory.weaponLevel=1; inventory.weaponDmg=12; inventory.helmet="Тканевый капюшон"; inventory.helmetLevel=1; inventory.helmetDef=3; inventory.boots="Тканевые сапоги"; inventory.bootsLevel=1; inventory.bootsDef=2; inventory.ring="Медное кольцо"; inventory.ringLevel=1; inventory.ringBonus=3; }
        player.defense = inventory.armorDef + inventory.helmetDef + inventory.bootsDef + Math.floor(player.level * 1.2);
        let c = CLASSES[player.classType];
        player.critChance = c.crit + inventory.ringBonus;
        player.dodgeChance = c.dodge + Math.floor(player.level * 0.6);
    }
    
    // ПУТЬ
    function findPath(sx,sy,tx,ty) { let path=[], dx=tx-sx, dy=ty-sy, dist=Math.hypot(dx,dy); if(dist<20) return path; let steps=Math.min(90,Math.floor(dist/14)); for(let i=1;i<=steps;i++) { let t=i/steps, nx=sx+dx*t, ny=sy+dy*t; if(canMoveTo(nx,ny,26)) path.push({x:nx,y:ny}); else { let ang=Math.atan2(dy,dx); for(let off of [-1.4,1.4,-2.2,2.2,-3,3]) { let nx2=sx+dx*t+Math.cos(ang+off)*52, ny2=sy+dy*t+Math.sin(ang+off)*52; if(canMoveTo(nx2,ny2,26)) { path.push({x:nx2,y:ny2}); break; } } } } path.push({x:tx,y:ty}); return path; }
    function moveTo(x,y) { player.targetX=x; player.targetY=y; player.path=findPath(player.x,player.y,x,y); }
    function updateMove() { if(!player.path||player.path.length===0) return; let next=player.path[0], dx=next.x-player.x, dy=next.y-player.y, dist=Math.hypot(dx,dy); if(dist<12) player.path.shift(); else { let step=Math.min(player.speed,dist), ang=Math.atan2(dy,dx), nx=player.x+Math.cos(ang)*step, ny=player.y+Math.sin(ang)*step; if(canMoveTo(nx,ny,26)) { player.x=nx; player.y=ny; } else { player.path=[]; player.targetX=null; } } }
    
    // БОЙ
    let selectedMob = null, messages = [], damageFloats = [], showStats = false, showInventory = false, shopOpen = false, bankOpen = false, explosionTarget = null, whirlwindActive = false, whirlwindTimer = 0;
    function addMsg(t,e=false) { messages.unshift({text:t,isErr:e,life:200}); if(messages.length>6) messages.pop(); }
    function getDamageRange() { let c=CLASSES[player.classType]; let bonus=inventory.weaponDmg+Math.floor(player.level*2.4); return { min:c.dmgMin+bonus, max:c.dmgMax+bonus }; }
    function showDamage(x,y,dmg,isPlayer=false,isCrit=false) { damageFloats.push({x,y,dmg,life:24,isPlayer,isCrit}); }
    function calculateDamage() { let {min,max}=getDamageRange(); let dmg=Math.floor(Math.random()*(max-min+1)+min); let isCrit=Math.random()*100<player.critChance; if(isCrit) { dmg=Math.floor(dmg*1.85); stats.criticalHits++; } return {dmg,isCrit}; }
    function killMob(mob) { let expGain=mob.exp, goldGain=Math.floor(mob.goldMin+Math.random()*(mob.goldMax-mob.goldMin)); player.exp+=expGain; player.gold+=goldGain; stats.mobsKilled++; stats.totalGold+=goldGain; addMsg(`✨ +${expGain} опыта, +${goldGain}💰`); if(Math.random()<0.4) { if(Math.random()<0.6) inventory.potionHp++; else inventory.potionMp++; addMsg(`🧪 Выпало зелье!`); } if(Math.random()<0.15) { if(Math.random()<0.6) inventory.potionBigHp++; else inventory.potionBigMp++; addMsg(`✨ Выпало большое зелье!`); } let idx=mobs.indexOf(mob); if(idx!==-1) mobs.splice(idx,1); if(selectedMob===mob) selectedMob=null; while(player.exp>=player.expToNext) { player.exp-=player.expToNext; player.level++; player.maxHp=CLASSES[player.classType].hp+player.level*17; player.maxMp=CLASSES[player.classType].mp+player.level*13; player.hp=player.maxHp; player.mp=player.maxMp; player.expToNext=110+player.level*45; updateGear(); addMsg(`⭐⭐⭐⭐⭐ УРОВЕНЬ ${player.level}! ⭐⭐⭐⭐⭐`); } }
    function playerAttack() { if(!selectedMob||selectedMob.hp<=0) { selectedMob=null; return false; } if(player.attackTimer>0) return false; let c=CLASSES[player.classType], dist=Math.hypot(player.x-selectedMob.x,player.y-selectedMob.y); if(dist>c.range) { addMsg(`🏃 Слишком далеко! (${Math.floor(dist)}/${c.range}px)`,true); return false; } let {dmg,isCrit}=calculateDamage(); selectedMob.hp-=dmg; stats.totalDamage+=dmg; player.attackTimer=28; addMsg(`⚔️ ${c.name} → ${dmg} урона${isCrit?" (КРИТ!)":""} ${selectedMob.name}!`); showDamage(selectedMob.x,selectedMob.y,dmg,false,isCrit); if(selectedMob.hp<=0) killMob(selectedMob); return true; }
    function useSuper() { if(player.superCooldown>0) { addMsg(`🌟 Суперспособность: ${Math.ceil(player.superCooldown/10)} сек`,true); return; } let c=CLASSES[player.classType]; stats.skillsUsed++; if(c.name==="Мечник") { whirlwindActive=true; whirlwindTimer=30; player.superCooldown=c.superCd; addMsg(`🌀 ВИХРЬ! Урон x${c.superDmg} по всем врагам!`); for(let mob of mobs) { if(Math.hypot(player.x-mob.x,player.y-mob.y)<c.superRadius && mob.hp>0) { let {min,max}=getDamageRange(), avg=(min+max)/2, dmg=Math.floor(avg*c.superDmg); mob.hp-=dmg; stats.totalDamage+=dmg; showDamage(mob.x,mob.y,dmg,false,true); addMsg(`🌀 Вихрь → ${dmg} урона ${mob.name}!`); if(mob.hp<=0) killMob(mob); } } } else if(c.name==="Лучник") { let targets=mobs.filter(m=>m.hp>0&&Math.hypot(player.x-m.x,player.y-m.y)<210); targets.sort((a,b)=>Math.hypot(player.x-a.x,player.y-a.y)-Math.hypot(player.x-b.x,player.y-b.y)); let hit=0; for(let mob of targets.slice(0,3)) { let {min,max}=getDamageRange(), avg=(min+max)/2, dmg=Math.floor(avg*3.2); mob.hp-=dmg; stats.totalDamage+=dmg; showDamage(mob.x,mob.y,dmg,false,true); addMsg(`🏹 Тройной выстрел → ${dmg} урона ${mob.name}!`); if(mob.hp<=0) killMob(mob); hit++; } if(hit===0) addMsg(`🏹 Нет врагов поблизости!`,true); else player.superCooldown=c.superCd; } else if(c.name==="Маг") { addMsg(`🔥 Нажмите на любое место для взрыва!`); explosionTarget={active:true}; return; } if(explosionTarget?.active!==true) player.superCooldown=c.superCd; }
    function castExplosion(wx,wy) { if(!explosionTarget?.active) return false; explosionTarget=null; let c=CLASSES[player.classType]; let {min,max}=getDamageRange(), avg=(min+max)/2, dmg=Math.floor(avg*c.superDmg), hit=false; for(let mob of mobs) { if(Math.hypot(wx-mob.x,wy-mob.y)<c.superRadius && mob.hp>0) { mob.hp-=dmg; stats.totalDamage+=dmg; showDamage(mob.x,mob.y,dmg,false,true); addMsg(`🔥 Взрыв → ${dmg} урона ${mob.name}!`); if(mob.hp<=0) killMob(mob); hit=true; } } damageFloats.push({x:wx,y:wy,dmg:"💥",life:20,isExplosion:true}); if(!hit) addMsg(`🔥 Взрыв не задел врагов!`,true); player.superCooldown=c.superCd; return true; }
    
    // МОБЫ АТАКУЮТ

,canvasWidth/2-200,y+372); } if(player.superCooldown>0) { let p=player.superCooldown/CLASSES[player.classType].superCd; ctx.fillStyle="#000000aa"; ctx.fillRect(15,canvasHeight-80,80,14); ctx.fillStyle="#ffaa44"; ctx.fillRect(15,canvasHeight-80,80*(1-p),14); ctx.fillStyle="#ffaa88"; ctx.font="11px monospace"; ctx.fillText(`🌟 ${Math.ceil(player.superCooldown/10)}с`,22,canvasHeight-62); } ctx.fillStyle="#ffffffaa"; ctx.font="10px monospace"; ctx.fillText(`⚔️ Урон: ${Math.floor(getDamageRange().min)}-${Math.floor(getDamageRange().max)}`,canvasWidth-150,canvasHeight-28); ctx.fillText(`🎯 Крит:${player.critChance}% | Уворот:${player.dodgeChance}%`,canvasWidth-190,canvasHeight-12); }
    
    // ОБНОВЛЕНИЕ
    function update() { updateMove(); updateMobs(); updateCamera(); updatePlayTime(); if(player.attackTimer>0) player.attackTimer--; if(player.superCooldown>0) player.superCooldown--; if(spawnTimer<=0) { if(mobs.length<MAX_MOBS) for(let i=0;i<2;i++) spawnMob(); spawnTimer=15; } else spawnTimer--; for(let i=0;i<messages.length;i++) if(messages[i].life) messages[i].life--; messages=messages.filter(m=>!m.life||m.life>0); }
    
    // УПРАВЛЕНИЕ
    function getWorldClick(cx,cy) { let rect=canvas.getBoundingClientRect(), sx=canvasWidth/rect.width, sy=canvasHeight/rect.height; return { x:(cx-rect.left)*sx+cameraX, y:(cy-rect.top)*sy+cameraY }; }
    canvas.addEventListener('click',(e)=>{ let w=getWorldClick(e.clientX,e.clientY); handleClick(w.x,w.y); });
    canvas.addEventListener('touchstart',(e)=>{ e.preventDefault(); let t=e.touches[0], w=getWorldClick(t.clientX,t.clientY); handleClick(w.x,w.y); });
    setInterval(()=>{ if(selectedMob&&selectedMob.hp>0&&Math.hypot(player.x-selectedMob.x,player.y-selectedMob.y)<=CLASSES[player.classType].range+20) playerAttack(); },2000);
    document.getElementById('superBtn').addEventListener('click',()=>useSuper());
    document.getElementById('hpBtn').addEventListener('click',()=>useHp());
    document.getElementById('mpBtn').addEventListener('click',()=>useMp());
    document.getElementById('statsBtn').addEventListener('click',()=>{ showStats=!showStats; showInventory=false; });
    document.getElementById('inventoryBtn').addEventListener('click',()=>{ showInventory=!showInventory; showStats=false; });
    window.addEventListener('keydown',(e)=>{ if(e.key==='e') useSuper(); if(e.key==='q') useHp(); if(e.key==='w') useMp(); if(e.key==='c') switchClass(); });
    
    // СТАРТ
    function init() { generateWorld(); player.x=safeZone.x+safeZone.width/2; player.y=safeZone.y+safeZone.height/2; player.hp=player.maxHp; player.mp=player.maxMp; updateGear(); for(let i=0;i<16;i++) spawnMob(); addMsg("✨ ДОБРО ПОЖАЛОВАТЬ! ПОЛНАЯ ВЕРСИЯ RPG ✨"); addMsg("🗡️ Нажмите на моба → автоатака раз в 2 сек"); addMsg("🌟 Суперспособность: 🌟 слева (КД 18 сек)"); addMsg("🏪 NPC: Торговец 🏪 | Лекарь 💚 | Банкир 🏦"); }
    init();
    
    function render() { drawWorld(); for(let m of mobs) drawMob(m); drawPlayer(); drawUI(); }
    function loop() { update(); render(); requestAnimationFrame(loop); }
    loop();
})();
</script>
</body>
</html>
