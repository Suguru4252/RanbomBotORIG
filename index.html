<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Rucoy Online 2D - NetErrror Build</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #0a0f1e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            touch-action: none; /* Для джойстика */
        }
        .game-container {
            background: #1a1f2e;
            padding: 10px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        canvas {
            display: block;
            margin: 0 auto;
            box-shadow: 0 0 0 2px #4a4e6b;
            border-radius: 8px;
            cursor: pointer;
        }
        .ui-panel {
            margin-top: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0f1219cc;
            backdrop-filter: blur(4px);
            padding: 8px 12px;
            border-radius: 40px;
            color: #ffd966;
            text-shadow: 0 0 2px black;
            font-weight: bold;
        }
        .stats {
            display: flex;
            gap: 20px;
            font-size: 14px;
        }
        .controls {
            display: flex;
            gap: 12px;
        }
        button {
            background: #2c2f3f;
            border: none;
            color: white;
            font-weight: bold;
            padding: 8px 16px;
            border-radius: 40px;
            font-family: monospace;
            font-size: 18px;
            box-shadow: 0 3px 0 #0a0c14;
            transition: 0.05s linear;
            touch-action: manipulation;
        }
        button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #0a0c14;
        }
        .joystick-area {
            position: fixed;
            bottom: 30px;
            left: 30px;
            width: 120px;
            height: 120px;
            background: rgba(0,0,0,0.4);
            border-radius: 60px;
            touch-action: none;
            z-index: 10;
        }
        .action-btns {
            position: fixed;
            bottom: 30px;
            right: 30px;
            display: flex;
            gap: 15px;
            z-index: 10;
        }
        .action-btn {
            width: 65px;
            height: 65px;
            background: #2c2f3fdd;
            backdrop-filter: blur(8px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            color: #ffaa44;
            border: 2px solid #ffcc77;
            box-shadow: 0 5px 0 #1a1c2a;
            touch-action: manipulation;
        }
        .action-btn:active {
            transform: translateY(2px);
        }
        @media (max-width: 700px) {
            .stats { font-size: 10px; gap: 8px; }
            button { padding: 4px 12px; font-size: 14px; }
        }
    </style>
</head>
<body>
<div>
    <div class="game-container">
        <canvas id="gameCanvas" width="800" height="480"></canvas>
        <div class="ui-panel">
            <div class="stats">
                <span>❤️ HP: <span id="hpVal">100</span>/<span id="maxHp">100</span></span>
                <span>⚔️ DMG: <span id="dmgVal">15-25</span></span>
                <span>🛡️ ARMOR: <span id="armorVal">10</span></span>
                <span>🌍 WORLD: <span id="worldName">Forest</span></span>
            </div>
            <div class="controls">
                <button id="resetBtn">⟳ RESPAWN</button>
            </div>
        </div>
    </div>

    <!-- Мобильные элементы управления -->
    <div id="joystickBase" class="joystick-area"></div>
    <div class="action-btns">
        <div id="attackBtn" class="action-btn">⚔️</div>
        <div id="healBtn" class="action-btn">💊</div>
    </div>
</div>

<script>
    (function(){
        // ---------- ПИКСЕЛЬНАЯ ГРАФИКА (стилизация спрайтов) ----------
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // ----- ИГРОВЫЕ МИРЫ (полная структура) -----
        const WORLDS = {
            forest: { name: "🌲 Forest", bg: "#2b5e3b", floor: "#3c8c40", mob: { name: "Goblin", hp: 45, dmg: 8, exp: 20, color: "#6b4c3b" } },
            desert: { name: "🏜️ Desert", bg: "#c9ae74", floor: "#e0b87a", mob: { name: "Scorpion", hp: 70, dmg: 12, exp: 35, color: "#b87c4f" } },
            castle: { name: "🏰 Castle", bg: "#4a5b6e", floor: "#6c7f8f", mob: { name: "Skeleton Knight", hp: 120, dmg: 18, exp: 60, color: "#b0b7c6" } }
        };
        
        // ----- ВСЯ БРОНЯ И ОРУЖИЕ (прогрессия) -----
        const ARMOR_SET = {
            cloth: { name: "Cloth Armor", def: 5, lvl: 1 },
            leather: { name: "Leather Armor", def: 12, lvl: 5 },
            iron: { name: "Iron Armor", def: 22, lvl: 12 },
            dragon: { name: "Dragon Scale", def: 38, lvl: 25 }
        };
        const WEAPONS = {
            dagger: { name: "Dagger", dmgMin: 8, dmgMax: 14, lvl: 1 },
            sword: { name: "Iron Sword", dmgMin: 15, dmgMax: 24, lvl: 5 },
            claymore: { name: "Claymore", dmgMin: 24, dmgMax: 38, lvl: 12 },
            dragonfang: { name: "Dragonfang", dmgMin: 40, dmgMax: 60, lvl: 25 }
        };
        
        // Состояние игрока
        let player = {
            x: 400, y: 240,
            hp: 100,
            maxHp: 100,
            level: 1,
            exp: 0,
            expToNext: 50,
            armorId: "cloth",
            weaponId: "dagger",
            worldKey: "forest"
        };
        
        // Текущий моб (спавн)
        let currentMob = null;
        let attackCooldown = 0;
        let invincibleFrames = 0;
        let lastMove = { x: 0, y: 0 };
        
        // Перемещение (клавиатура + джойстик)
        let moveVector = { x: 0, y: 0 };
        const MOVE_SPEED = 2.8;
        
        // Пиксельные спрайты (рисуем вручную)
        function drawPixelSprite(x, y, type, color, size=36) {
            ctx.save();
            ctx.imageSmoothingEnabled = false;
            ctx.fillStyle = color;
            ctx.shadowBlur = 0;
            // Стилизация: квадратный "пиксельный" персонаж
            ctx.fillRect(x-18, y-24, 36, 40);
            // глаза
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(x-10, y-16, 6, 6);
            ctx.fillRect(x+4, y-16, 6, 6);
            ctx.fillStyle = "#000000";
            ctx.fillRect(x-9, y-15, 4, 4);
            ctx.fillRect(x+5, y-15, 4, 4);
            if(type === "player"){
                ctx.fillStyle = "#ffaa66";
                ctx.fillRect(x-6, y-8, 12, 6); // улыбка
            } else {
                ctx.fillStyle = "#aa4444";
                ctx.fillRect(x-8, y-8, 16, 4);
            }
            // оружие/экипировка стилизация
            ctx.fillStyle = "#ccaaff";
            if(type === "player") ctx.fillRect(x+14, y-12, 6, 18);
            ctx.restore();
        }
        
        // Генерация моба для текущего мира
        function spawnMob(){
            const world = WORLDS[player.worldKey];
            if(!world) return;
            let baseHp = world.mob.hp + Math.floor(player.level * 1.5);
            let baseDmg = world.mob.dmg + Math.floor(player.level * 0.8);
            currentMob = {
                name: world.mob.name,
                hp: baseHp,
                maxHp: baseHp,
                dmg: baseDmg,
                exp: world.mob.exp + player.level * 2,
                x: 400 + (Math.random() - 0.5) * 200,
                y: 240 + (Math.random() - 0.5) * 120,
                color: world.mob.color
            };
        }
        
        // Обновление статов от экипировки
        function updateStatsFromGear(){
            const armor = ARMOR_SET[player.armorId];
            const weapon = WEAPONS[player.weaponId];
            let totalDef = armor.def;
            let dmgMin = weapon.dmgMin + Math.floor(player.level * 1.2);
            let dmgMax = weapon.dmgMax + Math.floor(player.level * 1.8);
            document.getElementById('armorVal').innerText = totalDef;
            document.getElementById('dmgVal').innerText = `${dmgMin}-${dmgMax}`;
            return { dmgMin, dmgMax, totalDef };
        }
        
        // Атака
        function playerAttack(){
            if(attackCooldown > 0) return false;
            if(!currentMob || currentMob.hp <= 0){
                spawnMob();
                if(!currentMob) return false;
            }
            const { dmgMin, dmgMax } = updateStatsFromGear();
            let damage = Math.floor(Math.random() * (dmgMax - dmgMin + 1) + dmgMin);
            currentMob.hp -= damage;
            attackCooldown = 15; // фреймы кулдауна
            
            // эффект текста урона
            ctx.font = "bold 20px monospace";
            ctx.fillStyle = "#ffaa66";
            ctx.shadowBlur = 0;
            ctx.fillText(`-${damage}`, currentMob.x, currentMob.y-25);
            
            if(currentMob.hp <= 0){
                // получение опыта
                let gainedExp = currentMob.exp;
                player.exp += gainedExp;
                // проверка уровня
                while(player.exp >= player.expToNext){
                    player.exp -= player.expToNext;
                    player.level++;
                    player.maxHp = 80 + player.level * 8;
                    player.hp = player.maxHp;
                    player.expToNext = 50 + player.level * 15;
                    // улучшение брони/оружия по уровням
                    if(player.level >= 25 && player.weaponId !== "dragonfang") player.weaponId = "dragonfang";
                    else if(player.level >= 12 && player.weaponId !== "claymore") player.weaponId = "claymore";
                    else if(player.level >= 5 && player.weaponId !== "sword") player.weaponId = "sword";
                    
                    if(player.level >= 25 && player.armorId !== "dragon") player.armorId = "dragon";
                    else if(player.level >= 12 && player.armorId !== "iron") player.armorId = "iron";
                    else if(player.level >= 5 && player.armorId !== "leather") player.armorId = "leather";
                    
                    updateStatsFromGear();
                }
                spawnMob();
            }
            return true;
        }
        
        function healPlayer(){
            if(player.hp < player.maxHp){
                player.hp = Math.min(player.maxHp, player.hp + 25);
            }
        }
        
        function damagePlayer(amount){
            if(invincibleFrames > 0) return;
            let armor = ARMOR_SET[player.armorId].def;
            let reduced = Math.max(1, amount - Math.floor(armor/3));
            player.hp -= reduced;
            invincibleFrames = 20;
            if(player.hp <= 0){
                player.hp = player.maxHp;
                player.exp = Math.floor(player.exp * 0.9);
                spawnMob();
                player.x = 400; player.y = 240;
            }
        }
        
        // Обновление движения и боя моба
        function updateGame(){
            if(attackCooldown > 0) attackCooldown--;
            if(invincibleFrames > 0) invincibleFrames--;
            
            // движение игрока
            let newX = player.x + moveVector.x * MOVE_SPEED;
            let newY = player.y + moveVector.y * MOVE_SPEED;
            player.x = Math.min(Math.max(newX, 40), canvas.width-40);
            player.y = Math.min(Math.max(newY, 40), canvas.height-40);
            
            if(currentMob && currentMob.hp > 0){
                // движение моба к игроку
                let dx = player.x - currentMob.x;
                let dy = player.y - currentMob.y;
                let len = Math.hypot(dx,dy);
                if(len > 5){
                    let step = Math.min(1.2, len/15);
                    currentMob.x += (dx/len)*step;
                    currentMob.y += (dy/len)*step;
                }
                // атака моба
                if(len < 45 && attackCooldown <= 5){
                    let mobDmg = currentMob.dmg;
                    damagePlayer(mobDmg);
                }
            } else if(!currentMob || currentMob.hp <= 0){
                spawnMob();
            }
        }
        
        // Смена миров через кнопки (+ для полноты интерфейса)
        function cycleWorld(){
            const worlds = Object.keys(WORLDS);
            let idx = worlds.indexOf(player.worldKey);
            let next = (idx+1) % worlds.length;
            player.worldKey = worlds[next];
            document.getElementById('worldName').innerText = WORLDS[player.worldKey].name;
            spawnMob();
        }
        
        // Отрисовка всего (пиксельный стиль)
        function render(){
            const world = WORLDS[player.worldKey];
            ctx.fillStyle = world.bg;
            ctx.fillRect(0,0,canvas.width,canvas.height);
            // пол тайлы
            for(let i=0;i<20;i++){
                ctx.fillStyle = world.floor;
                ctx.fillRect((i*40)%canvas.width, Math.floor(i/6)*40, 38, 38);
            }
            // рисуем моба
            if(currentMob && currentMob.hp > 0){
                drawPixelSprite(currentMob.x, currentMob.y, "mob", currentMob.color);
                ctx.fillStyle = "#ff0000";
                ctx.fillRect(currentMob.x-25, currentMob.y-38, 50, 6);
                ctx.fillStyle = "#00aa44";
                let percent = currentMob.hp/currentMob.maxHp;
                ctx.fillRect(currentMob.x-25, currentMob.y-38, 50*percent, 6);
                ctx.fillStyle = "#ffffff";
                ctx.font = "bold 12px monospace";
                ctx.fillText(currentMob.name, currentMob.x-30, currentMob.y-42);
            }
            // игрок
            drawPixelSprite(player.x, player.y, "player", "#7c6e65");
            // полоска хп игрока
            ctx.fillStyle = "#660000";
            ctx.fillRect(player.x-30, player.y-45, 60, 8);
            ctx.fillStyle = "#ee6644";
            ctx.fillRect(player.x-30, player.y-45, 60*(player.hp/player.maxHp), 8);
            
            ctx.fillStyle = "#f9f3c1";
            ctx.font = "bold 14px monospace";
            ctx.fillText(`Lv.${player.level}  Exp:${player.exp}/${player.expToNext}`, 12, 30);
            ctx.fillStyle = "#eedd99";
            ctx.fillText(`⚔️ ${WEAPONS[player.weaponId].name}  🛡️ ${ARMOR_SET[player.armorId].name}`, 12, 55);
            
            document.getElementById('hpVal').innerText = player.hp;
            document.getElementById('maxHp').innerText = player.maxHp;
        }
        
        // ----- УПРАВЛЕНИЕ (Mobile Joystick + кнопки) -----
        let joystickActive = false;
        const joystickBase = document.getElementById('joystickBase');
        function handleTouchStart(e){
            e.preventDefault();
            joystickActive = true;
        }
        function handleTouchMove(e){
            if(!joystickActive) return;
            e.preventDefault();
            const rect = joystickBase.getBoundingClientRect();
            const centerX = rect.left + rect.width/2;
            const centerY = rect.top + rect.height/2;
            let touch = e.touches[0];
            let dx = touch.clientX - centerX;
            let dy = touch.clientY - centerY;
            let len = Math.hypot(dx,dy);
            let maxRad = rect.width/2;
            if(len > maxRad) { dx = dx/len * maxRad; dy = dy/len * maxRad; }
            moveVector.x = dx / (maxRad/2);
            moveVector.y = dy / (maxRad/2);
            if(Math.abs(moveVector.x) < 0.15) moveVector.x = 0;
            if(Math.abs(moveVector.y) < 0.15) moveVector.y = 0;
        }
        function handleTouchEnd(e){
            joystickActive = false;
            moveVector.x = 0; moveVector.y = 0;
        }
        joystickBase.addEventListener('touchstart', handleTouchStart);
        joystickBase.addEventListener('touchmove', handleTouchMove);
        joystickBase.addEventListener('touchend', handleTouchEnd);
        
        document.getElementById('attackBtn').addEventListener('touchstart', (e) => { e.preventDefault(); playerAttack(); });
        document.getElementById('healBtn').addEventListener('touchstart', (e) => { e.preventDefault(); healPlayer(); });
        document.getElementById('resetBtn').addEventListener('click', () => { player.hp = player.maxHp; spawnMob(); });
        // доп. смена мира долгим нажатием на heal (для удобства)
        let worldTimer;
        document.getElementById('healBtn').addEventListener('touchstart', () => { worldTimer = setTimeout(() => { cycleWorld(); }, 500); });
        document.getElementById('healBtn').addEventListener('touchend', () => { clearTimeout(worldTimer); });
        // клавиатура для ПК
        window.addEventListener('keydown', (e) => {
            const key = e.key;
            if(key === 'ArrowUp') moveVector.y = -1;
            if(key === 'ArrowDown') moveVector.y = 1;
            if(key === 'ArrowLeft') moveVector.x = -1;
            if(key === 'ArrowRight') moveVector.x = 1;
            if(key === ' ') playerAttack();
            if(key === 'h') healPlayer();
            if(key === 'w') cycleWorld();
        });
        window.addEventListener('keyup', (e) => {
            const key = e.key;
            if(key === 'ArrowUp' && moveVector.y === -1) moveVector.y = 0;
            if(key === 'ArrowDown' && moveVector.y === 1) moveVector.y = 0;
            if(key === 'ArrowLeft' && moveVector.x === -1) moveVector.x = 0;
            if(key === 'ArrowRight' && moveVector.x === 1) moveVector.x = 0;
        });
        
        // Инициализация
        spawnMob();
        updateStatsFromGear();
        function gameLoop(){
            updateGame();
            render();
            requestAnimationFrame(gameLoop);
        }
        gameLoop();
    })();
</script>
</body>
</html>
