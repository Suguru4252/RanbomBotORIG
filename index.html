<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Rucoy Online - Мобильная версия</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0a0c15;
            overflow: hidden;
            font-family: 'Courier New', 'Monaco', monospace;
            touch-action: none;
        }

        canvas {
            display: block;
            cursor: crosshair;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* ВЕРХНЯЯ ПАНЕЛЬ - компактная для мобильных */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.85);
            padding: 6px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 200;
            border-bottom: 1px solid #ffd966;
            flex-wrap: wrap;
            gap: 5px;
        }

        .stats-top {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .hp-stat, .mp-stat {
            display: flex;
            align-items: center;
            gap: 4px;
            background: rgba(0,0,0,0.6);
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
        }
        .hp-stat span:first-child { color: #ff6a6a; font-size: 14px; }
        .mp-stat span:first-child { color: #6a9eff; font-size: 14px; }
        .hp-stat span:last-child, .mp-stat span:last-child { color: #fff; font-size: 12px; }

        .level-stat {
            background: #2c2f3f;
            padding: 3px 12px;
            border-radius: 20px;
            color: #ffd966;
            font-weight: bold;
            font-size: 12px;
        }

        .xp-bar-top {
            width: 120px;
            height: 8px;
            background: #2a2a2a;
            border-radius: 4px;
            overflow: hidden;
        }
        .xp-fill-top {
            height: 100%;
            background: linear-gradient(90deg, #6a9eff, #3a6eff);
            width: 0%;
        }

        .top-buttons {
            display: flex;
            gap: 8px;
        }
        .top-buttons button {
            background: #2c2f3f;
            border: 1px solid #ffd966;
            color: #ffd966;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
        }

        /* КНОПКИ КЛАССОВ - горизонтально */
        .class-bar {
            position: fixed;
            top: 55px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 5px;
            background: rgba(0,0,0,0.6);
            z-index: 200;
            flex-wrap: wrap;
        }
        .class-btn {
            background: #2c2f3f;
            border: 1px solid #ffd966;
            color: #ffd966;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
        }
        .class-btn.active { background: #6a3e9e; }

        /* НИЖНЯЯ ПАНЕЛЬ - горизонтальная для пальцев */
        .bottom-panel {
            position: fixed;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            background: rgba(0,0,0,0.8);
            padding: 8px 20px;
            border-radius: 50px;
            border: 1px solid #ffd966;
            z-index: 200;
        }

        .bottom-btn {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: #2c2f3f;
            border: 2px solid #ffd966;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 24px;
            position: relative;
        }
        .bottom-btn:active { transform: scale(0.95); }
        .bottom-btn span { font-size: 8px; color: #ffd966; margin-top: 2px; }
        .hotkey-hint {
            position: absolute;
            bottom: -18px;
            font-size: 8px;
            color: #aaa;
            background: rgba(0,0,0,0.6);
            padding: 1px 4px;
            border-radius: 8px;
        }

        /* ИНВЕНТАРЬ - на весь экран, скролл */
        .inventory-panel {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.96);
            border: none;
            padding: 15px;
            display: none;
            flex-direction: column;
            z-index: 500;
            overflow-y: auto;
        }

        .inventory-header {
            display: flex;
            justify-content: space-between;
            color: #ffd966;
            font-size: 18px;
            padding-bottom: 10px;
            border-bottom: 1px solid #ffd966;
            margin-bottom: 15px;
        }

        .inventory-content {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .inventory-slots {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
        }

        .inv-slot {
            background: rgba(0,0,0,0.6);
            border: 1px solid #ffd966;
            border-radius: 8px;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            position: relative;
        }

        .equipment-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            background: rgba(0,0,0,0.5);
            border-radius: 12px;
            padding: 10px;
        }
        .equipment-slot {
            background: rgba(0,0,0,0.5);
            border: 1px solid #ffd966;
            border-radius: 8px;
            padding: 8px;
            text-align: center;
            flex: 1;
            min-width: 70px;
        }

        /* СТАТИСТИКА */
        .stats-panel {
            position: fixed;
            right: 10px;
            top: 100px;
            background: rgba(0,0,0,0.92);
            border: 1px solid #ffd966;
            border-radius: 12px;
            padding: 12px;
            width: 200px;
            display: none;
            z-index: 300;
            font-size: 11px;
        }

        /* ЛАВКА */
        .shop-panel {
            position: fixed;
            left: 10px;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.96);
            border: 1px solid #ffd966;
            border-radius: 16px;
            padding: 15px;
            display: none;
            z-index: 400;
            max-height: 80vh;
            overflow-y: auto;
        }

        .log-message {
            position: fixed;
            bottom: 90px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            border-left: 3px solid #ffd966;
            padding: 5px 10px;
            color: #ffd966;
            font-size: 10px;
            border-radius: 4px;
            animation: fadeOut 2.5s forwards;
            pointer-events: none;
            z-index: 200;
            max-width: 70%;
        }

        .damage-number {
            position: fixed;
            font-weight: bold;
            font-size: 18px;
            color: #ffaa44;
            text-shadow: 1px 1px 0 #000;
            pointer-events: none;
            animation: floatUp 0.8s ease-out forwards;
            z-index: 400;
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-40px); }
        }
        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; }
        }

        /* Мобильные стили */
        @media (max-width: 700px) {
            .bottom-btn { width: 50px; height: 50px; font-size: 22px; }
            .hp-stat, .mp-stat { padding: 2px 8px; }
            .level-stat { padding: 2px 10px; font-size: 11px; }
            .class-btn { padding: 3px 10px; font-size: 10px; }
            .inventory-slots { grid-template-columns: repeat(5, 1fr); }
        }

        @media (max-width: 500px) {
            .bottom-panel { gap: 10px; padding: 6px 15px; }
            .bottom-btn { width: 45px; height: 45px; font-size: 20px; }
            .stats-top { gap: 5px; }
            .xp-bar-top { width: 80px; }
        }

        @media (orientation: portrait) {
            .top-bar { padding: 5px 8px; }
            .class-bar { top: 48px; }
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <!-- ВЕРХНЯЯ ПАНЕЛЬ -->
    <div class="top-bar">
        <div class="stats-top">
            <div class="level-stat">Lv.<span id="topLevel">1</span></div>
            <div class="hp-stat"><span>❤️</span><span id="topHp">120/120</span></div>
            <div class="mp-stat"><span>💙</span><span id="topMp">60/60</span></div>
            <div class="xp-bar-top"><div class="xp-fill-top" id="topXpFill"></div></div>
        </div>
        <div class="top-buttons">
            <div style="color:#ffd966; font-size:12px;">💰 <span id="topGold">0</span></div>
            <button id="statsBtn">📊</button>
            <button id="invTopBtn">🎒</button>
        </div>
    </div>

    <!-- КНОПКИ КЛАССОВ -->
    <div class="class-bar">
        <button id="classKnightBtn" class="class-btn active">🛡️ Рыцарь</button>
        <button id="classArcherBtn" class="class-btn">🏹 Лучник</button>
        <button id="classMageBtn" class="class-btn">🔮 Маг</button>
    </div>

    <!-- НИЖНЯЯ ПАНЕЛЬ -->
    <div class="bottom-panel">
        <div class="bottom-btn" id="healPotionBtn">
            🧪<span>Леч</span>
            <div class="hotkey-hint">1</div>
        </div>
        <div class="bottom-btn" id="manaPotionBtn">
            💙<span>Мана</span>
            <div class="hotkey-hint">2</div>
        </div>
        <div class="bottom-btn" id="superSkillBtn">
            ⚔️<span>Супер</span>
            <div class="hotkey-hint">3</div>
        </div>
    </div>

    <!-- ИНВЕНТАРЬ -->
    <div class="inventory-panel" id="inventoryPanel">
        <div class="inventory-header">
            <span>🎒 ИНВЕНТАРЬ</span>
            <span>💰 <span id="invGold">0</span></span>
        </div>
        <div class="inventory-content">
            <div class="inventory-slots" id="inventorySlots"></div>
            <div class="equipment-row" id="equipmentSlots"></div>
            <div style="display:flex; gap:10px; justify-content:center;">
                <div style="background:#2c2f3f; border-radius:8px; padding:8px; text-align:center; flex:1;">
                    <div>🧪 Быстрый HP</div>
                    <div id="quickHealDisplay" style="font-size:10px;">-</div>
                </div>
                <div style="background:#2c2f3f; border-radius:8px; padding:8px; text-align:center; flex:1;">
                    <div>💙 Быстрый MP</div>
                    <div id="quickManaDisplay" style="font-size:10px;">-</div>
                </div>
            </div>
        </div>
        <button id="closeInv" style="margin-top:15px; background:#4a3e2a; color:#ffd966; border:none; padding:10px; border-radius:20px;">Закрыть</button>
    </div>

    <!-- СТАТИСТИКА -->
    <div class="stats-panel" id="statsPanel">
        <div style="color:#ffd966; margin-bottom:10px;">📊 ХАРАКТЕРИСТИКИ</div>
        <div id="statsContent"></div>
        <button id="closeStats" style="margin-top:10px; width:100%; background:#4a3e2a; color:#ffd966; border:none; padding:5px; border-radius:15px;">Закрыть</button>
    </div>

    <!-- ЛАВКА -->
    <div class="shop-panel" id="shopPanel">
        <div style="color:#ffd966; font-size:18px; margin-bottom:10px; text-align:center;">🏪 ТОРГОВЕЦ</div>
        <div id="shopItems"></div>
        <button id="closeShop" style="margin-top:15px; width:100%; background:#4a3e2a; color:#ffd966; border:none; padding:8px; border-radius:20px;">Закрыть</button>
    </div>

    <script>
        // ==================== RUCOY ONLINE - МОБИЛЬНАЯ ВЕРСИЯ ====================
        
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        const TILE_SIZE = 44;
        const WORLD_WIDTH = 45;
        const WORLD_HEIGHT = 45;
        
        let camera = { x: 0, y: 0 };
        let selectedMonsterId = null;
        let currentTargetMonster = null;
        let targetTileX = null, targetTileY = null;
        
        let quickHealPotion = null;
        let quickManaPotion = null;
        let lastPotionTime = 0;
        const POTION_COOLDOWN = 3;
        
        let worldMap = [];
        let worldBiome = [];
        let safeZone = { x: 22, y: 22, radius: 4 };
        
        function generateWorld() {
            for (let y = 0; y < WORLD_HEIGHT; y++) {
                worldMap[y] = [];
                worldBiome[y] = [];
                for (let x = 0; x < WORLD_WIDTH; x++) {
                    if (x === 0 || y === 0 || x === WORLD_WIDTH - 1 || y === WORLD_HEIGHT - 1) {
                        worldMap[y][x] = 1;
                        worldBiome[y][x] = 'wall';
                    } 
                    else if (Math.abs(x - safeZone.x) <= safeZone.radius && Math.abs(y - safeZone.y) <= safeZone.radius) {
                        worldMap[y][x] = 0;
                        worldBiome[y][x] = 'shop';
                    }
                    else if (Math.sin(x * 0.2) * Math.cos(y * 0.2) < -0.5) {
                        worldMap[y][x] = 1;
                        worldBiome[y][x] = 'water';
                    }
                    else if (Math.sin(x * 0.3) * Math.cos(y * 0.3) > 0.6) {
                        worldMap[y][x] = 1;
                        worldBiome[y][x] = 'mountain';
                    }
                    else {
                        worldMap[y][x] = 0;
                        worldBiome[y][x] = 'grass';
                    }
                }
            }
            for (let dy = -safeZone.radius; dy <= safeZone.radius; dy++) {
                for (let dx = -safeZone.radius; dx <= safeZone.radius; dx++) {
                    let nx = safeZone.x + dx;
                    let ny = safeZone.y + dy;
                    if (nx >= 0 && nx < WORLD_WIDTH && ny >= 0 && ny < WORLD_HEIGHT) {
                        worldMap[ny][nx] = 0;
                        worldBiome[ny][nx] = 'shop';
                    }
                }
            }
        }
        
        let player = {
            tileX: 22, tileY: 22, x: 22 * TILE_SIZE, y: 22 * TILE_SIZE,
            targetTileX: 22, targetTileY: 22,
            level: 1, xp: 0, maxHp: 120, hp: 120, maxMp: 60, mp: 60,
            baseAttack: 22, baseDefense: 12, className: 'knight', gold: 500,
            inventory: [], equipment: { weapon: null, armor: null, helmet: null },
            
            get attack() {
                let bonus = this.className === 'knight' ? 6 : (this.className === 'archer' ? 8 : 7);
                if (this.equipment.weapon) bonus += this.equipment.weapon.damage || 0;
                return this.baseAttack + bonus;
            },
            get defense() {
                let bonus = this.baseDefense;
                if (this.equipment.armor) bonus += this.equipment.armor.defense || 0;
                return bonus;
            },
            
            moveToTile(tx, ty) {
                if (this.hp <= 0) return false;
                if (tx < 0 || tx >= WORLD_WIDTH || ty < 0 || ty >= WORLD_HEIGHT) return false;
                if (worldMap[ty][tx] === 1) return false;
                for (let m of monsters) if (m.alive && m.tileX === tx && m.tileY === ty) return false;
                this.targetTileX = tx;
                this.targetTileY = ty;
                targetTileX = tx;
                targetTileY = ty;
                setTimeout(() => { targetTileX = null; targetTileY = null; }, 400);
                return true;
            },
            
            updateMovement(deltaTime) {
                if (this.tileX !== this.targetTileX || this.tileY !== this.targetTileY) {
                    let targetX = this.targetTileX * TILE_SIZE;
                    let targetY = this.targetTileY * TILE_SIZE;
                    let dx = targetX - this.x, dy = targetY - this.y;
                    let dist = Math.hypot(dx, dy);
                    let step = 220 * deltaTime;
                    if (dist < step) {
                        this.x = targetX; this.y = targetY;
                        this.tileX = this.targetTileX; this.tileY = this.targetTileY;
                    } else {
                        let angle = Math.atan2(dy, dx);
                        this.x += Math.cos(angle) * step;
                        this.y += Math.sin(angle) * step;
                    }
                }
            },
            
            takeDamage(damage) {
                let actual = Math.max(1, Math.floor(damage - this.defense * 0.3));
                this.hp = Math.max(0, this.hp - actual);
                if (this.hp <= 0) this.die();
                return actual;
            },
            
            die() {
                addLog('💀 ВЫ ПОГИБЛИ! Возрождение...');
                this.hp = 0;
                setTimeout(() => {
                    this.hp = this.maxHp; this.mp = this.maxMp;
                    this.tileX = safeZone.x; this.tileY = safeZone.y;
                    this.targetTileX = safeZone.x; this.targetTileY = safeZone.y;
                    this.x = this.tileX * TILE_SIZE; this.y = this.tileY * TILE_SIZE;
                    currentTargetMonster = null;
                    addLog('🌟 Вы возродились');
                    updateUI();
                }, 3000);
            },
            
            addExp(amount) {
                this.xp += amount;
                let needXP = 100 + (this.level - 1) * 50;
                while (this.xp >= needXP) {
                    this.xp -= needXP;
                    this.levelUp();
                    needXP = 100 + (this.level - 1) * 50;
                }
                updateUI();
            },
            
            levelUp() {
                this.level++;
                this.maxHp += 30;
                this.hp = this.maxHp;
                this.maxMp += 15;
                this.mp = this.maxMp;
                this.baseAttack += 6;
                this.baseDefense += 3;
                addLog(`✨ УРОВЕНЬ ${this.level}! ✨`);
                updateUI();
            },
            
            attackMonster(monster) {
                let now = Date.now() / 1000;
                if (now - this.lastAttack < this.attackSpeed) return false;
                let dist = Math.abs(this.tileX - monster.tileX) + Math.abs(this.tileY - monster.tileY);
                if (this.className === 'knight' && dist > 1) return false;
                if ((this.className === 'archer' || this.className === 'mage') && dist > 12) return false;
                
                let damage = this.attack - monster.defense + Math.random() * 20;
                damage = Math.max(5, Math.floor(damage));
                monster.hp -= damage;
                this.lastAttack = now;
                addLog(`⚔️ Вы нанесли ${damage} урона ${monster.name}`);
                showDamage(monster.x, monster.y, damage);
                
                if (monster.hp <= 0) {
                    monster.die(this);
                    this.addExp(monster.xp);
                    let goldDrop = Math.floor(monster.goldMin + Math.random() * (monster.goldMax - monster.goldMin));
                    this.gold += goldDrop;
                    addLog(`💰 +${goldDrop} золота!`);
                    if (currentTargetMonster === monster) currentTargetMonster = null;
                }
                updateUI();
                return true;
            },
            attackSpeed: 0.85, lastAttack: 0
        };
        
        // МОНСТРЫ
        let monsters = [];
        let nextMonsterId = 1;
        
        const MONSTER_TYPES = {
            goblin: { name: 'Гоблин', hp: 45, attack: 16, defense: 3, xp: 35, goldMin: 8, goldMax: 18, size: 30, color: '#6b8c42', aggroRange: 5, attackRange: 1, speed: 1.5 },
            wolf: { name: 'Волк', hp: 55, attack: 20, defense: 4, xp: 45, goldMin: 12, goldMax: 25, size: 30, color: '#8a8a6a', aggroRange: 6, attackRange: 1, speed: 2 },
            skeleton: { name: 'Скелет', hp: 75, attack: 24, defense: 6, xp: 60, goldMin: 15, goldMax: 30, size: 32, color: '#bdb28c', aggroRange: 5, attackRange: 1, speed: 1.2 },
            orc: { name: 'Орк', hp: 110, attack: 30, defense: 8, xp: 95, goldMin: 25, goldMax: 45, size: 36, color: '#7a6a4a', aggroRange: 5, attackRange: 1, speed: 1 },
            minotaur: { name: 'Минотавр', hp: 180, attack: 40, defense: 12, xp: 150, goldMin: 40, goldMax: 70, size: 40, color: '#9b5e2c', aggroRange: 5, attackRange: 1, speed: 0.9 }
        };
        
        class Monster {
            constructor(type, tileX, tileY) {
                let d = MONSTER_TYPES[type];
                this.id = nextMonsterId++;
                this.type = type;
                this.name = d.name;
                this.hp = d.hp;
                this.maxHp = d.hp;
                this.attack = d.attack;
                this.defense = d.defense;
                this.xp = d.xp;
                this.goldMin = d.goldMin;
                this.goldMax = d.goldMax;
                this.size = d.size;
                this.color = d.color;
                this.aggroRange = d.aggroRange;
                this.attackRange = d.attackRange;
                this.speed = d.speed;
                this.tileX = tileX;
                this.tileY = tileY;
                this.x = tileX * TILE_SIZE;
                this.y = tileY * TILE_SIZE;
                this.alive = true;
                this.aggro = false;
                this.attackCooldown = 0;
                this.moveCooldown = 0;
            }
            
            canMoveTo(tx, ty) {
                if (tx < 0 || tx >= WORLD_WIDTH || ty < 0 || ty >= WORLD_HEIGHT) return false;
                if (worldMap[ty][tx] === 1) return false;
                if (Math.abs(tx - safeZone.x) <= safeZone.radius && Math.abs(ty - safeZone.y) <= safeZone.radius) return false;
                if (player.tileX === tx && player.tileY === ty) return true;
                for (let m of monsters) if (m !== this && m.alive && m.tileX === tx && m.tileY === ty) return false;
                return true;
            }
            
            moveTowards(ptx, pty) {
                let dx = ptx - this.tileX, dy = pty - this.tileY;
                let moves = [];
                if (dx > 0) moves.push({ tx: this.tileX + 1, ty: this.tileY });
                if (dx < 0) moves.push({ tx: this.tileX - 1, ty: this.tileY });
                if (dy > 0) moves.push({ tx: this.tileX, ty: this.tileY + 1 });
                if (dy < 0) moves.push({ tx: this.tileX, ty: this.tileY - 1 });
                for (let m of moves) {
                    if (this.canMoveTo(m.tx, m.ty)) {
                        this.tileX = m.tx; this.tileY = m.ty;
                        this.x = this.tileX * TILE_SIZE; this.y = this.tileY * TILE_SIZE;
                        return true;
                    }
                }
                return false;
            }
            
            update(deltaTime, p) {
                if (!this.alive) return;
                if (this.attackCooldown > 0) this.attackCooldown -= deltaTime;
                if (this.moveCooldown > 0) this.moveCooldown -= deltaTime;
                let dist = Math.abs(this.tileX - p.tileX) + Math.abs(this.tileY - p.tileY);
                if (dist <= this.aggroRange) this.aggro = true;
                if (dist > this.aggroRange + 2) this.aggro = false;
                if (this.aggro && p.hp > 0) {
                    if (dist > this.attackRange && this.moveCooldown <= 0) {
                        this.moveTowards(p.tileX, p.tileY);
                        this.moveCooldown = 0.4 / this.speed;
                    } else if (dist <= this.attackRange && this.attackCooldown <= 0) {
                        let dmg = Math.max(5, this.attack - p.defense + Math.random() * 15);
                        let actual = p.takeDamage(Math.floor(dmg));
                        this.attackCooldown = 1.2;
                        addLog(`💔 ${this.name} атакует! -${actual} HP`);
                        showDamage(p.x, p.y, actual);
                        updateUI();
                    }
                }
            }
            
            die(killer) { this.alive = false; setTimeout(() => this.respawn(), 8000); }
            
            respawn() {
                this.hp = this.maxHp; this.alive = true; this.aggro = false;
                for (let a = 0; a < 50; a++) {
                    let tx = 5 + Math.random() * (WORLD_WIDTH - 10);
                    let ty = 5 + Math.random() * (WORLD_HEIGHT - 10);
                    if (worldMap[ty][tx] === 0 && Math.abs(tx - safeZone.x) > 4) {
                        let clash = false;
                        for (let m of monsters) if (m !== this && m.alive && m.tileX === tx && m.tileY === ty) clash = true;
                        if (!clash && !(player.tileX === tx && player.tileY === ty)) {
                            this.tileX = tx; this.tileY = ty;
                            this.x = tx * TILE_SIZE; this.y = ty * TILE_SIZE;
                            return;
                        }
                    }
                }
            }
        }

                    if (worldMap[ty][tx] === 0 && Math.abs(tx - safeZone.x) > 4) {

                        for (let m of monsters) if (m.tileX === tx && m.tileY === ty) clash = true;

                    }
                }
            }
        }

        function useHealPotion() {

            let potion = quickHealPotion || player.inventory.find(i => i.type === 'consumable' && i.heal);
            if (!potion) { addLog('🧪 Нет зелий лечения!'); return; }
            player.hp = Math.min(player.maxHp, player.hp + potion.heal);
            potion.count--;
            if (potion.count <= 0) {
                let idx = player.inventory.indexOf(potion);
                if (idx !== -1) player.inventory.splice(idx, 1);
                if (quickHealPotion === potion) quickHealPotion = null;
            }
            lastPotionTime = now;
            addLog(`💚 Вылечено +${potion.heal} HP`);
            updateUI(); updateInventoryUI();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            camera.x = player.x - canvas.width / 2;
            camera.y = player.y - canvas.height / 2;
            camera.x = Math.max(0, Math.min(camera.x, WORLD_WIDTH * TILE_SIZE - canvas.width));
            camera.y = Math.max(0, Math.min(camera.y, WORLD_HEIGHT * TILE_SIZE - canvas.height));
            
            let startX = Math.max(0, Math.floor(camera.x / TILE_SIZE));
            let startY = Math.max(0, Math.floor(camera.y / TILE_SIZE));
            let endX = Math.min(WORLD_WIDTH, startX + Math.ceil(canvas.width / TILE_SIZE) + 2);
            let endY = Math.min(WORLD_HEIGHT, startY + Math.ceil(canvas.height / TILE_SIZE) + 2);
            
            for (let y = startY; y < endY; y++) {
                for (let x = startX; x < endX; x++) {
                    let sx = x * TILE_SIZE - camera.x;
                    let sy = y * TILE_SIZE - camera.y;
                    let biome = worldBiome[y][x];
                    if (worldMap[y][x] === 1) {
                        if (biome === 'water') ctx.fillStyle = '#4a7a9a';
                        else if (biome === 'mountain') ctx.fillStyle = '#8a8a8a';
                        else ctx.fillStyle = '#5a5a5a';
                        ctx.fillRect(sx, sy, TILE_SIZE - 1, TILE_SIZE - 1);
                    } else {
                        if (biome === 'grass') ctx.fillStyle = '#5cae4a';
                        else if (biome === 'shop') ctx.fillStyle = '#8aae6a';
                        else ctx.fillStyle = '#5c6e4a';
                        ctx.fillRect(sx, sy, TILE_SIZE - 1, TILE_SIZE - 1);
                        if (biome === 'grass') for (let i = 0; i < 5; i++) {
                            ctx.fillStyle = '#6cbe5a';
                            ctx.fillRect(sx + 6 + i * 6, sy + TILE_SIZE - 10, 2, 6);
                        }
                    }
                    if (x === safeZone.x && y === safeZone.y) {
                        ctx.fillStyle = '#ffaa66';
                        ctx.font = `${Math.min(24, TILE_SIZE - 10)}px monospace`;
                        ctx.fillText('🏪', sx + 12, sy + 34);
                    }
                    if (targetTileX === x && targetTileY === y) {
                        ctx.strokeStyle = '#ffdd88';
                        ctx.lineWidth = 2;
                        ctx.strokeRect(sx + 2, sy + 2, TILE_SIZE - 5, TILE_SIZE - 5);
                    }
                }
            }
            
            for (let m of monsters) {
                if (!m.alive) continue;
                let sx = m.x - camera.x - m.size/2;
                let sy = m.y - camera.y - m.size/2;
                ctx.fillStyle = m.color;
                ctx.fillRect(sx, sy, m.size, m.size);
                ctx.fillStyle = '#000';
                ctx.fillRect(sx + m.size/2 - 6, sy + m.size/2 - 4, 4, 4);
                ctx.fillRect(sx + m.size/2 + 2, sy + m.size/2 - 4, 4, 4);
                let hpP = m.hp / m.maxHp;
                ctx.fillStyle = '#a13333';
                ctx.fillRect(sx, sy - 6, m.size, 4);
                ctx.fillStyle = '#d65c5c';
                ctx.fillRect(sx, sy - 6, m.size * hpP, 4);
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 9px monospace';
                ctx.fillText(m.name, sx + 4, sy - 2);
                if (selectedMonsterId === m.id) {
                    ctx.strokeStyle = '#ff4444';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(sx - 1, sy - 1, m.size + 2, m.size + 2);
                }
            }
            
            let psx = player.x - camera.x - 18;
            let psy = player.y - camera.y - 18;
            if (player.className === 'knight') {
                ctx.fillStyle = '#3a6ea5';
                ctx.fillRect(psx + 4, psy + 6, 28, 24);
                ctx.fillStyle = '#f9c87a';
                ctx.beginPath();
                ctx.arc(psx + 18, psy + 12, 8, 0, Math.PI * 2);
                ctx.fill();
            } else if (player.className === 'archer') {
                ctx.fillStyle = '#6f9e4f';
                ctx.fillRect(psx + 4, psy + 6, 28, 24);
                ctx.fillStyle = '#f9c87a';
                ctx.beginPath();
                ctx.arc(psx + 18, psy + 12, 8, 0, Math.PI * 2);
                ctx.fill();
            } else {
                ctx.fillStyle = '#a367c2';
                ctx.fillRect(psx + 4, psy + 6, 28, 24);
                ctx.fillStyle = '#f9c87a';
                ctx.beginPath();
                ctx.arc(psx + 18, psy + 12, 8, 0, Math.PI * 2);
                ctx.fill();
            }
            let hpP = player.hp / player.maxHp;
            ctx.fillStyle = '#a13333';
            ctx.fillRect(psx, psy - 6, 36, 4);
            ctx.fillStyle = '#d65c5c';
            ctx.fillRect(psx, psy - 6, 36 * hpP, 4);
        }
        
        function handleCanvasClick(e) {
            let rect = canvas.getBoundingClientRect();
            let clickX = (e.clientX - rect.left) * (canvas.width / rect.width);
            let clickY = (e.clientY - rect.top) * (canvas.height / rect.height);

            if (clicked) {
                selectedMonsterId = clicked.id;
                currentTargetMonster = clicked;
                player.attackMonster(clicked);
            } else {
                if (tileX === safeZone.x && tileY === safeZone.y) openShop();

        let lastTimestamp = 0;
        function gameLoop(timestamp) {
            let dt = Math.min(0.033, (timestamp - lastTimestamp) / 1000);
            lastTimestamp = timestamp;
            player.updateMovement(dt);
            for (let m of monsters) m.update(dt, player);
            draw();
            requestAnimationFrame(gameLoop);
        }
        requestAnimationFrame(gameLoop);
        addLog('⚔️ Добро пожаловать! ⚔️');
        addLog('👆 Нажми на монстра - атака | На землю - движение');
    </script>
</body>
