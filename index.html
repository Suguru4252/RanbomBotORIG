<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover">
  <title>GTA San Andreas • Мобильная версия</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }

    body {
      background: #000;
      overflow: hidden;
      font-family: 'Arial', sans-serif;
      touch-action: manipulation;
      position: fixed;
      width: 100%;
      height: 100%;
    }

    #gameCanvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      touch-action: none;
    }

    /* HUD */
    .hud-top {
      position: absolute;
      top: 15px;
      left: 15px;
      right: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      pointer-events: none;
      z-index: 10;
    }

    .money {
      color: #ffaa00;
      font-family: 'Courier New', monospace;
      font-size: 18px;
      font-weight: bold;
      text-shadow: 0 0 10px #ff6600, 2px 2px 0 #000;
      background: rgba(0,0,0,0.7);
      padding: 8px 15px;
      border: 2px solid #c47a1a;
      border-radius: 4px;
      letter-spacing: 2px;
    }

    .wanted {
      color: #ff4444;
      font-family: 'Courier New', monospace;
      font-size: 18px;
      font-weight: bold;
      text-shadow: 0 0 10px #ff0000, 2px 2px 0 #000;
      background: rgba(0,0,0,0.7);
      padding: 8px 15px;
      border: 2px solid #c47a1a;
      border-radius: 4px;
    }

    .radio-bar {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: #ffcc66;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      background: rgba(0,0,0,0.8);
      padding: 8px 20px;
      border: 1px solid #c47a1a;
      border-radius: 20px;
      text-shadow: 1px 1px 0 #000;
      pointer-events: none;
      z-index: 10;
      animation: radioGlow 1.5s infinite alternate;
    }

    @keyframes radioGlow {
      from { box-shadow: 0 0 5px #ff8800; }
      to { box-shadow: 0 0 15px #ff8800; }
    }

    /* Джойстик движения */
    .joystick-move {
      position: absolute;
      bottom: 40px;
      left: 40px;
      width: 130px;
      height: 130px;
      background: rgba(255,255,255,0.08);
      border: 3px solid rgba(255,170,0,0.5);
      border-radius: 50%;
      z-index: 20;
      touch-action: none;
    }

    .joystick-move-thumb {
      position: absolute;
      width: 55px;
      height: 55px;
      background: rgba(255,170,0,0.6);
      border: 2px solid #ffaa00;
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 15px rgba(255,170,0,0.5);
    }

    /* Джойстик камеры */
    .joystick-camera {
      position: absolute;
      bottom: 40px;
      right: 40px;
      width: 130px;
      height: 130px;
      background: rgba(255,255,255,0.08);
      border: 3px solid rgba(255,170,0,0.5);
      border-radius: 50%;
      z-index: 20;
      touch-action: none;
    }

    .joystick-camera-thumb {
      position: absolute;
      width: 55px;
      height: 55px;
      background: rgba(255,170,0,0.6);
      border: 2px solid #ffaa00;
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 15px rgba(255,170,0,0.5);
    }

    /* Кнопка респауна */
    .btn-respawn {
      position: absolute;
      top: 100px;
      right: 20px;
      width: 55px;
      height: 55px;
      background: rgba(255,68,68,0.7);
      border: 2px solid #ff4444;
      border-radius: 50%;
      color: white;
      font-size: 24px;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 20;
      text-shadow: 0 0 10px #ff0000;
      box-shadow: 0 0 15px rgba(255,0,0,0.4);
    }

    /* Инструкция */
    .hint {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #ffaa00;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      text-align: center;
      background: rgba(0,0,0,0.8);
      padding: 15px 25px;
      border: 2px solid #c47a1a;
      border-radius: 8px;
      pointer-events: none;
      z-index: 5;
      animation: fadeOut 3s forwards;
      animation-delay: 2s;
    }

    @keyframes fadeOut {
      to { opacity: 0; }
    }

    @media (max-width: 400px) {
      .joystick-move, .joystick-camera {
        width: 110px;
        height: 110px;
        bottom: 30px;
      }
      .joystick-move { left: 25px; }
      .joystick-camera { right: 25px; }
      .joystick-move-thumb, .joystick-camera-thumb {
        width: 45px;
        height: 45px;
      }
      .money, .wanted {
        font-size: 14px;
        padding: 6px 10px;
      }
    }
  </style>
</head>
<body>
  <div class="hud-top">
    <div class="money">💵 $350</div>
    <div class="wanted">⭐ 0</div>
  </div>
  <div class="radio-bar">📻 RADIO LOS SANTOS</div>
  
  <!-- Джойстик движения -->
  <div class="joystick-move" id="joystickMove">
    <div class="joystick-move-thumb" id="joystickMoveThumb"></div>
  </div>
  
  <!-- Джойстик камеры -->
  <div class="joystick-camera" id="joystickCamera">
    <div class="joystick-camera-thumb" id="joystickCameraThumb"></div>
  </div>
  
  <!-- Кнопка респауна -->
  <div class="btn-respawn" id="btnRespawn">↺</div>
  
  <div class="hint" id="hint">🎮 Левый джойстик — движение<br>Правый — камера</div>

  <canvas id="gameCanvas"></canvas>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';

    // ========== ХОЛСТ ==========
    const canvas = document.getElementById('gameCanvas');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a0a00);
    scene.fog = new THREE.FogExp2(0x1a0a00, 0.00012);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.5, 300);
    camera.position.set(0, 7, 14);
    camera.lookAt(0, 0, 8);

    // ========== ОСВЕЩЕНИЕ ==========
    const ambientLight = new THREE.AmbientLight(0xff9944, 0.5);
    scene.add(ambientLight);

    const sunLight = new THREE.DirectionalLight(0xff8833, 1.0);
    sunLight.position.set(50, 30, -20);
    sunLight.castShadow = true;
    sunLight.receiveShadow = true;
    sunLight.shadow.mapSize.width = 256;
    sunLight.shadow.mapSize.height = 256;
    sunLight.shadow.camera.near = 0.5;
    sunLight.shadow.camera.far = 120;
    sunLight.shadow.camera.left = -25;
    sunLight.shadow.camera.right = 25;
    sunLight.shadow.camera.top = 25;
    sunLight.shadow.camera.bottom = -15;
    scene.add(sunLight);

    // ========== МИР ==========
    function createRoad(x, z, w, d) {
      const roadMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.9 });
      const road = new THREE.Mesh(new THREE.PlaneGeometry(w, d), roadMat);
      road.rotation.x = -Math.PI / 2;
      road.position.set(x, 0.01, z);
      road.receiveShadow = true;
      scene.add(road);
    }

    createRoad(0, 0, 10, 70);
    createRoad(0, -15, 35, 10);
    createRoad(0, 15, 35, 10);

    // Тротуары
    const swMat = new THREE.MeshStandardMaterial({ color: 0x555544, roughness: 0.8 });
    function createSidewalk(x, z, w, d) {
      const sw = new THREE.Mesh(new THREE.PlaneGeometry(w, d), swMat);
      sw.rotation.x = -Math.PI / 2;
      sw.position.set(x, 0.12, z);
      sw.receiveShadow = true;
      scene.add(sw);
    }
    createSidewalk(6.5, 0, 2, 70);
    createSidewalk(-6.5, 0, 2, 70);

    // Здания
    function createBuilding(x, z, w, h, d, color) {
      const group = new THREE.Group();
      const bodyMat = new THREE.MeshStandardMaterial({ color, roughness: 0.6 });
      const body = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), bodyMat);
      body.position.y = h / 2;
      body.castShadow = true;
      body.receiveShadow = true;
      group.add(body);

      const windowMat = new THREE.MeshStandardMaterial({
        color: 0xffcc66,
        roughness: 0.3,
        emissive: new THREE.Color(0x331100)
      });

      for (let wy = 0.8; wy < h; wy += 1.8) {
        for (let wz = -d / 2 + 1; wz < d / 2; wz += 2) {
          const win = new THREE.Mesh(new THREE.BoxGeometry(0.5, 1, 0.15), windowMat);
          win.position.set(w / 2 + 0.05, wy, wz);
          group.add(win);
          const win2 = new THREE.Mesh(new THREE.BoxGeometry(0.5, 1, 0.15), windowMat);
          win2.position.set(-w / 2 - 0.05, wy, wz);
          group.add(win2);
        }
      }

      group.position.set(x, 0.12, z);
      scene.add(group);
    }

    const buildings = [
      [9, -22, 4, 8, 4, 0xcc8855], [-9, -22, 4, 11, 4, 0xbb7744],
      [9, -12, 4, 6, 4, 0xdd9966], [-9, -12, 4, 13, 4, 0xaa6633],
      [9, -2, 4, 10, 4, 0xcc8855], [-9, -2, 4, 7, 4, 0xbb7744],
      [9, 8, 4, 12, 4, 0xdd9966], [-9, 8, 4, 9, 4, 0xaa6633],
      [9, 18, 4, 8, 4, 0xcc8855], [-9, 18, 4, 12, 4, 0xbb7744],
      [9, 28, 4, 10, 4, 0xdd9966], [-9, 28, 4, 7, 4, 0xaa6633],
      [16, -18, 5, 14, 5, 0x996644], [-16, -18, 5, 16, 5, 0x885533],
      [16, 12, 5, 12, 5, 0x996644], [-16, 12, 5, 18, 5, 0x885533],
    ];
    buildings.forEach(b => createBuilding(...b));

    // Пальмы
    function createPalm(x, z) {
      const palm = new THREE.Group();
      const trunk = new THREE.Mesh(
        new THREE.CylinderGeometry(0.18, 0.3, 4.5, 6),
        new THREE.MeshStandardMaterial({ color: 0x8b6b4d, roughness: 0.9 })
      );
      trunk.position.y = 2.25;
      trunk.castShadow = true;
      palm.add(trunk);

      const leafMat = new THREE.MeshStandardMaterial({ color: 0x338833, roughness: 0.5, side: THREE.DoubleSide });
      for (let i = 0; i < 7; i++) {
        const leaf = new THREE.Mesh(new THREE.ConeGeometry(0.5, 2.2, 5), leafMat);
        leaf.position.y = 4.7;
        leaf.rotation.x = Math.PI / 3;
        leaf.rotation.y = (i / 7) * Math.PI * 2;
        leaf.castShadow = true;
        palm.add(leaf);
      }

      palm.position.set(x, 0.12, z);
      scene.add(palm);
    }

    for (let z = -30; z <= 30; z += 8) {
      createPalm(6.2, z);
      createPalm(-6.2, z);
    }

    // Фонари
    function createLampPost(x, z) {
      const post = new THREE.Group();
      const pole = new THREE.Mesh(
        new THREE.CylinderGeometry(0.12, 0.18, 6, 6),
        new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 0.5, metalness: 0.8 })
      );
      pole.position.y = 3;
      pole.castShadow = true;
      post.add(pole);

      const lamp = new THREE.Mesh(
        new THREE.SphereGeometry(0.4, 6),
        new THREE.MeshStandardMaterial({ color: 0xffcc88, roughness: 0.3, emissive: new THREE.Color(0xff6600), emissiveIntensity: 0.6 })
      );
      lamp.position.y = 6.2;
      post.add(lamp);

      post.position.set(x, 0.12, z);
      scene.add(post);
    }

    for (let z = -28; z <= 28; z += 10) {
      createLampPost(5.5, z);
      createLampPost(-5.5, z);
    }

    // ========== МАШИНА (облегченная) ==========
    const carGroup = new THREE.Group();

    const bodyGeom = new THREE.BoxGeometry(2, 0.6, 4);
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0xcc3355, roughness: 0.3, metalness: 0.6 });
    const carBody = new THREE.Mesh(bodyGeom, bodyMat);
    carBody.position.y = 0.5;
    carBody.castShadow = true;
    carGroup.add(carBody);

    const cabinGeom = new THREE.BoxGeometry(1.7, 0.5, 2);
    const cabinMat = new THREE.MeshStandardMaterial({ color: 0xaa2244, roughness: 0.2, metalness: 0.5 });
    const cabin = new THREE.Mesh(cabinGeom, cabinMat);
    cabin.position.set(0, 0.9, -0.2);
    cabin.castShadow = true;
    carGroup.add(cabin);

    const wheelMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.8 });
    function createWheel(x, z) {
      const wg = new THREE.Group();
      const tire = new THREE.Mesh(new THREE.CylinderGeometry(0.45, 0.45, 0.35, 8), wheelMat);
      tire.rotation.z = Math.PI / 2;
      tire.castShadow = true;
      wg.add(tire);
      wg.position.set(x, 0.4, z);
      return wg;
    }
    carGroup.add(createWheel(-1.1, 1.5));
    carGroup.add(createWheel(1.1, 1.5));
    carGroup.add(createWheel(-1.1, -1.5));
    carGroup.add(createWheel(1.1, -1.5));

    // Фары
    const hlMat = new THREE.MeshStandardMaterial({ color: 0xffffcc, roughness: 0.2, emissive: new THREE.Color(0xffaa22), emissiveIntensity: 0.4 });
    const hl1 = new THREE.Mesh(new THREE.SphereGeometry(0.18, 6), hlMat);
    hl1.position.set(-0.55, 0.45, -2);
    carGroup.add(hl1);
    const hl2 = new THREE.Mesh(new THREE.SphereGeometry(0.18, 6), hlMat);
    hl2.position.set(0.55, 0.45, -2);
    carGroup.add(hl2);

    carGroup.position.set(0, 0.4, 0);
    scene.add(carGroup);

    // ========== ЧАСТИЦЫ ==========
    const particlesGeom = new THREE.BufferGeometry();
    const particlesCount = 200;
    const positions = new Float32Array(particlesCount * 3);
    for (let i = 0; i < particlesCount * 3; i += 3) {
      positions[i] = (Math.random() - 0.5) * 50;
      positions[i + 1] = Math.random() * 12;
      positions[i + 2] = (Math.random() - 0.5) * 60;
    }
    particlesGeom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const particles = new THREE.Points(particlesGeom, new THREE.PointsMaterial({
      color: 0xffaa44, size: 0.06, blending: THREE.AdditiveBlending, depthWrite: false, transparent: true, opacity: 0.35
    }));
    scene.add(particles);

    // ========== СЕНСОРНОЕ УПРАВЛЕНИЕ ==========
    const joystickMove = document.getElementById('joystickMove');
    const joystickMoveThumb = document.getElementById('joystickMoveThumb');
    const joystickCamera = document.getElementById('joystickCamera');
    const joystickCameraThumb = document.getElementById('joystickCameraThumb');
    const btnRespawn = document.getElementById('btnRespawn');

    let moveX = 0, moveY = 0;
    let camX = 0, camY = 0;
    let moveActive = false;
    let camActive = false;
    let moveTouchId = null;
    let camTouchId = null;

    const moveRect = joystickMove.getBoundingClientRect();
    const camRect = joystickCamera.getBoundingClientRect();
    const moveCenter = { x: moveRect.left + moveRect.width / 2, y: moveRect.top + moveRect.height / 2 };
    const camCenter = { x: camRect.left + camRect.width / 2, y: camRect.top + camRect.height / 2 };
    const maxDist = 45;

    function updateMoveThumb() {
      const dist = Math.sqrt(moveX * moveX + moveY * moveY);
      const clampedDist = Math.min(dist, maxDist);
      const angle = Math.atan2(moveY, moveX);
      const tx = Math.cos(angle) * clampedDist;
      const ty = Math.sin(angle) * clampedDist;
      joystickMoveThumb.style.transform = `translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px))`;
    }

    function updateCamThumb() {
      const dist = Math.sqrt(camX * camX + camY * camY);
      const clampedDist = Math.min(dist, maxDist);
      const angle = Math.atan2(camY, camX);
      const tx = Math.cos(angle) * clampedDist;
      const ty = Math.sin(angle) * clampedDist;
      joystickCameraThumb.style.transform = `translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px))`;
    }

    joystickMove.addEventListener('touchstart', (e) => {
      e.preventDefault();
      if (moveActive) return;
      const touch = e.changedTouches[0];
      moveTouchId = touch.identifier;
      moveActive = true;
      const rect = joystickMove.getBoundingClientRect();
      moveCenter.x = rect.left + rect.width / 2;
      moveCenter.y = rect.top + rect.height / 2;
    });

    joystickMove.addEventListener('touchmove', (e) => {
      e.preventDefault();
      for (let i = 0; i < e.changedTouches.length; i++) {
        const touch = e.changedTouches[i];
        if (touch.identifier === moveTouchId) {
          moveX = touch.clientX - moveCenter.x;
          moveY = touch.clientY - moveCenter.y;
          updateMoveThumb();
        }
      }
    });

    joystickMove.addEventListener('touchend', (e) => {
      for (let i = 0; i < e.changedTouches.length; i++) {
        if (e.changedTouches[i].identifier === moveTouchId) {
          moveActive = false;
          moveTouchId = null;
          moveX = 0;
          moveY = 0;
          updateMoveThumb();
        }
      }
    });

    joystickCamera.addEventListener('touchstart', (e) => {
      e.preventDefault();
      if (camActive) return;
      const touch = e.changedTouches[0];
      camTouchId = touch.identifier;
      camActive = true;
      const rect = joystickCamera.getBoundingClientRect();
      camCenter.x = rect.left + rect.width / 2;
      camCenter.y = rect.top + rect.height / 2;
    });

    joystickCamera.addEventListener('touchmove', (e) => {
      e.preventDefault();
      for (let i = 0; i < e.changedTouches.length; i++) {
        const touch = e.changedTouches[i];
        if (touch.identifier === camTouchId) {
          camX = touch.clientX - camCenter.x;
          camY = touch.clientY - camCenter.y;
          updateCamThumb();
        }
      }
    });

    joystickCamera.addEventListener('touchend', (e) => {
      for (let i = 0; i < e.changedTouches.length; i++) {
        if (e.changedTouches[i].identifier === camTouchId) {
          camActive = false;
          camTouchId = null;
          camX = 0;
          camY = 0;
          updateCamThumb();
        }
      }
    });

    // Респаун
    btnRespawn.addEventListener('click', () => {
      carGroup.position.set(0, 0.4, 0);
      carGroup.rotation.y = 0;
    });

    // Скрыть подсказку через 4 секунды
    setTimeout(() => {
      const hint = document.getElementById('hint');
      if (hint) hint.style.display = 'none';
    }, 4000);

    // ========== ИГРОВОЙ ЦИКЛ ==========
    let speed = 0;
    const maxSpeed = 0.35;
    const acceleration = 0.012;
    const friction = 0.015;
    const turnSpeed = 0.04;

    function animate() {
      requestAnimationFrame(animate);

      // Движение от левого джойстика
      const inputY = -moveY / maxDist;
      const inputX = moveX / maxDist;

      if (Math.abs(inputY) > 0.15) {
        speed += inputY * acceleration;
        speed = Math.max(-maxSpeed * 0.5, Math.min(maxSpeed, speed));
      } else {
        if (speed > 0) speed = Math.max(speed - friction, 0);
        else if (speed < 0) speed = Math.min(speed + friction, 0);
      }

      if (Math.abs(inputX) > 0.2) {
        carGroup.rotation.y -= inputX * turnSpeed * (Math.abs(speed) + 0.15);
      }

      carGroup.position.x += Math.sin(carGroup.rotation.y) * speed;
      carGroup.position.z += Math.cos(carGroup.rotation.y) * speed;

      carGroup.position.x = Math.max(-22, Math.min(22, carGroup.position.x));
      carGroup.position.z = Math.max(-33, Math.min(33, carGroup.position.z));

      // Камера от правого джойстика
      const camInputX = camX / maxDist;
      const camInputY = -camY / maxDist;
      const camAngle = carGroup.rotation.y + camInputX * 0.8;
      const camHeight = 5 + camInputY * 3;

      const targetCamPos = new THREE.Vector3(
        carGroup.position.x + Math.sin(camAngle) * 12,
        carGroup.position.y + camHeight,
        carGroup.position.z + Math.cos(camAngle) * 12
      );

      camera.position.lerp(targetCamPos, 0.08);
      camera.lookAt(carGroup.position.x, carGroup.position.y + 0.7, carGroup.position.z);

      particles.rotation.y += 0.0002;

      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
