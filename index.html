<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Rucoy Online - Точная копия</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #0a0c15;
            overflow: hidden;
            font-family: 'Courier New', 'Monaco', monospace;
        }

        canvas {
            display: block;
            cursor: crosshair;
        }

        /* ВЕРХНЯЯ ПАНЕЛЬ */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.85);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 200;
            border-bottom: 2px solid #ffd966;
        }

        .stats-top {
            display: flex;
            gap: 25px;
            align-items: center;
        }

        .hp-stat, .mp-stat {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0,0,0,0.5);
            padding: 4px 12px;
            border-radius: 20px;
        }
        .hp-stat span:first-child { color: #ff6a6a; font-size: 18px; }
        .mp-stat span:first-child { color: #6a9eff; font-size: 18px; }
        .hp-stat span:last-child, .mp-stat span:last-child { color: #fff; font-size: 16px; }

        .level-stat {
            background: #2c2f3f;
            padding: 4px 16px;
            border-radius: 20px;
            color: #ffd966;
            font-weight: bold;
        }

        .xp-bar-top {
            width: 280px;
            height: 12px;
            background: #2a2a2a;
            border-radius: 6px;
            overflow: hidden;
        }
        .xp-fill-top {
            height: 100%;
            background: linear-gradient(90deg, #6a9eff, #3a6eff);
            width: 0%;
        }

        /* НИЖНЯЯ ПАНЕЛЬ */
        .bottom-panel {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 25px;
            background: rgba(0,0,0,0.8);
            padding: 12px 30px;
            border-radius: 60px;
            border: 1px solid #ffd966;
            z-index: 200;
        }

        .bottom-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: #2c2f3f;
            border: 2px solid #ffd966;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.1s;
            font-size: 28px;
        }
        .bottom-btn:active { transform: scale(0.95); }
        .bottom-btn span { font-size: 10px; color: #ffd966; margin-top: 4px; }

        /* ИНВЕНТАРЬ */
        .inventory-panel {
            position: fixed;
            right: 20px;
            top: 80px;
            background: rgba(0,0,0,0.95);
            border: 2px solid #ffd966;
            border-radius: 12px;
            padding: 15px;
            width: 450px;
            display: none;
            z-index: 300;
        }

        .inventory-header {
            display: flex;
            justify-content: space-between;
            color: #ffd966;
            padding-bottom: 10px;
            border-bottom: 1px solid #ffd966;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .inventory-slots {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 6px;
        }

        .inv-slot {
            background: rgba(0,0,0,0.6);
            border: 1px solid #ffd966;
            border-radius: 6px;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            position: relative;
        }
        .inv-slot:hover { background: rgba(255,217,102,0.3); }
        .slot-count {
            position: absolute;
            bottom: 2px;
            right: 4px;
            font-size: 10px;
            color: #ffd966;
            background: rgba(0,0,0,0.6);
            padding: 1px 3px;
            border-radius: 4px;
        }
        .slot-name {
            position: absolute;
            top: -18px;
            left: 0;
            font-size: 9px;
            color: #ffd966;
            white-space: nowrap;
            background: rgba(0,0,0,0.7);
            padding: 2px 5px;
            border-radius: 4px;
            display: none;
        }
        .inv-slot:hover .slot-name { display: block; }

        /* СТАТИСТИКА */
        .stats-panel {
            position: fixed;
            left: 20px;
            top: 80px;
            background: rgba(0,0,0,0.92);
            border: 2px solid #ffd966;
            border-radius: 12px;
            padding: 20px;
            width: 280px;
            display: none;
            z-index: 300;
        }
        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            color: #fff;
            border-bottom: 1px solid #333;
        }

        /* ЛАВКА */
        .shop-panel {
            position: fixed;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.96);
            border: 2px solid #ffd966;
            border-radius: 16px;
            padding: 20px;
            width: 500px;
            display: none;
            z-index: 400;
        }
        .shop-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #333;
        }
        .shop-item span { color: #fff; }
        .buy-btn {
            background: #4a3e2a;
            color: #ffd966;
            border: none;
            padding: 6px 20px;
            border-radius: 20px;
            cursor: pointer;
        }

        /* ЛОГИ */
        .log-message {
            position: fixed;
            bottom: 120px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            border-left: 4px solid #ffd966;
            padding: 8px 15px;
            color: #ffd966;
            font-size: 12px;
            border-radius: 4px;
            animation: fadeOut 2.5s forwards;
            pointer-events: none;
            z-index: 200;
        }

        .damage-number {
            position: fixed;
            font-weight: bold;
            font-size: 22px;
            color: #ffaa44;
            text-shadow: 2px 2px 0 #000;
            pointer-events: none;
            animation: floatUp 0.8s ease-out forwards;
            z-index: 400;
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-50px); }
        }
        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; }
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <!-- ВЕРХНЯЯ ПАНЕЛЬ -->
    <div class="top-bar">
        <div class="stats-top">
            <div class="level-stat">Lv.<span id="topLevel">1</span></div>
            <div class="hp-stat"><span>❤️</span><span id="topHp">120/120</span></div>
            <div class="mp-stat"><span>💙</span><span id="topMp">60/60</span></div>
            <div class="xp-bar-top"><div class="xp-fill-top" id="topXpFill"></div></div>
        </div>
        <div style="display: flex; gap: 15px; align-items: center;">
            <div style="color:#ffd966;">💰 <span id="topGold">0</span></div>
            <button id="statsBtn" style="background:#2c2f3f; border:1px solid #ffd966; color:#ffd966; padding:5px 12px; border-radius:20px;">📊</button>
            <button id="invTopBtn" style="background:#2c2f3f; border:1px solid #ffd966; color:#ffd966; padding:5px 12px; border-radius:20px;">🎒</button>
        </div>
    </div>

    <!-- КНОПКИ КЛАССОВ -->
    <div style="position: fixed; top: 80px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; z-index: 200;">
        <button id="classKnightBtn" class="class-btn" style="background:#6a3e9e; border:1px solid #ffd966; color:#ffd966; padding:6px 18px; border-radius:30px;">🛡️ Рыцарь</button>
        <button id="classArcherBtn" class="class-btn" style="background:#2c2f3f; border:1px solid #ffd966; color:#ffd966; padding:6px 18px; border-radius:30px;">🏹 Лучник</button>
        <button id="classMageBtn" class="class-btn" style="background:#2c2f3f; border:1px solid #ffd966; color:#ffd966; padding:6px 18px; border-radius:30px;">🔮 Маг</button>
    </div>

    <!-- НИЖНЯЯ ПАНЕЛЬ -->
    <div class="bottom-panel">
        <div class="bottom-btn" id="healPotionBtn">🧪<span>Лечение</span></div>
        <div class="bottom-btn" id="manaPotionBtn">💙<span>Мана</span></div>
        <div class="bottom-btn" id="superSkillBtn">⚔️<span>Супер</span></div>
    </div>

    <!-- ИНВЕНТАРЬ -->
    <div class="inventory-panel" id="inventoryPanel">
        <div class="inventory-header">
            <span>🎒 ИНВЕНТАРЬ</span>
            <span>💰 <span id="invGold">0</span></span>
        </div>
        <div class="inventory-slots" id="inventorySlots"></div>
        <button id="closeInv" style="margin-top:15px; width:100%; background:#4a3e2a; color:#ffd966; border:none; padding:8px; border-radius:20px;">Закрыть</button>
    </div>

    <!-- СТАТИСТИКА -->
    <div class="stats-panel" id="statsPanel">
        <div style="color:#ffd966; font-size:20px; margin-bottom:15px;">📊 ХАРАКТЕРИСТИКИ</div>
        <div id="statsContent"></div>
        <button id="closeStats" style="margin-top:15px; width:100%; background:#4a3e2a; color:#ffd966; border:none; padding:8px; border-radius:20px;">Закрыть</button>
    </div>

    <!-- ЛАВКА -->
    <div class="shop-panel" id="shopPanel">
        <div style="color:#ffd966; font-size:22px; margin-bottom:15px; text-align:center;">🏪 ТОРГОВЕЦ</div>
        <div id="shopItems"></div>
        <button id="closeShop" style="margin-top:15px; width:100%; background:#4a3e2a; color:#ffd966; border:none; padding:8px; border-radius:20px;">Закрыть</button>
    </div>

    <script>
        // ==================== RUCOY ONLINE - ТОЧНАЯ КОПИЯ ====================
        
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        // ==================== НАСТРОЙКИ МИРА ====================
        const TILE_SIZE = 48;
        const WORLD_WIDTH = 45;
        const WORLD_HEIGHT = 45;
        
        let camera = { x: 0, y: 0 };
        let selectedMonsterId = null;
        let currentTargetMonster = null; // для постоянной атаки
        
        // КАРТА
        let worldMap = [];
        let worldBiome = [];
        
        // БЕЗОПАСНАЯ ЗОНА
        let safeZone = { x: 22, y: 22, radius: 3 };
        
        function generateWorld() {
            for (let y = 0; y < WORLD_HEIGHT; y++) {
                worldMap[y] = [];
                worldBiome[y] = [];
                for (let x = 0; x < WORLD_WIDTH; x++) {
                    if (x === 0 || y === 0 || x === WORLD_WIDTH - 1 || y === WORLD_HEIGHT - 1) {
                        worldMap[y][x] = 1;
                        worldBiome[y][x] = 'wall';
                    } 
                    else if (Math.abs(x - safeZone.x) <= safeZone.radius && Math.abs(y - safeZone.y) <= safeZone.radius) {
                        worldMap[y][x] = 0;
                        worldBiome[y][x] = 'shop';
                    }
                    else if (Math.sin(x * 0.25) * Math.cos(y * 0.25) < -0.5) {
                        worldMap[y][x] = 1;
                        worldBiome[y][x] = 'water';
                    }
                    else if (Math.sin(x * 0.35) * Math.cos(y * 0.35) > 0.65) {
                        worldMap[y][x] = 1;
                        worldBiome[y][x] = 'tree';
                    }
                    else {
                        worldMap[y][x] = 0;
                        worldBiome[y][x] = 'grass';
                    }
                }
            }
        }
        
        // ==================== ИГРОК ====================
        let player = {
            tileX: 22,
            tileY: 22,
            x: 22 * TILE_SIZE,
            y: 22 * TILE_SIZE,
            targetTileX: 22,
            targetTileY: 22,
            level: 1,
            xp: 0,
            maxHp: 120,
            hp: 120,
            maxMp: 60,
            mp: 60,
            baseAttack: 22,
            baseDefense: 12,
            className: 'knight',
            gold: 500,
            inventory: [],
            equipment: { weapon: null, armor: null },
            moving: false,
            
            get attack() {
                let bonus = 0;
                if (this.className === 'knight') bonus = 6;
                else if (this.className === 'archer') bonus = 8;
                else if (this.className === 'mage') bonus = 7;
                if (this.equipment.weapon) bonus += this.equipment.weapon.damage || 0;
                return this.baseAttack + bonus;
            },
            
            get defense() {
                let bonus = this.baseDefense;
                if (this.equipment.armor) bonus += this.equipment.armor.defense || 0;
                return bonus;
            },
            
            moveToTile(tx, ty) {
                if (this.hp <= 0) return false;
                if (tx < 0 || tx >= WORLD_WIDTH || ty < 0 || ty >= WORLD_HEIGHT) return false;
                if (worldMap[ty][tx] === 1) return false;
                for (let m of monsters) {
                    if (m.alive && m.tileX === tx && m.tileY === ty) return false;
                }
                this.targetTileX = tx;
                this.targetTileY = ty;
                return true;
            },
            
            updateMovement(deltaTime) {
                if (this.tileX !== this.targetTileX || this.tileY !== this.targetTileY) {
                    let targetX = this.targetTileX * TILE_SIZE;
                    let targetY = this.targetTileY * TILE_SIZE;
                    let dx = targetX - this.x;
                    let dy = targetY - this.y;
                    let dist = Math.hypot(dx, dy);
                    let step = 220 * deltaTime;
                    
                    if (dist < step) {
                        this.x = targetX;
                        this.y = targetY;
                        this.tileX = this.targetTileX;
                        this.tileY = this.targetTileY;
                    } else {
                        let angle = Math.atan2(dy, dx);
                        this.x += Math.cos(angle) * step;
                        this.y += Math.sin(angle) * step;
                    }
                }
            },
            
            takeDamage(damage) {
                let actual = Math.max(1, Math.floor(damage - this.defense * 0.3));
                this.hp = Math.max(0, this.hp - actual);
                if (this.hp <= 0) this.die();
                return actual;
            },
            
            die() {
                addLog('💀 ВЫ ПОГИБЛИ! Возрождение...');
                this.hp = 0;
                setTimeout(() => {
                    this.hp = this.maxHp;
                    this.mp = this.maxMp;
                    this.tileX = safeZone.x;
                    this.tileY = safeZone.y;
                    this.targetTileX = safeZone.x;
                    this.targetTileY = safeZone.y;
                    this.x = this.tileX * TILE_SIZE;
                    this.y = this.tileY * TILE_SIZE;
                    currentTargetMonster = null;
                    selectedMonsterId = null;
                    addLog('🌟 Вы возродились в безопасной зоне');
                    updateUI();
                }, 3000);
            },
            
            addExp(amount) {
                this.xp += amount;
                let needXP = 100 + (this.level - 1) * 50;
                while (this.xp >= needXP) {
                    this.xp -= needXP;
                    this.levelUp();
                    needXP = 100 + (this.level - 1) * 50;
                }
                updateUI();
            },
            
            levelUp() {
                this.level++;
                this.maxHp += 25;
                this.hp = this.maxHp;
                this.maxMp += 12;
                this.mp = this.maxMp;
                this.baseAttack += 5;
                this.baseDefense += 2;
                addLog(`✨ УРОВЕНЬ ${this.level}! ✨`);
                updateUI();
            },
            
            attackMonster(monster) {
                let now = Date.now() / 1000;
                if (now - this.lastAttack < this.attackSpeed) return false;
                
                let dist = Math.abs(this.tileX - monster.tileX) + Math.abs(this.tileY - monster.tileY);
                
                if (this.className === 'knight' && dist > 1) {
                    addLog('🏃 Подойдите ближе для атаки мечом!');
                    return false;
                }
                if ((this.className === 'archer' || this.className === 'mage') && dist > 12) {
                    addLog('📡 Слишком далеко для атаки!');
                    return false;
                }
                
                let damage = this.attack - monster.defense + Math.random() * 20;
                damage = Math.max(5, Math.floor(damage));
                
                monster.hp -= damage;
                this.lastAttack = now;
                
                addLog(`⚔️ Вы нанесли ${damage} урона ${monster.name}`);
                showDamage(monster.x, monster.y, damage);
                
                if (monster.hp <= 0) {
                    monster.die(this);
                    this.addExp(monster.xp);
                    let goldDrop = Math.floor(monster.goldMin + Math.random() * (monster.goldMax - monster.goldMin));
                    this.gold += goldDrop;
                    addLog(`💰 +${goldDrop} золота!`);
                    if (currentTargetMonster === monster) currentTargetMonster = null;
                }
                updateUI();
                return true;
            },
            
            attackSpeed: 0.85,
            lastAttack: 0
        };
        
        // ==================== МОНСТРЫ (ХОДЯТ ПО КЛЕТКАМ) ====================
        let monsters = [];
        let nextMonsterId = 1;
        
        const MONSTER_TYPES = {
            goblin: { name: 'Гоблин', hp: 45, attack: 16, defense: 3, xp: 35, goldMin: 8, goldMax: 18, size: 32, color: '#6b8c42', aggroRange: 5, attackRange: 1, speed: 1.5 },
            wolf: { name: 'Волк', hp: 55, attack: 20, defense: 4, xp: 45, goldMin: 12, goldMax: 25, size: 32, color: '#8a8a6a', aggroRange: 6, attackRange: 1, speed: 2 },
            skeleton: { name: 'Скелет', hp: 75, attack: 24, defense: 6, xp: 60, goldMin: 15, goldMax: 30, size: 34, color: '#bdb28c', aggroRange: 5, attackRange: 1, speed: 1.2 },
            orc: { name: 'Орк', hp: 110, attack: 30, defense: 8, xp: 95, goldMin: 25, goldMax: 45, size: 38, color: '#7a6a4a', aggroRange: 5, attackRange: 1, speed: 1 },
            minotaur: { name: 'Минотавр', hp: 180, attack: 40, defense: 12, xp: 150, goldMin: 40, goldMax: 70, size: 42, color: '#9b5e2c', aggroRange: 5, attackRange: 1, speed: 0.9 }
        };
        
        class Monster {
            constructor(type, tileX, tileY) {
                let data = MONSTER_TYPES[type];
                this.id = nextMonsterId++;
                this.type = type;
                this.name = data.name;
                this.hp = data.hp;
                this.maxHp = data.hp;
                this.attack = data.attack;
                this.defense = data.defense;
                this.xp = data.xp;
                this.goldMin = data.goldMin;
                this.goldMax = data.goldMax;
                this.size = data.size;
                this.color = data.color;
                this.aggroRange = data.aggroRange;
                this.attackRange = data.attackRange;
                this.speed = data.speed;
                this.tileX = tileX;
                this.tileY = tileY;
                this.x = tileX * TILE_SIZE;
                this.y = tileY * TILE_SIZE;
                this.alive = true;
                this.aggro = false;
                this.attackCooldown = 0;
                this.moveCooldown = 0;
            }
            
            canMoveTo(tx, ty) {
                if (tx < 0 || tx >= WORLD_WIDTH || ty < 0 || ty >= WORLD_HEIGHT) return false;
                if (worldMap[ty][tx] === 1) return false;
                if (player.tileX === tx && player.tileY === ty) return true;
                for (let m of monsters) {
                    if (m !== this && m.alive && m.tileX === tx && m.tileY === ty) return false;
                }
                return true;
            }
            
            moveTowards(playerTileX, playerTileY) {
                let dx = playerTileX - this.tileX;
                let dy = playerTileY - this.tileY;
                
                let moves = [];
                if (dx > 0) moves.push({ tx: this.tileX + 1, ty: this.tileY, priority: Math.abs(dx) });
                if (dx < 0) moves.push({ tx: this.tileX - 1, ty: this.tileY, priority: Math.abs(dx) });
                if (dy > 0) moves.push({ tx: this.tileX, ty: this.tileY + 1, priority: Math.abs(dy) });
                if (dy < 0) moves.push({ tx: this.tileX, ty: this.tileY - 1, priority: Math.abs(dy) });
                
                moves.sort((a, b) => b.priority - a.priority);
                
                for (let move of moves) {
                    if (this.canMoveTo(move.tx, move.ty)) {
                        this.tileX = move.tx;
                        this.tileY = move.ty;
                        this.x = this.tileX * TILE_SIZE;
                        this.y = this.tileY * TILE_SIZE;
                        return true;
                    }
                }
                return false;
            }
            
            update(deltaTime, player) {
                if (!this.alive) return;
                if (this.attackCooldown > 0) this.attackCooldown -= deltaTime;
                if (this.moveCooldown > 0) this.moveCooldown -= deltaTime;
                
                let dist = Math.abs(this.tileX - player.tileX) + Math.abs(this.tileY - player.tileY);
                
                if (dist <= this.aggroRange) this.aggro = true;
                if (dist > this.aggroRange + 2) this.aggro = false;
                
                if (this.aggro && player.hp > 0) {
                    if (dist > this.attackRange && this.moveCooldown <= 0) {
                        this.moveTowards(player.tileX, player.tileY);
                        this.moveCooldown = 0.4 / this.speed;
                    } else if (dist <= this.attackRange && this.attackCooldown <= 0) {
                        let damage = Math.max(5, this.attack - player.defense + Math.random() * 15);
                        let actual = player.takeDamage(Math.floor(damage));
                        this.attackCooldown = 1.2;
                        addLog(`💔 ${this.name} атакует! -${actual} HP`);
                        showDamage(player.x, player.y, actual);
                        updateUI();
                    }
                }
            }
            
            die(killer) {
                this.alive = false;
                setTimeout(() => this.respawn(), 8000);
            }
            
            respawn() {
                this.hp = this.maxHp;
                this.alive = true;
                this.aggro = false;
                for (let attempt = 0; attempt < 50; attempt++) {
                    let tx = 5 + Math.floor(Math.random() * (WORLD_WIDTH - 10));
                    let ty = 5 + Math.floor(Math.random() * (WORLD_HEIGHT - 10));
                    if (worldMap[ty][tx] === 0 && Math.abs(tx - safeZone.x) > 4) {
                        let hasMonster = false;
                        for (let m of monsters) {
                            if (m !== this && m.alive && m.tileX === tx && m.tileY === ty) hasMonster = true;
                        }
                        if (!hasMonster && !(player.tileX === tx && player.tileY === ty)) {
                            this.tileX = tx;
                            this.tileY = ty;
                            this.x = tx * TILE_SIZE;
                            this.y = ty * TILE_SIZE;
                            return;
                        }
                    }
                }
                this.tileX = 10;
                this.tileY = 10;
                this.x = 10 * TILE_SIZE;
                this.y = 10 * TILE_SIZE;
            }
        }
        
        function spawnMonsters() {
            let types = ['goblin', 'wolf', 'skeleton', 'orc', 'minotaur'];
            for (let i = 0; i < 55; i++) {
                let type = types[Math.floor(Math.random() * types.length)];
                let placed = false;
                for (let attempt = 0; attempt < 30; attempt++) {
                    let tx = 3 + Math.floor(Math.random() * (WORLD_WIDTH - 6));
                    let ty = 3 + Math.floor(Math.random() * (WORLD_HEIGHT - 6));
                    if (worldMap[ty][tx] === 0 && Math.abs(tx - safeZone.x) > 4) {
                        let hasMonster = false;
                        for (let m of monsters) {
                            if (m.tileX === tx && m.tileY === ty) hasMonster = true;
                        }
                        if (!hasMonster && !(player.tileX === tx && player.tileY === ty)) {
                            monsters.push(new Monster(type, tx, ty));
                            placed = true;
                            break;
                        }
                    }
                }
                if (!placed) monsters.push(new Monster(type, 12 + i % 10, 12 + Math.floor(i / 10)));
            }
        }
        
        // ==================== ПРЕДМЕТЫ ====================
        const SHOP_ITEMS = [
            { id: 'small_hp', name: 'Малая настойка HP', icon: '🧪', heal: 60, price: 20, type: 'consumable', desc: 'Восстанавливает 60 HP' },
            { id: 'medium_hp', name: 'Средняя настойка HP', icon: '🧪', heal: 150, price: 50, type: 'consumable', desc: 'Восстанавливает 150 HP' },
            { id: 'small_mp', name: 'Малая настойка MP', icon: '💙', mana: 40, price: 18, type: 'consumable', desc: 'Восстанавливает 40 MP' },
            { id: 'medium_mp', name: 'Средняя настойка MP', icon: '💙', mana: 100, price: 45, type: 'consumable', desc: 'Восстанавливает 100 MP' }
        ];
        
        function useHealPotion() {
            let potion = player.inventory.find(i => i.type === 'consumable' && i.heal);
            if (!potion) { addLog('🧪 Нет зелий лечения! Купите у торговца'); return; }
            player.hp = Math.min(player.maxHp, player.hp + potion.heal);
            potion.count--;
            if (potion.count <= 0) { let idx = player.inventory.indexOf(potion); player.inventory.splice(idx, 1); }
            addLog(`💚 Вылечено +${potion.heal} HP`);
            updateUI(); updateInventoryUI();
        }
        
        function useManaPotion() {
            let potion = player.inventory.find(i => i.type === 'consumable' && i.mana);
            if (!potion) { addLog('💙 Нет зелий маны! Купите у торговца'); return; }
            player.mp = Math.min(player.maxMp, player.mp + potion.mana);
            potion.count--;
            if (potion.count <= 0) { let idx = player.inventory.indexOf(potion); player.inventory.splice(idx, 1); }
            addLog(`💙 Восстановлено +${potion.mana} MP`);
            updateUI(); updateInventoryUI();
        }
        
        let lastSuperTime = 0;
        function useSuperSkill() {
            let now = Date.now() / 1000;
            if (now - lastSuperTime < 8) { addLog('⏳ Суперудар перезаряжается!'); return; }
            
            if (player.className === 'knight') {
                let hit = false;
                for (let m of monsters) {
                    if (!m.alive) continue;
                    let dist = Math.abs(m.tileX - player.tileX) + Math.abs(m.tileY - player.tileY);
                    if (dist <= 2) {
                        let dmg = Math.floor(player.attack * 1.8);
                        m.hp -= dmg;
                        showDamage(m.x, m.y, dmg);
                        hit = true;
                        if (m.hp <= 0) m.die(player);
                    }
                }
                addLog(hit ? '🌀 Вихревая атака!' : 'Рядом нет врагов');
            } 
            else if (player.className === 'archer') {
                let targets = monsters.filter(m => m.alive).slice(0, 3);
                for (let m of targets) {
                    let dmg = Math.floor(player.attack * 1.5);
                    m.hp -= dmg;
                    showDamage(m.x, m.y, dmg);
                    if (m.hp <= 0) m.die(player);
                }
                addLog(targets.length ? '🏹 Залп стрел!' : 'Нет целей');
            }
            else if (player.className === 'mage') {
                let hit = false;
                for (let m of monsters) {
                    if (!m.alive) continue;
                    let dist = Math.abs(m.tileX - player.tileX) + Math.abs(m.tileY - player.tileY);
                    if (dist <= 4) {
                        let dmg = Math.floor(player.attack * 1.9);
                        m.hp -= dmg;
                        showDamage(m.x, m.y, dmg);
                        hit = true;
                        if (m.hp <= 0) m.die(player);
                    }
                }
                addLog(hit ? '🔥 Огненный шар!' : 'Нет врагов в радиусе');
            }
            lastSuperTime = now;
            updateUI();
        }
        
        // РЕГЕНЕРАЦИЯ
        setInterval(() => {
            if (player.hp > 0 && player.hp < player.maxHp) {
                let regen = Math.floor(player.maxHp * 0.03);
                player.hp = Math.min(player.maxHp, player.hp + regen);
                updateUI();
            }
            if (player.mp < player.maxMp) {
                let regen = Math.floor(player.maxMp * 0.05);
                player.mp = Math.min(player.maxMp, player.mp + regen);
                updateUI();
            }
        }, 10000);
        
        // ==================== UI ====================
        function updateUI() {
            document.getElementById('topLevel').innerText = player.level;
            document.getElementById('topHp').innerText = `${Math.floor(player.hp)}/${player.maxHp}`;
            document.getElementById('topMp').innerText = `${Math.floor(player.mp)}/${player.maxMp}`;
            document.getElementById('topGold').innerText = player.gold;
            document.getElementById('invGold').innerText = player.gold;
            
            let needXP = 100 + (player.level - 1) * 50;
            let xpPercent = (player.xp / needXP) * 100;
            document.getElementById('topXpFill').style.width = xpPercent + '%';
            
            let statsHtml = `
                <div class="stat-row"><span>Уровень:</span><span>${player.level}</span></div>
                <div class="stat-row"><span>Опыт:</span><span>${player.xp}/${needXP}</span></div>
                <div class="stat-row"><span>Здоровье:</span><span>${player.maxHp}</span></div>
                <div class="stat-row"><span>Мана:</span><span>${player.maxMp}</span></div>
                <div class="stat-row"><span>Атака:</span><span>${player.attack}</span></div>
                <div class="stat-row"><span>Защита:</span><span>${player.defense}</span></div>
                <div class="stat-row"><span>Класс:</span><span>${player.className === 'knight' ? 'Рыцарь' : player.className === 'archer' ? 'Лучник' : 'Маг'}</span></div>
                <div class="stat-row"><span>Золото:</span><span>💰 ${player.gold}</span></div>
            `;
            document.getElementById('statsContent').innerHTML = statsHtml;
        }
        
        function updateInventoryUI() {
            let container = document.getElementById('inventorySlots');
            container.innerHTML = '';
            for (let i = 0; i < 32; i++) {
                let slot = document.createElement('div');
                slot.className = 'inv-slot';
                if (player.inventory[i]) {
                    let item = player.inventory[i];
                    slot.innerHTML = item.icon;
                    let nameSpan = document.createElement('span');
                    nameSpan.className = 'slot-name';
                    nameSpan.innerText = `${item.name}${item.heal ? ` (+${item.heal} HP)` : item.mana ? ` (+${item.mana} MP)` : ''}`;
                    slot.appendChild(nameSpan);
                    if (item.count > 1) {
                        let countSpan = document.createElement('span');
                        countSpan.className = 'slot-count';
                        countSpan.innerText = item.count;
                        slot.appendChild(countSpan);
                    }
                } else {
                    slot.innerHTML = '⬜';
                }
                slot.onclick = () => useItem(i);
                container.appendChild(slot);
            }
        }
        
        function useItem(slot) {
            let item = player.inventory[slot];
            if (!item) return;
            if (item.type === 'consumable') {
                if (item.heal) {
                    player.hp = Math.min(player.maxHp, player.hp + item.heal);
                    addLog(`💚 Использовано ${item.name} +${item.heal} HP`);
                }
                if (item.mana) {
                    player.mp = Math.min(player.maxMp, player.mp + item.mana);
                    addLog(`💙 Использовано ${item.name} +${item.mana} MP`);
                }
                item.count--;
                if (item.count <= 0) player.inventory[slot] = null;
                updateUI(); updateInventoryUI();
            }
        }
        
        function initInventory() {
            player.inventory.push({ name: 'Малая настойка HP', icon: '🧪', heal: 60, count: 5, type: 'consumable' });
            player.inventory.push({ name: 'Малая настойка MP', icon: '💙', mana: 40, count: 3, type: 'consumable' });
        }
        
        function openShop() {
            let container = document.getElementById('shopItems');
            container.innerHTML = '';
            for (let item of SHOP_ITEMS) {
                let div = document.createElement('div');
                div.className = 'shop-item';
                div.innerHTML = `
                    <span style="font-size:28px;">${item.icon}</span>
                    <div style="flex:1; margin-left:15px;">
                        <div style="color:#ffd966; font-weight:bold;">${item.name}</div>
                        <div style="color:#aaa; font-size:10px;">${item.desc}</div>
                    </div>
                    <span style="color:#ffd966;">💰 ${item.price}</span>
                    <button class="buy-btn" data-id="${item.id}">Купить</button>
                `;
                container.appendChild(div);
            }
            document.getElementById('shopPanel').style.display = 'block';
            
            document.querySelectorAll('.buy-btn').forEach(btn => {
                btn.onclick = () => {
                    let itemId = btn.dataset.id;
                    let shopItem = SHOP_ITEMS.find(i => i.id === itemId);
                    if (player.gold >= shopItem.price) {
                        player.gold -= shopItem.price;
                        let existing = player.inventory.find(i => i.name === shopItem.name);
                        if (existing) existing.count++;
                        else player.inventory.push({ ...shopItem, count: 1 });
                        updateUI(); updateInventoryUI();
                        addLog(`🛒 Куплено: ${shopItem.name}`);
                    } else {
                        addLog('💰 Недостаточно золота!');
                    }
                };
            });
        }
        
        // ==================== ОТРИСОВКА (С ДЕТАЛЬНОЙ ТРАВОЙ) ====================
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            camera.x = player.x - canvas.width / 2;
            camera.y = player.y - canvas.height / 2;
            camera.x = Math.max(0, Math.min(camera.x, WORLD_WIDTH * TILE_SIZE - canvas.width));
            camera.y = Math.max(0, Math.min(camera.y, WORLD_HEIGHT * TILE_SIZE - canvas.height));
            
            let startX = Math.max(0, Math.floor(camera.x / TILE_SIZE));
            let startY = Math.max(0, Math.floor(camera.y / TILE_SIZE));
            let endX = Math.min(WORLD_WIDTH, startX + Math.ceil(canvas.width / TILE_SIZE) + 2);
            let endY = Math.min(WORLD_HEIGHT, startY + Math.ceil(canvas.height / TILE_SIZE) + 2);
            
            for (let y = startY; y < endY; y++) {
                for (let x = startX; x < endX; x++) {
                    let screenX = x * TILE_SIZE - camera.x;
                    let screenY = y * TILE_SIZE - camera.y;
                    let biome = worldBiome[y][x];
                    
                    if (worldMap[y][x] === 1) {
                        if (biome === 'water') ctx.fillStyle = '#4a6a8a';
                        else if (biome === 'tree') ctx.fillStyle = '#3a6e2a';
                        else ctx.fillStyle = '#4a3e35';
                        ctx.fillRect(screenX, screenY, TILE_SIZE - 1, TILE_SIZE - 1);
                    } else {
                        if (biome === 'grass') {
                            ctx.fillStyle = '#5c8e4a';
                            ctx.fillRect(screenX, screenY, TILE_SIZE - 1, TILE_SIZE - 1);
                            ctx.fillStyle = '#6cae5a';
                            for (let i = 0; i < 12; i++) {
                                let gx = screenX + 4 + Math.sin(x * 2 + i) * 8;
                                let gy = screenY + TILE_SIZE - 8 + Math.cos(y * 2 + i) * 4;
                                ctx.fillRect(gx, gy, 2, 4 + Math.sin(i) * 2);
                            }
                            ctx.fillStyle = '#4a7e3a';
                            for (let i = 0; i < 8; i++) {
                                ctx.fillRect(screenX + 8 + i * 5, screenY + TILE_SIZE - 12, 2, 6);
                            }
                        } else if (biome === 'shop') {
                            ctx.fillStyle = '#8aae6a';
                            ctx.fillRect(screenX, screenY, TILE_SIZE - 1, TILE_SIZE - 1);
                            ctx.fillStyle = '#ffaa66';
                            ctx.fillRect(screenX + 18, screenY + 18, 12, 12);
                        } else {
                            ctx.fillStyle = '#5c6e4a';
                            ctx.fillRect(screenX, screenY, TILE_SIZE - 1, TILE_SIZE - 1);
                        }
                        
                        ctx.fillStyle = '#2c3524';
                        ctx.fillRect(screenX + 4, screenY + 4, TILE_SIZE - 9, TILE_SIZE - 9);
                    }
                    
                    if (x === safeZone.x && y === safeZone.y) {
                        ctx.fillStyle = '#ffaa66';
                        ctx.font = 'bold 26px monospace';
                        ctx.fillText('🏪', screenX + 12, screenY + 38);
                        ctx.fillStyle = '#ffd966';
                        ctx.font = '10px monospace';
                        ctx.fillText('Торговец', screenX + 8, screenY + 58);
                    }
                }
            }
            
            // Монстры
            for (let m of monsters) {
                if (!m.alive) continue;
                let screenX = m.x - camera.x - m.size/2;
                let screenY = m.y - camera.y - m.size/2;
                
                ctx.fillStyle = m.color;
                ctx.fillRect(screenX, screenY, m.size, m.size);
                ctx.fillStyle = '#000';
                ctx.fillRect(screenX + m.size/2 - 8, screenY + m.size/2 - 4, 6, 6);
                ctx.fillRect(screenX + m.size/2 + 2, screenY + m.size/2 - 4, 6, 6);
                
                let hpPercent = m.hp / m.maxHp;
                ctx.fillStyle = '#a13333';
                ctx.fillRect(screenX, screenY - 8, m.size, 5);
                ctx.fillStyle = '#d65c5c';
                ctx.fillRect(screenX, screenY - 8, m.size * hpPercent, 5);
                
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 11px monospace';
                ctx.fillText(m.name, screenX + 4, screenY - 2);
                
                if (selectedMonsterId === m.id) {
                    ctx.strokeStyle = '#ff4444';
                    ctx.lineWidth = 3;
                    ctx.strokeRect(screenX - 2, screenY - 2, m.size + 4, m.size + 4);
                }
            }
            
            // Игрок (скин зависит от класса)
            let psx = player.x - camera.x - 20;
            let psy = player.y - camera.y - 20;
            
            if (player.className === 'knight') {
                ctx.fillStyle = '#3a6ea5';
                ctx.fillRect(psx, psy, 40, 40);
                ctx.fillStyle = '#f9c87a';
                ctx.beginPath();
                ctx.arc(psx + 20, psy + 12, 12, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#ccccaa';
                ctx.fillRect(psx + 28, psy + 18, 12, 6);
            } else if (player.className === 'archer') {
                ctx.fillStyle = '#6f9e4f';
                ctx.fillRect(psx, psy, 40, 40);
                ctx.fillStyle = '#f9c87a';
                ctx.beginPath();
                ctx.arc(psx + 20, psy + 12, 12, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#8aae6a';
                ctx.fillRect(psx + 26, psy + 20, 14, 4);
                ctx.fillStyle = '#ccaa66';
                ctx.fillRect(psx + 32, psy + 18, 8, 8);
            } else {
                ctx.fillStyle = '#a367c2';
                ctx.fillRect(psx, psy, 40, 40);
                ctx.fillStyle = '#f9c87a';
                ctx.beginPath();
                ctx.arc(psx + 20, psy + 12, 12, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#ff88aa';
                ctx.fillRect(psx + 24, psy + 18, 16, 6);
                ctx.beginPath();
                ctx.moveTo(psx + 36, psy + 20);
                ctx.lineTo(psx + 44, psy + 16);
                ctx.lineTo(psx + 36, psy + 12);
                ctx.fill();
            }
            
            let hpPercent = player.hp / player.maxHp;
            ctx.fillStyle = '#a13333';
            ctx.fillRect(psx, psy - 10, 40, 5);
            ctx.fillStyle = '#d65c5c';
            ctx.fillRect(psx, psy - 10, 40 * hpPercent, 5);
            ctx.fillStyle = '#ffd966';
            ctx.font = 'bold 10px monospace';
            ctx.fillText('Герой', psx + 12, psy - 12);
        }
        
        // ==================== ОБРАБОТКА КЛИКОВ ====================
        function handleCanvasClick(e) {
            let rect = canvas.getBoundingClientRect();
            let clickX = (e.clientX - rect.left) * (canvas.width / rect.width);
            let clickY = (e.clientY - rect.top) * (canvas.height / rect.height);
            let worldX = clickX + camera.x;
            let worldY = clickY + camera.y;
            let tileX = Math.floor(worldX / TILE_SIZE);
            let tileY = Math.floor(worldY / TILE_SIZE);
            
            if (tileX < 0 || tileX >= WORLD_WIDTH || tileY < 0 || tileY >= WORLD_HEIGHT) return;
            
            let clickedMonster = null;
            for (let m of monsters) {
                if (m.alive && m.tileX === tileX && m.tileY === tileY) {
                    clickedMonster = m;
                    break;
                }
            }
            
            if (clickedMonster) {
                selectedMonsterId = clickedMonster.id;
                currentTargetMonster = clickedMonster;
                player.attackMonster(clickedMonster);
            } else {
                if (tileX === safeZone.x && tileY === safeZone.y) {
                    openShop();
                } else {
                    player.moveToTile(tileX, tileY);
                    if (currentTargetMonster) {
                        let dist = Math.abs(player.tileX - currentTargetMonster.tileX) + Math.abs(player.tileY - currentTargetMonster.tileY);
                        if (dist > 8) currentTargetMonster = null;
                    }
                }
            }
        }
        
        // АВТО-АТАКА ПО ЦЕЛИ
        setInterval(() => {
            if (currentTargetMonster && currentTargetMonster.alive && player.hp > 0) {
                let dist = Math.abs(player.tileX - currentTargetMonster.tileX) + Math.abs(player.tileY - currentTargetMonster.tileY);
                let maxDist = player.className === 'knight' ? 1 : 12;
                if (dist <= maxDist) {
                    player.attackMonster(currentTargetMonster);
                } else if (dist > 10) {
                    currentTargetMonster = null;
                }
            }
        }, 500);
        
        // ==================== ВСПОМОГАТЕЛЬНЫЕ ====================
        function addLog(msg) {
            let div = document.createElement('div');
            div.className = 'log-message';
            div.innerText = msg;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 2500);
        }
        
        function showDamage(x, y, damage) {
            let div = document.createElement('div');
            div.className = 'damage-number';
            div.innerText = `-${Math.floor(damage)}`;
            let screenX = x - camera.x;
            let screenY = y - camera.y;
            div.style.left = screenX + 'px';
            div.style.top = screenY + 'px';
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 800);
        }
        
        // ==================== ИНИЦИАЛИЗАЦИЯ ====================
        generateWorld();
        spawnMonsters();
        initInventory();
        updateUI();
        updateInventoryUI();
        
        canvas.addEventListener('click', handleCanvasClick);
        
        document.getElementById('healPotionBtn').onclick = useHealPotion;
        document.getElementById('manaPotionBtn').onclick = useManaPotion;
        document.getElementById('superSkillBtn').onclick = useSuperSkill;
        document.getElementById('statsBtn').onclick = () => document.getElementById('statsPanel').style.display = 'block';
        document.getElementById('closeStats').onclick = () => document.getElementById('statsPanel').style.display = 'none';
        document.getElementById('invTopBtn').onclick = () => {
            let p = document.getElementById('inventoryPanel');
            p.style.display = p.style.display === 'none' ? 'block' : 'none';
            updateInventoryUI();
        };
        document.getElementById('closeInv').onclick = () => document.getElementById('inventoryPanel').style.display = 'none';
        document.getElementById('closeShop').onclick = () => document.getElementById('shopPanel').style.display = 'none';
        
        document.getElementById('classKnightBtn').onclick = () => { player.className = 'knight'; addLog('Класс изменён на Рыцаря'); updateUI(); };
        document.getElementById('classArcherBtn').onclick = () => { player.className = 'archer'; addLog('Класс изменён на Лучника'); updateUI(); };
        document.getElementById('classMageBtn').onclick = () => { player.className = 'mage'; addLog('Класс изменён на Мага'); updateUI(); };
        
        let lastTimestamp = 0;
        function gameLoop(timestamp) {
            let deltaTime = Math.min(0.033, (timestamp - lastTimestamp) / 1000);
            lastTimestamp = timestamp;
            player.updateMovement(deltaTime);
            for (let m of monsters) m.update(deltaTime, player);
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        requestAnimationFrame(gameLoop);
        addLog('⚔️ Добро пожаловать в Rucoy Online! ⚔️');
        addLog('🖱️ Клик по монстру - атака | По земле - движение');
        
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
