<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=no">
    <title>Rucoy Online - Полная версия</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #0a0c12;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
            font-family: 'Courier New', monospace;
            touch-action: none;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
            background: #1a2a1a;
        }
        
        .corner-buttons {
            position: fixed;
            z-index: 100;
            pointer-events: auto;
        }
        .top-left { top: 12px; left: 12px; display: flex; gap: 8px; }
        .top-right { top: 12px; right: 12px; display: flex; gap: 8px; }
        .bottom-left { bottom: 12px; left: 12px; display: flex; gap: 8px; }
        .bottom-right { bottom: 12px; right: 12px; display: flex; gap: 8px; }
        
        .mini-btn {
            background: rgba(44, 47, 74, 0.85);
            backdrop-filter: blur(4px);
            border: 1px solid #ffaa55;
            color: #ffcc88;
            font-size: 12px;
            font-weight: bold;
            padding: 6px 10px;
            border-radius: 20px;
            box-shadow: 0 2px 0 #121420;
            touch-action: manipulation;
            cursor: pointer;
            font-family: monospace;
            transition: 0.03s linear;
            text-align: center;
            min-width: 55px;
        }
        .mini-btn:active { transform: translateY(2px); }
        .fight-mini { background: rgba(200, 80, 60, 0.85); border-color: #ff8866; color: white; }
        .skill-mini { background: rgba(106, 78, 158, 0.85); border-color: #c88eff; }
        .class-mini { background: rgba(60, 100, 80, 0.85); border-color: #88ffaa; }
        
        @media (max-width: 700px) {
            .mini-btn { font-size: 10px; padding: 4px 8px; min-width: 45px; }
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div class="corner-buttons top-left">
        <button class="mini-btn" id="classBtn">🔄 КЛАСС</button>
    </div>
    
    <div class="corner-buttons top-right">
        <button class="mini-btn" id="statsBtn">⚙️ СТАТ</button>
    </div>
    
    <div class="corner-buttons bottom-left">
        <button class="mini-btn" id="hpBtn">❤️ HP</button>
        <button class="mini-btn" id="mpBtn">💙 MP</button>
    </div>
    
    <div class="corner-buttons bottom-right">
        <button class="mini-btn fight-mini" id="attackBtn">⚔️ АТАКА</button>
        <button class="mini-btn skill-mini" id="skillBtn">✨ СКИЛЛ</button>
    </div>
    
    <div class="corner-buttons" style="bottom: 12px; right: 90px; display: flex; gap: 6px;">
        <button class="mini-btn class-mini" id="classWarriorBtn">⚔️</button>
        <button class="mini-btn class-mini" id="classArcherBtn">🏹</button>
        <button class="mini-btn class-mini" id="classMageBtn">🔮</button>
    </div>

<script>
    (function(){
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        const WORLD_WIDTH = 5800;
        const WORLD_HEIGHT = 4600;
        
        let cameraX = 0, cameraY = 0;
        let canvasWidth = window.innerWidth;
        let canvasHeight = window.innerHeight;
        
        function resizeCanvas() {
            canvasWidth = window.innerWidth;
            canvasHeight = window.innerHeight;
            canvas.width = canvasWidth;
            canvas.height = canvasHeight;
        }
        window.addEventListener('resize', () => {
            resizeCanvas();
            updateCamera();
        });
        resizeCanvas();
        
        let stats = {
            mobsKilled: 0, totalGold: 0, totalDamage: 0, totalDamageTaken: 0,
            startTime: Date.now()
        };
        
        function getPlayTime() {
            let s = Math.floor((Date.now() - stats.startTime) / 1000);
            return { h: Math.floor(s/3600), m: Math.floor((s%3600)/60), s: s%60 };
        }
        
        let safeZone = { x: 500, y: 420, width: 560, height: 440 };
        
        // NPC Торговец
        let shopNPC = { x: safeZone.x + safeZone.width - 80, y: safeZone.y + safeZone.height - 60, radius: 28 };
        
        let gates = [
            { x: safeZone.x + safeZone.width/2 - 50, y: safeZone.y - 30, width: 100, height: 40 },
            { x: safeZone.x + safeZone.width/2 - 50, y: safeZone.y + safeZone.height - 10, width: 100, height: 40 },
            { x: safeZone.x - 30, y: safeZone.y + safeZone.height/2 - 50, width: 40, height: 100 },
            { x: safeZone.x + safeZone.width - 10, y: safeZone.y + safeZone.height/2 - 50, width: 40, height: 100 }
        ];
        
        function isInSafeZone(x, y) {
            return x > safeZone.x && x < safeZone.x + safeZone.width && y > safeZone.y && y < safeZone.y + safeZone.height;
        }
        
        function isAtGate(x, y) {
            for(let g of gates) if(x > g.x && x < g.x+g.width && y > g.y && y < g.y+g.height) return true;
            return false;
        }
        
        function canCrossBoundary(fx, fy, tx, ty) {
            let was = isInSafeZone(fx, fy);
            let will = isInSafeZone(tx, ty);
            if(was === will) return true;
            let mx = (fx+tx)/2, my = (fy+ty)/2;
            return isAtGate(mx, my) || isAtGate(tx, ty) || isAtGate(fx, fy);
        }
        
        let obstacles = [];
        
        function generateWorld() {
            obstacles = [];
            for(let i=0;i<38;i++) {
                let fx = safeZone.x + i*28;
                if(!(fx>gates[0].x-20 && fx<gates[0].x+gates[0].width+20)) obstacles.push({x:fx,y:safeZone.y-18,radius:14,type:'fence'});
                if(!(fx>gates[1].x-20 && fx<gates[1].x+gates[1].width+20)) obstacles.push({x:fx,y:safeZone.y+safeZone.height+8,radius:14,type:'fence'});
            }
            for(let i=0;i<30;i++) {
                let fy = safeZone.y + i*28;
                if(!(fy>gates[2].y-20 && fy<gates[2].y+gates[2].height+20)) obstacles.push({x:safeZone.x-18,y:fy,radius:14,type:'fence'});
                if(!(fy>gates[3].y-20 && fy<gates[3].y+gates[3].height+20)) obstacles.push({x:safeZone.x+safeZone.width+8,y:fy,radius:14,type:'fence'});
            }
            for(let i=0;i<420;i++) {
                let x=80+Math.random()*(WORLD_WIDTH-160), y=80+Math.random()*(WORLD_HEIGHT-160);
                if(x>safeZone.x-80 && x<safeZone.x+safeZone.width+80 && y>safeZone.y-80 && y<safeZone.y+safeZone.height+80) continue;
                obstacles.push({x,y,radius:26,type:'tree'});
            }
            for(let i=0;i<85;i++) {
                let x=100+Math.random()*(WORLD_WIDTH-200), y=100+Math.random()*(WORLD_HEIGHT-200);
                if(x>safeZone.x-100 && x<safeZone.x+safeZone.width+100 && y>safeZone.y-100 && y<safeZone.y+safeZone.height+100) continue;
                obstacles.push({x,y,radius:38,type:'mountain'});
            }
            for(let i=0;i<260;i++) {
                let x=50+Math.random()*(WORLD_WIDTH-100), y=50+Math.random()*(WORLD_HEIGHT-100);
                if(x>safeZone.x-60 && x<safeZone.x+safeZone.width+60 && y>safeZone.y-60 && y<safeZone.y+safeZone.height+60) continue;
                obstacles.push({x,y,radius:16,type:'rock'});
            }
        }
        
        function isWalkable(x,y,r=24) {
            if(x-r<25 || x+r>WORLD_WIDTH-25 || y-r<25 || y+r>WORLD_HEIGHT-25) return false;
            for(let o of obstacles) if(Math.hypot(x-o.x,y-o.y)<r+o.radius) return false;
            return true;
        }
        
        function canMoveTo(x,y,r=24) {
            if(!isWalkable(x,y,r)) return false;
            if(!canCrossBoundary(player.x,player.y,x,y)) return false;
            return true;
        }
        
        // КЛАССЫ С РАЗНОЙ ДАЛЬНОСТЬЮ
        const CLASSES = {
            warrior: { name: "Мечник", icon: "⚔️", color: "#6c8cae", armor: "#5a7a9a", 
                hp: 320, mp: 75, dmgMin: 34, dmgMax: 60, skill: "Вихрь", 
                range: 55, skillRange: 70, isMelee: true },
            archer: { name: "Лучник", icon: "🏹", color: "#7cae6c", armor: "#6a8a5a", 
                hp: 260, mp: 120, dmgMin: 32, dmgMax: 58, skill: "Тройной выстрел", 
                range: 150, skillRange: 180, isMelee: false },
            mage: { name: "Маг", icon: "🔮", color: "#b57ad6", armor: "#9a6aba", 
                hp: 210, mp: 210, dmgMin: 40, dmgMax: 70, skill: "Огненный взрыв", 
                range: 140, skillRange: 170, isMelee: false }
        };
        
        // ПИКСЕЛЬНЫЕ МОДЕЛИ МОБОВ
        const MOB_TYPES = [
            { name: "Гоблин", hp: 70, dmg: 16, exp: 38, color: "#6f8c5a", skin: "#8cae6a", icon: "👺", speed: 1.0, range: 55, draw: drawGoblin },
            { name: "Волк", hp: 95, dmg: 24, exp: 55, color: "#8a7a6a", skin: "#c0a890", icon: "🐺", speed: 1.3, range: 50, draw: drawWolf },
            { name: "Медведь", hp: 150, dmg: 32, exp: 78, color: "#8b5a3a", skin: "#b87a4a", icon: "🐻", speed: 0.9, range: 58, draw: drawBear },
            { name: "Скелет", hp: 170, dmg: 32, exp: 95, color: "#b8b8cc", skin: "#d0d0e0", icon: "💀", speed: 1.1, range: 55, draw: drawSkeleton },
            { name: "Орк", hp: 240, dmg: 45, exp: 132, color: "#8a6a4a", skin: "#aa8262", icon: "👺", speed: 0.85, range: 58, draw: drawOrc },
            { name: "Дракон", hp: 310, dmg: 58, exp: 210, color: "#c97a3a", skin: "#e09a5a", icon: "🐉", speed: 0.6, range: 65, draw: drawDragon }
        ];
        
        // ФУНКЦИИ ОТРИСОВКИ МОБОВ
        function drawGoblin(x, y, color, skin) {
            ctx.fillStyle = skin; ctx.fillRect(x-12, y-18, 24, 32);
            ctx.fillStyle = color; ctx.fillRect(x-10, y-10, 20, 24);
            ctx.fillStyle = "#000"; ctx.fillRect(x-6, y-12, 4, 4); ctx.fillRect(x+2, y-12, 4, 4);
            ctx.fillStyle = "#8b5a2b"; ctx.fillRect(x-8, y+4, 16, 8);
            ctx.fillStyle = "#fff"; ctx.fillRect(x-4, y-4, 2, 2); ctx.fillRect(x+2, y-4, 2, 2);
        }
        
        function drawWolf(x, y, color, skin) {
            ctx.fillStyle = skin; ctx.fillRect(x-14, y-16, 28, 28);
            ctx.fillStyle = color; ctx.fillRect(x-12, y-12, 24, 22);
            ctx.fillStyle = "#000"; ctx.fillRect(x-8, y-10, 4, 4); ctx.fillRect(x+4, y-10, 4, 4);
            ctx.fillStyle = "#4a3a2a"; ctx.fillRect(x-4, y+2, 8, 6);
            for(let i=0;i<2;i++) ctx.fillRect(x-10+i*16, y-4, 4, 4);
        }
        
        function drawBear(x, y, color, skin) {
            ctx.fillStyle = skin; ctx.fillRect(x-16, y-20, 32, 36);
            ctx.fillStyle = color; ctx.fillRect(x-14, y-12, 28, 28);
            ctx.fillStyle = "#000"; ctx.fillRect(x-8, y-14, 5, 5); ctx.fillRect(x+3, y-14, 5, 5);
            ctx.fillStyle = "#5a3a2a"; ctx.fillRect(x-6, y+2, 12, 8);
        }
        
        function drawSkeleton(x, y, color, skin) {
            ctx.fillStyle = skin; ctx.fillRect(x-12, y-20, 24, 36);
            ctx.fillStyle = color; ctx.fillRect(x-10, y-12, 20, 28);
            ctx.fillStyle = "#000"; ctx.fillRect(x-6, y-14, 4, 4); ctx.fillRect(x+2, y-14, 4, 4);
            ctx.fillStyle = "#8a8a8a"; ctx.fillRect(x-8, y+2, 16, 6);
            for(let i=0;i<2;i++) ctx.fillRect(x-4+i*8, y-2, 3, 8);
        }
        
        function drawOrc(x, y, color, skin) {
            ctx.fillStyle = skin; ctx.fillRect(x-14, y-20, 28, 36);
            ctx.fillStyle = color; ctx.fillRect(x-12, y-12, 24, 28);
            ctx.fillStyle = "#000"; ctx.fillRect(x-8, y-14, 5, 5); ctx.fillRect(x+3, y-14, 5, 5);
            ctx.fillStyle = "#b87c3a"; ctx.fillRect(x-10, y+2, 20, 10);
            for(let i=0;i<2;i++) ctx.fillRect(x-6+i*12, y-4, 4, 8);
        }
        
        function drawDragon(x, y, color, skin) {
            ctx.fillStyle = skin; ctx.fillRect(x-16, y-22, 32, 40);
            ctx.fillStyle = color; ctx.fillRect(x-14, y-14, 28, 32);
            ctx.fillStyle = "#000"; ctx.fillRect(x-8, y-16, 5, 5); ctx.fillRect(x+3, y-16, 5, 5);
            ctx.fillStyle = "#d97a3a"; ctx.fillRect(x-12, y-2, 24, 8);
            ctx.fillStyle = "#ffaa66"; ctx.fillRect(x-4, y-22, 8, 8);
        }
        
        let mobs = [], spawnTimer = 0;
        const MAX_MOBS = 30;
        
        function createMob() {
            let t = MOB_TYPES[Math.floor(Math.random() * MOB_TYPES.length)];
            let lvl = Math.max(1, player.level + Math.floor(Math.random() * 4) - 2);
            let hpMult = 1 + (lvl-1)*0.15, dmgMult = 1 + (lvl-1)*0.13;
            return {
                name: t.name + " Lv." + lvl, level: lvl,
                hp: Math.floor(t.hp * hpMult), maxHp: Math.floor(t.hp * hpMult),
                dmg: Math.floor(t.dmg * dmgMult),
                exp: Math.floor(t.exp * (0.85 + lvl*0.12)),
                color: t.color, skin: t.skin, icon: t.icon,
                speed: t.speed, attackRange: t.range,
                drawFunc: t.draw,
                x: 0, y: 0, attackTimer: 0
            };
        }
        
        function spawnMob() {
            if(mobs.length >= MAX_MOBS) return;
            for(let a=0;a<50;a++) {
                let x=150+Math.random()*(WORLD_WIDTH-300), y=120+Math.random()*(WORLD_HEIGHT-240);
                if(isWalkable(x,y,26) && !isInSafeZone(x,y) && Math.hypot(x-player.x,y-player.y)>200) {
                    let m=createMob(); m.x=x; m.y=y; mobs.push(m); return;
                }
            }
        }
        
        let player = {
            x: safeZone.x + safeZone.width/2, y: safeZone.y + safeZone.height/2,
            targetX: null, targetY: null,
            hp: 320, maxHp: 320, mp: 75, maxMp: 75,
            level: 1, exp: 0, expToNext: 90,
            classType: "warrior",
            potionHp: 5, potionMp: 5,
            gold: 450, speed: 4.5, defense: 15,
            attackTimer: 0, superCooldown: 0
        };
        
        // ДВИЖЕНИЕ
        function moveTo(x, y) {
            player.targetX = x;
            player.targetY = y;
        }
        
        function updateMove() {
            if(player.targetX === null || player.targetY === null) return;
            let dx = player.targetX - player.x;
            let dy = player.targetY - player.y;
            let dist = Math.hypot(dx, dy);
            if(dist < 8) {
                player.targetX = null;
                player.targetY = null;
                return;
            }
            let step = Math.min(player.speed, dist);
            let ang = Math.atan2(dy, dx);
            let nx = player.x + Math.cos(ang) * step;
            let ny = player.y + Math.sin(ang) * step;
            if(canMoveTo(nx, ny, 24)) {
                player.x = nx;
                player.y = ny;
            } else {
                player.targetX = null;
                player.targetY = null;
            }
        }
        
        // СУПЕРСПОСОБНОСТИ
        let explosionTarget = null;
        let whirlwindActive = false;
        let whirlwindTimer = 0;
        
        function useSuper() {
            if(player.superCooldown > 0) {
                addMsg(`🌟 Суперспособность: ${Math.ceil(player.superCooldown/10)} сек`, true);
                return;
            }
            let c = CLASSES[player.classType];
            if(c.name === "Мечник") {
                whirlwindActive = true;
                whirlwindTimer = 30;
                player.superCooldown = 180;
                addMsg(`🌀 ВИХРЬ! Урон x2 по всем врагам!`);
                for(let mob of mobs) {
                    if(Math.hypot(player.x-mob.x,player.y-mob.y)<100 && mob.hp>0) {
                        let {min,max}=getDamageRange(), avg=(min+max)/2, dmg=Math.floor(avg*2);
                        mob.hp-=dmg; stats.totalDamage+=dmg; showDamage(mob.x,mob.y,dmg);
                        addMsg(`🌀 Вихрь → ${dmg} урона ${mob.name}!`);
                        if(mob.hp<=0) killMob(mob);
                    }
                }
            } else if(c.name === "Лучник") {
                let targets = mobs.filter(m=>m.hp>0 && Math.hypot(player.x-m.x,player.y-m.y)<200);
                targets.sort((a,b)=>Math.hypot(player.x-a.x,player.y-a.y)-Math.hypot(player.x-b.x,player.y-b.y));
                let hit=0;
                for(let mob of targets.slice(0,3)) {
                    let {min,max}=getDamageRange(), avg=(min+max)/2, dmg=Math.floor(avg*3);
                    mob.hp-=dmg; stats.totalDamage+=dmg; showDamage(mob.x,mob.y,dmg);
                    addMsg(`🏹 Тройной выстрел → ${dmg} урона ${mob.name}!`);
                    if(mob.hp<=0) killMob(mob); hit++;
                }
                if(hit>0) player.superCooldown=180;
                else addMsg(`🏹 Нет врагов поблизости!`, true);
            } else if(c.name === "Маг") {
                addMsg(`🔥 Нажмите на любое место для взрыва!`);
                explosionTarget = { active: true };
                return;
            }
        }
        
        function castExplosion(wx, wy) {
            if(!explosionTarget?.active) return;
            explosionTarget = null;
            let {min,max}=getDamageRange(), avg=(min+max)/2, dmg=Math.floor(avg*2.5), hit=false;
            for(let mob of mobs) {
                if(Math.hypot(wx-mob.x,wy-mob.y)<80 && mob.hp>0) {
                    mob.hp-=dmg; stats.totalDamage+=dmg; showDamage(mob.x,mob.y,dmg);
                    addMsg(`🔥 Взрыв → ${dmg} урона ${mob.name}!`);
                    if(mob.hp<=0) killMob(mob); hit=true;
                }
            }
            damageFloats.push({x:wx,y:wy,dmg:"💥",life:15,isExplosion:true});
            if(!hit) addMsg(`🔥 Взрыв не задел врагов!`, true);
            player.superCooldown = 180;
        }
        
        let selectedMob = null, messages = [], damageFloats = [], showStats = false, shopOpen = false;
        
        function addMsg(t, e=false) { messages.unshift({text:t,isErr:e,life:180}); if(messages.length>5) messages.pop(); }
        function getDamageRange() { let c=CLASSES[player.classType]; return { min: c.dmgMin+Math.floor(player.level*2), max: c.dmgMax+Math.floor(player.level*2.8) }; }
        function showDamage(x,y,dmg,isPlayer=false) { damageFloats.push({x,y,dmg,life:20,isPlayer}); }
        
        function killMob(mob) {
            let expGain=mob.exp, goldGain=Math.floor(25+Math.random()*(player.level*13));
            player.exp+=expGain; player.gold+=goldGain;
            stats.mobsKilled++; stats.totalGold+=goldGain;
            addMsg(`✨ +${expGain} опыта, +${goldGain}💰`);
            if(Math.random()<0.5) { if(Math.random()<0.6) player.potionHp++; else player.potionMp++; addMsg(`🧪 Выпало зелье!`); }
            let idx=mobs.indexOf(mob); if(idx!==-1) mobs.splice(idx,1);
            if(selectedMob===mob) selectedMob=null;
            while(player.exp>=player.expToNext) {
                player.exp-=player.expToNext; player.level++;
                player.maxHp=CLASSES[player.classType].hp+player.level*15;
                player.maxMp=CLASSES[player.classType].mp+player.level*11;
                player.hp=player.maxHp; player.mp=player.maxMp;
                player.expToNext=90+player.level*38;
                addMsg(`⭐⭐ УРОВЕНЬ ${player.level}! ⭐⭐`);
            }
        }
        
        function playerAttack() {
            if(!selectedMob || selectedMob.hp<=0) { selectedMob=null; return false; }
            if(player.attackTimer > 0) return false;
            let c=CLASSES[player.classType], dist=Math.hypot(player.x-selectedMob.x,player.y-selectedMob.y);
            if(dist > c.range) { 
                addMsg(`🏃 Слишком далеко! (нужно ${c.range}px, у вас ${Math.floor(dist)}px)`, true); 
                return false; 
            }
            let {min,max}=getDamageRange(), dmg=Math.floor(Math.random()*(max-min+1)+min);
            selectedMob.hp-=dmg; stats.totalDamage+=dmg; player.attackTimer = 30;
            addMsg(`⚔️ ${c.name} → ${dmg} урона ${selectedMob.name}!`);
            showDamage(selectedMob.x,selectedMob.y,dmg);
            if(selectedMob.hp<=0) killMob(selectedMob);
            return true;
        }
        
        function useSkill() {
            if(!selectedMob || selectedMob.hp<=0) { addMsg(`🎯 Выберите цель!`, true); return; }
            let c=CLASSES[player.classType], dist=Math.hypot(player.x-selectedMob.x,player.y-selectedMob.y);
            if(dist>c.skillRange) { addMsg(`🏃 Слишком далеко для способности!`, true); return; }
            let manaCost=30+Math.floor(player.level/2);
            if(player.mp<manaCost) { addMsg(`💙 Не хватает маны! (${manaCost} MP)`, true); return; }
            player.mp-=manaCost;
            let {min,max}=getDamageRange(), avg=(min+max)/2, dmg=Math.floor(avg*2.4);
            selectedMob.hp-=dmg; stats.totalDamage+=dmg;
            addMsg(`✨ ${c.skill}! ${dmg} урона по ${selectedMob.name}!`);
            showDamage(selectedMob.x,selectedMob.y,dmg);
            if(selectedMob.hp<=0) killMob(selectedMob);
        }
        
        function updateMobs() {
            for(let m of mobs) {
                if(m.hp<=0) continue;
                let dx=player.x-m.x, dy=player.y-m.y, dist=Math.hypot(dx,dy);
                if(dist<230 && !isInSafeZone(player.x,player.y)) {
                    let ang=Math.atan2(dy,dx), step=Math.min(m.speed,dist-48);
                    if(step>0) { let nx=m.x+Math.cos(ang)*step, ny=m.y+Math.sin(ang)*step; if(isWalkable(nx,ny,26) && !isInSafeZone(nx,ny)) { m.x=nx; m.y=ny; } }
                    if(dist<m.attackRange+15) {
                        if(m.attackTimer <= 0) {
                            let dmg=Math.max(5,m.dmg-Math.floor(player.defense/3));
                            player.hp-=dmg; stats.totalDamageTaken+=dmg; m.attackTimer = 30;
                            addMsg(`💀 ${m.name} нанес ${dmg} урона!`, true);
                            showDamage(m.x,m.y,dmg,true);
                            if(player.hp<=0) {
                                player.hp=player.maxHp; player.mp=player.maxMp;
                                player.x=safeZone.x+safeZone.width/2; player.y=safeZone.y+safeZone.height/2;
                                player.targetX=null; player.targetY=null;
                                addMsg(`💀 ВОСКРЕШЕНИЕ В БЕЗОПАСНОЙ ЗОНЕ 💀`, true);
                            }
                        } else m.attackTimer--;
                    } else if(m.attackTimer>0) m.attackTimer--;
                } else if(m.attackTimer>0) m.attackTimer--;
            }
        }
        
        function useHp() {
            if(!isInSafeZone(player.x,player.y)) { addMsg(`🏪 Зелья только в безопасной зоне!`, true); return; }
            if(player.potionHp<=0) { addMsg(`❌ Нет зелий HP! Купите у торговца`, true); return; }
            let heal=Math.floor(player.maxHp*0.75);
            player.hp=Math.min(player.maxHp,player.hp+heal); player.potionHp--;
            addMsg(`❤️ +${heal} HP (осталось ${player.potionHp})`);
        }
        
        function useMp() {
            if(!isInSafeZone(player.x,player.y)) { addMsg(`🏪 Зелья только в безопасной зоне!`, true); return; }
            if(player.potionMp<=0) { addMsg(`❌ Нет зелий MP! Купите у торговца`, true); return; }
            let mana=Math.floor(player.maxMp*0.8);
            player.mp=Math.min(player.maxMp,player.mp+mana); player.potionMp--;
            addMsg(`💙 +${mana} MP (осталось ${player.potionMp})`);
        }
        
        // МАГАЗИН NPC
        const SHOP = [
            { name: "Зелье HP", type: "hp", price: 60, icon: "❤️" },
            { name: "Зелье MP", type: "mp", price: 55, icon: "💙" },
            { name: "Большое HP", type: "hp_big", price: 160, icon: "❤️✨" },
            { name: "Большое MP", type: "mp_big", price: 150, icon: "💙✨" }
        ];
        
        function openShop() {
            if(isInSafeZone(player.x,player.y)) { 
                shopOpen = !shopOpen; 
                addMsg(shopOpen ? "🏪 Магазин открыт" : "🏪 Магазин закрыт"); 
            } else { 
                addMsg(`🏪 Подойдите к торговцу в безопасной зоне!`, true); 
            }
        }
        
        function buyItem(item) {
            if(player.gold>=item.price) {
                player.gold-=item.price;
                if(item.type==="hp") player.potionHp++;
                else if(item.type==="mp") player.potionMp++;
                else if(item.type==="hp_big") player.potionHp+=2;
                else if(item.type==="mp_big") player.potionMp+=2;
                addMsg(`✅ Куплен ${item.name}!`);
            } else addMsg(`💰 Не хватает золота!`, true);
        }
        
        function switchClass(className) {
            let classes = Object.keys(CLASSES);
            let newClass = className || classes[(classes.indexOf(player.classType)+1)%classes.length];
            if(player.classType===newClass) return;
            let hpPercent=player.hp/player.maxHp, mpPercent=player.mp/player.maxMp;
            player.classType=newClass;
            player.maxHp=CLASSES[newClass].hp+player.level*15;
            player.maxMp=CLASSES[newClass].mp+player.level*11;
            player.hp=Math.max(1,Math.min(player.maxHp,Math.floor(player.maxHp*hpPercent)));
            player.mp=Math.max(1,Math.min(player.maxMp,Math.floor(player.maxMp*mpPercent)));
            addMsg(`🔄 Класс: ${CLASSES[newClass].name} ${CLASSES[newClass].icon} | Дальность: ${CLASSES[newClass].range}px`);
        }
        
        function isClickOnNPC(wx, wy) {
            let distToNPC = Math.hypot(wx - shopNPC.x, wy - shopNPC.y);
            if(distToNPC < shopNPC.radius + 15) {
                openShop();
                return true;
            }
            return false;
        }
        
        function selectMobAt(wx,wy) {
            for(let m of mobs) if(Math.hypot(m.x-wx,m.y-wy)<55 && m.hp>0) { selectedMob=m; addMsg(`🎯 Цель: ${m.name} (${m.hp}/${m.maxHp} HP)`); return true; }
            return false;
        }
        
        function handleClick(wx,wy) {
            if(showStats) { showStats=false; return; }
            if(shopOpen) {
                let cx=canvasWidth/2, cy=canvasHeight/2-40;
                for(let i=0;i<SHOP.length;i++) { let y=cy-20+i*62; if(wy>cameraY+y-25 && wy<cameraY+y+35) { buyItem(SHOP[i]); return; } }
                shopOpen=false; return;
            }
            if(explosionTarget?.active) { castExplosion(wx,wy); return; }
            if(isClickOnNPC(wx,wy)) return;
            if(selectMobAt(wx,wy)) return;
            moveTo(wx,wy);
        }
        
        function updateCamera() {
            let tx=player.x-canvasWidth/2, ty=player.y-canvasHeight/2;
            tx=Math.min(Math.max(tx,0),WORLD_WIDTH-canvasWidth);
            ty=Math.min(Math.max(ty,0),WORLD_HEIGHT-canvasHeight);
            cameraX+=(tx-cameraX)*0.1; cameraY+=(ty-cameraY)*0.1;
        }
        
        function drawWorld() {
            for(let i=0;i<WORLD_WIDTH/52+10;i++) for(let j=0;j<WORLD_HEIGHT/52+10;j++) {
                let x=i*52-cameraX, y=j*52-cameraY;
                if(x>-60 && x<canvasWidth+60 && y>-60 && y<canvasHeight+60) {
                    ctx.fillStyle=((i+j)%2===0)?"#4a8c3a":"#3a6c2a";
                    ctx.fillRect(x,y,51,51);
                }
            }
            for(let o of obstacles) {
                let x=o.x-cameraX, y=o.y-cameraY;
                if(x>-120 && x<canvasWidth+120 && y>-120 && y<canvasHeight+120) {
                    if(o.type==='tree') {
                        ctx.fillStyle="#3c9e3c"; ctx.fillRect(x-18,y-32,36,58);
                        ctx.fillStyle="#8b5a2b"; ctx.fillRect(x-10,y-8,20,32);
                        ctx.fillStyle="#5aac3a"; ctx.beginPath(); ctx.ellipse(x,y-42,26,30,0,0,Math.PI*2); ctx.fill();
                    } else if(o.type==='mountain') {
                        ctx.fillStyle="#6e6e7a"; ctx.beginPath(); ctx.moveTo(x,y-45); ctx.lineTo(x-40,y+15); ctx.lineTo(x+40,y+15); ctx.fill();
                        ctx.fillStyle="#8e8e9a"; ctx.beginPath(); ctx.moveTo(x-12,y-15); ctx.lineTo(x,y-38); ctx.lineTo(x+12,y-15); ctx.fill();
                    } else if(o.type==='rock') { ctx.fillStyle="#7a6a5a"; ctx.beginPath(); ctx.ellipse(x,y,18,14,0,0,Math.PI*2); ctx.fill(); }
                    else if(o.type==='fence') { ctx.fillStyle="#c99e6f"; ctx.fillRect(x-10,y-14,20,32); for(let i=0;i<3;i++) ctx.fillRect(x-6+i*6,y-22,3,14); }
                }
            }
            let szX=safeZone.x-cameraX, szY=safeZone.y-cameraY;
            ctx.fillStyle="#88aa66aa"; ctx.fillRect(szX,szY,safeZone.width,safeZone.height);
            
            // NPC Торговец
            let npcX = shopNPC.x - cameraX;
            let npcY = shopNPC.y - cameraY;
            ctx.fillStyle = "#c99e6f";
            ctx.fillRect(npcX-18, npcY-25, 36, 45);
            ctx.fillStyle = "#e8c28a";
            ctx.fillRect(npcX-12, npcY-15, 24, 30);
            ctx.fillStyle = "#000";
            ctx.fillRect(npcX-8, npcY-10, 5, 5);
            ctx.fillRect(npcX+3, npcY-10, 5, 5);
            ctx.font = "24px monospace";
            ctx.fillStyle = "#ffdd99";
            ctx.fillText("🏪", npcX-12, npcY+5);
            ctx.font = "10px monospace";
            ctx.fillStyle = "#ffffaa";
            ctx.fillText("Торговец", npcX-20, npcY-28);
            
            for(let g of gates) {
                let gx=g.x-cameraX, gy=g.y-cameraY;
                ctx.fillStyle="#c9a87a"; ctx.fillRect(gx,gy,g.width,g.height);
                ctx.fillStyle="#e8c28a";
                if(g.width>g.height) for(let i=0;i<3;i++) ctx.fillRect(gx+15+i*25,gy+12,12,18);
                else for(let i=0;i<3;i++) ctx.fillRect(gx+12,gy+15+i*25,18,12);
            }
        }
        
        function drawPlayer() {
            let x=player.x-cameraX, y=player.y-cameraY, c=CLASSES[player.classType];
            // Тело человека
            ctx.fillStyle = "#e0c8a0";
            ctx.fillRect(x-12, y-24, 24, 44);
            // Одежда/броня
            ctx.fillStyle = c.color;
            ctx.fillRect(x-10, y-16, 20, 32);
            ctx.fillStyle = c.armor;
            ctx.fillRect(x-8, y-8, 16, 24);
            // Голова
            ctx.fillStyle = "#e0c8a0";
            ctx.fillRect(x-8, y-28, 16, 16);
            // Глаза
            ctx.fillStyle = "#fff";
            ctx.fillRect(x-5, y-24, 4, 4);
            ctx.fillRect(x+1, y-24, 4, 4);
            ctx.fillStyle = "#000";
            ctx.fillRect(x-4, y-23, 2, 2);
            ctx.fillRect(x+2, y-23, 2, 2);
            // Оружие
            ctx.fillStyle = "#ccaaff";
            if(c.name === "Мечник") ctx.fillRect(x+8, y-12, 8, 24);
            else if(c.name === "Лучник") ctx.fillRect(x+8, y-14, 12, 6);
            else if(c.name === "Маг") { ctx.fillStyle = "#ffaa66"; ctx.fillRect(x+6, y-14, 10, 10); }
            // Иконка класса
            ctx.font = "16px monospace";
            ctx.fillStyle = "#ffffaa";
            ctx.fillText(c.icon, x-6, y+2);
            // Полоска HP
            ctx.fillStyle = "#a33";
            ctx.fillRect(x-20, y-36, 56, 7);
            ctx.fillStyle = "#4f6";
            ctx.fillRect(x-20, y-36, 56 * (player.hp/player.maxHp), 7);
            // Эффект вихря
            if(whirlwindActive) {
                ctx.fillStyle = "#ffaa44aa";
                ctx.beginPath();
                ctx.arc(x, y, 45, 0, Math.PI*2);
                ctx.fill();
                whirlwindTimer--;
                if(whirlwindTimer <= 0) whirlwindActive = false;
            }
        }
        
        function drawMob(m) {
            let x = m.x - cameraX;
            let y = m.y - cameraY;
            if(x < -80 || x > canvasWidth+80) return;
            m.drawFunc(x, y, m.color, m.skin);
            // Полоска HP
            let percent = m.hp / m.maxHp;
            ctx.fillStyle = "#a33";
            ctx.fillRect(x-24, y-32, 48, 6);
            ctx.fillStyle = "#4f6";
            ctx.fillRect(x-24, y-32, 48 * percent, 6);
            // Имя и уровень
            ctx.font = "9px monospace";
            ctx.fillStyle = "#ffffaa";
            ctx.fillText(m.name, x-20, y-38);
        }
        
        function drawUI() {
            let c=CLASSES[player.classType], fs=Math.max(12,Math.min(16,canvasWidth/65));
            ctx.fillStyle="#000000aa"; ctx.fillRect(12,12,210,75);
            ctx.fillStyle="#c55"; ctx.fillRect(18,18,190,18);
            ctx.fillStyle="#f75"; ctx.fillRect(18,18,190*(player.hp/player.maxHp),18);
            ctx.fillStyle="#58f"; ctx.fillRect(18,42,190*(player.mp/player.maxMp),16);
            ctx.fillStyle="#fff"; ctx.font=`bold ${fs}px monospace`; ctx.fillText(`❤️ ${Math.floor(player.hp)}/${player.maxHp}`,22,34);
            ctx.fillText(`💙 ${Math.floor(player.mp)}/${player.maxMp}`,22,56);
            ctx.fillStyle="#fd9"; ctx.font=`bold ${fs+2}px monospace`; ctx.fillText(`${c.name} Lv.${player.level}`,22,88);
            ctx.fillStyle="#000000aa"; ctx.fillRect(12,96,210,14); ctx.fillStyle="#8af"; ctx.fillRect(12,96,210*(player.exp/player.expToNext),14);
            ctx.fillStyle="#fff"; ctx.font=`${fs-2}px monospace`; ctx.fillText(`EXP: ${player.exp}/${player.expToNext}`,18,108);
            ctx.fillStyle="#000000aa"; ctx.fillRect(canvasWidth-145,12,133,60);
            ctx.fillStyle="#fc8"; ctx.font=`bold ${fs}px monospace`; ctx.fillText(`💰 ${player.gold}`,canvasWidth-135,35);
            ctx.fillText(`🧪${player.potionHp}  🔮${player.potionMp}`,canvasWidth-135,60);
            for(let i=0;i<Math.min(4,messages.length);i++) { let m=messages[i]; ctx.fillStyle=m.isErr?"#f86c":"#edbc"; ctx.font=`${fs-2}px monospace`; ctx.fillText(m.text.substring(0,32),15,canvasHeight-45-i*18); }
            if(selectedMob&&selectedMob.hp>0) { let x=selectedMob.x-cameraX, y=selectedMob.y-cameraY; ctx.strokeStyle="#fa4"; ctx.lineWidth=4; ctx.strokeRect(x-20,y-30,56,56); }
            if(player.targetX!==null && player.targetY!==null) { let tx=player.targetX-cameraX, ty=player.targetY-cameraY; ctx.fillStyle="#fc4a"; ctx.beginPath(); ctx.arc(tx,ty,16,0,Math.PI*2); ctx.fill(); ctx.fillStyle="#fa0"; ctx.beginPath(); ctx.arc(tx,ty,8,0,Math.PI*2); ctx.fill(); }
            for(let i=0;i<damageFloats.length;i++) { let d=damageFloats[i], x=d.x-cameraX, y=d.y-cameraY; if(d.isExplosion) { ctx.font="bold 32px monospace"; ctx.fillStyle="#ff8844"; ctx.fillText("💥",x-15,y-20); } else { ctx.font=`bold ${d.isPlayer?18:22}px monospace`; ctx.fillStyle=d.isPlayer?"#fa6":"#f84"; ctx.fillText(`-${d.dmg}`,x-12,y-28); } d.life--; if(d.life<=0) damageFloats.splice(i,1), i--; }
            if(shopOpen&&isInSafeZone(player.x,player.y)) {
                ctx.fillStyle="#000000dd"; ctx.fillRect(canvasWidth/2-210,canvasHeight/2-150,420,280);
                ctx.fillStyle="#fd9"; ctx.font=`bold ${Math.min(24,canvasWidth/30)}px monospace`; ctx.fillText("🏪 МАГАЗИН",canvasWidth/2-80,canvasHeight/2-90);
                for(let i=0;i<SHOP.length;i++) { let it=SHOP[i], y=canvasHeight/2-35+i*62; ctx.fillStyle="#a86"; ctx.fillRect(canvasWidth/2-180,y-12,360,48); ctx.fillStyle="#fc8"; ctx.font=`${Math.min(18,canvasWidth/45)}px monospace`; ctx.fillText(`${it.icon} ${it.name} - ${it.price}💰`,canvasWidth/2-150,y+12); }
            }
            if(showStats) { let t=getPlayTime(); ctx.fillStyle="#000000dd"; ctx.fillRect(canvasWidth/2-190,canvasHeight/2-170,380,340); ctx.fillStyle="#fd9"; ctx.font=`bold ${Math.min(24,canvasWidth/30)}px monospace`; ctx.fillText("⚙️ СТАТИСТИКА",canvasWidth/2-95,canvasHeight/2-120); ctx.font=`${Math.min(14,canvasWidth/50)}px monospace`; ctx.fillStyle="#edb"; ctx.fillText(`👾 Убито: ${stats.mobsKilled}`,canvasWidth/2-150,canvasHeight/2-55); ctx.fillText(`💰 Золота: ${stats.totalGold}`,canvasWidth/2-150,canvasHeight/2-20); ctx.fillText(`⚔️ Урона: ${stats.totalDamage}`,canvasWidth/2-150,canvasHeight/2+15); ctx.fillText(`🛡️ Получено: ${stats.totalDamageTaken}`,canvasWidth/2-150,canvasHeight/2+50); ctx.fillText(`⏱️ Время: ${t.h}h ${t.m}m ${t.s}s`,canvasWidth/2-150,canvasHeight/2+85); ctx.fillText(`⭐ Уровень: ${player.level}`,canvasWidth/2-150,canvasHeight/2+120); }
            if(player.superCooldown>0) { let p=player.superCooldown/180; ctx.fillStyle="#000000aa"; ctx.fillRect(15,canvasHeight-70,70,12); ctx.fillStyle="#ffaa44"; ctx.fillRect(15,canvasHeight-70,70*(1-p),12); ctx.fillStyle="#ffaa88"; ctx.font="10px monospace"; ctx.fillText(`🌟 ${Math.ceil(player.superCooldown/10)}с`,20,canvasHeight-55); }
        }
        
        function update() {
            updateMove(); updateMobs(); updateCamera();
            if(player.attackTimer > 0) player.attackTimer--;
            if(player.superCooldown > 0) player.superCooldown--;
            if(spawnTimer<=0) { if(mobs.length<MAX_MOBS) for(let i=0;i<2;i++) spawnMob(); spawnTimer=18; } else spawnTimer--;
            for(let i=0;i<messages.length;i++) if(messages[i].life) messages[i].life--;
            messages=messages.filter(m=>!m.life||m.life>0);
        }
        
        function getWorldClick(cx,cy) { let rect=canvas.getBoundingClientRect(), sx=canvasWidth/rect.width, sy=canvasHeight/rect.height; return { x:(cx-rect.left)*sx+cameraX, y:(cy-rect.top)*sy+cameraY }; }
        canvas.addEventListener('click',(e)=>{ let w=getWorldClick(e.clientX,e.clientY); handleClick(w.x,w.y); });
        canvas.addEventListener('touchstart',(e)=>{ e.preventDefault(); let t=e.touches[0]; let w=getWorldClick(t.clientX,t.clientY); handleClick(w.x,w.y); });
        setInterval(()=>{ if(selectedMob&&selectedMob.hp>0&&Math.hypot(player.x-selectedMob.x,player.y-selectedMob.y)<=CLASSES[player.classType].range+15) playerAttack(); },2000);
        
        document.getElementById('attackBtn').onclick=()=>{ if(selectedMob&&selectedMob.hp>0) playerAttack(); else addMsg("🎯 Выберите цель",true); };
        document.getElementById('skillBtn').onclick=()=>useSkill();
        document.getElementById('hpBtn').onclick=()=>useHp();
        document.getElementById('mpBtn').onclick=()=>useMp();
        document.getElementById('classBtn').onclick=()=>switchClass();
        document.getElementById('statsBtn').onclick=()=>{ showStats=!showStats; };
        document.getElementById('classWarriorBtn').onclick=()=>switchClass('warrior');
        document.getElementById('classArcherBtn').onclick=()=>switchClass('archer');
        document.getElementById('classMageBtn').onclick=()=>switchClass('mage');
        
        window.addEventListener('keydown',(e)=>{
            if(e.key==='1') useSuper();
            if(e.key==='2') useHp();
            if(e.key==='3') useMp();
            if(e.key==='s') useSkill();
            if(e.key==='c') switchClass();
        });
        
        function init() {
            generateWorld();
            player.x=safeZone.x+safeZone.width/2; player.y=safeZone.y+safeZone.height/2;
            player.hp=player.maxHp; player.mp=player.maxMp;
            for(let i=0;i<12;i++) spawnMob();
            addMsg("✨ Добро пожаловать!");
            addMsg(`🗡️ ${CLASSES.warrior.name} - ближний бой (${CLASSES.warrior.range}px)`);
            addMsg(`🏹 ${CLASSES.archer.name} - дальний бой (${CLASSES.archer.range}px)`);
            addMsg(`🔮 ${CLASSES.mage.name} - дальний бой (${CLASSES.mage.range}px)`);
            addMsg("🌟 1 - СУПЕРСИЛА | 2 - ЗЕЛЬЕ HP | 3 - ЗЕЛЬЕ MP");
            addMsg("🏪 Торговец в безопасной зоне (иконка 🏪)");
        }
        init();
        
        function render() { drawWorld(); for(let m of mobs) drawMob(m); drawPlayer(); drawUI(); }
        function loop() { update(); render(); requestAnimationFrame(loop); }
        loop();
    })();
</script>
</body>
</html>
